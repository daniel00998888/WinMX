<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control | WinMX Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { background: #050505; color: white; font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-10">
    <h1 class="text-4xl font-black mb-10 text-emerald-500 uppercase tracking-tighter italic">WinMX Admin <span class="text-white text-sm font-normal">Control de Depósitos</span></h1>

    <div class="grid grid-cols-1 gap-6" id="pending-list">
        </div>

    <script>
        // CREDENCIALES REALES RESTAURADAS
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        async function loadPending() {
            const { data, error } = await sb.from('history')
                .select('*, usuarios(saldo)')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });

            const container = document.getElementById('pending-list');
            if(error) return console.error(error);
            
            container.innerHTML = data.length === 0 ? '<p class="text-zinc-600">No hay depósitos pendientes.</p>' : '';

            data.forEach(dep => {
                container.innerHTML += `
                    <div class="bg-zinc-900 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                        <div class="flex gap-6 items-center">
                            <img src="${dep.evidence_url}" class="w-32 h-32 object-cover rounded-2xl border border-white/10 cursor-pointer" onclick="window.open('${dep.evidence_url}')">
                            <div>
                                <p class="text-emerald-500 font-bold text-2xl">$${dep.amount}</p>
                                <p class="text-[10px] text-zinc-500 font-mono">USUARIO ID: ${dep.user_id}</p>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="approve('${dep.id}', '${dep.user_id}', ${dep.amount}, ${dep.usuarios.saldo})" class="bg-emerald-500 text-black px-8 py-4 rounded-2xl font-black hover:bg-emerald-400">APROBAR</button>
                            <button onclick="reject('${dep.id}')" class="bg-red-500/10 text-red-500 px-8 py-4 rounded-2xl font-black border border-red-500/20 hover:bg-red-500 hover:text-white">RECHAZAR</button>
                        </div>
                    </div>
                `;
            });
        }

        async function approve(historyId, userId, amount, currentSaldo) {
            if(!confirm("¿Confirmas que el dinero llegó a tu banco?")) return;
            const newSaldo = currentSaldo + amount;
            await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', userId);
            await sb.from('history').update({ status: 'completed', label: 'DEPÓSITO APROBADO' }).eq('id', historyId);
            alert("Saldo cargado con éxito.");
            loadPending();
        }

        async function reject(id) {
            if(!confirm("¿Rechazar este depósito?")) return;
            await sb.from('history').update({ status: 'rejected', label: 'DEPÓSITO RECHAZADO' }).eq('id', id);
            loadPending();
        }

        loadPending();
        setInterval(loadPending, 10000); // Recarga cada 10 segundos
    </script>
</body>
</html>
