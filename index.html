<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino Royale</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0b1d2a,#09131c);
  color:white;
  text-align:center;
}

header{
  background:#102c3c;
  padding:15px;
  font-size:26px;
  font-weight:bold;
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.card{
  background:#16394f;
  padding:20px;
  border-radius:15px;
  width:260px;
  box-shadow:0 0 15px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#00c896;
  color:white;
  cursor:pointer;
  width:80%;
}

input,select{
  padding:8px;
  margin-top:10px;
  width:80%;
}

.logout{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
}
</style>
</head>

<body>

<header>🎰 CASINO ROYALE</header>

<button class="logout" onclick="logout()">Cerrar sesión</button>

<!-- LOGIN -->
<div id="auth">
<h2>Acceso</h2>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>

<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- CASINO -->
<div id="casino" style="display:none">
<h2>Saldo: $<span id="saldo">0</span></h2>

<div class="container">

<div class="card">
<h3>🎰 Slot</h3>
<input id="slotBet" type="number">
<button onclick="slot()">Girar</button>
<p id="slotRes"></p>
</div>

<div class="card">
<h3>🎲 Dado</h3>
<input id="diceBet" type="number">
<button onclick="dice()">Lanzar</button>
<p id="diceRes"></p>
</div>

<div class="card">
<h3>🎡 Ruleta</h3>
<input id="roulBet" type="number">
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>
<button onclick="roulette()">Girar</button>
<p id="roulRes"></p>
</div>

<div class="card">
<h3>🃏 Blackjack</h3>
<input id="bjBet" type="number">
<button onclick="blackjack()">Jugar</button>
<p id="bjRes"></p>
</div>

</div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dakhnqriwbzihlzhtfcb.supabase.co",
  "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

let user = null;
let saldo = 0;

// ================= AUTO LOGIN =================
async function checkSession(){
  const { data } = await supabase.auth.getSession();

  if(data.session){
    user = data.session.user;
    start();
  }
}
checkSession();

// ================= REGISTER =================
window.register = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const { error } = await supabase.auth.signUp({ email, password: pass });

  if(error){
    alert(error.message);
    return;
  }

  alert("Registro exitoso. Revisa tu correo 📩");
}

// ================= LOGIN =================
window.login = async function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if(error){
    alert(error.message);
    return;
  }

  user = data.user;
  start();
}

// ================= LOGOUT =================
window.logout = async function(){
  await supabase.auth.signOut();
  location.reload();
}

// ================= START =================
async function start(){

  document.getElementById("auth").style.display="none";
  document.getElementById("casino").style.display="block";

  let { data } = await supabase
    .from("usuarios")
    .select("*")
    .eq("id", user.id);

  if(data.length === 0){
    await supabase.from("usuarios").insert([{ id:user.id, saldo:1000 }]);
    saldo = 1000;
  }else{
    saldo = data[0].saldo;
  }

  update();
}

// ================= SAVE =================
async function save(){
  await supabase.from("usuarios").update({ saldo }).eq("id", user.id);
}

// ================= UI =================
function update(){
  document.getElementById("saldo").innerText = saldo;
}

// ================= JUEGOS =================
window.slot = function(){
  let bet = +document.getElementById("slotBet").value;
  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let win = Math.random()<0.3;
  saldo += win ? bet : -bet;

  document.getElementById("slotRes").innerText = win?"GANASTE 🎉":"PERDISTE ❌";
  update(); save();
}

window.dice = function(){
  let bet = +document.getElementById("diceBet").value;
  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let d = Math.floor(Math.random()*6)+1;
  let win = d>=4;

  saldo += win ? bet : -bet;

  document.getElementById("diceRes").innerText = "Resultado: "+d;
  update(); save();
}

window.roulette = function(){
  let bet = +document.getElementById("roulBet").value;
  let c = document.getElementById("color").value;

  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let r = Math.random()<0.5?"rojo":"negro";
  let win = r===c;

  saldo += win ? bet : -bet;

  document.getElementById("roulRes").innerText = "Resultado: "+r;
  update(); save();
}

window.blackjack = function(){
  let bet = +document.getElementById("bjBet").value;
  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let p = Math.floor(Math.random()*11)+11;
  let d = Math.floor(Math.random()*11)+11;

  let win = (p>d && p<=21)||d>21;

  saldo += win ? bet : -bet;

  document.getElementById("bjRes").innerText = `Tú:${p} Dealer:${d}`;
  update(); save();
}

</script>

</body>
</html>
