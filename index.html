<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1625, #1a2a3f);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
        .reel {
            width: 80px; height: 80px; background: #0f1c2e; border: 3px solid #22d3ee;
            border-radius: 12px; font-size: 42px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }
        @media (min-width: 640px) {
            .reel { width: 90px; height: 90px; font-size: 48px; }
        }
        .reel.spinning { animation: spin 0.9s linear infinite; }
        @keyframes spin { 0% { transform: translateY(-400%); } 100% { transform: translateY(0); } }
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .chat-box { scrollbar-width: thin; scrollbar-color: #22d3ee #1e2937; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-3 px-4 md:px-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-xl md:text-2xl font-bold tracking-wider neon-text">CASINO REAL PRO</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="text-lg md:text-2xl font-semibold text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 px-5 py-2 rounded-2xl text-sm transition">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-8">
                <span class="text-6xl">🎰</span>
                <h2 class="text-3xl md:text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">Accede para jugar</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-cyan-400 text-white">
            <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-cyan-400 text-white">
            <div class="flex gap-4">
                <button onclick="register()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-semibold transition text-sm md:text-base">Registrarse</button>
                <button onclick="login()" class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-black py-4 rounded-2xl font-semibold transition text-sm md:text-base">Entrar</button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[28px]"></p>
        </div>
    </div>

    <!-- CASINO -->
    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen overflow-hidden">

            <!-- SIDEBAR (responsive) -->
            <div id="sidebar" class="w-72 bg-zinc-950 border-r border-zinc-800 p-4 md:p-6 flex flex-col fixed md:static inset-y-0 left-0 z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="flex justify-between items-center mb-6 md:hidden">
                    <h1 class="text-xl font-bold neon-text">Menú</h1>
                    <button onclick="toggleSidebar()" class="text-2xl">✕</button>
                </div>

                <h3 class="text-cyan-400 font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-gamepad"></i> JUEGOS
                </h3>
                <div onclick="showGame('slot'); toggleSidebar()" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🎰</span><span class="font-medium">Slots</span>
                </div>
                <div onclick="showGame('roulette'); toggleSidebar()" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🎡</span><span class="font-medium">Ruleta</span>
                </div>
                <div onclick="showGame('dice'); toggleSidebar()" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🎲</span><span class="font-medium">Dados</span>
                </div>
                <div onclick="showGame('bj'); toggleSidebar()" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-8 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🃏</span><span class="font-medium">Blackjack</span>
                </div>

                <h3 class="text-cyan-400 font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-trophy"></i> TOP 5
                </h3>
                <div id="rankingBox" class="flex-1 space-y-3 overflow-auto"></div>
            </div>

            <!-- CONTENIDO PRINCIPAL -->
            <div class="flex-1 flex flex-col min-w-0">
                <!-- Botón para abrir sidebar en móvil -->
                <div class="md:hidden bg-zinc-900 border-b border-zinc-800 p-3 flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="text-2xl px-3">
                        <i class="fas fa-bars"></i>
                    </button>
                    <span class="font-bold">Casino Real</span>
                </div>

                <div class="flex-1 p-4 md:p-8 overflow-auto">
                    <!-- Games aquí (igual que antes) -->
                    <div id="slot" class="game">
                        <h2 class="text-3xl md:text-4xl font-bold mb-6 flex items-center gap-3"><span>🎰</span> Tragamonedas</h2>
                        <div class="max-w-lg mx-auto">
                            <div class="flex justify-center gap-4 md:gap-6 mb-8">
                                <div class="reel" id="r1">🍒</div>
                                <div class="reel" id="r2">💎</div>
                                <div class="reel" id="r3">7️⃣</div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-3 max-w-xs mx-auto">
                                <input id="betSlot" type="number" placeholder="Apuesta" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-center text-xl focus:outline-none focus:border-cyan-400">
                                <button onclick="spinSlot()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 px-8 py-4 rounded-2xl font-bold text-lg">GIRAR</button>
                            </div>
                            <p id="slotRes" class="text-center mt-8 text-2xl md:text-3xl font-bold min-h-[70px]"></p>
                        </div>
                    </div>

                    <!-- Los otros juegos (roulette, dice, bj) se mantienen igual, solo agregué hidden y responsive -->
                    <div id="roulette" class="game hidden"> ... (mantén el contenido de ruleta anterior) </div>
                    <div id="dice" class="game hidden"> ... (mantén el contenido de dados) </div>
                    <div id="bj" class="game hidden"> ... (mantén el contenido de blackjack) </div>
                </div>
            </div>

            <!-- CHAT (responsive) -->
            <div id="chatPanel" class="w-80 bg-zinc-950 border-l border-zinc-800 flex flex-col fixed md:static inset-y-0 right-0 z-50 transform translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="p-4 border-b border-zinc-800 bg-zinc-900 flex justify-between items-center md:hidden">
                    <h3 class="font-semibold">Chat en Vivo</h3>
                    <button onclick="toggleChat()" class="text-2xl">✕</button>
                </div>
                <div id="chatBox" class="chat-box flex-1 p-4 overflow-auto space-y-3 text-sm"></div>
                <div class="p-4 border-t border-zinc-800 bg-zinc-900">
                    <div class="flex gap-2">
                        <input id="chatInput" placeholder="Mensaje..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-cyan-400">
                        <button onclick="sendMsg()" class="bg-cyan-500 hover:bg-cyan-600 text-black px-6 rounded-2xl font-semibold text-sm">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        // === Todo el script anterior (auth, juegos, chat, ranking, etc.) ===
        // Mantengo el mismo JavaScript que funcionaba, solo agrego las funciones para toggle

        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        let user = null;
        let saldo = 0;
        let chatChannel = null;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function toggleChat() {
            const chat = document.getElementById('chatPanel');
            chat.classList.toggle('translate-x-full');
        }

        // Resto de funciones (msg, val, register, login, startCasino, spinSlot, etc.)
        // ... copia aquí todo el script de la versión anterior que ya funcionaba ...

        // Solo agrego al final de startCasino():
        async function startCasino() {
            // ... código anterior ...
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("casino").classList.remove("hidden");
            document.getElementById("topbar").classList.remove("hidden");
            // ... resto del código ...
            showGame('slot');
        }

        // INIT
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                startCasino();
            }
        };
    </script>
</body>
</html>
