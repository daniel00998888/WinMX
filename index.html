<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Ultra Premium Casino Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800;900&display=swap');
        
        :root {
            --mx-green: #10b981;
        }
        body {
            background-color: #070707;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        
        .glass-panel {
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .neon-text { text-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }

        /* Loader */
        #boot-loader {
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <!-- BOOT LOADER -->
    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-7xl font-casino italic mb-8 neon-text">Win<span class="text-emerald-500">MX</span></div>
        <div class="w-72 h-1.5 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-500" style="width: 0%"></div>
        </div>
        <p class="mt-6 text-xs font-bold text-zinc-500 tracking-[3px] uppercase">Cargando experiencia premium...</p>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="glass-panel p-12 rounded-[3rem] w-full max-w-md">
            <h2 class="text-5xl font-casino italic text-center mb-2">Win<span class="text-emerald-500">MX</span></h2>
            <p class="text-center text-zinc-500 text-sm mb-10">Ultra Premium Casino</p>
            
            <input id="auth-email" type="email" placeholder="CORREO ELECTRÓNICO" 
                   class="w-full bg-zinc-900 p-6 rounded-2xl border border-white/10 focus:border-emerald-500 outline-none mb-5 text-center text-lg">
            <input id="auth-password" type="password" placeholder="CONTRASEÑA" 
                   class="w-full bg-zinc-900 p-6 rounded-2xl border border-white/10 focus:border-emerald-500 outline-none mb-8 text-center text-lg">
            
            <button onclick="handleLogin()" 
                    class="w-full py-7 bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-2xl rounded-3xl transition-all">
                ENTRAR AL CASINO
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <nav class="glass-panel sticky top-0 z-50 px-6 py-5 border-b border-white/10">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-4xl">🎰</span>
                    <h1 class="text-4xl font-casino italic tracking-tighter neon-text">WinMX</h1>
                </div>
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <span class="text-xs text-zinc-500 uppercase tracking-widest">Saldo</span>
                        <div id="balance-display" class="text-4xl font-casino text-emerald-400">$0</div>
                    </div>
                    <button onclick="logout()" class="px-6 py-3 bg-red-500/10 hover:bg-red-500/20 rounded-2xl text-red-400 transition-all">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <div class="glass-panel p-10 rounded-[3rem]">
                <div class="grid grid-cols-3 gap-6 mb-10">
                    <div class="reel"><div id="reel-1" class="slot-reel flex flex-col"></div></div>
                    <div class="reel"><div id="reel-2" class="slot-reel flex flex-col"></div></div>
                    <div class="reel"><div id="reel-3" class="slot-reel flex flex-col"></div></div>
                </div>

                <div class="flex flex-col md:flex-row gap-6 items-center justify-center">
                    <div class="flex gap-4">
                        <button onclick="changeBet(-10)" class="w-14 h-14 rounded-2xl bg-zinc-800 hover:bg-zinc-700 text-2xl">−</button>
                        <div class="text-center min-w-[120px]">
                            <span class="text-xs text-zinc-500">APUESTA</span>
                            <div id="bet-display" class="text-4xl font-casino">$10</div>
                        </div>
                        <button onclick="changeBet(10)" class="w-14 h-14 rounded-2xl bg-zinc-800 hover:bg-zinc-700 text-2xl">+</button>
                    </div>
                    <button onclick="spin()" id="spin-btn"
                            class="bg-emerald-500 hover:bg-emerald-600 text-black font-bold px-20 py-8 rounded-3xl text-4xl font-casino tracking-wider">
                        GIRAR
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let currentUser = null;
        let balance = 0;
        let currentBet = 10;

        // ==================== LOADER ====================
        function hideLoader() {
            const loader = document.getElementById('boot-loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 800);
        }

        // ==================== AUTH ====================
        async function handleLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            if (!email || !password) {
                alert("Por favor ingresa correo y contraseña");
                return;
            }

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Error de inicio de sesión: " + error.message);
                return;
            }

            currentUser = data.user;
            await loadUserBalance();
            
            // Ocultar auth y mostrar app
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            initReels();
        }

        async function loadUserBalance() {
            if (!currentUser) return;
            const { data } = await sb.from('usuarios').select('saldo').eq('id', currentUser.id).single();
            balance = data ? data.saldo : 0;
            document.getElementById('balance-display').textContent = '$' + balance.toLocaleString('es-MX');
        }

        async function saveBalance() {
            if (!currentUser) return;
            await sb.from('usuarios').update({ saldo: balance }).eq('id', currentUser.id);
        }

        // ==================== SLOTS ====================
        function initReels() {
            const symbols = ['🍒', '💎', '7️⃣', '⭐', '🔔', '🍉'];
            [1,2,3].forEach(i => {
                const reel = document.getElementById(`reel-${i}`);
                reel.innerHTML = '';
                for (let j = 0; j < 30; j++) {
                    reel.innerHTML += `<div class="slot-item">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
                }
            });
        }

        async function spin() {
            if (balance < currentBet) {
                alert("Saldo insuficiente");
                return;
            }

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.textContent = "GIRANDO...";

            // Animación
            [1,2,3].forEach(i => {
                const reel = document.getElementById(`reel-${i}`);
                reel.style.transition = 'transform 3.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
                reel.style.transform = `translateY(-${160 * 15}px)`;
            });

            setTimeout(async () => {
                const symbols = ['🍒', '💎', '7️⃣', '⭐', '🔔', '🍉'];
                const result = [
                    symbols[Math.floor(Math.random()*symbols.length)],
                    symbols[Math.floor(Math.random()*symbols.length)],
                    symbols[Math.floor(Math.random()*symbols.length)]
                ];

                [1,2,3].forEach((i, idx) => {
                    const reel = document.getElementById(`reel-${i}`);
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0)';
                    reel.innerHTML = `<div class="slot-item">${result[idx]}</div>`;
                });

                const isWin = result[0] === result[1] && result[1] === result[2];
                const winAmount = isWin ? currentBet * 15 : 0;
                balance += winAmount - currentBet;

                await saveBalance();
                await loadUserBalance();

                if (isWin) alert(`¡GANASTE $${winAmount}!`);
                else alert(`Perdiste $${currentBet}`);

                btn.disabled = false;
                btn.textContent = "GIRAR";
            }, 3200);
        }

        function changeBet(delta) {
            currentBet = Math.max(10, currentBet + delta);
            document.getElementById('bet-display').textContent = '$' + currentBet;
        }

        function logout() {
            sb.auth.signOut();
            location.reload();
        }

        // ==================== INICIO ====================
        window.onload = async () => {
            // Animación del loader
            let progress = 0;
            const bar = document.getElementById('boot-bar');
            const loaderInterval = setInterval(() => {
                progress += Math.random() * 25;
                bar.style.width = `${Math.min(progress, 100)}%`;
                if (progress >= 100) {
                    clearInterval(loaderInterval);
                }
            }, 120);

            // Verificar sesión
            const { data: { session } } = await sb.auth.getSession();
            
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await loadUserBalance();
                initReels();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }

            // Ocultar loader después de cargar
            setTimeout(() => {
                hideLoader();
            }, 800);
        };
    </script>
</body>
</html>
