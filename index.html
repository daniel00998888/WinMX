<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Original Ecosystem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --st-bg: #0f212e;
            --st-sidebar: #1a2c38;
            --st-card: #213743;
            --st-accent: #00e701;
            --st-text-muted: #b1bad3;
            --st-header: #1a2c38;
            --st-input: #0f212e;
            --st-blue: #2f4553;
            --st-transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--st-bg); color: #fff; overflow-x: hidden; }

        /* SCROLLBAR CUSTOMIZATION */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--st-bg); }
        ::-webkit-scrollbar-thumb { background: var(--st-card); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--st-text-muted); }

        /* LAYOUT CORE */
        .app-wrapper { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; transition: var(--st-transition); }
        .sidebar-collapsed { grid-template-columns: 60px 1fr; }

        /* HEADER & NAVIGATION */
        header { 
            height: 64px; background: var(--st-header); border-bottom: 2px solid rgba(0,0,0,0.1); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            position: sticky; top: 0; z-index: 1000;
        }

        .monedero-mx {
            background: var(--st-blue); display: flex; align-items: center; border-radius: 4px;
            padding: 2px; gap: 10px; border: 1px solid rgba(255,255,255,0.05);
        }

        /* SIDEBAR STYLING */
        aside { 
            background: var(--st-sidebar); display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.05); overflow-y: auto; height: calc(100vh - 64px);
            position: sticky; top: 64px;
        }

        .nav-item {
            padding: 12px 20px; display: flex; align-items: center; gap: 15px; color: var(--st-text-muted);
            cursor: pointer; transition: var(--st-transition); font-weight: 600; font-size: 14px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-item.active { color: #fff; border-left: 3px solid var(--st-accent); background: rgba(0,231,1,0.03); }
        .nav-item i { width: 20px; text-align: center; font-size: 18px; }

        /* GAME GRID */
        .main-content { padding: 40px; max-width: 1400px; mx-auto; }
        .game-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; margin-top: 25px; 
        }

        .game-card {
            background: var(--st-card); border-radius: 8px; overflow: hidden;
            position: relative; transition: var(--st-transition); cursor: pointer;
            aspect-ratio: 3/4;
        }

        .game-card:hover { transform: translateY(-8px); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; }

        .game-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .game-card:hover .game-overlay { opacity: 1; }

        .live-tag {
            position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7);
            padding: 2px 8px; border-radius: 10px; font-size: 10px; display: flex; align-items: center; gap: 4px;
        }
        .dot { width: 6px; height: 6px; background: var(--st-accent); border-radius: 50%; }

        /* SEARCH BAR */
        .search-container {
            background: var(--st-card); border-radius: 50px; display: flex; align-items: center;
            padding: 0 20px; border: 2px solid transparent; transition: 0.3s;
        }
        .search-container:focus-within { border-color: var(--st-blue); }
        .search-container input { 
            background: transparent; border: none; padding: 15px; color: #fff; width: 100%;
            outline: none; font-size: 14px;
        }

        /* BUTTONS STAKE STYLE */
        .btn-monedero { background: #213743; color: #fff; font-weight: 700; padding: 8px 16px; border-radius: 4px; font-size: 14px; }
        .btn-deposit { background: #007aff; color: #fff; font-weight: 700; padding: 8px 24px; border-radius: 4px; font-size: 14px; }

        /* LOADER */
        #loader { background: var(--st-bg); z-index: 10000; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center">
        <div class="mb-4 text-4xl font-black italic text-white animate-pulse">Win<span class="text-[#00e701]">MX</span></div>
        <div class="w-48 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div id="p-bar" class="h-full bg-[#00e701] transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header>
        <div class="flex items-center gap-6">
            <i onclick="UI.toggleSidebar()" class="fas fa-bars text-xl cursor-pointer text-gray-400 hover:text-white"></i>
            <div class="text-2xl font-black italic tracking-tighter">Win<span class="text-[#00e701]">MX</span></div>
        </div>

        <div class="flex items-center gap-4">
            <div class="monedero-mx">
                <span id="u-balance" class="px-3 font-bold text-sm">MX$0.00</span>
                <button onclick="UI.showCashier()" class="btn-deposit hover:brightness-110">Monedero</button>
            </div>
            <div class="flex items-center gap-4 text-gray-400 ml-4">
                <i class="fas fa-search cursor-pointer"></i>
                <i class="fas fa-user-circle text-2xl cursor-pointer text-white"></i>
            </div>
        </div>
    </header>

    <div class="app-wrapper" id="app-grid">
        <aside id="sidebar">
            <div class="py-4">
                <div class="nav-item active"><i class="fas fa-star"></i> <span>Favoritos</span></div>
                <div class="nav-item"><i class="fas fa-history"></i> <span>Reciente</span></div>
                <div class="nav-item"><i class="fas fa-trophy"></i> <span>Desafíos</span></div>
                <div class="nav-item"><i class="fas fa-file-invoice-dollar"></i> <span>Mis Apuestas</span></div>
            </div>
            
            <div class="border-t border-gray-800 my-2"></div>
            
            <div class="px-5 py-4 text-[11px] font-bold text-gray-500 uppercase tracking-widest">Juegos</div>
            <div class="nav-item"><i class="fas fa-gem text-blue-400"></i> <span>Solo en WinMX</span></div>
            <div class="nav-item"><i class="fas fa-rocket text-purple-400"></i> <span>Lanzamientos</span></div>
            <div class="nav-item"><i class="fas fa-dice text-green-400"></i> <span>Originales</span></div>
            <div class="nav-item"><i class="fas fa-bolt text-yellow-400"></i> <span>Tragamonedas</span></div>
            <div class="nav-item"><i class="fas fa-video text-red-400"></i> <span>Casino en Vivo</span></div>
        </aside>

        <main class="main-content">
            <h1 class="text-2xl font-bold mb-8 flex items-center gap-3">
                <i class="fas fa-dice text-[#00e701]"></i> Originales De WinMX
            </h1>

            <div class="search-container mb-10">
                <i class="fas fa-search text-gray-500"></i>
                <input type="text" placeholder="Busca tu juego..." id="game-search">
            </div>

            <div class="game-grid" id="grid-container">
                </div>
        </main>
    </div>

    <div id="modal-cajero" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[2000] hidden items-center justify-center p-4">
        <div class="bg-[#1a2c38] w-full max-w-md rounded-xl p-8 shadow-2xl animate__animated animate__fadeInUp">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Depositar MXN</h2>
                <i onclick="UI.hideCashier()" class="fas fa-times cursor-pointer text-gray-500 hover:text-white"></i>
            </div>
            <div class="space-y-6">
                <div class="bg-[#0f212e] p-4 rounded-lg">
                    <label class="text-xs text-gray-500 font-bold uppercase block mb-2">Monto del Depósito</label>
                    <input id="dep-amount" type="number" value="100" class="bg-transparent border-none text-2xl font-bold text-white w-full outline-none">
                </div>
                <button onclick="Core.processDeposit()" class="w-full py-4 bg-[#00e701] text-black font-extrabold rounded-lg hover:scale-[1.02] transition-all">Confirmar en Cajero</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE DATOS ---
        const GAMES_DB = [
            { id: 'mines', name: 'MINES', img: 'https://stake.com/games/mines.png', players: '3,427', color: 'bg-blue-600' },
            { id: 'dice', name: 'DICE', img: 'https://stake.com/games/dice.png', players: '2,735', color: 'bg-red-600' },
            { id: 'plinko', name: 'PLINKO', img: 'https://stake.com/games/plinko.png', players: '1,463', color: 'bg-pink-600' },
            { id: 'limbo', name: 'LIMBO', img: 'https://stake.com/games/limbo.png', players: '2,038', color: 'bg-orange-500' },
            { id: 'crash', name: 'CRASH', img: 'https://stake.com/games/crash.png', players: '5,102', color: 'bg-emerald-500' },
            { id: 'hilo', name: 'HILO', img: 'https://stake.com/games/hilo.png', players: '890', color: 'bg-indigo-600' },
            { id: 'keno', name: 'KENO', img: 'https://stake.com/games/keno.png', players: '1,120', color: 'bg-yellow-600' },
            { id: 'blackjack', name: 'BLACKJACK', img: 'https://stake.com/games/blackjack.png', players: '1,069', color: 'bg-blue-900' }
        ];

        const Core = {
            balance: 0.00,
            
            init() {
                this.loadGames();
                this.animateLoader();
            },

            animateLoader() {
                let p = 0;
                const int = setInterval(() => {
                    p += Math.random() * 30;
                    document.getElementById('p-bar').style.width = p + '%';
                    if(p >= 100) {
                        clearInterval(int);
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                    }
                }, 200);
            },

            loadGames() {
                const container = document.getElementById('grid-container');
                container.innerHTML = GAMES_DB.map(game => `
                    <div class="game-card animate__animated animate__fadeIn">
                        <div class="absolute inset-0 ${game.color} opacity-20"></div>
                        <img src="${game.img}" alt="${game.name}" onerror="this.src='https://placehold.co/400x600/213743/white?text=${game.name}'">
                        <div class="game-overlay">
                            <button class="bg-[#00e701] text-black w-12 h-12 rounded-full flex items-center justify-center">
                                <i class="fas fa-play"></i>
                            </button>
                        </div>
                        <div class="live-tag">
                            <div class="dot"></div>
                            <span>${game.players}</span>
                        </div>
                    </div>
                `).join('');
            },

            processDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                this.balance += amt;
                document.getElementById('u-balance').innerText = `MX$${this.balance.toFixed(2)}`;
                UI.hideCashier();
                alert(`¡Depósito de MX$${amt} exitoso!`);
            }
        };

        const UI = {
            toggleSidebar() {
                document.getElementById('app-grid').classList.toggle('sidebar-collapsed');
            },
            showCashier() {
                document.getElementById('modal-cajero').style.display = 'flex';
            },
            hideCashier() {
                document.getElementById('modal-cajero').style.display = 'none';
            }
        };

        window.onload = () => Core.init();
    </script>
</body>
</html>
