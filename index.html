<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --mx-green: #10b981; --mx-yellow: #f59e0b; --mx-red: #ef4444; --mx-dark: #070707; }
        body { background-color: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass-panel { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        
        .slot-box { height: 140px; overflow: hidden; background: linear-gradient(180deg, #000 0%, #0a0a0a 50%, #000 100%); border: 3px solid #1a1a1a; border-radius: 1.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .slot-item { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }

        .btn-action { background: var(--mx-green); color: black; font-weight: 900; transition: all 0.3s ease; }
        .btn-action:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); }
        .tab-btn.active { color: var(--mx-green); border-bottom: 3px solid var(--mx-green); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="text-6xl font-casino italic mb-6 animate-pulse text-emerald-500">WinMX</div>
        <div class="w-64 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="main-app" class="opacity-0 transition-opacity duration-1000">
        <nav class="glass-panel sticky top-0 z-[100] px-6 md:px-12 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl font-casino italic">Win<span class="text-emerald-500">MX</span></h1>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <span class="text-[10px] text-zinc-500 font-black uppercase tracking-widest">Balance Total</span>
                        <div id="balance-display" class="text-2xl md:text-4xl font-casino text-white leading-none">$0.00</div>
                    </div>
                    <button onclick="Auth.logout()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                        <i class="fas fa-power-off text-xl"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <div class="glass-panel p-8 md:p-14 rounded-[3rem] md:rounded-[4rem]">
                    <div class="grid grid-cols-3 gap-4 md:gap-8 mb-12">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    <div class="flex flex-col md:flex-row items-center justify-between gap-8 bg-black/40 p-8 rounded-[3rem]">
                        <div class="flex items-center gap-6">
                            <button onclick="Game.changeBet(-10)" class="w-14 h-14 rounded-2xl bg-zinc-800 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all text-xl"><i class="fas fa-minus"></i></button>
                            <div class="text-center min-w-[100px]">
                                <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Apuesta</p>
                                <span id="bet-display" class="text-4xl font-casino text-white">$10</span>
                            </div>
                            <button onclick="Game.changeBet(10)" class="w-14 h-14 rounded-2xl bg-zinc-800 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all text-xl"><i class="fas fa-plus"></i></button>
                        </div>
                        <button id="spin-btn" onclick="Game.spin()" class="btn-action w-full md:w-auto px-20 py-8 rounded-[2.5rem] font-casino text-4xl italic">GIRAR</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-panel p-8 rounded-[3rem] min-h-[500px] flex flex-col">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="UI.openModal('modal-deposit')" class="py-4 bg-emerald-500 text-black font-black rounded-2xl text-[11px] uppercase tracking-wider">Depositar</button>
                        <button class="py-4 bg-zinc-800 text-zinc-500 font-black rounded-2xl text-[11px] uppercase cursor-not-allowed italic">Retirar</button>
                    </div>
                    <div class="flex gap-6 mb-6 border-b border-white/5">
                        <button onclick="UI.switchTab('bets')" id="tab-bets-btn" class="pb-3 text-[10px] font-bold uppercase tracking-widest tab-btn active">Actividad</button>
                        <button onclick="UI.switchTab('deposits')" id="tab-deps-btn" class="pb-3 text-[10px] font-bold uppercase tracking-widest tab-btn">Depósitos</button>
                    </div>
                    <div id="history-content" class="flex-grow space-y-3 overflow-y-auto max-h-[450px] custom-scroll pr-2"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[1000] flex items-center justify-center hidden p-4">
        <div class="glass-panel p-10 md:p-14 rounded-[3.5rem] w-full max-w-lg animate__animated animate__zoomIn">
            <div id="dep-step-1">
                <h2 class="font-casino text-3xl text-center mb-8 italic">Monto a <span class="text-emerald-500">Recargar</span></h2>
                <div class="relative mb-10 text-center">
                    <input id="dep-amount" type="number" placeholder="0.00" class="w-full bg-transparent text-center text-6xl md:text-8xl font-casino border-b-2 border-zinc-900 focus:border-emerald-500 outline-none py-4 text-white">
                </div>
                <div class="grid grid-cols-3 gap-3 mb-10 text-center">
                    <button onclick="UI.setDep(100)" class="py-4 bg-white/5 rounded-2xl text-[11px] font-black hover:bg-emerald-500 hover:text-black transition-all">+$100</button>
                    <button onclick="UI.setDep(500)" class="py-4 bg-white/5 rounded-2xl text-[11px] font-black hover:bg-emerald-500 hover:text-black transition-all">+$500</button>
                    <button onclick="UI.setDep(1000)" class="py-4 bg-white/5 rounded-2xl text-[11px] font-black hover:bg-emerald-500 hover:text-black transition-all">+$1000</button>
                </div>
                <button onclick="UI.depNextStep()" class="btn-action w-full py-7 rounded-3xl font-casino text-xl">Continuar</button>
            </div>
            <div id="dep-step-2" class="hidden">
                <h2 class="font-casino text-2xl text-center mb-4 italic">Instrucciones de <span class="text-emerald-500">Pago</span></h2>
                <div class="bg-emerald-500/5 p-6 rounded-3xl border border-emerald-500/10 mb-6 text-center">
                    <p class="text-[9px] font-black text-emerald-500 uppercase mb-2">Total a Transferir:</p>
                    <p id="dep-final-amount" class="text-4xl font-casino text-white mb-4">$0.00</p>
                    <p class="text-xl md:text-2xl font-mono font-bold text-white tracking-tighter">722 969 020 533 491 161</p>
                </div>
                <input type="file" id="receipt-input" class="hidden" accept="image/*">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-3xl p-8 flex flex-col items-center justify-center cursor-pointer hover:border-emerald-500 transition-all">
                    <i class="fas fa-camera text-3xl text-zinc-700 mb-2"></i>
                    <p id="file-label" class="text-[10px] font-black text-zinc-500 uppercase">Click para subir comprobante</p>
                </label>
                <button id="final-dep-btn" onclick="Core.confirmDeposit()" class="btn-action w-full py-6 rounded-2xl font-casino text-xl mt-6">Validar Depósito</button>
            </div>
            <button onclick="UI.closeModal('modal-deposit')" class="mt-8 block mx-auto text-[10px] font-black text-zinc-700 uppercase hover:text-white transition-colors">Cancelar depósito</button>
        </div>
    </div>

    <div id="notif-container" class="fixed bottom-10 right-10 z-[2000] flex flex-col gap-3"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, currentTab: 'bets', symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'] };
        const PAYTABLE = { '🍒🍒🍒': 5, '🍋🍋🍋': 10, '🔔🔔🔔': 20, '⭐️⭐️⭐️': 50, '💎💎💎': 100, '7️⃣7️⃣7️⃣': 500 };

        // FUNCIONES DE AUTENTICACIÓN AÑADIDAS
        const Auth = {
            async logout() {
                const { error } = await sb.auth.signOut();
                if (error) UI.notify("Error al salir", "error");
                location.reload(); // Esto te mandará a la página de login automáticamente
            }
        };

        const Core = {
            async init() {
                let p = 0;
                const int = setInterval(() => {
                    p += 20;
                    document.getElementById('boot-bar').style.width = `${Math.min(p, 100)}%`;
                    if(p >= 100) { clearInterval(int); this.checkSession(); }
                }, 50);
            },
            async checkSession() {
                const { data: { session } } = await sb.auth.getSession();
                if (session) { 
                    State.user = session.user; 
                    this.loadData(); 
                } else {
                    // Si no hay sesión, puedes redirigir aquí o mostrar login
                    document.getElementById('boot-loader').innerHTML = '<p class="text-white font-casino">Sesión expirada. Redirigiendo...</p>';
                    setTimeout(() => location.reload(), 1500);
                }
            },
            async loadData() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if (data) { State.balance = data.saldo; UI.updateBalance(); Game.initReels(); this.fetchHistory(); }
                document.getElementById('boot-loader').classList.add('opacity-0');
                setTimeout(() => { document.getElementById('boot-loader').remove(); document.getElementById('main-app').classList.add('opacity-100'); }, 700);
            },
            async fetchHistory() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', State.currentTab).order('created_at', { ascending: false });
                UI.renderHistory(data || []);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Sube el comprobante primero", "error");

                const btn = document.getElementById('final-dep-btn');
                btn.disabled = true; btn.innerText = "VALIDANDO...";

                try {
                    const path = `evidence/${State.user.id}/${Date.now()}.png`;
                    await sb.storage.from('comprobantes').upload(path, file);
                    const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);

                    await sb.from('history').insert({
                        user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPÓSITO', status: 'pending', evidence_url: publicUrl
                    });

                    UI.notify("Depósito enviado a revisión", "success");
                    UI.closeModal('modal-deposit');
                    this.fetchHistory();
                } catch(e) { UI.notify("Error de red", "error"); }
                btn.disabled = false; btn.innerText = "Validar Depósito";
            }
        };

        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    [...State.symbols, ...State.symbols, ...State.symbols].forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`);
                });
            },
            changeBet(v) { State.currentBet = Math.max(10, State.currentBet + v); document.getElementById('bet-display').innerText = `$${State.currentBet}`; },
            async spin() {
                if(State.isSpinning || State.balance < State.currentBet) return UI.notify("Saldo insuficiente", "error");
                State.isSpinning = true;
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;

                const results = [State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)]];
                const combo = results.join('');
                const winMult = PAYTABLE[combo] || 0;
                const winAmt = State.currentBet * winMult;
                const netChange = winAmt - State.currentBet;

                [1,2,3].forEach((id, i) => {
                    const reel = document.getElementById(`reel-${id}`);
                    const idx = State.symbols.indexOf(results[i]);
                    reel.style.transform = `translateY(-${(idx * 140) + (140 * 6)}px)`;
                });

                setTimeout(async () => {
                    State.balance += netChange;
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert({ user_id: State.user.id, type: 'bets', amount: netChange, label: winMult > 0 ? `PREMIO X${winMult}` : 'JUEGO', status: 'completed' });
                    UI.updateBalance(); Core.fetchHistory();
                    State.isSpinning = false; btn.disabled = false;
                    this.resetReels();
                }, 3500);
            },
            resetReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transition = 'none'; r.style.transform = 'translateY(0)';
                    setTimeout(() => r.style.transition = 'transform 3.5s cubic-bezier(0.15, 0, 0.05, 1)', 50);
                });
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString()}`; },
            notify(m, t) {
                const c = document.getElementById('notif-container');
                const n = document.createElement('div');
                n.className = `p-5 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInUp ${t==='success'?'bg-emerald-500 text-black':'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n);
                setTimeout(() => { n.classList.replace('animate__fadeInUp', 'animate__fadeOutDown'); setTimeout(()=>n.remove(), 500); }, 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { 
                document.getElementById(id).classList.add('hidden');
                document.getElementById('dep-step-1').classList.remove('hidden');
                document.getElementById('dep-step-2').classList.add('hidden');
            },
            setDep(v) { document.getElementById('dep-amount').value = v; },
            depNextStep() { 
                const amt = document.getElementById('dep-amount').value;
                if(!amt || amt <= 0) return UI.notify("Pon un monto válido", "error");
                document.getElementById('dep-final-amount').innerText = `$${parseFloat(amt).toLocaleString()}`;
                document.getElementById('dep-step-1').classList.add('hidden'); 
                document.getElementById('dep-step-2').classList.remove('hidden'); 
            },
            switchTab(t) {
                State.currentTab = t;
                document.getElementById('tab-bets-btn').classList.toggle('active', t === 'bets');
                document.getElementById('tab-deps-btn').classList.toggle('active', t === 'deposits');
                Core.fetchHistory();
            },
            renderHistory(data) {
                const c = document.getElementById('history-content');
                c.innerHTML = data.length ? data.map(i => {
                    let colorClass = 'text-zinc-500';
                    let statusText = i.label;
                    if (i.type === 'deposits') {
                        if (i.status === 'pending') { colorClass = 'text-amber-500'; statusText = 'DEPOSITO PENDIENTE ⏳'; }
                        else if (i.status === 'completed') { colorClass = 'text-emerald-500'; statusText = 'DEPOSITO APROBADO ✅'; }
                        else if (i.status === 'rejected') { colorClass = 'text-red-500'; statusText = 'DEPOSITO RECHAZADO ❌'; }
                    } else if (i.amount > 0) { colorClass = 'text-emerald-500'; }
                    return `<div class="p-5 bg-white/5 rounded-3xl flex justify-between items-center border border-white/5">
                        <div><p class="text-[9px] font-black uppercase mb-1 ${colorClass}">${statusText}</p>
                        <p class="text-[11px] font-bold text-zinc-600">${new Date(i.created_at).toLocaleTimeString()}</p></div>
                        <p class="font-casino ${colorClass}">${i.amount >= 0 ? '+' : ''}$${Math.abs(i.amount)}</p></div>`;
                }).join('') : '<p class="text-center text-zinc-800 font-bold uppercase text-[10px] py-10 italic">Sin actividad</p>';
            }
        };

        Core.init();
    </script>
</body>
</html>
