<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino PRO</title>

<!-- SUPABASE CDN CORRECTO -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1d2a;color:white;text-align:center}
header{background:#102c3c;padding:15px;font-size:24px}
.container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-top:20px}
.card{background:#16394f;padding:20px;border-radius:10px;width:260px}
button{padding:10px;margin-top:10px;border:none;border-radius:5px;background:#00c896;color:white;cursor:pointer}
input,select{padding:8px;margin-top:10px;width:80%}
</style>
</head>

<body>

<header>🎰 Casino PRO</header>

<div id="auth">
<h3>Login / Registro</h3>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
<button onclick="register()">Registrar</button>
</div>

<div id="casino" style="display:none">
<h2>Saldo: $<span id="saldo">0</span></h2>

<div class="container">

<div class="card">
<h3>🎰 Slot</h3>
<input id="slotBet" type="number" placeholder="Apuesta">
<button onclick="slot()">Jugar</button>
<p id="slotRes"></p>
</div>

<div class="card">
<h3>🎲 Dado</h3>
<input id="diceBet" type="number" placeholder="Apuesta">
<button onclick="dice()">Lanzar</button>
<p id="diceRes"></p>
</div>

<div class="card">
<h3>🎡 Ruleta</h3>
<input id="roulBet" type="number" placeholder="Apuesta">
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>
<button onclick="roulette()">Girar</button>
<p id="roulRes"></p>
</div>

<div class="card">
<h3>🃏 Blackjack</h3>
<input id="bjBet" type="number" placeholder="Apuesta">
<button onclick="blackjack()">Jugar</button>
<p id="bjRes"></p>
</div>

</div>
</div>

<script>
// ⚠️ PON TUS DATOS DE SUPABASE AQUÍ
const supabaseUrl = "https://dakhnqriwbzihlzhtfcb.supabase.co";
const supabaseKey = "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let saldo = 0;
let user = null;

// REGISTRO
async function register(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const { error } = await supabase.auth.signUp({ email, password: pass });

  if(error) return alert(error.message);
  alert("Registrado correctamente");
}

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if(error) return alert(error.message);

  user = data.user;
  start();
}

// INICIAR CASINO
async function start(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("casino").style.display = "block";

  let { data, error } = await supabase
    .from("usuarios")
    .select("*")
    .eq("id", user.id);

  if(error) return alert(error.message);

  if(data.length === 0){
    await supabase.from("usuarios").insert([{ id: user.id, saldo: 1000 }]);
    saldo = 1000;
  } else {
    saldo = data[0].saldo;
  }

  update();
}

// ACTUALIZAR UI
function update(){
  document.getElementById("saldo").innerText = saldo;
}

// GUARDAR EN DB
async function save(){
  await supabase
    .from("usuarios")
    .update({ saldo })
    .eq("id", user.id);
}

// 🎰 SLOT
function slot(){
  let bet = parseInt(document.getElementById("slotBet").value);

  if(!bet || bet <= 0 || bet > saldo) return alert("Apuesta inválida");

  let win = Math.random() < 0.3;

  saldo += win ? bet : -bet;

  document.getElementById("slotRes").innerText = win ? "Ganaste 🎉" : "Perdiste ❌";

  update(); save();
}

// 🎲 DADO
function dice(){
  let bet = parseInt(document.getElementById("diceBet").value);

  if(!bet || bet <= 0 || bet > saldo) return alert("Apuesta inválida");

  let d = Math.floor(Math.random() * 6) + 1;
  let win = d >= 4;

  saldo += win ? bet : -bet;

  document.getElementById("diceRes").innerText = "Salió: " + d;

  update(); save();
}

// 🎡 RULETA
function roulette(){
  let bet = parseInt(document.getElementById("roulBet").value);
  let c = document.getElementById("color").value;

  if(!bet || bet <= 0 || bet > saldo) return alert("Apuesta inválida");

  let r = Math.random() < 0.5 ? "rojo" : "negro";
  let win = r === c;

  saldo += win ? bet : -bet;

  document.getElementById("roulRes").innerText = "Resultado: " + r;

  update(); save();
}

// 🃏 BLACKJACK
function blackjack(){
  let bet = parseInt(document.getElementById("bjBet").value);

  if(!bet || bet <= 0 || bet > saldo) return alert("Apuesta inválida");

  let player = Math.floor(Math.random()*11)+11;
  let dealer = Math.floor(Math.random()*11)+11;

  let win = (player > dealer && player <= 21) || dealer > 21;

  saldo += win ? bet : -bet;

  document.getElementById("bjRes").innerText =
    `Tú: ${player} | Dealer: ${dealer}`;

  update(); save();
}
</script>

</body>
</html>
