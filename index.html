<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background-color: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass-panel { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        
        /* Slot Reels */
        .slot-box { height: 120px; overflow: hidden; background: #000; border: 2px solid #1a1a1a; border-radius: 1rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .slot-item { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }

        .btn-action { background: var(--mx-green); color: black; font-weight: 900; transition: all 0.3s; }
        .btn-action:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        
        .input-auth { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 1rem; outline: none; width: 100%; transition: border 0.3s; }
        .input-auth:focus { border-color: var(--mx-green); }

        .hidden-view { display: none !important; }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[2000] bg-black flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-5xl font-casino italic mb-4 animate-pulse text-emerald-500">WinMX</div>
        <div class="w-48 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-900/20 via-black to-black">
        <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] w-full max-w-md animate__animated animate__fadeInUp">
            <h2 class="text-4xl font-casino italic text-center mb-2">Bienvenido</h2>
            <p class="text-zinc-500 text-center text-sm mb-8 font-bold uppercase tracking-widest">Premium Casino Experience</p>
            
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Correo Electrónico" class="input-auth text-white">
                <input id="auth-password" type="password" placeholder="Contraseña" class="input-auth text-white">
                
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="Auth.login()" class="btn-action py-4 rounded-2xl font-casino">Entrar</button>
                    <button onclick="Auth.register()" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-casino text-sm">Registro</button>
                </div>
            </div>
            <p class="mt-8 text-[10px] text-zinc-600 text-center uppercase font-black">Al entrar aceptas nuestros términos de juego responsable</p>
        </div>
    </div>

    <div id="casino-view" class="hidden-view min-h-screen flex flex-col">
        <nav class="glass-panel sticky top-0 z-[100] px-6 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-casino italic">Win<span class="text-emerald-500">MX</span></h1>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <span class="text-[9px] text-zinc-500 font-black uppercase">Balance</span>
                        <div id="balance-display" class="text-xl md:text-2xl font-casino text-white leading-none">$0.00</div>
                    </div>
                    <button onclick="Auth.logout()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 overflow-y-auto">
            <div class="lg:col-span-8">
                <div class="glass-panel p-6 md:p-12 rounded-[3rem]">
                    <div class="grid grid-cols-3 gap-3 md:gap-6 mb-8">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    <div class="flex flex-col md:flex-row items-center justify-between gap-6 bg-black/40 p-6 rounded-[2rem]">
                        <div class="flex items-center gap-4">
                            <button onclick="Game.changeBet(-10)" class="w-10 h-10 rounded-lg bg-zinc-800">-</button>
                            <div class="text-center min-w-[70px]">
                                <span id="bet-display" class="text-2xl font-casino">$10</span>
                            </div>
                            <button onclick="Game.changeBet(10)" class="w-10 h-10 rounded-lg bg-zinc-800">+</button>
                        </div>
                        <button id="spin-btn" onclick="Game.spin()" class="btn-action w-full md:w-auto px-12 py-5 rounded-2xl font-casino text-2xl italic tracking-tighter">GIRAR AHORA</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-panel p-6 rounded-[2.5rem] min-h-[400px] flex flex-col">
                    <button onclick="UI.openModal('modal-deposit')" class="w-full py-4 bg-emerald-500 text-black font-black rounded-xl text-xs uppercase mb-6">Depositar Saldo</button>
                    <div class="flex gap-4 mb-4 border-b border-white/5">
                        <button onclick="UI.switchTab('bets')" id="tab-bets-btn" class="pb-2 text-[10px] font-black uppercase tab-btn active">Juegos</button>
                        <button onclick="UI.switchTab('deposits')" id="tab-deps-btn" class="pb-2 text-[10px] font-black uppercase tab-btn">Pagos</button>
                    </div>
                    <div id="history-content" class="flex-grow space-y-2 overflow-y-auto max-h-[300px]"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[1000] flex items-center justify-center hidden p-4">
        <div class="glass-panel p-8 rounded-[2.5rem] w-full max-w-md">
            <h2 class="font-casino text-2xl text-center mb-6 italic text-emerald-500">Recargar</h2>
            <input id="dep-amount" type="number" placeholder="Monto" class="input-auth text-center text-3xl font-casino mb-6">
            <button onclick="UI.closeModal('modal-deposit')" class="btn-action w-full py-5 rounded-2xl font-casino">Confirmar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed bottom-6 right-6 z-[3000]"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, currentTab: 'bets', symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'] };

        const Auth = {
            async login() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) return UI.notify(error.message, "error");
                location.reload();
            },
            async register() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signUp({ email, password });
                if (error) return UI.notify(error.message, "error");
                UI.notify("Cuenta creada. ¡Inicia sesión!", "success");
            },
            async logout() {
                await sb.auth.signOut();
                location.reload();
            }
        };

        const Core = {
            init() {
                Game.initReels();
                let p = 0;
                const int = setInterval(() => {
                    p += 20;
                    document.getElementById('boot-bar').style.width = p + "%";
                    if(p >= 100) { clearInterval(int); this.check(); }
                }, 50);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').classList.add('opacity-0');
                setTimeout(() => document.getElementById('boot-loader').remove(), 500);

                if (session) {
                    State.user = session.user;
                    document.getElementById('casino-view').classList.remove('hidden-view');
                    this.loadData();
                } else {
                    document.getElementById('auth-view').classList.remove('hidden-view');
                }
            },
            async loadData() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if (data) { State.balance = data.saldo; UI.updateBalance(); }
                UI.fetchHistory();
            }
        };

        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    const items = [...State.symbols, ...State.symbols, ...State.symbols];
                    items.forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`);
                });
            },
            changeBet(v) { State.currentBet = Math.max(10, State.currentBet + v); document.getElementById('bet-display').innerText = `$${State.currentBet}`; },
            spin() {
                if(State.isSpinning || State.balance < State.currentBet) return UI.notify("Sin saldo", "error");
                State.isSpinning = true;
                const res = [State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)]];
                
                [1,2,3].forEach((id, i) => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transform = `translateY(-${(State.symbols.indexOf(res[i]) * 120) + 720}px)`;
                });

                setTimeout(() => {
                    State.balance -= State.currentBet;
                    UI.updateBalance();
                    State.isSpinning = false;
                    this.resetReels();
                }, 3500);
            },
            resetReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transition = 'none'; r.style.transform = 'translateY(0)';
                    setTimeout(() => r.style.transition = 'transform 3.5s cubic-bezier(0.15, 0, 0.05, 1)', 50);
                });
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance}`; },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 mb-2 rounded-xl text-xs font-black uppercase animate__animated animate__fadeInUp ${t==='success'?'bg-emerald-500 text-black':'bg-red-600 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },
            switchTab(t) {
                State.currentTab = t;
                document.getElementById('tab-bets-btn').classList.toggle('active', t === 'bets');
                document.getElementById('tab-deps-btn').classList.toggle('active', t === 'deposits');
            },
            fetchHistory() {
                document.getElementById('history-content').innerHTML = '<p class="text-center py-10 opacity-20 text-[10px]">HISTORIAL VACÍO</p>';
            }
        };

        Core.init();
    </script>
</body>
</html>
