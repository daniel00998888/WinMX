<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Plataforma Profesional v2.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        :root { --mx-green: #00ff88; --mx-bg: #050505; --mx-surface: #0f0f0f; --mx-border: #1a1a1a; }
        
        body { background: var(--mx-bg); color: white; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; margin: 0; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--mx-bg); z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--mx-surface); width: 100%; max-width: 400px; padding: 40px; border-radius: 2.5rem; border: 1px solid var(--mx-border); text-align: center; }
        .auth-input { width: 100%; background: #000; border: 1px solid var(--mx-border); padding: 15px 20px; border-radius: 12px; margin-bottom: 12px; outline: none; color: white; }
        .auth-input:focus { border-color: var(--mx-green); }

        /* SIDEBAR */
        aside { width: 260px; background: var(--mx-surface); border-right: 1px solid var(--mx-border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 100; }
        .nav-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #555; cursor: pointer; transition: 0.2s; font-size: 13px; font-weight: 800; text-transform: uppercase; }
        .nav-item:hover, .nav-item.active { color: var(--mx-green); background: rgba(0,255,136,0.05); }
        .nav-item.active { border-right: 3px solid var(--mx-green); color: var(--mx-green); }

        /* MAIN CONTENT */
        main { flex-grow: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        header { height: 75px; background: var(--mx-surface); border-bottom: 1px solid var(--mx-border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }

        /* GAME AREA */
        #game-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; overflow-y: auto; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .game-frame { width: 100%; max-width: 850px; aspect-ratio: 16/9; background: #000; border-radius: 30px; border: 1px solid var(--mx-border); position: relative; overflow: hidden; display: flex; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

        /* SLOTS REELS */
        .reel-container { flex: 1; border-right: 1px solid #111; position: relative; overflow: hidden; }
        .reel-strip { position: absolute; width: 100%; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); top: 0; }
        .symbol { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }

        /* CONTROL BAR */
        .control-bar { background: var(--mx-surface); border-top: 1px solid var(--mx-border); padding: 25px 40px; display: flex; gap: 20px; align-items: center; }
        .bet-selector { background: #000; border: 1px solid var(--mx-border); border-radius: 15px; display: flex; align-items: center; padding: 5px 20px; flex-grow: 1; }
        .btn-play { background: var(--mx-green); color: #000; font-family: 'Archivo Black'; padding: 18px 50px; border-radius: 15px; font-size: 20px; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,255,136,0.2); border: none; cursor: pointer; }
        .btn-play:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }

        /* MODAL DEPOSITO */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #0f0f0f; padding: 50px; border-radius: 3.5rem; border: 1px solid #222; width: 100%; max-width: 420px; text-align: center; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="font-casino text-3xl mb-10 italic">WIN<span class="text-emerald-500">MX</span></div>
            <input id="email" type="email" placeholder="Correo Electrónico" class="auth-input">
            <input id="pass" type="password" placeholder="Contraseña" class="auth-input">
            <button onclick="Auth.handle()" id="btn-auth-main" class="w-full bg-emerald-500 text-black font-casino py-4 rounded-xl mt-4 text-lg">Entrar al Casino</button>
            <button onclick="Auth.toggle()" id="btn-auth-toggle" class="mt-6 text-[10px] font-black text-zinc-600 uppercase tracking-widest">¿No tienes cuenta? Regístrate</button>
        </div>
    </div>

    <aside>
        <div class="p-10 font-casino text-2xl italic tracking-tighter">WIN<span class="text-emerald-500">MX</span></div>
        <nav class="flex-grow">
            <div onclick="Router.go('slots')" id="n-slots" class="nav-item active"><i class="fas fa-dice"></i> Lucky Slots</div>
            <div onclick="Router.go('mines')" id="n-mines" class="nav-item"><i class="fas fa-bomb"></i> Mines Pro</div>
            <div onclick="Router.go('crash')" id="n-crash" class="nav-item"><i class="fas fa-rocket"></i> Crash Rocket</div>
            <div class="mt-10 px-8 text-[10px] text-zinc-700 font-black uppercase tracking-widest">Cuenta</div>
            <div onclick="UI.modal('dep', true)" class="nav-item"><i class="fas fa-wallet"></i> Depositar</div>
            <div onclick="Auth.signOut()" class="nav-item text-red-500"><i class="fas fa-power-off"></i> Salir</div>
        </nav>
    </aside>

    <main>
        <header>
            <div id="route-label" class="text-zinc-500 font-bold text-[10px] uppercase tracking-widest">Casino > Slots</div>
            <div class="flex items-center gap-4">
                <div class="bg-black border border-white/5 px-6 py-2 rounded-2xl flex flex-col items-end">
                    <span id="bal-txt" class="text-xl font-casino text-emerald-400">$0.00</span>
                    <span class="text-[7px] text-zinc-600 font-black uppercase">Saldo MXN</span>
                </div>
                <button onclick="UI.modal('dep', true)" class="w-12 h-12 bg-emerald-500 text-black rounded-2xl flex items-center justify-center shadow-lg"><i class="fas fa-plus"></i></button>
            </div>
        </header>

        <div id="game-container">
            <div class="game-frame">
                <div id="game-render" class="flex-grow flex items-center justify-center p-10"></div>
            </div>
        </div>

        <div class="control-bar">
            <div class="bet-selector">
                <button onclick="Game.adjustBet(-10)" class="text-zinc-600 p-2"><i class="fas fa-minus"></i></button>
                <div class="flex-grow text-center">
                    <p class="text-[8px] text-zinc-700 font-black uppercase">Apuesta</p>
                    <span id="bet-txt" class="font-casino text-2xl text-white">$10</span>
                </div>
                <button onclick="Game.adjustBet(10)" class="text-zinc-600 p-2"><i class="fas fa-plus"></i></button>
                <div class="flex gap-2 ml-6 border-l border-zinc-800 pl-6">
                    <button onclick="Game.adjustBet(State.bet)" class="bg-zinc-900 text-[9px] px-3 py-1 rounded font-bold uppercase">x2</button>
                    <button onclick="Game.adjustBet(-State.bet/2)" class="bg-zinc-900 text-[9px] px-3 py-1 rounded font-bold uppercase">1/2</button>
                </div>
            </div>
            <button id="btn-play-main" onclick="Game.play()" class="btn-play italic">APOSTAR</button>
        </div>
    </main>

    <div id="modal-dep" class="modal">
        <div class="modal-content relative">
            <button onclick="UI.modal('dep', false)" class="absolute top-10 right-10 text-zinc-600"><i class="fas fa-times"></i></button>
            <div class="font-casino text-2xl mb-10 italic text-emerald-500">DEPOSITAR SALDO</div>
            <input id="dep-val" type="number" placeholder="$0.00" class="w-full bg-black text-emerald-500 text-center text-5xl font-casino py-8 rounded-[2rem] border border-white/5 outline-none mb-8">
            <div class="bg-zinc-900 p-8 rounded-[2.5rem] border border-white/5 mb-8 text-center">
                <p class="text-[9px] text-zinc-600 font-black mb-2 uppercase tracking-widest">CUENTA STP INTERBANCARIA</p>
                <p class="text-lg font-mono font-bold text-white select-all">722 969 020 533 491 161</p>
            </div>
            <button onclick="UI.doDep()" class="w-full py-6 bg-emerald-500 text-black font-casino text-xl rounded-[1.5rem] shadow-2xl">Confirmar Envío</button>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let State = { user: null, balance: 0, bet: 10, playing: false, game: 'slots', isLogin: true, spinIdx: 0 };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Auth = {
            toggle() { State.isLogin = !State.isLogin; document.getElementById('btn-auth-main').innerText = State.isLogin ? 'Entrar al Casino' : 'Crear Cuenta'; },
            async handle() {
                const email = document.getElementById('email').value;
                const pass = document.getElementById('pass').value;
                const { data, error } = State.isLogin ? await sb.auth.signInWithPassword({ email, password: pass }) : await sb.auth.signUp({ email, password: pass });
                if(error) alert(error.message);
                else { if(!State.isLogin) await sb.from('usuarios').insert([{ id: data.user.id, saldo: 0 }]); location.reload(); }
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    State.user = session.user;
                    document.getElementById('auth-screen').style.display = 'none';
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                    State.balance = data ? data.saldo : 0;
                    UI.refresh(); Router.go('slots');
                }
            },
            signOut() { sb.auth.signOut().then(() => location.reload()); }
        };

        const Router = {
            go(g) { State.game = g; document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.id === `n-${g}`)); this.render(); },
            render() {
                const r = document.getElementById('game-render');
                if(State.game === 'slots') {
                    r.innerHTML = `<div class="flex gap-4 w-full h-full"><div class="reel-container"><div id="r1" class="reel-strip"></div></div><div class="reel-container"><div id="r2" class="reel-strip"></div></div><div class="reel-container"><div id="r3" class="reel-strip"></div></div></div>`;
                    [1,2,3].forEach(id => { let s = document.getElementById(`r${id}`); s.innerHTML = ''; for(let i=0; i<80; i++) s.innerHTML += `<div class="symbol">${SYMBOLS[i%6]}</div>`; });
                } else if(State.game === 'mines') {
                    r.innerHTML = `<div id="m-grid" class="grid grid-cols-5 gap-3 w-full max-w-[320px]"></div>`;
                    const g = document.getElementById('m-grid'); for(let i=0; i<25; i++) g.innerHTML += `<button onclick="Logic.mines.play(${i}, this)" class="aspect-square bg-zinc-900 rounded-xl border border-white/5 text-xl">?</button>`;
                }
            }
        };

        const Logic = {
            slots: {
                run() {
                    State.spinIdx++; const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    [1,2,3].forEach((id, i) => { const strip = document.getElementById(`r${id}`); strip.style.transform = `translateY(-${(State.spinIdx * 2400) + (SYMBOLS.indexOf(res[i]) * 160)}px)`; });
                    setTimeout(() => Game.end(res[0]===res[1]&&res[1]===res[2] ? 10 : 0), 3100);
                }
            },
            mines: {
                active: false, bombs: [], mult: 1,
                play(i, btn) {
                    if(!this.active) { this.active = true; State.playing = true; this.mult = 1.2; this.bombs = Array.from({length:25},(_,k)=>k).sort(()=>Math.random()-0.5).slice(0,4); document.getElementById('btn-play-main').innerText = "COBRAR"; }
                    if(this.bombs.includes(i)) { btn.innerText = '💣'; btn.style.background = '#f44'; this.end(false); }
                    else { btn.innerText = '💎'; btn.style.background = 'rgba(0,255,136,0.1)'; this.mult *= 1.4; document.getElementById('btn-play-main').innerText = `COBRAR $${Math.floor(State.bet*this.mult)}`; }
                    btn.disabled = true;
                },
                end(win) { this.active = false; Game.end(win ? this.mult : 0); setTimeout(() => Router.go('mines'), 1000); }
            }
        };

        const Game = {
            adjustBet(v) { State.bet = Math.max(10, Math.floor(State.bet + v)); document.getElementById('bet-txt').innerText = `$${State.bet}`; },
            play() {
                if(State.game === 'mines' && Logic.mines.active) return Logic.mines.end(true);
                if(State.balance < State.bet) return alert("Saldo insuficiente");
                State.playing = true; State.balance -= State.bet; UI.refresh();
                if(State.game === 'slots') Logic.slots.run();
            },
            async end(m) {
                const win = Math.floor(State.bet * m); State.balance += win; State.playing = false;
                document.getElementById('btn-play-main').innerText = "APOSTAR"; UI.refresh();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
            }
        };

        const UI = {
            refresh() { document.getElementById('bal-txt').innerText = `$${State.balance.toLocaleString()}`; },
            modal(id, s) { document.getElementById(`modal-${id}`).style.display = s ? 'flex' : 'none'; },
            async doDep() { const a = document.getElementById('dep-val').value; await sb.from('depositos').insert([{ user_id: State.user.id, amount: a, status: 'pending' }]); alert("Notificado"); this.modal('dep', false); }
        };

        Auth.check();
    </script>
</body>
</html>
