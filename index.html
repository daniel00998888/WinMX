<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Casino Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #050505; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); }
        .slot-box { height: 150px; overflow: hidden; background: #000; border: 3px solid #151515; border-radius: 2.5rem; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .slot-reel { display: flex; flex-direction: column; align-items: center; }
        .slot-item { height: 150px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; }
        .tab-btn { padding: 14px; font-size: 10px; font-weight: 900; color: #444; border-bottom: 2px solid transparent; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: var(--mx-green); border-bottom: 2px solid var(--mx-green); }
        .btn-primary { background: var(--mx-green); color: black; font-weight: 900; transition: 0.3s; cursor: pointer; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-12 rounded-[4rem] w-full max-w-md text-center border-b-[12px] border-emerald-600 shadow-2xl">
            <h2 class="text-7xl font-casino italic mb-4 tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="EMAIL" class="w-full bg-black/50 p-6 rounded-3xl border border-white/5 text-white text-center text-lg outline-none focus:border-emerald-500">
                <input id="auth-password" type="password" placeholder="CONTRASEÑA" class="w-full bg-black/50 p-6 rounded-3xl border border-white/5 text-white text-center text-lg outline-none focus:border-emerald-500">
                <button onclick="handleAuth()" id="auth-main-btn" class="btn-primary w-full py-6 rounded-3xl font-black uppercase italic tracking-widest mt-4 text-xl">Entrar</button>
                <button onclick="toggleAuthMode()" id="auth-switch-btn" class="text-zinc-500 text-[11px] font-black uppercase mt-6 block mx-auto underline">¿No tienes cuenta? Regístrate</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50 px-10">
            <h1 class="text-4xl font-casino italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h1>
            <div class="flex items-center gap-8">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-zinc-500 font-black uppercase">Balance Global</span>
                    <span id="balance-display" class="text-4xl font-casino text-emerald-400">$0.00</span>
                </div>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 pt-10">
            <div class="lg:col-span-7">
                <div class="glass p-10 rounded-[4rem] border border-white/5 shadow-2xl">
                    <div class="grid grid-cols-3 gap-6 mb-12">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    <div class="flex flex-col items-center gap-10">
                        <div class="flex items-center gap-10 bg-black p-5 rounded-full border border-white/10 px-10 shadow-inner">
                            <button onclick="changeBet(-50)" class="text-zinc-600 hover:text-white text-2xl transition"><i class="fas fa-minus-circle"></i></button>
                            <span id="bet-display" class="text-5xl font-casino">$10</span>
                            <button onclick="changeBet(50)" class="text-zinc-600 hover:text-white text-2xl transition"><i class="fas fa-plus-circle"></i></button>
                        </div>
                        <button id="spin-btn" onclick="spin()" class="btn-primary w-full py-10 rounded-[3rem] font-casino text-5xl uppercase italic tracking-tighter">Jugar Ahora</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="glass p-8 rounded-[3.5rem] flex-grow border border-white/5 flex flex-col shadow-2xl">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="showModal('deposit')" class="p-5 bg-emerald-500/10 border border-emerald-500/20 rounded-3xl text-emerald-500 font-black text-[11px] uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all">Depósito</button>
                        <button onclick="showModal('withdraw')" class="p-5 bg-red-500/10 border border-red-500/20 rounded-3xl text-red-500 font-black text-[11px] uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">Retiro</button>
                    </div>
                    <div class="flex border-b border-white/5 mb-6">
                        <button onclick="switchTab('tab-bets')" id="btn-tab-bets" class="tab-btn active">Apuestas</button>
                        <button onclick="switchTab('tab-deposits')" id="btn-tab-deposits" class="tab-btn">Cajero</button>
                        <button onclick="switchTab('tab-withdraws')" id="btn-tab-withdraws" class="tab-btn">Retiros</button>
                    </div>
                    <div class="flex-grow overflow-y-auto max-h-[420px] custom-scroll pr-2 space-y-3">
                        <div id="tab-bets" class="tab-content"></div>
                        <div id="tab-deposits" class="tab-content hidden"></div>
                        <div id="tab-withdraws" class="tab-content hidden"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-bank" class="fixed inset-0 bg-black/98 flex items-center justify-center z-[100] hidden p-6">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm text-center border border-white/10">
            <h2 id="modal-title" class="font-casino text-4xl mb-6 text-emerald-500 uppercase tracking-widest">DEPOSITAR</h2>
            
            <div id="clave-container" class="bg-zinc-950 p-6 rounded-3xl border border-white/5 mb-8 text-left">
                <span class="text-[9px] font-black text-zinc-500 uppercase block mb-2 tracking-widest text-center">Transferencia CLAVE</span>
                <span class="text-emerald-400 font-mono text-xl block text-center font-bold break-all">722969020533491161</span>
                <p class="text-[8px] text-zinc-600 mt-4 text-center font-bold leading-tight">Envía tu transferencia y después anota el monto abajo para que el sistema procese tu saldo.</p>
            </div>

            <div class="relative mb-8">
                <input id="modal-amount" type="number" placeholder="Monto enviado" class="w-full bg-transparent text-center text-4xl font-casino border-b-2 border-emerald-500 py-4 outline-none text-white">
            </div>
            
            <button onclick="executeTransaction()" class="btn-primary w-full py-6 rounded-[2rem] font-black uppercase text-xl italic tracking-widest mb-4">Confirmar</button>
            <button onclick="closeModal()" class="text-zinc-600 text-[10px] font-black uppercase tracking-widest underline">Cerrar</button>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        
        let isLoginMode = true;
        let userId = null;
        let balance = 0;
        let currentBet = 10;
        let currentAction = 'deposit';
        const symbols = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        // --- SISTEMA DE AUTENTICACIÓN ---
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'Iniciar Sesión' : 'Registro';
            document.getElementById('auth-main-btn').innerText = isLoginMode ? 'Entrar' : 'Registrar';
            document.getElementById('auth-switch-btn').innerText = isLoginMode ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Entra';
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || password.length < 6) return alert("Completa los datos correctamente.");

            if(isLoginMode) {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if(error) return alert("Datos incorrectos");
            } else {
                const { data, error } = await sb.auth.signUp({ email, password });
                if(error) return alert(error.message);
                if(data.user) {
                    await sb.from('usuarios').insert({ id: data.user.id, saldo: 1000 });
                    alert("¡Registro exitoso! Entra ahora.");
                    toggleAuthMode(); return;
                }
            }
            checkUser();
        }

        async function checkUser() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                userId = session.user.id;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await syncData();
                setupReels();
            }
        }

        async function syncData() {
            const { data } = await sb.from('usuarios').select('saldo').eq('id', userId).single();
            if (data) { balance = data.saldo; updateUI(); loadHistory(); }
        }

        // --- MOTOR DE JUEGO (MANTIENE TUS PROBABILIDADES) ---
        function calculateMathResult() {
            const rng = Math.random() * 100;
            if (rng <= 0.2) return { type: 'JACKPOT', icons: ['7️⃣','7️⃣','7️⃣'], mult: 200 };
            if (rng <= 1.5) return { type: 'DIAMANTE', icons: ['💎','💎','💎'], mult: 50 };
            if (rng <= 6.0) return { type: 'ESTRELLA', icons: ['⭐️','⭐️','⭐️'], mult: 10 };
            if (rng <= 20.0) return { type: 'PAR', icons: ['🍒','🍒','🍋'], mult: 2 };
            return { type: 'SIN SUERTE', icons: ['🍋','🔔','🍒'], mult: 0 };
        }

        async function spin() {
            if (balance < currentBet) return alert("Saldo insuficiente");
            const res = calculateMathResult();
            const win = currentBet * res.mult;
            const newSaldo = (balance - currentBet) + win;
            
            document.getElementById('spin-btn').disabled = true;

            [1,2,3].forEach((id, i) => {
                const reel = document.getElementById(`reel-${id}`);
                reel.style.transition = 'none';
                reel.style.transform = `translateY(0px)`;
                reel.offsetHeight;
                const finalPos = (symbols.indexOf(res.icons[i]) * 150) + 4500;
                reel.style.transition = `transform ${2.5 + (i*0.5)}s cubic-bezier(0.15, 0, 0.05, 1)`;
                reel.style.transform = `translateY(-${finalPos}px)`;
            });

            setTimeout(async () => {
                const { error } = await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', userId);
                if (!error) {
                    balance = newSaldo;
                    await sb.from('history').insert({ user_id: userId, type: 'bets', amount: win > 0 ? win : -currentBet, label: res.type });
                    loadHistory(); updateUI();
                }
                document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        // --- TRANSACCIONES BANCARIAS ---
        async function executeTransaction() {
            const amt = parseFloat(document.getElementById('modal-amount').value);
            if(!amt || amt <= 0) return alert("Ingresa un monto válido");
            let newSaldo = currentAction === 'deposit' ? balance + amt : balance - amt;
            if (newSaldo < 0) return alert("Fondos insuficientes");

            const { error } = await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', userId);
            if(!error) {
                await sb.from('history').insert({ user_id: userId, type: currentAction === 'deposit' ? 'deposits' : 'withdraws', amount: amt, label: currentAction.toUpperCase() });
                balance = newSaldo; updateUI(); loadHistory(); closeModal();
            }
        }

        async function loadHistory() {
            const { data: logs } = await sb.from('history').select('*').eq('user_id', userId).order('created_at', { ascending: false });
            document.getElementById('tab-bets').innerHTML = '';
            document.getElementById('tab-deposits').innerHTML = '';
            document.getElementById('tab-withdraws').innerHTML = '';
            logs?.forEach(log => {
                const container = document.getElementById(`tab-${log.type}`);
                const color = log.amount > 0 ? 'text-emerald-500' : 'text-red-500';
                container.innerHTML += `<div class="bg-black/40 p-5 rounded-3xl flex justify-between items-center border border-white/5 mb-2">
                    <span class="text-[10px] font-bold text-zinc-300 uppercase">${log.label}</span>
                    <span class="font-casino ${color} text-lg">$${Math.abs(log.amount).toLocaleString()}</span>
                </div>`;
            });
        }

        // --- UI HELPERS ---
        function updateUI() { document.getElementById('balance-display').innerText = `$${balance.toLocaleString()}`; }
        function setupReels() {
            [1,2,3].forEach(id => {
                const reel = document.getElementById(`reel-${id}`);
                reel.innerHTML = '';
                [...symbols, ...symbols, ...symbols, ...symbols, ...symbols, ...symbols, ...symbols].forEach(s => {
                    const d = document.createElement('div'); d.className = 'slot-item'; d.innerText = s; reel.appendChild(d);
                });
            });
        }
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active');
        }
        function showModal(t) { 
            currentAction = t; 
            document.getElementById('modal-title').innerText = t === 'deposit' ? 'DEPOSITAR' : 'RETIRAR';
            // Solo mostramos la CLAVE si es un depósito
            document.getElementById('clave-container').style.display = t === 'deposit' ? 'block' : 'none';
            document.getElementById('modal-bank').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('modal-bank').classList.add('hidden'); }
        function changeBet(v) { currentBet = Math.max(10, currentBet + v); document.getElementById('bet-display').innerText = `$${currentBet}`; }
        async function logout() { await sb.auth.signOut(); location.reload(); }
        window.onload = checkUser;
    </script>
</body>
</html>
