<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Pro Layout V3</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&display=swap');
        :root { --mx-green: #00ff88; --mx-bg: #050505; --mx-card: #0f0f0f; }
        
        body { background-color: var(--mx-bg); color: white; font-family: 'Inter', sans-serif; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

        /* Contenedor Principal con Escalado Corregido */
        .main-wrapper { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Selector de Juegos: Grid de Iconos */
        .game-grid-nav {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 1.5rem;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .nav-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border-radius: 1rem;
            background: transparent;
            transition: 0.2s;
            opacity: 0.4;
            cursor: pointer;
        }
        .nav-card.active { 
            opacity: 1; 
            background: rgba(0,255,136,0.1); 
            border: 1px solid var(--mx-green);
        }
        .nav-card span:first-child { font-size: 1.5rem; margin-bottom: 4px; }
        .nav-card span:last-child { font-size: 9px; font-weight: 900; text-transform: uppercase; }

        /* Área de Juego (The Stage) */
        .game-stage {
            flex-grow: 1;
            background: var(--mx-card);
            border: 1px solid #222;
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #game-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 250px;
        }

        /* Slots con tamaño controlado */
        .slot-machine { display: flex; gap: 8px; max-width: 400px; width: 100%; }
        .slot-col { 
            flex: 1; height: 120px; overflow: hidden; 
            background: #000; border-radius: 12px; border: 2px solid #1a1a1a;
        }
        .slot-item { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }

        /* Panel de Control Compacto */
        .bottom-controls {
            background: #000;
            padding: 20px 30px;
            border-top: 1px solid #1a1a1a;
        }

        .bet-box {
            background: #111;
            border-radius: 1rem;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #222;
        }

        .action-btn {
            background: var(--mx-green);
            color: black;
            font-family: 'Archivo Black';
            font-size: 1.25rem;
            padding: 15px;
            border-radius: 1rem;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,255,136,0.2);
        }
        .action-btn:active { transform: scale(0.98); }

        /* Notificaciones */
        #notif-stack { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="flex justify-between items-center py-4 px-2">
            <div class="font-casino text-2xl italic tracking-tighter">WIN<span class="text-emerald-500">MX</span></div>
            <div class="bg-black/40 px-5 py-2 rounded-2xl border border-white/5 text-right">
                <span class="block text-[8px] text-zinc-500 font-black uppercase">Saldo Actual</span>
                <span id="bal-txt" class="text-xl font-casino text-emerald-400">$0.00</span>
            </div>
        </header>

        <div class="game-grid-nav no-scrollbar overflow-x-auto">
            <div onclick="Router.go('slots')" id="n-slots" class="nav-card active"><span>🎰</span><span>Slots</span></div>
            <div onclick="Router.go('mines')" id="n-mines" class="nav-card"><span>💣</span><span>Minas</span></div>
            <div onclick="Router.go('crash')" id="n-crash" class="nav-card"><span>🚀</span><span>Crash</span></div>
            <div onclick="Router.go('dice')" id="n-dice" class="nav-card"><span>🎲</span><span>Dados</span></div>
            <div onclick="Router.go('roulette')" id="n-roulette" class="nav-card"><span>🎡</span><span>Ruleta</span></div>
            <div onclick="Router.go('cards')" id="n-cards" class="nav-card"><span>🃏</span><span>Cartas</span></div>
            <div onclick="Router.go('tower')" id="n-tower" class="nav-card"><span>🏰</span><span>Torre</span></div>
            <div onclick="Router.go('plinko')" id="n-plinko" class="nav-card"><span>🎾</span><span>Plinko</span></div>
        </div>

        <div class="game-stage">
            <div class="bg-black/60 px-6 py-2 flex justify-between items-center text-[10px] font-bold text-zinc-600 border-b border-white/5">
                <span id="game-label">MODO: CLASSIC SLOTS</span>
                <span id="game-mults">MAX WIN: x500</span>
            </div>
            
            <div id="game-content"></div>

            <div class="bottom-controls">
                <div class="flex flex-col md:flex-row gap-4 items-center">
                    
                    <div class="w-full md:w-auto flex-grow">
                        <div class="bet-box">
                            <button onclick="Engine.chBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-lg font-black">-</button>
                            <div class="flex-grow text-center">
                                <span class="block text-[8px] text-zinc-600 uppercase font-black">Tu Apuesta</span>
                                <span id="bet-txt" class="text-xl font-casino">$10</span>
                            </div>
                            <button onclick="Engine.chBet(10)" class="w-10 h-10 bg-zinc-800 rounded-lg font-black">+</button>
                        </div>
                    </div>

                    <div class="w-full md:w-64">
                        <button id="play-btn" onclick="Engine.play()" class="action-btn">APOSTAR</button>
                    </div>

                </div>
                
                <p id="game-rules" class="text-[9px] text-zinc-700 text-center mt-4 font-bold uppercase tracking-widest italic">
                    Alinea 3 símbolos para ganar. Suerte.
                </p>
            </div>
        </div>
    </div>

    <div id="notif-stack"></div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        let State = { user: null, balance: 0, bet: 10, playing: false, game: 'slots', spinCount: 0 };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Router = {
            go(g) {
                if(State.playing) return;
                State.game = g;
                document.querySelectorAll('.nav-card').forEach(c => c.classList.toggle('active', c.id === `n-${g}`));
                this.render();
            },
            render() {
                const stage = document.getElementById('game-content');
                const label = document.getElementById('game-label');
                const mults = document.getElementById('game-mults');
                const rules = document.getElementById('game-rules');
                
                const db = this.data[State.game];
                label.innerText = `MODO: ${db.name}`;
                mults.innerText = `MAX WIN: ${db.max}`;
                rules.innerText = db.rules;
                stage.innerHTML = db.html;

                if(State.game === 'slots') Logic.slots.init();
            },
            data: {
                slots: { name: "SLOTS", max: "x500", rules: "Alinea 3 símbolos iguales en el centro.", html: `<div class="slot-machine"><div class="slot-col"><div id="r1" class="transition-all duration-[3s]"></div></div><div class="slot-col"><div id="r2" class="transition-all duration-[3s]"></div></div><div class="slot-col"><div id="r3" class="transition-all duration-[3s]"></div></div></div>` },
                mines: { name: "MINAS", max: "x20", rules: "Busca diamantes, evita las bombas.", html: `<div id="mine-board" class="grid grid-cols-5 gap-2 w-full max-w-[280px]"></div>` },
                crash: { name: "CRASH", max: "x1000", rules: "Retírate antes de que el cohete explote.", html: `<div class="text-center"><div id="c-mult" class="text-6xl font-casino">1.00x</div><div id="c-rocket" class="text-4xl mt-4">🚀</div></div>` }
                // Los demás juegos se agregan aquí siguiendo el mismo patrón
            }
        };

        const Logic = {
            slots: {
                init() {
                    [1,2,3].forEach(id => {
                        const r = document.getElementById(`r${id}`); r.innerHTML = '';
                        for(let i=0; i<60; i++) r.innerHTML += `<div class="slot-item">${SYMBOLS[i%6]}</div>`;
                    });
                },
                async start() {
                    State.spinCount++;
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    [1,2,3].forEach((id, i) => {
                        const r = document.getElementById(`r${id}`);
                        const pos = (State.spinCount * 120 * 12) + (SYMBOLS.indexOf(res[i]) * 120);
                        r.style.transform = `translateY(-${pos}px)`;
                    });
                    setTimeout(() => {
                        const winMap = {'7️⃣7️⃣7️⃣': 500, '💎💎💎': 100, '⭐️⭐️⭐️': 50, '🔔🔔🔔': 20, '🍋🍋🍋': 10, '🍒🍒🍒': 5};
                        Engine.finish(winMap[res.join('')] || 0, "SLOTS");
                    }, 3100);
                }
            }
        };

        const Engine = {
            chBet(v) { if(!State.playing) { State.bet = Math.max(10, State.bet + v); UI.up(); } },
            async play() {
                if(State.balance < State.bet) return UI.notify("SALDO INSUFICIENTE", "error");
                State.playing = true; UI.btn(true);
                State.balance -= State.bet; UI.up();
                
                if(State.game === 'slots') Logic.slots.start();
                // Otros disparadores aquí
            },
            async finish(m, label) {
                const win = State.bet * m;
                State.balance += win;
                State.playing = false; UI.btn(false); UI.up();
                if(win > 0) UI.notify(`¡GANASTE $${win}!`, "success");
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                await sb.from('history').insert([{ user_id: State.user.id, amount: win - State.bet, label: label }]);
            }
        };

        const UI = {
            up() {
                document.getElementById('bal-txt').innerText = `$${State.balance.toLocaleString()}`;
                document.getElementById('bet-txt').innerText = `$${State.bet.toLocaleString()}`;
            },
            btn(d) { document.getElementById('play-btn').disabled = d; document.getElementById('play-btn').style.opacity = d ? 0.5 : 1; },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-xl text-[10px] font-black uppercase ${t==='success'?'bg-emerald-500 text-black':'bg-red-600'}`;
                n.innerText = m; document.getElementById('notif-stack').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            }
        };

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if(session) {
                State.user = session.user;
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                State.balance = data.saldo || 0;
                UI.up(); Router.go('slots');
            }
        }
        init();
    </script>
</body>
</html>
