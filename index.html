        const sfx = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            spin: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),

        const playSfx = (key) => { sfx[key].currentTime = 0; sfx[key].play().catch(() => {}); };

        let State = { 
            user: null, balance: 0, isSpinning: false, totalSpins: 0, 
            luckFactor: 1.0, consecutiveLosses: 0, sessionDebt: 0 
        };

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                playSfx('click');
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[viewId];
                if(navId) document.getElementById(navId).classList.add('active');
            },
            openGame(game) {
                playSfx('click');
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.drawGrid();
                if(game === 'tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button id="btn-slots-play" onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div class="risk-badge mb-2"><i class="fas fa-bomb"></i> 3 Minas Activas</div><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden-view flex flex-col items-center p-3 mb-3 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500 text-xs">1.00x</span><span id="mines-next-val" class="next-mult-tag">Siguiente: 1.45x</span><button id="mines-cashout-btn" onclick="GameLogic.mines.cashout()" class="btn-action px-6 py-2 mt-2 font-casino text-[10px]">COBRAR</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino">APOSTAR</button></div></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse"></div><div id="tower-controls"><input id="tower-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino">JUGAR</button></div><div id="tower-cashout-status" class="hidden-view"><span id="tower-next-info" class="next-mult-tag block mb-2"></span><button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="btn-action w-full py-4 font-casino">COBRAR</button></div></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino italic mb-4">1.00x</div><div class="h-24 flex items-center justify-center mb-6"><div id="crash-rocket" class="text-4xl transition-all duration-100">рџљЂ</div></div><input id="crash-bet-input" type="number" value="10" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`
            }
        };

        const GameLogic = {
            // SISTEMA APC EVOLUTION v3
            adjustLuck(winAmount, betAmount) {
                const profit = winAmount - betAmount;
                if (profit <= 0) {
                    State.consecutiveLosses++;
                    State.sessionDebt += Math.abs(profit);
                    // MODO RECUPERACIГ“N: Si el usuario pierde 3 veces seguidas o > $100 en sesiГіn
                    State.luckFactor = (State.consecutiveLosses >= 3 || State.sessionDebt > 100) ? 1.6 : Math.min(1.0, State.luckFactor + 0.1);
                } else {
                    State.consecutiveLosses = 0;
                    State.sessionDebt = 0;
                    State.luckFactor = winAmount > betAmount * 5 ? 0.4 : 0.7; // Reducir si gana mucho
                }
                if (State.balance > 800) State.luckFactor = Math.min(0.65, State.luckFactor);
            },

            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(State.isSpinning) return;
                    const bet = Math.abs(parseFloat(document.getElementById('slots-bet-input').value)) || 10;
                    if(State.balance < bet || bet <= 0) return UI.notify("Saldo insuficiente", "error");
                    
                    const btn = document.getElementById('btn-slots-play');
                    btn.disabled = true; playSfx('spin'); State.isSpinning = true; State.balance -= bet; UI.updateBalance();

                    const getSym = () => SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    let res = [getSym(), getSym()];
                    
                    // LГіgica de Enganche
                    if (State.luckFactor > 1.3 && Math.random() < 0.5) { const ws = getSym(); res = [ws, ws, ws]; }
                    else { res.push(res[0] === res[1] && Math.random() > State.luckFactor ? SYMBOLS[(SYMBOLS.indexOf(res[0])+1)%SYMBOLS.length] : getSym()); }

                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });
                    
                    setTimeout(async () => {
                        State.isSpinning = false; btn.disabled = false;
                        let win = (res[0] === res[1] && res[1] === res[2]) ? bet * 10 : 0;
                        if(win > 0) { State.balance += win; playSfx('win'); UI.notify("ВЎGANASTE!", "success"); }
                        else { playSfx('lose'); }
                        UI.updateBalance();
                        GameLogic.adjustLuck(win, bet);
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    }, 3500);
                }
            },

            mines: {
                active: false, mines: [], rev: [], mult: 1, bet: 0,
                steps: [1.45, 2.10, 3.80, 5.50, 9.20, 16.00, 28.00],
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer"></div>`;
                },
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('mines-bet-input').value)) || 10;
                    if(State.balance < b || b <= 0) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.mult = 1; this.rev = [];
                    this.mines = []; while(this.mines.length < 3) { let r = Math.floor(Math.random()*25); if(!this.mines.includes(r)) this.mines.push(r); }
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    this.drawGrid();
                },
                cell(i) {
                    if(!this.active || this.rev.includes(i)) return;
                    let failProb = (0.15 + (this.rev.length * 0.15)) / State.luckFactor;
                    if(this.bet >= 100 && this.rev.length < 2 && Math.random() < 0.4) failProb = 0.9;

                    if (Math.random() < failProb) { if(!this.mines.includes(i)) { this.mines.pop(); this.mines.push(i); } }

                    this.rev.push(i); const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) { el.innerHTML = 'рџ’Ј'; el.classList.add('bg-red-500/20'); this.end(false); }
                    else { 
                        el.innerHTML = 'рџ’Ћ'; el.classList.add('bg-emerald-500/20');
                        this.mult = this.steps[this.rev.length-1] || this.mult * 1.5;
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2) + 'x';
                        document.getElementById('mines-next-val').innerText = `Siguiente: ${(this.steps[this.rev.length] || this.mult * 1.5).toFixed(2)}x`;
                        document.getElementById('mines-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                    }
                },
                cashout() { if(this.active) { State.balance += (this.bet * this.mult); playSfx('win'); this.end(true); } },
                async end(win) {
                    GameLogic.adjustLuck(win ? (this.bet * this.mult) : 0, this.bet);
                    this.active = false; UI.updateBalance();
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                    document.getElementById('mines-status').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },

            tower: {
                level: 0, active: false, bet: 0, mult: 1,
                steps: [1.45, 2.30, 3.80, 6.50, 11.20, 19.80, 35.00, 75.00],
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        let row = document.createElement('div'); row.className = "grid grid-cols-3 gap-1.5 opacity-30"; row.id = `trow-${i}`;
                        for(let j=0; j<3; j++) row.innerHTML += `<div onclick="GameLogic.tower.select(${i},${j})" class="h-8 bg-white/5 border border-white/5 rounded-lg flex items-center justify-center cursor-pointer"></div>`;
                        c.appendChild(row);
                    }
                },
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('tower-bet-input').value)) || 10;
                    if(State.balance < b || b <= 0) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.level = 0; this.drawTower();
                    document.getElementById('trow-0').classList.remove('opacity-30');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout-status').classList.remove('hidden-view');
                    document.getElementById('tower-next-info').innerText = `SIGUIENTE: ${this.steps[0]}x`;
                },
                select(r, c) {
                    if(!this.active || r !== this.level) return;
                    let fp = (this.level > 4 ? 0.65 : 0.33) / State.luckFactor;
                    const items = document.getElementById(`trow-${r}`).children;
                    if(Math.random() < fp) { items[c].innerHTML = 'рџ’Ј'; this.end(false); }
                    else {
                        items[c].innerHTML = 'рџ’Ћ'; items[c].classList.add('bg-emerald-500/20');
                        this.mult = this.steps[this.level]; this.level++;
                        document.getElementById('tower-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                        if(this.level < 8) {
                            document.getElementById(`trow-${this.level}`).classList.remove('opacity-30');
                            document.getElementById('tower-next-info').innerText = `SIGUIENTE: ${this.steps[this.level]}x`;
                        } else this.cashout();
                    }
                },
                cashout() { if(this.active) { State.balance += (this.bet * this.mult); playSfx('win'); this.end(true); } },
                async end(win) {
                    GameLogic.adjustLuck(win ? (this.bet * this.mult) : 0, this.bet);
                    this.active = false; UI.updateBalance();
                    document.getElementById('tower-controls').classList.remove('hidden-view');
                    document.getElementById('tower-cashout-status').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },

            crash: {
                active: false, mult: 1, bet: 0, interval: null,
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('crash-bet-input').value)) || 10;
                    if(State.balance < b || b <= 0) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance(); this.active = true; this.bet = b; this.mult = 1;
                    const btn = document.getElementById('btn-crash'); btn.onclick = () => this.cashout();
                    
                    let limit = (this.bet >= 100 && Math.random() < 0.6) ? 1.05 : (State.luckFactor > 1.3 ? 3.0 : (1.1 + Math.random() * 2) * State.luckFactor);
                    
                    this.interval = setInterval(() => {
                        this.mult += 0.05;
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2) + 'x';
                        document.getElementById('crash-rocket').style.transform = `translate(${this.mult*5}px, -${this.mult*5}px)`;
                        btn.innerText = `RETIRAR $${(this.bet * this.mult).toFixed(2)}`;
                        if(this.mult >= limit) { clearInterval(this.interval); this.explode(); }
                    }, 100);
                },
                cashout() { if(this.active) { clearInterval(this.interval); State.balance += (this.bet * this.mult); playSfx('win'); this.end(true); } },
                explode() { document.getElementById('crash-rocket').innerHTML = 'рџ’Ґ'; this.end(false); },
                async end(win) {
                    GameLogic.adjustLuck(win ? (this.bet * this.mult) : 0, this.bet);
                    this.active = false; UI.updateBalance();
                    setTimeout(() => {
                        const btn = document.getElementById('btn-crash'); btn.innerText = "DESPEGAR"; btn.onclick = () => this.start();
                        document.getElementById('crash-mult').innerText = '1.00x';
                        document.getElementById('crash-rocket').innerHTML = 'рџљЂ';
                        document.getElementById('crash-rocket').style.transform = 'translate(0, 20px)';
                    }, 2000);
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            }
        };

        const Core = {
            async init() { 
                let p = 0; const i = setInterval(() => { p += 25; document.getElementById('boot-bar').style.width = `${p}%`; if(p >= 100) { clearInterval(i); this.check(); } }, 100); 
            },
            async check() { 
                const { data: { session } } = await sb.auth.getSession(); 
                document.getElementById('boot-loader').style.display = 'none'; 
                if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); } 
                else { document.getElementById('auth-view').classList.remove('hidden-view'); } 
            },
            async loadBalance() { 
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle(); 
                State.balance = data ? data.saldo : 0; UI.updateBalance(); 
            }
        };

        // UI & AUTH HELPERS MANTENIDOS SEGГљN TU ESTRUCTURA ORIGINAL
        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest animate__animated animate__fadeInDown ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            copyClabe() { navigator.clipboard.writeText("722969020533491161"); this.notify("Copiado", "success"); }
        };

        const AuthManager = {
            async login() { 
                const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) UI.notify(error.message, "error"); else location.reload();
            },
            switchTab(tab) {
                document.getElementById('login-container').classList.toggle('hidden-view', tab==='register');
                document.getElementById('register-container').classList.toggle('hidden-view', tab==='login');
            }
        };

        Core.init();
    </script>
</body>
</html>
