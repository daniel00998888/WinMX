                    const suit = ['♠️','♥️','♣️','♦️'][Math.floor(Math.random()*4)];
                    const oldVal = parseInt(document.getElementById('card-val').innerText);
                    document.getElementById('card-val').innerText = val;
                    document.getElementById('card-suit').innerText = suit;
                    const w = (c === 'high' && val > oldVal) || (c === 'low' && val < oldVal);
                    Logic.end(w ? State.bet * 2 : 0, w ? 'CARDS X2' : 'CARDS');
                }
            },
            target: {
                async play() {
                    if(!await Logic.start()) return;
                    const m = [0, 0, 1.5, 2, 10][Math.floor(Math.random()*5)];
                    Logic.end(State.bet * m, m > 0 ? `TARGET X${m}` : 'TARGET');
                }
            }
        };

        const AuthManager = {
            async login() { location.reload(); }, // Simplificado para este ejemplo
            async logout() { await sb.auth.signOut(); location.reload(); }
        };

        const Core = {
            async init() {
                let p = 0;
                const i = setInterval(() => {
                    p += 20; document.getElementById('boot-bar').style.width = p + "%";
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    setTimeout(() => document.getElementById('main-app').classList.add('opacity-100'), 50);
                    this.load(); Router.render('slots');
                } else { /* Redirigir a login */ }
            },
            async load() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                State.balance = data.saldo; UI.upBal(); this.fHist();
            },
            async fHist() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false }).limit(15);
                UI.renderH(data || []);
            },
            async doDep() {
                const amt = parseFloat(document.getElementById('d-amt').value);
                const file = document.getElementById('d-file').files[0];
                if(!amt || !file) return UI.notify("Sube el comprobante", "error");
                document.getElementById('d-confirm-btn').disabled = true;
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPÓSITO', status: 'pending', evidence_url: publicUrl }]);
                UI.notify("Enviado", "success"); UI.closeModal('modal-deposit');
            }
        };

        const UI = {
            upBal() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString()}`; },
            upBet() { document.querySelectorAll('.bet-txt').forEach(el => el.innerText = `$${State.bet}`); },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-xl font-bold uppercase text-[10px] ${t==='success'?'bg-emerald-500 text-black':'bg-red-600'} animate__animated animate__fadeInUp`;
                n.innerText = m; document.getElementById('notifs').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },
            setD(v) { document.getElementById('d-amt').value = v; },
            dNext() {
                const amt = document.getElementById('d-amt').value;
                if(!amt) return;
                document.getElementById('d-final-amt').innerText = `$${amt} MXN`;
                document.getElementById('d-step-1').classList.add('hidden');
                document.getElementById('d-step-2').classList.remove('hidden');
            },
            fileOk() { document.getElementById('d-label').innerText = "LISTO ✅"; },
            renderH(data) {
                document.getElementById('history-list').innerHTML = data.map(i => `
                    <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center text-[11px] border border-white/5">
                        <span class="font-bold text-zinc-500 uppercase">${i.label}</span>
                        <span class="font-casino ${i.amount >= 0 ? 'text-emerald-500' : 'text-zinc-500'}">${i.amount >= 0 ? '+' : ''}$${Math.abs(i.amount)}</span>
                    </div>`).join('');
            }
        };

        Core.init();
    </script>
</body>
</html>
