<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1625, #1a2a3f);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
        .reel {
            width: 90px; height: 90px; background: #0f1c2e; border: 3px solid #22d3ee;
            border-radius: 12px; font-size: 48px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }
        .reel.spinning { animation: spin 0.9s linear infinite; }
        @keyframes spin { 0% { transform: translateY(-400%); } 100% { transform: translateY(0); } }
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        .chat-box { scrollbar-width: thin; scrollbar-color: #22d3ee #1e2937; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-4 px-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-2xl font-bold tracking-wider neon-text">CASINO REAL PRO</h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 bg-zinc-900 px-6 py-2.5 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="text-2xl font-semibold text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 px-6 py-2.5 rounded-2xl transition-all font-medium">
                    <i class="fas fa-sign-out-alt"></i> <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-8">
                <span class="text-6xl">🎰</span>
                <h2 class="text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">Accede para jugar</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-cyan-400 text-white">
            <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-cyan-400 text-white">
            <div class="flex gap-4">
                <button onclick="register()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-semibold transition">Registrarse</button>
                <button onclick="login()" class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-black py-4 rounded-2xl font-semibold transition">Entrar</button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[28px]"></p>
        </div>
    </div>

    <!-- CASINO -->
    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen">
            <!-- SIDEBAR -->
            <div class="w-72 bg-zinc-950 border-r border-zinc-800 p-6 flex flex-col overflow-auto">
                <h3 class="text-cyan-400 font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-gamepad"></i> JUEGOS
                </h3>
                <div onclick="showGame('slot')" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🎰</span>
                    <span class="font-medium text-lg">Slots</span>
                </div>
                <div onclick="showGame('roulette')" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🎡</span>
                    <span class="font-medium text-lg">Ruleta</span>
                </div>
                <div onclick="showGame('dice')" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🎲</span>
                    <span class="font-medium text-lg">Dados</span>
                </div>
                <div onclick="showGame('bj')" class="cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-8 flex items-center gap-3 transition-all">
                    <span class="text-3xl">🃏</span>
                    <span class="font-medium text-lg">Blackjack</span>
                </div>

                <h3 class="text-cyan-400 font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-trophy"></i> TOP 5
                </h3>
                <div id="rankingBox" class="flex-1 space-y-3"></div>
            </div>

            <!-- CONTENIDO -->
            <div class="flex-1 p-8 overflow-auto">
                <div id="slot" class="game">
                    <h2 class="text-4xl font-bold mb-8 flex items-center gap-4"><span>🎰</span> Tragamonedas Premium</h2>
                    <div class="max-w-lg mx-auto">
                        <div class="flex justify-center gap-6 mb-10">
                            <div class="reel" id="r1">🍒</div>
                            <div class="reel" id="r2">💎</div>
                            <div class="reel" id="r3">7️⃣</div>
                        </div>
                        <div class="flex gap-4 max-w-xs mx-auto">
                            <input id="betSlot" type="number" placeholder="Monto de apuesta" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 text-center text-2xl focus:outline-none focus:border-cyan-400">
                            <button onclick="spinSlot()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 px-12 py-5 rounded-2xl font-bold text-xl transition">GIRAR</button>
                        </div>
                        <p id="slotRes" class="text-center mt-10 text-3xl font-bold min-h-[80px]"></p>
                    </div>
                </div>

                <div id="roulette" class="game hidden">
                    <h2 class="text-4xl font-bold mb-8">🎡 Ruleta</h2>
                    <div class="game-card p-10 rounded-3xl max-w-md mx-auto text-center bg-zinc-900 border border-zinc-700">
                        <input id="betRou" type="number" placeholder="Apuesta" class="bg-zinc-800 w-full py-5 rounded-2xl text-center text-2xl mb-6">
                        <select id="color" class="bg-zinc-800 w-full py-5 rounded-2xl mb-8 text-lg">
                            <option value="rojo">🔴 Rojo</option>
                            <option value="negro">⚫ Negro</option>
                        </select>
                        <button onclick="spinRoulette()" class="w-full bg-red-600 hover:bg-red-700 py-6 rounded-2xl font-bold text-2xl transition">GIRAR RULETA</button>
                        <p id="rouRes" class="mt-10 text-2xl font-semibold"></p>
                    </div>
                </div>

                <div id="dice" class="game hidden">
                    <h2 class="text-4xl font-bold mb-8">🎲 Dados</h2>
                    <div class="game-card p-10 rounded-3xl max-w-md mx-auto text-center bg-zinc-900 border border-zinc-700">
                        <input id="betDice" type="number" placeholder="Apuesta" class="bg-zinc-800 w-full py-5 rounded-2xl text-center text-2xl mb-8">
                        <button onclick="playDice()" class="w-full bg-amber-600 hover:bg-amber-700 py-6 rounded-2xl font-bold text-2xl transition">LANZAR DADOS</button>
                        <p id="diceRes" class="mt-12 text-4xl font-bold"></p>
                    </div>
                </div>

                <div id="bj" class="game hidden">
                    <h2 class="text-4xl font-bold mb-8">🃏 Blackjack</h2>
                    <div class="game-card p-10 rounded-3xl max-w-md mx-auto text-center bg-zinc-900 border border-zinc-700">
                        <input id="betBJ" type="number" placeholder="Apuesta" class="bg-zinc-800 w-full py-5 rounded-2xl text-center text-2xl mb-8">
                        <button onclick="playBJ()" class="w-full bg-purple-600 hover:bg-purple-700 py-6 rounded-2xl font-bold text-2xl transition">REPARTIR MANO</button>
                        <p id="bjRes" class="mt-10 text-2xl font-mono"></p>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div class="w-80 bg-zinc-950 border-l border-zinc-800 flex flex-col">
                <div class="p-5 border-b border-zinc-800 bg-zinc-900">
                    <h3 class="font-semibold flex items-center gap-2 text-lg"><i class="fas fa-comments text-cyan-400"></i> Chat en Vivo</h3>
                </div>
                <div id="chatBox" class="chat-box flex-1 p-5 overflow-auto space-y-4 text-sm"></div>
                <div class="p-5 border-t border-zinc-800 bg-zinc-900">
                    <div class="flex gap-3">
                        <input id="chatInput" placeholder="Escribe un mensaje..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-400">
                        <button onclick="sendMsg()" class="bg-cyan-500 hover:bg-cyan-600 text-black px-8 rounded-2xl font-semibold transition">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;
        let chatChannel = null;

        function msg(text, color = "text-white") {
            const el = document.getElementById("msg");
            if (el) el.innerHTML = `<span class="${color}">${text}</span>`;
        }

        function val(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : "";
        }

        function formatSaldo(n) {
            return new Intl.NumberFormat('es-MX').format(Math.floor(n || 0));
        }

        function updateSaldo() {
            const el = document.getElementById("saldo");
            if (el) el.textContent = "$" + formatSaldo(saldo);
        }

        function launchConfetti() {
            const canvas = document.getElementById("confetti");
            if (!canvas) return;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext("2d");
            let particles = [];
            const colors = ['#22d3ee', '#eab308', '#a855f7', '#ec4899'];

            for (let i = 0; i < 180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 9 + 6,
                    speed: Math.random() * 7 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    angle: Math.random() * 360,
                    rotationSpeed: Math.random() * 12 - 6
                });
            }

            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.y += p.speed;
                    p.angle += p.rotationSpeed;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.7);
                    ctx.restore();
                    if (p.y > canvas.height + 100) particles.splice(i, 1);
                }
                if (particles.length > 0 && frame < 110) requestAnimationFrame(animate);
                frame++;
            }
            animate();
        }

        async function register() {
            msg("Registrando...");
            const { error } = await sb.auth.signUp({ email: val("email"), password: val("pass") });
            msg(error ? error.message : "✅ Revisa tu correo para confirmar", error ? "text-red-400" : "text-green-400");
        }

        async function login() {
            msg("Iniciando sesión...");
            const { data, error } = await sb.auth.signInWithPassword({ email: val("email"), password: val("pass") });
            if (error) return msg(error.message, "text-red-400");
            user = data.user;
            startCasino();
        }

        async function startCasino() {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("casino").classList.remove("hidden");
            document.getElementById("topbar").classList.remove("hidden");

            // Crear o cargar usuario
            let { data, error } = await sb.from("usuarios").select("*").eq("id", user.id).single();

            if (error && error.code === 'PGRST116') { // No rows found
                const { error: insertError } = await sb.from("usuarios").insert([{ id: user.id, saldo: 3000 }]);
                if (insertError) console.error(insertError);
                saldo = 3000;
            } else if (data) {
                saldo = data.saldo || 3000;
            } else {
                saldo = 3000;
            }

            updateSaldo();
            loadRanking();
            initChat();
            showGame('slot');   // Ahora sí existe el elemento
        }

        async function saveSaldo() {
            if (!user) return;
            await sb.from("usuarios").update({ saldo }).eq("id", user.id);
        }

        function showGame(gameId) {
            document.querySelectorAll('.game').forEach(g => g.classList.add('hidden'));
            const game = document.getElementById(gameId);
            if (game) game.classList.remove('hidden');
        }

        // ==================== JUEGOS ====================
        async function spinSlot() {
            let bet = parseInt(val("betSlot"));
            if (!bet || bet <= 0 || bet > saldo) {
                document.getElementById("slotRes").innerHTML = `<span class="text-red-400">¡Apuesta inválida!</span>`;
                return;
            }

            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            reels.forEach(reel => reel.classList.add('spinning'));

            await new Promise(r => setTimeout(r, 1700));
            reels.forEach(reel => reel.classList.remove('spinning'));

            const symbols = ["🍒","💎","7️⃣","⭐","🍀","🔔","🍉"];
            let results = symbols.sort(() => 0.5 - Math.random()).slice(0,3);

            reels[0].innerText = results[0];
            reels[1].innerText = results[1];
            reels[2].innerText = results[2];

            const isWin = results[0] === results[1] && results[1] === results[2];
            saldo += isWin ? bet * 15 : -bet;

            const resEl = document.getElementById("slotRes");
            if (isWin) {
                resEl.innerHTML = `<span class="text-yellow-400">¡JACKPOT! +$${bet*15}</span>`;
                launchConfetti();
            } else {
                resEl.innerHTML = `<span class="text-red-400">-$${bet}</span>`;
            }

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function spinRoulette() { /* misma función anterior */ 
            let bet = parseInt(val("betRou"));
            if (!bet || bet <= 0 || bet > saldo) return alert("Apuesta inválida");
            const color = val("color");
            const result = Math.random() < 0.5 ? "rojo" : "negro";
            const win = result === color;
            saldo += win ? bet * 2 : -bet;
            document.getElementById("rouRes").innerHTML = `Salió <span class="${result==='rojo' ? 'text-red-500' : 'text-zinc-100'} font-bold">${result.toUpperCase()}</span><br>${win ? '<span class="text-green-400">¡Ganaste 2x!</span>' : '<span class="text-red-400">Perdiste</span>'}`;
            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function playDice() {
            let bet = parseInt(val("betDice"));
            if (!bet || bet <= 0 || bet > saldo) return;
            const roll = Math.floor(Math.random() * 6) + 1;
            const win = roll >= 4;
            saldo += win ? bet : -bet;
            document.getElementById("diceRes").innerHTML = `🎲 ${roll}<br><span class="${win ? 'text-green-400' : 'text-red-400'}">${win ? '¡Ganaste!' : 'Perdiste'}</span>`;
            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function playBJ() {
            let bet = parseInt(val("betBJ"));
            if (!bet || bet <= 0 || bet > saldo) return;
            const player = Math.floor(Math.random() * 10) + 12;
            const dealer = Math.floor(Math.random() * 10) + 12;
            const win = (player > dealer && player <= 21) || dealer > 21;
            saldo += win ? bet : -bet;
            document.getElementById("bjRes").innerHTML = `Tú: <strong>${player}</strong> — Dealer: <strong>${dealer}</strong><br><span class="${win ? 'text-green-400' : 'text-red-400'} text-2xl">${win ? '¡Ganaste!' : 'Perdiste'}</span>`;
            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        // ==================== CHAT & RANKING ====================
        function initChat() {
            if (chatChannel) return;
            chatChannel = sb.channel('chat-room');
            chatChannel.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, (payload) => {
                const box = document.getElementById("chatBox");
                if (box) {
                    box.innerHTML += `<div class="bg-zinc-900 p-3 rounded-2xl"><span class="text-cyan-400">Usuario:</span> ${payload.new.mensaje || ''}</div>`;
                    box.scrollTop = box.scrollHeight;
                }
            }).subscribe();
        }

        async function sendMsg() {
            const text = val("chatInput");
            if (!text || !user) return;
            const { error } = await sb.from("chat").insert([{ user_id: user.id, mensaje: text }]);
            if (!error) document.getElementById("chatInput").value = "";
        }

        async function loadRanking() {
            const rankingBox = document.getElementById("rankingBox");
            if (!rankingBox) return;
            const { data } = await sb.from("usuarios").select("saldo").order("saldo", { ascending: false }).limit(5);
            let html = "";
            (data || []).forEach((u, i) => {
                html += `<div class="flex justify-between bg-zinc-900 p-4 rounded-2xl"><span class="text-cyan-300">#${i+1}</span><span class="text-yellow-300 font-semibold">$${formatSaldo(u.saldo)}</span></div>`;
            });
            rankingBox.innerHTML = html || "<p class='text-zinc-500 p-4'>Sin jugadores aún</p>";
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        // INIT
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                startCasino();
            }
        };
    </script>
</body>
</html>
