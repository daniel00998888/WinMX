        .symbol-unit { height: 145px; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8)); }

        .btn-action {

        .btn-action:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 20px 50px var(--mx-emerald-glow); }

        .loader-full { background: #000; position: fixed; inset: 0; z-index: 10000; display: flex; flex-direction: column; items-center; justify-content: center; }
        
        /* SCROLLBAR CUSTOM */

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>

        // MOTOR DE AUDIO (MÁXIMA CALIDAD)
        const AudioFX = {
            ctx: null, master: null,
            init() {
                if(!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.master = this.ctx.createGain();
                    this.master.connect(this.ctx.destination);
                    this.master.gain.value = 0.25;
                }
            },
            play(type) {
                this.init();
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.connect(g); g.connect(this.master);
                const t = this.ctx.currentTime;
                
                if(type === 'spin') {
                    o.type = 'sawtooth'; o.frequency.setValueAtTime(100, t);
                    o.frequency.exponentialRampToValueAtTime(30, t+0.1);
                    g.gain.setValueAtTime(0.05, t); g.gain.linearRampToValueAtTime(0, t+0.1);
                } else if(type === 'win') {
                    o.type = 'square'; o.frequency.setValueAtTime(500, t);
                    o.frequency.setValueAtTime(700, t+0.1);
                    o.frequency.setValueAtTime(900, t+0.2);
                    g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t+1);
                }
                o.start(); o.stop(t+1);
            }
        };

        // NÚCLEO DE AUTENTICACIÓN
        const AuthCore = {
            async process() {

                    else {
                        await sb.from('usuarios').insert({ id: data.user.id, saldo: 0 });
                        UI.toast("Cuenta creada con éxito", "success");
                        location.reload();
                    }
                } else {
                    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                    if(error) UI.toast("Acceso Denegado", "error");
                    else location.reload();
                }
                btn.disabled = false;

            async check() {

                if(session) {
                    APP.user = session.user;
                    document.getElementById('auth-view').classList.add('hidden');

            logout() { sb.auth.signOut(); location.reload(); }

        const AuthUI = {
            switch(mode) {

                document.getElementById('tab-login').classList.toggle('active', mode === 'login');

            async loadHistory() {
                const { data } = await sb.from('history').select('*').eq('user_id', APP.user.id).order('created_at', {ascending: false});
                UI.renderHistory(data || []);
            },
            async sendDeposit() {
                const amt = parseFloat(document.getElementById('cash-input').value);

                if(!amt || !file) return UI.toast("Completa los datos", "error");

                btn.disabled = true; btn.innerText = "PROCESANDO ENVÍO...";

                    await sb.storage.from('comprobantes').upload(`evidence/${fName}`, file);
                    const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(`evidence/${fName}`);

                    await sb.from('history').insert({

                    this.loadHistory();
                } catch(e) { UI.toast("Error del Servidor", "error"); }
                finally { btn.disabled = false; btn.innerText = "Confirmar Envío"; }

        // MOTOR DEL CASINO
        const Casino = {
            init() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    for(let i=0; i<70; i++) {
                        const s = APP.symbols[Math.floor(Math.random()*5)];

            updateBet(v) {
                APP.bet = Math.max(10, APP.bet + v);

            },
            async spin() {
                if(APP.isSpinning || APP.balance < APP.bet) return UI.toast("Saldo Insuficiente", "error");

                APP.isSpinning = true;
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;

                const res = [APP.symbols[Math.floor(Math.random()*5)], APP.symbols[Math.floor(Math.random()*5)], APP.symbols[Math.floor(Math.random()*5)]];
                const mult = APP.odds[res.join('')] || 0;

                [1,2,3].forEach((id, i) => {
                    const el = document.getElementById(`reel-${id}`);
                    const travel = (APP.symbols.indexOf(res[i]) * 145) + (145 * 55);

                const feed = document.getElementById('history-feed');
                feed.innerHTML = data.map(l => `
                    <div class="glass-premium p-6 rounded-[3rem] flex justify-between items-center animate__animated animate__fadeInUp border border-white/5">
                        <div>
                            <p class="text-[10px] font-black text-zinc-700 uppercase">${l.label}</p>
                            <p class="text-[7px] font-bold text-zinc-900 mt-1">${new Date(l.created_at).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-casino text-2xl ${l.amount >= 0 ? 'text-emerald-500' : 'text-red-600'}">${l.amount >= 0 ? '+' : ''}${l.amount.toFixed(2)}</p>
                            ${l.status === 'pending' ? '<span class="text-[7px] font-black text-amber-500 uppercase">En Revisión</span>' : ''}
                        </div>
                    </div>
                `).join('');
            },
            async hideLoader() {
                const bar = document.getElementById('load-progress');
                const msg = document.getElementById('load-msg');
                const steps = ["Seguridad SSL...", "Cifrado Militar...", "Conectando DB...", "Ready"];
                for(let i=0; i<=100; i+=25) {
                    bar.style.width = i + '%';
                    msg.innerText = steps[i/25];
                    await new Promise(r => setTimeout(r, 200));
                }
                document.getElementById('sys-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('sys-loader').remove(), 1000);
            }
        };

        document.getElementById('evidence-upload').onchange = (e) => {
            if(e.target.files[0]) {
                document.getElementById('up-text').innerText = "✅ ARCHIVO LISTO";
                document.getElementById('up-text').classList.add('text-emerald-500');
            }
        };

        // Lanzamiento
        AuthCore.check();

    </script>
</body>
</html>
