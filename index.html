<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino PRO</title>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:Arial;">

<h2>🎰 Casino Login</h2>

<input id="email" placeholder="Correo"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>

<button id="btnRegister">Registrar</button>
<button id="btnLogin">Entrar</button>

<p id="msg"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔥 usamos OTRO nombre (evita conflicto)
const sb = window.supabase.createClient(
  "https://dakhnqriwbzihlzhtfcb.supabase.co",
  "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

function msg(t){
  document.getElementById("msg").innerText = t;
}

function val(id){
  return document.getElementById(id).value;
}

// REGISTER
async function register(){
  msg("Registrando...");

  const { error } = await sb.auth.signUp({
    email: val("email"),
    password: val("pass")
  });

  msg(error ? "❌ " + error.message : "📩 Revisa tu correo");
}

// LOGIN
async function login(){
  msg("Entrando...");

  const { error } = await sb.auth.signInWithPassword({
    email: val("email"),
    password: val("pass")
  });

  if(error){
    if(error.message.includes("Email not confirmed")){
      msg("⚠️ Confirma tu correo");
    } else {
      msg("❌ " + error.message);
    }
    return;
  }

  msg("✅ LOGIN OK");
}

// BOTONES
document.getElementById("btnRegister").onclick = register;
document.getElementById("btnLogin").onclick = login;

</script>

</body>
</html>
