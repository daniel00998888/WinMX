        .mine-cell.bomb { background: #ef4444; border-color: #ef4444; }
    </style>

                if(game === 'mines') GameLogic.mines.init();
                UI.updateBetDisplay();
            },
            templates: {
                slots: `
                    <div class="game-info text-[10px] text-zinc-400">3 símbolos iguales ganan hasta 50x.</div>
                    <div class="glass p-6 text-center">
                        <div class="grid grid-cols-3 gap-2 mb-8">

                            <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button>
                    </div>`,
                dice: `
                    <div class="game-info text-[10px] text-zinc-400">Adivina si la suma es Mayor o Menor a 7. Paga 2x.</div>
                    <div class="glass p-8 text-center">
                        <div class="flex justify-center gap-4 mb-6">
                            <div id="die-1" class="die">1</div><div id="die-2" class="die">1</div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <button onclick="GameLogic.dice.play('under')" class="bg-blue-500/10 border border-blue-500/30 py-4 rounded-2xl font-bold text-[10px] text-blue-400">MENOR A 7</button>
                            <button onclick="GameLogic.dice.play('over')" class="bg-red-500/10 border border-red-500/30 py-4 rounded-2xl font-bold text-[10px] text-red-400">MAYOR A 7</button>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                    </div>`,
                crash: `
                    <div class="game-info text-[10px] text-zinc-400">Retira antes de que el multiplicador explote.</div>
                    <div class="glass p-8 text-center">
                        <div id="crash-display" class="text-6xl font-casino text-emerald-500 mb-8 italic">1.00x</div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-6 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button id="btn-crash-action" onclick="GameLogic.crash.start()" class="btn-action w-full py-5 font-casino text-xl">DESPEGAR</button>
                    </div>`,
                mines: `
                    <div class="game-info text-[10px] text-zinc-400">Evita las 3 bombas. Cada diamante aumenta el premio.</div>
                    <div class="glass p-4 text-center">
                        <div id="mines-grid" class="grid grid-cols-4 gap-2 mb-4"></div>
                        <div class="flex justify-between items-center mb-4 px-2">
                            <span id="mines-mult" class="font-casino text-emerald-500">1.00x</span>
                            <button id="btn-mines-cashout" onclick="GameLogic.mines.cashout()" class="hidden bg-emerald-500 text-black px-4 py-2 rounded-lg font-bold text-[10px]">COBRAR</button>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                    </div>`,
                roulette: `
                    <div class="game-info text-[10px] text-zinc-400">Adivina el color. Paga 2x. El 0 (Verde) pierde.</div>
                    <div class="glass p-8 text-center">
                        <div id="wheel" class="w-24 h-24 bg-zinc-900 rounded-full mx-auto mb-6 border-4 border-emerald-500 flex items-center justify-center text-3xl font-casino">?</div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <button onclick="GameLogic.roulette.play('red')" class="bg-red-600/20 border border-red-600/50 py-4 rounded-2xl font-bold text-[10px] text-red-400">ROJO</button>
                            <button onclick="GameLogic.roulette.play('black')" class="bg-zinc-800 border border-white/10 py-4 rounded-2xl font-bold text-[10px]">NEGRO</button>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>

                    </div>`,
                chests: `
                    <div class="game-info text-[10px] text-zinc-400">Un cofre tiene 5x, otro 2x y otro 0x. ¡Suerte!</div>
                    <div class="glass p-8 text-center">
                        <div class="grid grid-cols-3 gap-3 mb-6">

        };

        const GameLogic = {
            changeBet(v) { if(State.isSpinning || State.minesActive) return; State.currentBet = Math.max(10, State.currentBet + v); UI.updateBetDisplay(); },
            async startSpin() {
                if(State.isSpinning || State.balance < State.currentBet) { UI.notify("Saldo insuficiente", "error"); return false; }
                State.isSpinning = true; State.balance -= State.currentBet; UI.updateBalance();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async endSpin(winAmt, label) {
                if(winAmt > 0) {
                    State.balance += winAmt;
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    UI.notify(`GANASTE $${winAmt}`, "success"); UI.updateBalance();
                }
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: winAmt - State.currentBet, label: label, status: 'completed' }]);
                State.isSpinning = false;
            },
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(!await GameLogic.startSpin()) return;
                    State.totalSpins++; const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    const pay = { '7️⃣7️⃣7️⃣': 50, '💎💎💎': 15, '⭐️⭐️⭐️': 10, '🔔🔔🔔': 5, '🍋🍋🍋': 2, '🍒🍒🍒': 1.5 };
                    const mult = pay[res.join('')] || 0;
                    [1,2,3].forEach((id, i) => { const reel = document.getElementById(`reel-${id}`); const pos = (State.totalSpins * 90 * 12) + (SYMBOLS.indexOf(res[i]) * 90); reel.style.transform = `translateY(-${pos}px)`; });
                    setTimeout(() => GameLogic.endSpin(State.currentBet * mult, mult > 0 ? 'W SLOTS' : 'SLOTS'), 3500);
                }
            },
            dice: {
                async play(choice) {
                    if(!await GameLogic.startSpin()) return;
                    const d1 = document.getElementById('die-1'), d2 = document.getElementById('die-2');
                    d1.classList.add('animate-roll'); d2.classList.add('animate-roll');
                    setTimeout(() => {
                        d1.classList.remove('animate-roll'); d2.classList.remove('animate-roll');
                        const v1 = Math.floor(Math.random()*6)+1, v2 = Math.floor(Math.random()*6)+1, sum = v1 + v2;
                        d1.innerText = v1; d2.innerText = v2;
                        const win = (choice === 'under' && sum < 7) || (choice === 'over' && sum > 7);
                        GameLogic.endSpin(win ? State.currentBet * 2 : 0, win ? 'W DICE' : 'DICE');
                    }, 1500);
                }
            },
            crash: {
                mult: 1.0, timer: null,
                async start() {
                    if(!await GameLogic.startSpin()) return;
                    const btn = document.getElementById('btn-crash-action');
                    btn.innerText = "RETIRAR"; btn.onclick = () => this.stop();
                    this.mult = 1.0; const crashAt = (Math.random() * 4 + 1.1).toFixed(2);
                    this.timer = setInterval(() => {
                        this.mult += 0.04;
                        document.getElementById('crash-display').innerText = this.mult.toFixed(2) + "x";
                        if(this.mult >= crashAt) {
                            clearInterval(this.timer);
                            document.getElementById('crash-display').innerText = "BOOM!";
                            document.getElementById('crash-display').classList.replace('text-emerald-500', 'text-red-500');
                            this.reset(); GameLogic.endSpin(0, 'CRASH');
                        }
                    }, 100);
                },
                stop() {
                    clearInterval(this.timer);
                    const win = Math.floor(State.currentBet * this.mult);
                    this.reset(); GameLogic.endSpin(win, 'W CRASH');
                },
                reset() {
                    const btn = document.getElementById('btn-crash-action');
                    btn.innerText = "DESPEGAR"; btn.onclick = () => this.start();
                    setTimeout(() => document.getElementById('crash-display').classList.replace('text-red-500', 'text-emerald-500'), 2000);
                }
            },
            mines: {
                bombs: [], hits: 0,
                init() {
                    const grid = document.getElementById('mines-grid'); grid.innerHTML = '';
                    this.bombs = Array.from({length: 16}, (_, i) => i).sort(() => Math.random() - 0.5).slice(0, 3);
                    this.hits = 0; State.minesActive = false;
                    for(let i=0; i<16; i++) {
                        grid.innerHTML += `<div onclick="GameLogic.mines.reveal(this, ${i})" class="mine-cell">?</div>`;
                    }
                },
                async reveal(el, idx) {
                    if(el.innerText !== '?' || !this.bombs) return;
                    if(this.hits === 0) { if(!await GameLogic.startSpin()) return; State.minesActive = true; }
                    if(this.bombs.includes(idx)) {
                        el.innerHTML = '💣'; el.classList.add('bomb');
                        State.minesActive = false; GameLogic.endSpin(0, 'MINES');
                        setTimeout(() => this.init(), 2000);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('hit');
                        this.hits++;
                        const m = 1 + (this.hits * 0.45);
                        document.getElementById('mines-mult').innerText = m.toFixed(2) + "x";
                        document.getElementById('btn-mines-cashout').classList.remove('hidden');
                    }
                },
                async cashout() {
                    const win = Math.floor(State.currentBet * (1 + (this.hits * 0.45)));
                    State.minesActive = false; GameLogic.endSpin(win, 'W MINES');
                    this.init(); document.getElementById('btn-mines-cashout').classList.add('hidden');
                    document.getElementById('mines-mult').innerText = "1.00x";
                }
            },
            roulette: {
                async play(color) {
                    if(!await GameLogic.startSpin()) return;
                    const w = document.getElementById('wheel'); w.classList.add('animate-roll');
                    setTimeout(() => {
                        w.classList.remove('animate-roll'); const n = Math.floor(Math.random()*15);
                        const resCol = n === 0 ? 'green' : (n % 2 === 0 ? 'red' : 'black');
                        w.innerText = n; w.style.color = resCol === 'red' ? '#ef4444' : (resCol === 'black' ? '#fff' : '#10b981');
                        const win = color === resCol;
                        GameLogic.endSpin(win ? State.currentBet * 2 : 0, win ? 'W RULETA' : 'RULETA');
                    }, 2000);
                }
            },
            chests: {
                async play(idx) {
                    if(!await GameLogic.startSpin()) return;
                    const res = [0, 2, 5].sort(() => Math.random() - 0.5);
                    GameLogic.endSpin(State.currentBet * res[idx], res[idx] > 0 ? 'W COFRES' : 'COFRES');
                }
            }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) return UI.notify("Credenciales incorrectas", "error");
                location.reload();
            },
            async register() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signUp({ email: e, password: p });
                UI.notify(error ? error.message : "¡Revisa tu correo!", error ? "error" : "success");
            },
            async logout() { await sb.auth.signOut(); location.reload(); }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    await this.load();
                } else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async load() {
                let { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                if(!data) { 
                    await sb.from('usuarios').insert([{ id: State.user.id, email: State.user.email, saldo: 0 }]); 
                    State.balance = 0; 
                } else { State.balance = data.saldo; }
                UI.updateBalance();
            },
            async fetchHistory() {
                const b = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false }).limit(10);
                const container = document.getElementById('history-lists');
                container.innerHTML = b.data.map(i => `
                    <div class="glass p-4 flex justify-between items-center text-[10px]">
                        <div><p class="font-bold text-zinc-500 uppercase">${i.label}</p><p class="text-[8px] opacity-40">${new Date(i.created_at).toLocaleTimeString()}</p></div>
                        <p class="${i.amount >= 0 ? 'text-emerald-500' : 'text-red-500'} font-casino">$${i.amount.toFixed(2)}</p>
                    </div>`).join('');
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Datos incompletos", "error");
                UI.notify("Procesando...", "success");
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPOSITO', status: 'pending', evidence_url: publicUrl }]);
                UI.closeModal('modal-deposit');
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            updateBetDisplay() { document.querySelectorAll('.bet-val').forEach(el => el.innerText = `$${State.currentBet}`); },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() {
                document.getElementById('dep-step-1').classList.add('hidden-view');
                document.getElementById('dep-step-2').classList.remove('hidden-view');
            },
            handleFile(input) { if(input.files[0]) document.getElementById('file-label').innerText = "ARCHIVO SELECCIONADO ✅"; }
        };

        window.onload = () => Core.init();
    </script>
</body>
</html>
