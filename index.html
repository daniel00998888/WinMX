<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASINO REAL PRO | Sesión Permanente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0a1625, #050a14); font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; }
        .neon-border { border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); }
        .reel.spinning { animation: blur 0.1s infinite; }
        @keyframes blur { 0% { filter: blur(0px); transform: translateY(-2px); } 50% { filter: blur(4px); } 100% { filter: blur(0px); transform: translateY(2px); } }
        
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none; }
        .toast { 
            background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 24px; border-radius: 16px; margin-bottom: 10px;
            backdrop-blur: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateX(120%); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto; min-width: 250px;
        }
        .toast.show { transform: translateX(0); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="notification-container"></div>

    <header id="topbar" class="hidden bg-zinc-950/80 backdrop-blur-md border-b border-white/10 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">💎</span>
                <h1 class="text-xl font-black tracking-tighter text-cyan-400 uppercase">Casino Real</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-zinc-900 px-6 py-2 rounded-full border border-yellow-500/30">
                    <span class="text-yellow-400 font-bold text-xl" id="saldoDisplay">$0</span>
                </div>
                <button onclick="logout()" class="text-zinc-500 hover:text-red-500 transition text-xl"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </header>

    <div id="loadingScreen" class="fixed inset-0 bg-[#050a14] flex items-center justify-center z-[200]">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-cyan-500"></div>
    </div>

    <div id="authSection" class="hidden flex items-center justify-center min-h-screen p-6">
        <div class="bg-zinc-900 p-8 rounded-[2rem] w-full max-w-md border border-white/5">
            <div class="text-center mb-8">
                <span class="text-6xl">🎰</span>
                <h2 class="text-3xl font-bold mt-4">Bienvenido</h2>
            </div>
            <input id="email" type="email" placeholder="Email" class="w-full bg-zinc-800 p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-cyan-500 text-white">
            <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 p-4 rounded-2xl mb-6 outline-none focus:ring-2 ring-cyan-500 text-white">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="authAction('up')" class="bg-zinc-800 py-4 rounded-2xl font-bold hover:bg-zinc-700 transition">Registro</button>
                <button onclick="authAction('in')" class="bg-cyan-500 text-black py-4 rounded-2xl font-bold hover:bg-cyan-400 transition">Entrar</button>
            </div>
        </div>
    </div>

    <main id="mainCasino" class="hidden max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <button onclick="switchTab('tab-slots')" class="bg-zinc-900 p-5 rounded-2xl border border-white/5 hover:border-cyan-500 transition font-bold">🎰 SLOTS</button>
            <button onclick="switchTab('tab-dice')" class="bg-zinc-900 p-5 rounded-2xl border border-white/5 hover:border-cyan-500 transition font-bold">🎲 DADOS</button>
            <button onclick="switchTab('tab-bj')" class="bg-zinc-900 p-5 rounded-2xl border border-white/5 hover:border-cyan-500 transition font-bold">🃏 BLACKJACK</button>
            <button onclick="openBank()" class="bg-emerald-900/30 p-5 rounded-2xl border border-emerald-500/30 text-emerald-400 font-bold hover:bg-emerald-900/50 transition font-bold">🏦 BANCO</button>
        </div>

        <section id="tab-slots" class="tab-content">
            <div class="bg-zinc-900/50 p-10 rounded-[3rem] text-center neon-border max-w-2xl mx-auto">
                <h2 class="text-2xl font-black mb-8 tracking-widest text-cyan-400 uppercase">Tragamonedas</h2>
                <div class="flex justify-center gap-4 mb-10">
                    <div id="s1" class="w-20 h-28 bg-black rounded-2xl text-5xl flex items-center justify-center border-2 border-zinc-800">🍒</div>
                    <div id="s2" class="w-20 h-28 bg-black rounded-2xl text-5xl flex items-center justify-center border-2 border-zinc-800">💎</div>
                    <div id="s3" class="w-20 h-28 bg-black rounded-2xl text-5xl flex items-center justify-center border-2 border-zinc-800">7️⃣</div>
                </div>
                <input id="betSlots" type="number" value="10" class="bg-black p-4 rounded-xl mb-4 text-center w-40 border border-zinc-700 text-2xl font-bold">
                <button onclick="playSlots()" id="btnSlots" class="w-full max-w-sm bg-gradient-to-r from-cyan-500 to-blue-600 text-black py-5 rounded-2xl font-black text-2xl active:scale-95 transition-all">GIRAR</button>
            </div>
        </section>

        <section id="tab-dice" class="tab-content hidden">
            <div class="bg-zinc-900/50 p-10 rounded-[3rem] text-center neon-border max-w-lg mx-auto">
                <h2 class="text-2xl font-black mb-4 text-indigo-400">DADOS LUCKY 7</h2>
                <div class="flex justify-center gap-8 mb-10">
                    <div id="d1" class="text-7xl p-6 bg-white text-black rounded-3xl">🎲</div>
                    <div id="d2" class="text-7xl p-6 bg-white text-black rounded-3xl">🎲</div>
                </div>
                <input id="betDice" type="number" value="10" class="bg-black p-4 rounded-xl mb-4 text-center w-40 border border-zinc-700 text-2xl font-bold">
                <button onclick="playDice()" class="w-full bg-indigo-500 py-5 rounded-2xl font-black text-xl">LANZAR</button>
            </div>
        </section>

        <section id="tab-bj" class="tab-content hidden">
            <div class="bg-zinc-900/50 p-10 rounded-[3rem] max-w-lg mx-auto border border-white/10 text-center">
                <h2 class="text-2xl font-black mb-10 text-red-500">BLACKJACK</h2>
                <div class="flex justify-around items-center mb-10">
                    <div class="bg-black/40 p-6 rounded-3xl w-32">
                        <p class="text-[10px] text-zinc-500">TÚ</p>
                        <p id="playerScore" class="text-5xl font-black">0</p>
                    </div>
                    <div class="bg-black/40 p-6 rounded-3xl w-32">
                        <p class="text-[10px] text-zinc-500">CASA</p>
                        <p id="dealerScore" class="text-5xl font-black">0</p>
                    </div>
                </div>
                <input id="betBJ" type="number" value="20" class="bg-black p-4 rounded-xl mb-4 text-center w-40 border border-zinc-700 text-2xl font-bold">
                <button onclick="playBJ()" class="w-full bg-red-600 py-5 rounded-2xl font-black text-xl">PEDIR CARTA</button>
            </div>
        </section>
    </main>

    <div id="bankModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[100] p-4 backdrop-blur-xl">
        <div class="bg-zinc-900 p-8 rounded-[2.5rem] w-full max-w-lg border border-white/10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">🏦 BANCO REAL</h2>
                <button onclick="closeBank()" class="text-3xl text-zinc-500">&times;</button>
            </div>
            <div class="flex gap-2 mb-8 bg-black p-1 rounded-2xl">
                <button onclick="switchBankTab('dep')" id="btnDep" class="flex-1 py-3 rounded-xl font-bold bg-zinc-800">DEPOSITAR</button>
                <button onclick="switchBankTab('ret')" id="btnRet" class="flex-1 py-3 rounded-xl font-bold text-zinc-500">RETIRAR</button>
            </div>
            <div id="bank-dep" class="space-y-4">
                <input id="depAmt" type="number" placeholder="Monto $" class="w-full bg-black p-5 rounded-2xl border border-white/5 text-white">
                <button onclick="doDep()" class="w-full bg-emerald-500 text-black py-4 rounded-2xl font-black">GENERAR CLABE</button>
                <div id="clabeArea" class="hidden p-6 bg-zinc-800 rounded-3xl text-center border border-white/5">
                    <p id="clabeNum" class="font-mono text-2xl text-cyan-400 mb-4 tracking-tighter">000000000000000000</p>
                    <button onclick="confirmRealDep()" class="w-full bg-emerald-600 py-4 rounded-2xl font-bold">YA DEPOSITÉ</button>
                </div>
            </div>
            <div id="bank-ret" class="hidden space-y-4">
                <input id="retAmt" type="number" placeholder="Monto a retirar" class="w-full bg-black p-5 rounded-2xl border border-white/5 text-white">
                <button onclick="doRet()" class="w-full bg-red-500 text-white py-4 rounded-2xl font-black">CONFIRMAR RETIRO</button>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;

        // --- INICIO: REVISAR SESIÓN AL CARGAR ---
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                await initApp();
            } else {
                showAuth();
            }
        };

        function notify(msg, type = 'info') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `toast border-l-4 ${type === 'win' ? 'border-green-500' : type === 'error' ? 'border-red-500' : 'border-cyan-500'}`;
            toast.innerHTML = `<div class="flex items-center gap-3"><span class="text-xl">${type === 'win' ? '🏆' : 'ℹ️'}</span><span class="font-bold">${msg}</span></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        async function authAction(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(type === 'up') {
                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if(error) return notify(error.message, 'error');
                await sb.from('usuarios').insert([{ id: data.user.id, email, saldo: 500 }]);
                notify("¡Cuenta creada! Inicia sesión.");
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) return notify("Error en los datos", 'error');
                user = data.user;
                initApp();
            }
        }

        async function initApp() {
            const { data, error } = await sb.from('usuarios').select('*').eq('id', user.id).single();
            if(data) {
                saldo = data.saldo;
                updateSaldo(false);
                document.getElementById('loadingScreen').classList.add('hidden');
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('topbar').classList.remove('hidden');
                document.getElementById('mainCasino').classList.remove('hidden');
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('loadingScreen').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
        }

        async function updateSaldo(sync = true) {
            document.getElementById('saldoDisplay').innerText = `$${saldo.toLocaleString()}`;
            if(sync && user) {
                await sb.from('usuarios').update({ saldo }).eq('id', user.id);
            }
        }

        // --- LÓGICA DE JUEGOS Y BANCO (Misma que antes) ---
        const icons = ["🍒", "💎", "7️⃣", "🔔", "🍋", "⭐"];
        function playSlots() {
            const bet = parseInt(document.getElementById('betSlots').value);
            if(bet > saldo || bet <= 0) return notify("Saldo insuficiente", 'error');
            saldo -= bet; updateSaldo();
            const reels = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
            reels.forEach(r => { r.classList.add('spinning'); r.innerText = "🎲"; });
            setTimeout(() => {
                const res = reels.map(r => {
                    r.classList.remove('spinning');
                    const icon = icons[Math.floor(Math.random() * icons.length)];
                    r.innerText = icon; return icon;
                });
                if(res[0] === res[1] && res[1] === res[2]) {
                    const win = bet * 15; saldo += win; notify(`¡JACKPOT! +$${win}`, 'win');
                } else if(res[0] === res[1] || res[1] === res[2]) {
                    const win = bet * 2; saldo += win; notify(`¡Ganaste! +$${win}`, 'win');
                }
                updateSaldo();
            }, 800);
        }

        function playDice() {
            const bet = parseInt(document.getElementById('betDice').value);
            if(bet > saldo) return notify("Saldo insuficiente", 'error');
            saldo -= bet;
            const r1 = Math.floor(Math.random() * 6) + 1; const r2 = Math.floor(Math.random() * 6) + 1;
            document.getElementById('d1').innerText = r1; document.getElementById('d2').innerText = r2;
            if(r1+r2 === 7 || r1+r2 === 11) { saldo += bet*3; notify("¡Dados ganadores!", 'win'); }
            updateSaldo();
        }

        function playBJ() {
            const bet = parseInt(document.getElementById('betBJ').value);
            if(bet > saldo) return notify("Saldo insuficiente", 'error');
            const p = Math.floor(Math.random()*11)+2; const d = Math.floor(Math.random()*11)+2;
            document.getElementById('playerScore').innerText = p; document.getElementById('dealerScore').innerText = d;
            if(p > d) { saldo += bet*2; notify("Ganaste la mano", 'win'); } else { saldo -= bet; notify("Perdiste", 'error'); }
            updateSaldo();
        }

        function openBank() { document.getElementById('bankModal').classList.remove('hidden'); }
        function closeBank() { document.getElementById('bankModal').classList.add('hidden'); }
        function switchBankTab(type) {
            document.getElementById('bank-dep').classList.toggle('hidden', type !== 'dep');
            document.getElementById('bank-ret').classList.toggle('hidden', type !== 'ret');
        }
        function doDep() {
            document.getElementById('clabeNum').innerText = "012" + Math.floor(Math.random() * 1000000000000000);
            document.getElementById('clabeArea').classList.remove('hidden');
        }
        function confirmRealDep() {
            const amt = parseInt(document.getElementById('depAmt').value) || 0;
            saldo += amt; updateSaldo(); notify("Depósito acreditado", 'win'); closeBank();
        }
        function doRet() {
            const amt = parseInt(document.getElementById('retAmt').value) || 0;
            if(amt > saldo) return notify("Saldo insuficiente", 'error');
            saldo -= amt; updateSaldo(); notify("Retiro en proceso", 'info'); closeBank();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- CERRAR SESIÓN DE VERDAD ---
        async function logout() {
            await sb.auth.signOut();
            location.reload(); // Recarga y como ya no hay sesión, mostrará el Login
        }
    </script>
</body>
</html>
