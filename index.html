<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino Royale PRO</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle,#0b1d2a,#050d14);
  color:white;
  text-align:center;
}

header{
  background:#0f2a3a;
  padding:15px;
  font-size:26px;
}

.screen{display:none;}
.active{display:block;}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.card{
  background:#132f42;
  padding:20px;
  border-radius:15px;
  width:260px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

button{
  width:80%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#00c896;
  color:white;
  cursor:pointer;
}

input,select{
  width:80%;
  padding:8px;
  margin-top:10px;
}

.logout{
  position:absolute;
  right:10px;
  top:10px;
  background:red;
}

.reset{
  position:absolute;
  left:10px;
  top:10px;
  background:orange;
}
</style>
</head>

<body>

<header>🎰 CASINO PRO</header>

<button class="logout" onclick="logout()">Salir</button>
<button class="reset" onclick="resetUser()">Reset</button>

<!-- LOGIN -->
<div id="auth" class="screen active">
<h2>Acceso</h2>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- CASINO -->
<div id="casino" class="screen">
<h2>Fichas: $<span id="saldo">0</span></h2>

<div class="container">

<div class="card">
<h3>🎰 Slot</h3>
<input id="slotBet" type="number">
<button onclick="slot()">Girar</button>
<p id="slotRes"></p>
</div>

<div class="card">
<h3>🎲 Dado</h3>
<input id="diceBet" type="number">
<button onclick="dice()">Lanzar</button>
<p id="diceRes"></p>
</div>

<div class="card">
<h3>🎡 Ruleta</h3>
<input id="roulBet" type="number">
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>
<button onclick="roulette()">Girar</button>
<p id="roulRes"></p>
</div>

<div class="card">
<h3>🃏 Blackjack</h3>
<input id="bjBet" type="number">
<button onclick="blackjack()">Jugar</button>
<p id="bjRes"></p>
</div>

</div>
</div>

<script>

// ===== VARIABLES =====
let saldo = 1000;

// ===== UI =====
function show(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

function update(){
  document.getElementById("saldo").innerText = saldo;
  localStorage.setItem("saldo", saldo);
}

// ===== REGISTRO =====
function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(!email || !pass) return alert("Completa los campos");

  localStorage.setItem("user", JSON.stringify({email,pass}));
  localStorage.setItem("saldo",1000);

  alert("Cuenta creada 🎉 ahora inicia sesión");
}

// ===== LOGIN =====
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let user = JSON.parse(localStorage.getItem("user"));

  if(!user) return alert("No existe cuenta");

  if(user.email===email && user.pass===pass){
    saldo = parseInt(localStorage.getItem("saldo")) || 1000;

    localStorage.setItem("autoLogin","true");

    show("casino");
    update();
  }else{
    alert("Datos incorrectos");
  }
}

// ===== AUTO LOGIN CONTROLADO =====
window.onload = ()=>{
  if(localStorage.getItem("user") && localStorage.getItem("autoLogin")==="true"){
    saldo = parseInt(localStorage.getItem("saldo")) || 1000;
    show("casino");
    update();
  }
}

// ===== LOGOUT =====
function logout(){
  localStorage.setItem("autoLogin","false");
  show("auth");
}

// ===== RESET =====
function resetUser(){
  localStorage.clear();
  location.reload();
}

// ===== JUEGOS =====

// SLOT
function slot(){
  let bet = +document.getElementById("slotBet").value;
  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let res = document.getElementById("slotRes");
  res.innerText = "Girando... 🎰";

  setTimeout(()=>{
    let s=["🍒","💎","7️⃣","⭐"];
    let a=s[Math.floor(Math.random()*4)];
    let b=s[Math.floor(Math.random()*4)];
    let c=s[Math.floor(Math.random()*4)];

    let win=(a===b && b===c);

    saldo += win ? bet*3 : -bet;

    res.innerText = `${a} ${b} ${c} → ${win?"JACKPOT 💰":"PERDISTE ❌"}`;
    update();
  },1000);
}

// DADO
function dice(){
  let bet=+document.getElementById("diceBet").value;
  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let res=document.getElementById("diceRes");
  res.innerText="Lanzando...";

  setTimeout(()=>{
    let d=Math.floor(Math.random()*6)+1;
    let win=d>=4;

    saldo+=win?bet:-bet;

    res.innerText=`🎲 ${d} → ${win?"GANASTE":"PERDISTE"}`;
    update();
  },800);
}

// RULETA
function roulette(){
  let bet=+document.getElementById("roulBet").value;
  let c=document.getElementById("color").value;

  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let res=document.getElementById("roulRes");
  res.innerText="Girando...";

  setTimeout(()=>{
    let r=Math.random()<0.5?"rojo":"negro";
    let win=r===c;

    saldo+=win?bet:-bet;

    res.innerText=`${r} → ${win?"GANASTE 💰":"PERDISTE ❌"}`;
    update();
  },1200);
}

// BLACKJACK
function blackjack(){
  let bet=+document.getElementById("bjBet").value;
  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let p=Math.floor(Math.random()*10)+12;
  let d=Math.floor(Math.random()*10)+12;

  let win=(p>d && p<=21)||d>21;

  saldo+=win?bet:-bet;

  document.getElementById("bjRes").innerText=
    `🃏 Tú:${p} Dealer:${d} → ${win?"GANASTE":"PERDISTE"}`;

  update();
}

</script>

</body>
</html>
