<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0a1625, #1a2a3f); font-family: 'Segoe UI', sans-serif; }
        .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
        .reel {
            width: 85px; height: 85px; background: #0f1c2e; border: 4px solid #22d3ee;
            border-radius: 14px; font-size: 46px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
        }
        @media (min-width: 640px) { .reel { width: 100px; height: 100px; font-size: 56px; } }
        .spinning { animation: spin 0.1s linear infinite; }
        @keyframes spin { 0% { transform: translateY(-10px); filter: blur(2px); } 100% { transform: translateY(10px); filter: blur(2px); } }
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body class="text-white min-h-screen">
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-4 px-4 sticky top-0 z-40">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-2xl font-bold tracking-wider neon-text">CASINO REAL PRO</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-zinc-900 px-6 py-3 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="font-semibold text-2xl text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-5 py-3 rounded-2xl text-sm">Salir</button>
            </div>
        </div>
    </header>

    <div id="auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-10">
                <span class="text-7xl">🎰</span>
                <h2 class="text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">¡Bienvenido!</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-4 focus:outline-none focus:border-cyan-400 text-lg">
            <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-6 focus:outline-none focus:border-cyan-400 text-lg">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="register()" class="bg-zinc-700 hover:bg-zinc-600 py-5 rounded-2xl font-semibold text-lg transition">Registrarse</button>
                <button onclick="login()" class="bg-cyan-500 hover:bg-cyan-600 text-black py-5 rounded-2xl font-semibold text-lg transition">Entrar</button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[28px]"></p>
        </div>
    </div>

    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen overflow-hidden">
            <div id="sidebar" class="w-72 bg-zinc-950 border-r border-zinc-800 p-6 flex flex-col fixed md:static inset-y-0 left-0 z-50 -translate-x-full md:translate-x-0 transition-transform duration-300">
                <h3 class="text-cyan-400 font-semibold mb-5 flex items-center gap-2 text-lg"><i class="fas fa-gamepad"></i> JUEGOS</h3>
                <div onclick="showGame('slot')" class="flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">🎰 <span class="font-medium">Slots</span></div>
                <div onclick="openBankModal()" class="flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer text-lg">🏦 <span class="font-medium">Depósito / Retiro</span></div>
                <h3 class="text-cyan-400 font-semibold mt-auto mb-5 flex items-center gap-2 text-lg"><i class="fas fa-trophy"></i> TOP 5</h3>
                <div id="rankingBox" class="flex-1 space-y-4 overflow-auto"></div>
            </div>

            <div class="flex-1 flex flex-col p-6 md:p-10 overflow-auto">
                <div id="slot" class="game">
                    <h2 class="text-4xl font-bold mb-8 flex items-center gap-4"><span>🎰</span> Tragamonedas Premium</h2>
                    <div class="max-w-lg mx-auto bg-zinc-900/50 p-8 rounded-3xl">
                        <div class="flex justify-center gap-6 mb-12">
                            <div class="reel" id="r1">🍒</div>
                            <div class="reel" id="r2">💎</div>
                            <div class="reel" id="r3">7️⃣</div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <input id="betSlot" type="number" placeholder="Monto a apostar" class="bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-center text-2xl outline-none focus:border-cyan-500">
                            <button onclick="spinSlot()" class="bg-gradient-to-r from-cyan-500 to-blue-600 py-5 rounded-3xl font-bold text-xl active:scale-95 transition">GIRAR</button>
                        </div>
                        <p id="slotRes" class="text-center mt-12 text-3xl font-bold min-h-[80px]"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bankModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-lg">
            <h2 class="text-3xl font-bold mb-6">🏦 Depósito Express</h2>
            <input id="depositAmount" type="number" placeholder="Monto" class="w-full bg-zinc-800 rounded-2xl px-5 py-4 text-2xl mb-4 outline-none">
            <button onclick="confirmDeposit()" class="w-full bg-green-600 py-4 rounded-2xl font-bold mb-4">CONFIRMAR CARGA</button>
            <button onclick="closeBankModal()" class="w-full text-zinc-400">Cerrar</button>
        </div>
    </div>

    <script>
        // TU CONFIGURACIÓN ORIGINAL
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;
        const symbols = ["🍒", "💎", "7️⃣", "🔔", "🍋"];

        // FUNCIONES DE AUTH CONECTADAS A SUPABASE
        async function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("pass").value;
            const { data, error } = await sb.auth.signUp({ email, password });
            if (error) return msg(error.message, "text-red-500");
            
            // Crear perfil en tu tabla 'profiles'
            await sb.from('profiles').insert([{ id: data.user.id, email: email, saldo: 100 }]);
            msg("Registro exitoso. ¡Inicia sesión!", "text-green-500");
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("pass").value;
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) return msg("Error: Datos incorrectos", "text-red-500");
            
            user = data.user;
            loadUserData();
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        async function loadUserData() {
            const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
            if (data) {
                saldo = data.saldo;
                updateUI();
                document.getElementById("auth").classList.add("hidden");
                document.getElementById("casino").classList.remove("hidden");
                document.getElementById("topbar").classList.remove("hidden");
            }
        }

        // LÓGICA DE JUEGO PERSISTENTE
        async function spinSlot() {
            const bet = parseInt(document.getElementById("betSlot").value) || 0;
            if (bet <= 0 || bet > saldo) return alert("Saldo insuficiente");

            saldo -= bet;
            updateUI();

            const reels = [document.getElementById("r1"), document.getElementById("r2"), document.getElementById("r3")];
            reels.forEach(r => r.classList.add("spinning"));

            setTimeout(async () => {
                const res = reels.map(r => {
                    r.classList.remove("spinning");
                    const s = symbols[Math.floor(Math.random() * symbols.length)];
                    r.textContent = s;
                    return s;
                });

                if (res[0] === res[1] && res[1] === res[2]) {
                    const win = bet * 10;
                    saldo += win;
                    document.getElementById("slotRes").innerHTML = "💰 ¡GANASTE $" + win + "!";
                } else {
                    document.getElementById("slotRes").innerHTML = "❌ PERDISTE";
                }

                updateUI();
                // GUARDAR EN SUPABASE
                await sb.from('profiles').update({ saldo: saldo }).eq('id', user.id);
            }, 1000);
        }

        // BANCO CONECTADO
        async function confirmDeposit() {
            const amt = parseInt(document.getElementById("depositAmount").value) || 0;
            if (amt <= 0) return;
            
            saldo += amt;
            await sb.from('profiles').update({ saldo: saldo }).eq('id', user.id);
            updateUI();
            closeBankModal();
            alert("Saldo cargado correctamente");
        }

        function updateUI() {
            document.getElementById("saldo").textContent = "$" + saldo;
        }

        function msg(text, color) {
            document.getElementById("msg").className = "text-center mt-6 text-sm " + color;
            document.getElementById("msg").textContent = text;
        }

        function openBankModal() { document.getElementById("bankModal").classList.remove("hidden"); }
        function closeBankModal() { document.getElementById("bankModal").classList.add("hidden"); }
        function showGame(id) { /* lógica para cambiar divs de juegos */ }
    </script>
</body>
</html>
