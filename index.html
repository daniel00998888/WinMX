<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --mx-green: #10b981;
            --mx-green-glow: rgba(16, 185, 129, 0.4);
            --mx-dark-bg: #030303;
            --mx-card-bg: rgba(12, 12, 12, 0.98);
            --mx-border: rgba(255, 255, 255, 0.08);
            --mx-gold: #fbbf24;
            --mx-win-anim: cubic-bezier(0.15, 0, 0.05, 1);
        }

        /* RESET & GLOBAL STYLES */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--mx-dark-bg); }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 20px; border: 1px solid var(--mx-border); }
        ::-webkit-scrollbar-thumb:hover { background: var(--mx-green); }

        body {
            background-color: var(--mx-dark-bg);
            background-image: 
                radial-gradient(circle at 20% 0%, rgba(16, 185, 129, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 80% 100%, rgba(16, 185, 129, 0.04) 0%, transparent 40%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: -0.02em; }
        .font-mono-pro { font-family: 'JetBrains Mono', monospace; }

        /* CAPAS DE CRISTALERÍA DINÁMICA */
        .glass-panel {
            background: var(--mx-card-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--mx-border);
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.8);
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .neon-text { text-shadow: 0 0 15px var(--mx-green-glow); }
        .inner-shadow { box-shadow: inset 0 0 50px rgba(0,0,0,0.9); }

        /* MOTOR VISUAL DE SLOTS (CALIBRACIÓN 135px) */
        .slot-box {
            height: 135px; 
            overflow: hidden;
            background: linear-gradient(180deg, #000 0%, #080808 50%, #000 100%);
            border: 3px solid #141414;
            border-radius: 2.5rem;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0,0,0,1);
        }

        .slot-box::after {
            content: "";
            position: absolute;
            z-index: 5;
            inset: 0;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.95) 0%, 
                transparent 25%, 
                transparent 75%, 
                rgba(0,0,0,0.95) 100%);
            pointer-events: none;
        }

        .slot-reel {
            transition: transform 4s var(--mx-win-anim);
            will-change: transform;
        }

        .slot-item {
            height: 135px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.05));
        }

        /* BOTONES DE ACCIÓN (SISTEMA MX) */
        .btn-main {
            background: var(--mx-green);
            color: black;
            font-weight: 900;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-main::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.6s;
            z-index: -1;
        }

        .btn-main:hover:not(:disabled)::before { left: 100%; }

        .btn-main:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px var(--mx-green-glow);
        }

        .btn-main:active { transform: scale(0.97); }

        .btn-main:disabled {
            background: #151515;
            color: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* TABS & FILTROS */
        .tab-trigger {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #444;
            padding: 10px 0;
            transition: all 0.4s ease;
            position: relative;
        }

        .tab-trigger.active { color: var(--mx-green); }
        .tab-trigger.active::after {
            content: "";
            position: absolute;
            bottom: -2px; left: 0; width: 100%;
            height: 2px; background: var(--mx-green);
            box-shadow: 0 0 10px var(--mx-green);
        }

        /* NOTIFICACIONES TOAST */
        .mx-toast {
            animation: bounceInRight 0.7s cubic-bezier(0.215, 0.610, 0.355, 1.000);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border-left: 4px solid var(--mx-green);
        }

        @keyframes bounceInRight {
            0% { opacity: 0; transform: translateX(200px); }
            60% { opacity: 1; transform: translateX(-15px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>

    <script>
        /**
         * WINMX ENGINE v5.0 - CORE ARCHITECTURE
         * Reconstrucción Total de 750+ Líneas
         */

        const CONFIG = {
            url: "https://dakhnqriwbzihlzhtfcb.supabase.co",
            key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        };
        
        const sb = window.supabase.createClient(CONFIG.url, CONFIG.key);
        
        let GlobalState = {
            user: null,
            balance: 0,
            bet: 10,
            spinning: false,
            activeTab: 'bets',
            icons: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'],
            history: []
        };

        const PAYTABLE = {
            '🍒🍒🍒': 20, '7️⃣7️⃣7️⃣': 100, '💎💎💎': 50,
            '🔔🔔🔔': 10, '⭐️⭐️⭐️': 15, '🍋🍋🍋': 5
        };

        // AUDIO SYSTEM (CRYPTO ENGINES)
        const AudioCore = {
            ctx: null,
            init() { 
                try { 
                    if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
                } catch(e) { console.error("Audio error", e); }
            },
            trigger(type) {
                this.init();
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;
                if(type === 'spin') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
                    gain.gain.setValueAtTime(0.04, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.2);
                } else if(type === 'win') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(500, now);
                    osc.frequency.exponentialRampToValueAtTime(1000, now + 0.4);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.4);
                } else if(type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.1);
                }
                osc.start(); osc.stop(now + 0.6);
            }
        };

        // SYSTEM & ACCOUNT CORE
        const System = {
            async boot() {
                let p = 0;
                const bar = document.getElementById('loader-bar');
                const label = document.getElementById('loader-status');
                const sequence = ["Initializing RNG...", "Syncing Balance...", "Loading Paytable...", "Handshaking Database..."];
                
                const timer = setInterval(() => {
                    p += Math.random() * 20;
                    bar.style.width = Math.min(p, 100) + '%';
                    if(Math.floor(p/25) < sequence.length) label.innerText = sequence[Math.floor(p/25)];
                    
                    if(p >= 100) {
                        clearInterval(timer);
                        this.verifySession();
                    }
                }, 250);
            },

            async verifySession() {
                try {
                    const { data: { session } } = await sb.auth.getSession();
                    if (session) {
                        GlobalState.user = session.user;
                        this.initAccount();
                    } else {
                        UI.showScreen('auth-app');
                        this.killLoader();
                    }
                } catch(err) {
                    UI.notify("Error de conexión", "error");
                }
            },

            async handleAuth() {
                const email = document.getElementById('email-field').value;
                const pass = document.getElementById('pass-field').value;
                const btn = document.getElementById('auth-btn');

                if(!email || !pass) return UI.notify("Faltan datos", "error");
                btn.disabled = true; btn.innerText = "ACCEDIENDO...";

                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                
                if(error) {
                    const { data: up, error: errUp } = await sb.auth.signUp({ email, password: pass });
                    if(up.user) {
                        await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                        UI.notify("Registrado con éxito", "success");
                    } else {
                        UI.notify("Error: " + error.message, "error");
                        btn.disabled = false; btn.innerText = "Entrar al Lobby";
                        return;
                    }
                }
                location.reload();
            },

            async initAccount() {
                UI.showScreen('main-app');
                const { data, error } = await sb.from('usuarios').select('saldo').eq('id', GlobalState.user.id).single();
                if (data) {
                    GlobalState.balance = data.saldo;
                    UI.updateBalance();
                    this.fetchActivity();
                    Engine.setup();
                }
                this.killLoader();
            },

            async fetchActivity() {
                const { data } = await sb.from('history')
                    .select('*')
                    .eq('user_id', GlobalState.user.id)
                    .order('created_at', {ascending: false})
                    .limit(30);
                GlobalState.history = data || [];
                UI.renderHistory();
            },

            async confirmDeposit() {
                const fileInput = document.getElementById('evidence-input');
                const amt = parseFloat(document.getElementById('dep-amount').value);
                
                if(!amt || amt < 10) return UI.notify("Monto mínimo $10", "error");
                if(!fileInput.files[0]) return UI.notify("Sube el comprobante", "error");

                const btn = document.getElementById('final-dep-btn');
                btn.disabled = true; btn.innerText = "SUBIENDO...";

                try {
                    const file = fileInput.files[0];
                    const path = `evidence/${GlobalState.user.id}/${Date.now()}.png`;
                    const { error } = await sb.storage.from('comprobantes').upload(path, file);
                    if(error) throw error;

                    const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);

                    await sb.from('history').insert({
                        user_id: GlobalState.user.id,
                        type: 'deposits',
                        amount: amt,
                        label: 'RECARGA SALDO',
                        status: 'pending',
                        evidence_url: publicUrl
                    });

                    UI.notify("Depósito enviado", "success");
                    UI.modal('dep-modal', false);
                    this.fetchActivity();
                } catch(e) {
                    UI.notify("Fallo al subir", "error");
                } finally {
                    btn.disabled = false; btn.innerText = "Confirmar Operación";
                }
            },

            killLoader() {
                const l = document.getElementById('loader-screen');
                l.style.opacity = '0';
                setTimeout(() => l.classList.add('hidden'), 1000);
            },

            logout() { sb.auth.signOut(); location.reload(); }
        };

        // RNG & GAME ENGINE
        const Engine = {
            setup() {
                [1,2,3].forEach(id => {
                    const el = document.getElementById(`reel-${id}`);
                    el.innerHTML = '';
                    const pool = [...GlobalState.icons, ...GlobalState.icons, ...GlobalState.icons, ...GlobalState.icons, ...GlobalState.icons];
                    pool.forEach(icon => {
                        el.innerHTML += `<div class="slot-item">${icon}</div>`;
                    });
                });
            },

            setBet(val) {
                AudioCore.trigger('click');
                GlobalState.bet = Math.max(10, GlobalState.bet + val);
                document.getElementById('bet-display').innerText = `$${GlobalState.bet}`;
            },

            async spin() {
                if(GlobalState.spinning) return;
                if(GlobalState.balance < GlobalState.bet) return UI.notify("Saldo insuficiente", "error");

                GlobalState.spinning = true;
                AudioCore.trigger('click');
                
                const btn = document.getElementById('spin-trigger');
                btn.disabled = true; btn.innerText = "...";

                // Resultado RNG
                const result = [
                    GlobalState.icons[Math.floor(Math.random() * 6)],
                    GlobalState.icons[Math.floor(Math.random() * 6)],
                    GlobalState.icons[Math.floor(Math.random() * 6)]
                ];

                const mult = PAYTABLE[result.join('')] || 0;
                const winAmt = GlobalState.bet * mult;
                const delta = winAmt - GlobalState.bet;
                const newBalance = GlobalState.balance + delta;

                // Animación Física
                [1,2,3].forEach((id, i) => {
                    const el = document.getElementById(`reel-${id}`);
                    const iconIndex = GlobalState.icons.indexOf(result[i]);
                    const pixels = (iconIndex * 135) + (135 * 24);
                    el.style.transform = `translateY(-${pixels}px)`;
                });

                let loopSound = setInterval(() => AudioCore.trigger('spin'), 180);

                setTimeout(async () => {
                    clearInterval(loopSound);
                    
                    if(mult > 0) {
                        AudioCore.trigger('win');
                        UI.notify(`WIN X${mult}!`, "success");
                    }

                    const { error } = await sb.from('usuarios').update({ saldo: newBalance }).eq('id', GlobalState.user.id);
                    if(!error) {
                        await sb.from('history').insert({
                            user_id: GlobalState.user.id,
                            type: 'bets',
                            amount: delta,
                            label: mult > 0 ? `WIN X${mult}` : 'JUEGO',
                            status: 'completed'
                        });

                        GlobalState.balance = newBalance;
                        UI.updateBalance();
                        System.fetchActivity();
                    }

                    GlobalState.spinning = false;
                    btn.disabled = false; btn.innerText = "GIRAR";
                    this.resetVisuals();
                }, 4000);
            },

            resetVisuals() {
                [1,2,3].forEach(id => {
                    const el = document.getElementById(`reel-${id}`);
                    el.style.transition = 'none';
                    el.style.transform = 'translateY(0)';
                    setTimeout(() => el.style.transition = 'transform 4s var(--mx-win-anim)', 50);
                });
            }
        };

        // UI INTERFACE MANAGER
        const UI = {
            updateBalance() {
                const el = document.getElementById('balance-display');
                el.innerText = `$${GlobalState.balance.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            },

            notify(msg, type = 'info') {
                const hub = document.getElementById('toast-hub');
                const t = document.createElement('div');
                const colors = { success: 'bg-emerald-500 text-black', error: 'bg-red-500 text-white', info: 'bg-zinc-900 text-white' };
                t.className = `${colors[type]} mx-toast px-10 py-5 rounded-2xl font-black text-[10px] shadow-2xl flex items-center gap-4 uppercase tracking-widest`;
                t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${msg}`;
                hub.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3500);
            },

            showScreen(id) {
                const el = document.getElementById(id);
                el.classList.remove('hidden');
                setTimeout(() => el.classList.add('opacity-100'), 50);
            },

            switchTab(t) {
                AudioCore.trigger('click');
                GlobalState.activeTab = t;
                document.getElementById('tab-bets').classList.toggle('active', t === 'bets');
                document.getElementById('tab-deps').classList.toggle('active', t === 'deps');
                this.renderHistory();
            },

            renderHistory() {
                const box = document.getElementById('history-container');
                box.innerHTML = '';
                const filtered = GlobalState.history.filter(h => GlobalState.activeTab === 'bets' ? h.type === 'bets' : h.type === 'deposits');
                
                if(filtered.length === 0) {
                    box.innerHTML = `<div class="py-20 text-center text-zinc-800 font-black text-[9px] uppercase tracking-widest">Sin Actividad</div>`;
                    return;
                }

                filtered.forEach(h => {
                    const isWin = h.amount >= 0;
                    const color = h.status === 'pending' ? 'text-amber-500' : (isWin ? 'text-emerald-500' : 'text-red-500');
                    box.innerHTML += `
                        <div class="glass-panel p-5 rounded-[1.8rem] flex justify-between items-center animate__animated animate__fadeInUp">
                            <div class="flex flex-col">
                                <span class="text-[9px] font-black text-zinc-600 uppercase mb-1">${h.label}</span>
                                <span class="text-[7px] text-zinc-800 font-bold">${new Date(h.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="text-right font-casino text-lg ${color}">${isWin ? '+' : '-'}$${Math.abs(h.amount).toFixed(2)}</div>
                        </div>
                    `;
                });
            },

            modal(id, state) {
                AudioCore.trigger('click');
                const el = document.getElementById(id);
                if(state) {
                    el.classList.remove('hidden');
                    document.getElementById('dep-step-1').classList.remove('hidden');
                    document.getElementById('dep-step-2').classList.add('hidden');
                } else el.classList.add('hidden');
            },

            nextDep() {
                const amt = document.getElementById('dep-amount').value;
                if(amt < 10) return this.notify("Min $10 MXN", "error");
                AudioCore.trigger('click');
                document.getElementById('dep-step-1').classList.add('hidden');
                document.getElementById('dep-step-2').classList.remove('hidden');
            },

            copyClave() {
                navigator.clipboard.writeText('722969020533491161');
                this.notify("Copiado al Portapapeles", "success");
            }
        };

        // LISTENERS & BOOT
        document.getElementById('evidence-input')?.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                document.getElementById('evidence-status').innerText = "✅ ARCHIVO CARGADO";
                document.getElementById('evidence-status').classList.add('text-emerald-500');
            }
        });

        System.boot();

    </script>
</body>
</html>
