<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .game-info { background: rgba(16, 185, 129, 0.05); border-left: 3px solid var(--mx-green); padding: 12px; border-radius: 0 15px 15px 0; margin-bottom: 20px; }
        /* Estilos específicos nuevos juegos */
        .mine-cell { aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .mine-cell.revealed { background: rgba(16, 185, 129, 0.2); border-color: var(--mx-green); }
        .mine-cell.exploded { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; }
    </style>
</head>
<body class="antialiased select-none">

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-8 bg-black">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-casino mb-10 italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Correo" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <input id="auth-password" type="password" placeholder="Contraseña" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino mt-2">Entrar</button>
                <button onclick="AuthManager.register()" class="w-full py-2 text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Crear cuenta</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        <header class="p-5 flex justify-between items-center bg-black/40 border-b border-white/5">
            <span class="font-casino italic text-xl tracking-tighter">WIN<span class="text-emerald-500">MX</span></span>
            <div class="balance-pill">
                <span id="balance-display" class="font-casino text-emerald-500 text-lg tracking-tight">$0.00</span>
                <div onclick="UI.openModal('modal-deposit')" class="btn-plus active:scale-90 transition-transform"><i class="fas fa-plus"></i></div>
            </div>
        </header>

        <div id="view-lobby" class="view-content p-5 space-y-6">
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-800 p-6 rounded-[2.2rem] shadow-xl">
                <h2 class="text-2xl font-casino italic leading-tight text-white">Suerte hoy</h2>
                <p class="text-[9px] font-bold text-emerald-100 uppercase tracking-widest mt-1 opacity-70">Sistema Realtime 2.0 Activo</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="Router.openGame('slots')" class="glass p-6 text-center active:scale-95 transition-transform"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Slots</span></div>
                <div onclick="Router.openGame('crash')" class="glass p-6 text-center active:scale-95 transition-transform"><span class="text-4xl block mb-2">🚀</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Crash</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center active:scale-95 transition-transform"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Minas</span></div>
                <div onclick="Router.openGame('tower')" class="glass p-6 text-center active:scale-95 transition-transform"><span class="text-4xl block mb-2">🗼</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Torre</span></div>
            </div>
        </div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-600 text-[10px] font-bold uppercase flex items-center"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
            <div id="game-mount" class="w-full"></div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">
            <div onclick="Router.showView('lobby')" id="nav-home" class="nav-item active"><i class="fas fa-gamepad text-xl mb-1"></i><span>Jugar</span></div>
            <div onclick="Router.showView('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt text-xl mb-1"></i><span>Historial</span></div>
            <div onclick="Router.showView('profile')" id="nav-profile" class="nav-item"><i class="fas fa-user-circle text-xl mb-1"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm bg-[#0a0a0a] overflow-y-auto max-h-[90vh]">
            <div id="dep-step-1">
                <h2 class="font-casino text-emerald-500 text-center mb-6">Monto a Cargar</h2>
                <input id="dep-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-10 text-white">
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 font-casino">Siguiente</button>
            </div>
            <div id="dep-step-2" class="hidden-view space-y-4 text-center">
                <div class="bg-emerald-500/10 p-5 rounded-2xl border border-emerald-500/20 text-center">
                    <p class="text-[8px] font-bold text-emerald-500 uppercase mb-2 tracking-widest">Cuenta CLABE (STP)</p>
                    <div class="flex items-center justify-between bg-black/40 p-3 rounded-lg border border-white/5">
                        <span id="clabe-number" class="text-sm font-mono font-bold text-white tracking-tighter">722969020533491161</span>
                        <button onclick="UI.copyClabe()" class="ml-2 text-emerald-500 active:scale-75 transition-transform p-2"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
                <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-6 text-[9px] text-zinc-700 font-bold uppercase">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, crashMult: 1.0, towerLvl: 0 };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navMap = { 'lobby': 'nav-home', 'history': 'nav-history', 'profile': 'nav-profile' };
                if(navMap[viewId]) document.getElementById(navMap[viewId]).classList.add('active');
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                UI.updateBetDisplay();
            },
            templates: {
                slots: `
                    <div class="game-info text-[10px] text-zinc-400">
                        <span class="text-white font-bold block mb-1">REGLAS DE SLOTS:</span>
                        Gira y busca 3 iguales. <br>
                        <span class="text-emerald-500 mt-1 block italic font-bold">Premios: 1.5x a 50x.</span>
                    </div>
                    <div class="glass p-6 text-center">
                        <div class="grid grid-cols-3 gap-2 mb-8">
                            <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                            <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                            <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button>
                    </div>`,
                crash: `
                    <div class="game-info text-[10px] text-zinc-400">
                        <span class="text-white font-bold block mb-1">REGLAS DE CRASH:</span>
                        El multiplicador sube. Retira antes de que explote. <br>
                        <span class="text-emerald-500 mt-1 block italic font-bold">Entre más esperas, más ganas, pero más riesgo.</span>
                    </div>
                    <div class="glass p-8 text-center">
                        <div id="crash-val" class="text-6xl font-casino text-emerald-500 mb-6">1.00x</div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button id="crash-btn" onclick="GameLogic.crash.play()" class="btn-action w-full py-5 font-casino text-xl">VOLAR</button>
                    </div>`,
                mines: `
                    <div class="game-info text-[10px] text-zinc-400">
                        <span class="text-white font-bold block mb-1">REGLAS DE MINAS:</span>
                        Encuentra diamantes sin tocar bombas. <br>
                        <span class="text-emerald-500 mt-1 block italic font-bold">A más diamantes, mayor multiplicador.</span>
                    </div>
                    <div class="glass p-4 text-center">
                        <div id="mine-grid" class="grid grid-cols-5 gap-2 mb-6">
                            ${Array(25).fill(0).map((_,i) => `<div onclick="GameLogic.mines.tap(${i})" id="mine-${i}" class="mine-cell"><i class="fas fa-gem text-black/10"></i></div>`).join('')}
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button id="mine-btn" onclick="GameLogic.mines.start()" class="btn-action w-full py-5 font-casino text-xl">EMPEZAR</button>
                    </div>`,
                tower: `
                    <div class="game-info text-[10px] text-zinc-400">
                        <span class="text-white font-bold block mb-1">REGLAS DE TORRE:</span>
                        Elige una casilla por nivel. Si pasas, el premio sube. <br>
                        <span class="text-emerald-500 mt-1 block italic font-bold">Llega al nivel 5 para el 10x.</span>
                    </div>
                    <div class="glass p-6 text-center space-y-2">
                        ${[5,4,3,2,1].map(l => `<div id="tower-row-${l}" class="grid grid-cols-2 gap-2 opacity-20">
                            <div onclick="GameLogic.tower.step(${l},0)" class="bg-zinc-800 p-4 rounded-xl">?</div>
                            <div onclick="GameLogic.tower.step(${l},1)" class="bg-zinc-800 p-4 rounded-xl">?</div>
                        </div>`).join('')}
                        <button id="tower-btn" onclick="GameLogic.tower.start()" class="btn-action w-full py-5 font-casino text-xl mt-4">JUGAR</button>
                    </div>`
            }
        };

        const GameLogic = {
            changeBet(v) { if(State.isSpinning) return; State.currentBet = Math.max(10, State.currentBet + v); UI.updateBetDisplay(); },
            async start() {
                if(State.balance < State.currentBet) { UI.notify("Sin saldo", "error"); return false; }
                State.balance -= State.currentBet; UI.updateBalance();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async win(amt, label) {
                State.balance += amt; UI.updateBalance();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                UI.notify(`+ $${amt.toFixed(2)}`, "success");
            },
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(State.isSpinning || !await GameLogic.start()) return;
                    State.isSpinning = true;
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    const pay = { '7️⃣7️⃣7️⃣': 50, '💎💎💎': 15, '⭐️⭐️⭐️': 10, '🔔🔔🔔': 5, '🍋🍋🍋': 2, '🍒🍒🍒': 1.5 };
                    const mult = pay[res.join('')] || 0;
                    [1,2,3].forEach((id, i) => { const reel = document.getElementById(`reel-${id}`); reel.style.transform = `translateY(-${(30 * 90) + (SYMBOLS.indexOf(res[i]) * 90)}px)`; });
                    setTimeout(() => { if(mult > 0) GameLogic.win(State.currentBet * mult, 'W SLOTS'); State.isSpinning = false; }, 3500);
                }
            },
            crash: {
                active: false, timer: null,
                async play() {
                    if(this.active) { this.cashout(); return; }
                    if(!await GameLogic.start()) return;
                    this.active = true; State.isSpinning = true; State.crashMult = 1.0;
                    const btn = document.getElementById('crash-btn'); btn.innerText = "RETIRAR"; btn.style.background = "#fbbf24";
                    const boom = Math.random() * 4 + 1.1;
                    this.timer = setInterval(() => {
                        State.crashMult += 0.04;
                        document.getElementById('crash-val').innerText = State.crashMult.toFixed(2) + "x";
                        if(State.crashMult >= boom) this.explode();
                    }, 100);
                },
                explode() {
                    clearInterval(this.timer); this.active = false; State.isSpinning = false;
                    document.getElementById('crash-val').innerText = "EXPLOTÓ!";
                    document.getElementById('crash-val').style.color = "#ef4444";
                    const btn = document.getElementById('crash-btn'); btn.innerText = "VOLAR"; btn.style.background = "#10b981";
                    setTimeout(() => { document.getElementById('crash-val').style.color = "#10b981"; document.getElementById('crash-val').innerText = "1.00x"; }, 2000);
                },
                cashout() {
                    clearInterval(this.timer); this.active = false; State.isSpinning = false;
                    GameLogic.win(State.currentBet * State.crashMult, 'W CRASH');
                    this.explode();
                }
            },
            mines: {
                bombs: [], active: false, count: 0,
                async start() {
                    if(this.active) { this.cashout(); return; }
                    if(!await GameLogic.start()) return;
                    this.active = true; State.isSpinning = true; this.count = 0;
                    this.bombs = []; while(this.bombs.length < 4) { let r = Math.floor(Math.random()*25); if(!this.bombs.includes(r)) this.bombs.push(r); }
                    document.querySelectorAll('.mine-cell').forEach(c => { c.className = "mine-cell"; c.innerHTML = '<i class="fas fa-gem text-black/10"></i>'; });
                    document.getElementById('mine-btn').innerText = "RETIRAR";
                },
                tap(i) {
                    if(!this.active) return;
                    const cell = document.getElementById(`mine-${i}`);
                    if(cell.classList.contains('revealed')) return;
                    if(this.bombs.includes(i)) {
                        cell.className = "mine-cell exploded"; cell.innerHTML = "💣";
                        this.active = false; State.isSpinning = false;
                        UI.notify("BOOM!", "error");
                        document.getElementById('mine-btn').innerText = "EMPEZAR";
                    } else {
                        cell.className = "mine-cell revealed"; cell.innerHTML = "💎";
                        this.count++;
                        document.getElementById('mine-btn').innerText = `RETIRAR $${(State.currentBet * (1 + this.count*0.3)).toFixed(2)}`;
                    }
                },
                cashout() {
                    GameLogic.win(State.currentBet * (1 + this.count*0.3), 'W MINES');
                    this.active = false; State.isSpinning = false;
                    document.getElementById('mine-btn').innerText = "EMPEZAR";
                }
            },
            tower: {
                active: false,
                async start() {
                    if(!await GameLogic.start()) return;
                    this.active = true; State.isSpinning = true; State.towerLvl = 1;
                    document.querySelectorAll('[id^="tower-row-"]').forEach(r => r.classList.add('opacity-20'));
                    document.getElementById('tower-row-1').classList.remove('opacity-20');
                    document.getElementById('tower-btn').classList.add('hidden-view');
                },
                step(l, s) {
                    if(!this.active || l !== State.towerLvl) return;
                    if(Math.random() > 0.5) {
                        UI.notify("CAÍSTE!", "error"); this.active = false; State.isSpinning = false;
                        document.getElementById('tower-btn').classList.remove('hidden-view');
                    } else {
                        if(l === 5) {
                            GameLogic.win(State.currentBet * 10, 'W TOWER');
                            this.active = false; State.isSpinning = false;
                            document.getElementById('tower-btn').classList.remove('hidden-view');
                        } else {
                            State.towerLvl++;
                            document.getElementById(`tower-row-${State.towerLvl}`).classList.remove('opacity-20');
                        }
                    }
                }
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString('en-US', {minimumFractionDigits: 2})}`; },
            updateBetDisplay() { document.querySelectorAll('.bet-val').forEach(el => el.innerText = `$${State.currentBet}`); },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            },
            copyClabe() { navigator.clipboard.writeText("722969020533491161"); UI.notify("CLABE COPIADA", "success"); },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(!error) location.reload();
            },
            async register() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signUp({ email: e, password: p });
                UI.notify(error ? "Error" : "Cuenta lista", error ? "error" : "success");
            }
        };

        const Core = {
            async init() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    let { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                    State.balance = data ? data.saldo : 0;
                    UI.updateBalance();
                } else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            }
        };

        Core.init();
    </script>
</body>
</html>
