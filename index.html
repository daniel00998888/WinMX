<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | El Casino #1 de México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --mx-green: #006341; --mx-red: #ce1126; --gold: #fbbf24; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .bank-scroll-area { max-height: 60vh; overflow-y: auto; }
        .card-game { transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card-game:hover { border-color: var(--mx-green); transform: translateY(-5px); }
        .spinning { animation: spin 0.1s infinite linear; }
        @keyframes spin { from { transform: translateY(-10px); filter: blur(4px); } to { transform: translateY(10px); filter: blur(4px); } }
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast { transform: translateX(120%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="loading" class="fixed inset-0 bg-black flex items-center justify-center z-[500]">
        <div class="w-12 h-12 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div id="auth" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center border-b-4 border-emerald-600">
            <h2 class="text-5xl font-black italic mb-10">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4 mb-8">
                <input id="email" type="email" placeholder="Correo" class="w-full bg-zinc-900 p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500">
                <input id="pass" type="password" placeholder="Pass" class="w-full bg-zinc-900 p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleAuth('up')" class="bg-zinc-800 py-4 rounded-2xl font-bold uppercase text-xs">Registro</button>
                <button onclick="handleAuth('in')" class="bg-emerald-600 text-black py-4 rounded-2xl font-black uppercase text-xs">Entrar</button>
            </div>
        </div>
    </div>

    <header id="nav" class="hidden glass sticky top-0 z-50 py-4 px-8 flex justify-between items-center border-b border-white/5">
        <div class="bg-emerald-600 px-3 py-1 rounded font-black italic text-black skew-x-[-15deg]">WinMX</div>
        <div onclick="openBank()" class="cursor-pointer flex items-center gap-3 bg-zinc-950 px-5 py-2 rounded-2xl border border-white/10 hover:border-emerald-500 transition">
            <p id="balance" class="text-emerald-400 font-black text-lg">$0</p>
            <i class="fas fa-wallet text-emerald-500"></i>
        </div>
    </header>

    <main id="app" class="hidden p-8 max-w-7xl mx-auto">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <div onclick="tab('slots')" class="card-game glass p-6 rounded-[2rem] text-center"><div class="text-4xl mb-2">🎰</div><p class="font-black text-[10px] uppercase">Slots</p></div>
            <div onclick="tab('crash')" class="card-game glass p-6 rounded-[2rem] text-center"><div class="text-4xl mb-2">🚀</div><p class="font-black text-[10px] uppercase">Crash</p></div>
            <div onclick="tab('roulette')" class="card-game glass p-6 rounded-[2rem] text-center"><div class="text-4xl mb-2">🎯</div><p class="font-black text-[10px] uppercase">Ruleta</p></div>
            <div onclick="tab('flip')" class="card-game glass p-6 rounded-[2rem] text-center"><div class="text-4xl mb-2">🪙</div><p class="font-black text-[10px] uppercase">Flip</p></div>
        </div>

        <div id="game-zone">
            <div id="tab-slots" class="tab-content glass p-10 rounded-[3rem] text-center max-w-xl mx-auto border-t-4 border-emerald-500">
                <div class="flex justify-center gap-2 mb-8">
                    <div id="s1" class="w-16 h-24 bg-black rounded-xl text-4xl flex items-center justify-center border border-white/5">💎</div>
                    <div id="s2" class="w-16 h-24 bg-black rounded-xl text-4xl flex items-center justify-center border border-white/5">💎</div>
                    <div id="s3" class="w-16 h-24 bg-black rounded-xl text-4xl flex items-center justify-center border border-white/5">💎</div>
                </div>
                <button onclick="playSlots()" class="w-full bg-emerald-600 text-black py-4 rounded-xl font-black uppercase italic">Girar ($10)</button>
            </div>

            <div id="tab-crash" class="tab-content hidden glass p-10 rounded-[3rem] text-center max-w-xl mx-auto border-t-4 border-emerald-500">
                <div class="h-40 flex items-end justify-center mb-6 bg-black/40 rounded-3xl relative overflow-hidden">
                    <div id="rocket" class="text-5xl transition-all duration-100">🚀</div>
                    <div id="multiplier" class="absolute top-5 text-4xl font-black text-emerald-400">1.00x</div>
                </div>
                <button id="btn-crash" onclick="startCrash()" class="w-full bg-emerald-600 text-black py-4 rounded-xl font-black uppercase italic">Apostar ($20)</button>
            </div>

            <div id="tab-roulette" class="tab-content hidden glass p-10 rounded-[3rem] text-center max-w-xl mx-auto border-t-4 border-emerald-500">
                <div id="r-result" class="text-6xl mb-6 font-black text-white">-</div>
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <button onclick="playRoulette('red')" class="bg-red-600 py-3 rounded-xl font-black text-[10px]">ROJO (x2)</button>
                    <button onclick="playRoulette('black')" class="bg-zinc-800 py-3 rounded-xl font-black text-[10px]">NEGRO (x2)</button>
                    <button onclick="playRoulette('green')" class="bg-emerald-600 py-3 rounded-xl font-black text-[10px]">VERDE (x14)</button>
                </div>
            </div>

            <div id="tab-flip" class="tab-content hidden glass p-10 rounded-[3rem] text-center max-w-xl mx-auto border-t-4 border-emerald-500">
                <div id="coin" class="text-7xl mb-8 transition-all duration-500">🪙</div>
                <div class="flex gap-4">
                    <button onclick="playFlip('cara')" class="flex-1 bg-zinc-800 py-4 rounded-xl font-black">CARA</button>
                    <button onclick="playFlip('cruz')" class="flex-1 bg-zinc-800 py-4 rounded-xl font-black">CRUZ</button>
                </div>
            </div>
        </div>
    </main>

    <div id="bank-modal" class="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-4 hidden">
        <div class="bg-zinc-900 w-full max-w-lg rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl">
            <div class="bg-emerald-600 p-6 flex justify-between items-center text-black">
                <h2 class="text-xl font-black italic">BANCO WinMX</h2>
                <button onclick="closeBank()" class="text-3xl">&times;</button>
            </div>
            <div class="bank-scroll-area p-6">
                <div class="bg-black/40 p-6 rounded-3xl border border-white/5 mb-6 text-center">
                    <p id="bank-balance" class="text-4xl font-black text-emerald-400">$0.00</p>
                </div>
                <div class="flex gap-2 mb-6 bg-black p-1 rounded-2xl">
                    <button onclick="switchBankTab('dep')" id="tab-btn-dep" class="flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]">DEPÓSITO</button>
                    <button onclick="switchBankTab('ret')" id="tab-btn-ret" class="flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]">RETIRO</button>
                </div>
                <div id="section-dep">
                    <input id="in-amt" type="number" placeholder="Monto" class="w-full bg-black p-5 rounded-2xl border border-white/5 mb-4 font-bold">
                    <button onclick="confirmDeposit()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase text-xs">Depositar Ahora</button>
                </div>
                <div id="section-ret" class="hidden">
                    <input id="out-amt" type="number" placeholder="Monto" class="w-full bg-black p-5 rounded-2xl border border-white/5 mb-4 font-bold">
                    <button onclick="processWithdrawal()" class="w-full bg-zinc-800 text-red-500 py-4 rounded-xl font-black uppercase text-xs">Retirar Fondos</button>
                </div>
                <hr class="my-6 border-white/5">
                <div id="history-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let user = null, saldo = 0, history = [];

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if(session) { user = session.user; await initApp(); } 
            else { document.getElementById('loading').classList.add('hidden'); document.getElementById('auth').classList.remove('hidden'); }
        };

        async function initApp() {
            const { data } = await sb.from('usuarios').select('*').eq('id', user.id).single();
            if(data) {
                saldo = data.saldo; 
                history = JSON.parse(localStorage.getItem(`history_${user.id}`)) || [];
                updateUI(); renderHistory();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        async function handleAuth(mode) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                const { error } = mode === 'up' ? await sb.auth.signUp({email, password:pass}) : await sb.auth.signInWithPassword({email, password:pass});
                if(error) throw error;
                location.reload();
            } catch(e) { toast(e.message, "err"); }
        }

        // --- LÓGICA DE TODOS LOS JUEGOS ---

        function playSlots() {
            if(saldo < 10) return toast("Mínimo $10", "err");
            saldo -= 10; updateUI();
            const reels = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
            reels.forEach(r => r.classList.add('spinning'));
            setTimeout(() => {
                const res = reels.map(r => { r.classList.remove('spinning'); return r.innerText = ["🍒","💎","7️⃣","🔔"][Math.floor(Math.random()*4)]; });
                if(res[0] === res[1] && res[1] === res[2]) { saldo += 100; toast("¡JACKPOT! +$100", "ok"); }
                else if(res[0] === res[1]) { saldo += 20; toast("¡Doble! +$20", "ok"); }
                updateUI();
            }, 800);
        }

        let crashInterval;
        function startCrash() {
            if(saldo < 20) return toast("Mínimo $20", "err");
            const btn = document.getElementById('btn-crash');
            if(btn.innerText === "RETIRAR") {
                const multi = parseFloat(document.getElementById('multiplier').innerText);
                saldo += Math.floor(20 * multi);
                clearInterval(crashInterval);
                btn.innerText = "Apostar ($20)";
                btn.className = "w-full bg-emerald-600 text-black py-4 rounded-xl font-black uppercase italic";
                toast(`Ganaste x${multi}`, "ok");
                updateUI();
                return;
            }
            saldo -= 20; updateUI();
            btn.innerText = "RETIRAR";
            btn.className = "w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase italic";
            let m = 1.00;
            crashInterval = setInterval(() => {
                m += 0.05;
                document.getElementById('multiplier').innerText = m.toFixed(2) + "x";
                document.getElementById('rocket').style.transform = `translate(${m*5}px, -${m*10}px)`;
                if(Math.random() < 0.03) {
                    clearInterval(crashInterval);
                    btn.innerText = "Apostar ($20)";
                    btn.className = "w-full bg-emerald-600 text-black py-4 rounded-xl font-black uppercase italic";
                    document.getElementById('multiplier').innerText = "BOOM!";
                    toast("¡PERDISTE!", "err");
                }
            }, 100);
        }

        function playRoulette(bet) {
            if(saldo < 50) return toast("Mínimo $50", "err");
            saldo -= 50; updateUI();
            const res = Math.floor(Math.random() * 37);
            const color = res === 0 ? 'green' : (res % 2 === 0 ? 'red' : 'black');
            document.getElementById('r-result').innerText = res;
            document.getElementById('r-result').className = `text-6xl mb-6 font-black ${color === 'red' ? 'text-red-600' : (color === 'green' ? 'text-emerald-500' : 'text-zinc-400')}`;
            if(bet === color) {
                const win = color === 'green' ? 50*14 : 50*2;
                saldo += win; toast(`¡Ganaste $${win}!`, "ok");
            }
            updateUI();
        }

        function playFlip(choice) {
            if(saldo < 20) return toast("Mínimo $20", "err");
            saldo -= 20; updateUI();
            const coin = document.getElementById('coin');
            coin.style.transform = "rotateY(720deg)";
            setTimeout(() => {
                const res = Math.random() > 0.5 ? 'cara' : 'cruz';
                coin.innerText = res === 'cara' ? "🪙" : "🛡️";
                coin.style.transform = "rotateY(0deg)";
                if(choice === res) { saldo += 40; toast("¡Ganaste $40!", "ok"); }
                updateUI();
            }, 500);
        }

        // --- SISTEMA ---
        function updateUI() {
            document.getElementById('balance').innerText = `$${saldo.toLocaleString()}`;
            document.getElementById('bank-balance').innerText = `$${saldo.toLocaleString()}.00`;
            sb.from('usuarios').update({ saldo }).eq('id', user.id).then();
            localStorage.setItem(`history_${user.id}`, JSON.stringify(history));
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.map(m => `<div class="bg-black/20 p-3 rounded-xl flex justify-between text-[10px] border border-white/5"><b>${m.type}</b> <span>$${m.amount}</span></div>`).join('');
        }

        function confirmDeposit() {
            const amt = parseInt(document.getElementById('in-amt').value);
            if(!amt) return;
            saldo += amt; history.unshift({type:'Depósito', amount:amt});
            updateUI(); renderHistory(); closeBank();
        }

        function processWithdrawal() {
            const amt = parseInt(document.getElementById('out-amt').value);
            if(!amt || amt > saldo) return toast("Saldo insuficiente", "err");
            saldo -= amt; history.unshift({type:'Retiro', amount:amt});
            updateUI(); renderHistory(); closeBank();
        }

        function openBank() { document.getElementById('bank-modal').classList.remove('hidden'); }
        function closeBank() { document.getElementById('bank-modal').classList.add('hidden'); }
        function switchBankTab(t) {
            document.getElementById('section-dep').classList.toggle('hidden', t !== 'dep');
            document.getElementById('section-ret').classList.toggle('hidden', t !== 'ret');
        }
        function tab(id) { document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); document.getElementById('tab-'+id).classList.remove('hidden'); }
        function toast(m, t) {
            const c = document.getElementById('notification-container');
            const e = document.createElement('div');
            e.className = `toast glass p-4 rounded-xl mb-4 border-l-4 ${t==='ok'?'border-emerald-500':'border-red-500'} font-bold text-[10px] uppercase`;
            e.innerText = m;
            c.appendChild(e);
            setTimeout(() => e.classList.add('show'), 10);
            setTimeout(() => { e.classList.remove('show'); setTimeout(()=>e.remove(), 400); }, 3000);
        }
        async function logout() { await sb.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
