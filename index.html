        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .die { width: 55px; height: 55px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: black; font-weight: 900; }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, totalSpins: 0 };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navMap = { 'lobby': 'nav-home', 'history': 'nav-history', 'profile': 'nav-profile' };
                if(navMap[viewId]) document.getElementById(navMap[viewId]).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                UI.updateBetDisplay();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeInUp"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button><span class="bet-val font-casino text-2xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button></div><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                dice: `<div class="glass p-8 text-center animate__animated animate__fadeInUp"><div class="flex justify-center gap-4 mb-6"><div id="die-1" class="die">1</div><div id="die-2" class="die">1</div></div><div class="grid grid-cols-2 gap-3 mb-6"><button onclick="GameLogic.dice.play('under')" class="bg-blue-500/10 border border-blue-500/30 py-4 rounded-2xl font-bold text-[10px] text-blue-400">MENOR 7</button><button onclick="GameLogic.dice.play('over')" class="bg-red-500/10 border border-red-500/30 py-4 rounded-2xl font-bold text-[10px] text-red-400">MAYOR 7</button></div><div class="bg-black/50 p-4 rounded-2xl flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button><span class="bet-val font-casino text-2xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button></div></div>`,
                roulette: `<div class="glass p-8 text-center animate__animated animate__fadeInUp"><div id="wheel" class="w-24 h-24 bg-zinc-900 rounded-full mx-auto mb-6 border-4 border-emerald-500 flex items-center justify-center text-3xl font-casino">?</div><div class="grid grid-cols-2 gap-3 mb-6"><button onclick="GameLogic.roulette.play('red')" class="bg-red-600/20 border border-red-600/50 py-4 rounded-2xl font-bold text-[10px] text-red-400">ROJO</button><button onclick="GameLogic.roulette.play('black')" class="bg-zinc-800 border border-white/10 py-4 rounded-2xl font-bold text-[10px]">NEGRO</button></div><div class="bg-black/50 p-4 rounded-2xl flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button><span class="bet-val font-casino text-2xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button></div></div>`,
                chests: `<div class="glass p-8 text-center animate__animated animate__fadeInUp"><div class="grid grid-cols-3 gap-3 mb-6"><div onclick="GameLogic.chests.play(0)" class="bg-zinc-900 p-6 rounded-2xl text-4xl">🎁</div><div onclick="GameLogic.chests.play(1)" class="bg-zinc-900 p-6 rounded-2xl text-4xl">🎁</div><div onclick="GameLogic.chests.play(2)" class="bg-zinc-900 p-6 rounded-2xl text-4xl">🎁</div></div><div class="bg-black/50 p-4 rounded-2xl flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button><span class="bet-val font-casino text-2xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button></div></div>`
            }
        };

        const GameLogic = {
            changeBet(v) { State.currentBet = Math.max(10, State.currentBet + v); UI.updateBetDisplay(); },
            async startSpin() {
                if(State.isSpinning || State.balance < State.currentBet) { UI.notify("Saldo insuficiente", "error"); return false; }
                State.isSpinning = true; State.balance -= State.currentBet; UI.updateBalance();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async endSpin(winAmt, label) {
                if(winAmt > 0) {
                    State.balance += winAmt;
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    UI.notify(`+ $${winAmt}`, "success"); UI.updateBalance();
                }
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: winAmt - State.currentBet, label: label, status: 'completed' }]);
                State.isSpinning = false;
            },
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(!await GameLogic.startSpin()) return;
                    State.totalSpins++; const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    const pay = { '7️⃣7️⃣7️⃣': 500, '💎💎💎': 100, '⭐️⭐️⭐️': 50, '🔔🔔🔔': 20, '🍋🍋🍋': 10, '🍒🍒🍒': 5 };
                    const mult = pay[res.join('')] || 0;
                    [1,2,3].forEach((id, i) => { const reel = document.getElementById(`reel-${id}`); const pos = (State.totalSpins * 90 * 12) + (SYMBOLS.indexOf(res[i]) * 90); reel.style.transform = `translateY(-${pos}px)`; });
                    setTimeout(() => GameLogic.endSpin(State.currentBet * mult, mult > 0 ? 'W SLOTS' : 'SLOTS'), 3500);
                }
            },
            dice: {
                async play(choice) {
                    if(!await GameLogic.startSpin()) return;
                    const d1 = document.getElementById('die-1'), d2 = document.getElementById('die-2');
                    d1.classList.add('animate-roll'); d2.classList.add('animate-roll');
                    setTimeout(() => {
                        d1.classList.remove('animate-roll'); d2.classList.remove('animate-roll');
                        const v1 = Math.floor(Math.random()*6)+1, v2 = Math.floor(Math.random()*6)+1, sum = v1 + v2;
                        d1.innerText = v1; d2.innerText = v2;
                        const win = (choice === 'under' && sum < 7) || (choice === 'over' && sum > 7);
                        GameLogic.endSpin(win ? State.currentBet * 2 : 0, win ? 'W DICE' : 'DICE');
                    }, 1500);
                }
            },
            roulette: {
                async play(color) {
                    if(!await GameLogic.startSpin()) return;
                    const w = document.getElementById('wheel'); w.classList.add('animate-roll');
                    setTimeout(() => {
                        w.classList.remove('animate-roll'); const n = Math.floor(Math.random()*15);
                        const resCol = n === 0 ? 'green' : (n % 2 === 0 ? 'red' : 'black');
                        w.innerText = n; w.style.color = resCol === 'red' ? '#ef4444' : (resCol === 'black' ? '#fff' : '#10b981');
                        const win = color === resCol;
                        GameLogic.endSpin(win ? State.currentBet * 2 : 0, win ? 'W RULETA' : 'RULETA');
                    }, 2000);
                }
            },
            chests: {
                async play(idx) {
                    if(!await GameLogic.startSpin()) return;
                    const res = [0, 2, 5].sort(() => Math.random() - 0.5);
                    GameLogic.endSpin(State.currentBet * res[idx], res[idx] > 0 ? 'W COFRES' : 'COFRES');
                }
            }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                if(!e || !p) return UI.notify("Faltan datos", "error");
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) return UI.notify("Credenciales incorrectas", "error");
                location.reload();
            },
            async register() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signUp({ email: e, password: p });
                UI.notify(error ? error.message : "¡Cuenta creada! Entra ahora", error ? "error" : "success");
            },
            async logout() { await sb.auth.signOut(); location.reload(); }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    await this.load();
                    this.initRealtime();
                } else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async load() {
                let { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                if(!data) { await sb.from('usuarios').insert([{ id: State.user.id, email: State.user.email, saldo: 0 }]); State.balance = 0; } 
                else { State.balance = data.saldo; }
                UI.updateBalance();
            },
            initRealtime() {
                console.log("Conectando Realtime Global...");
                sb.channel('global-updates')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'usuarios' }, payload => {
                    if (payload.new && payload.new.id === State.user.id) {
                        console.log("¡Saldo actualizado vía Realtime!");
                        State.balance = payload.new.saldo;
                        UI.updateBalance();
                        UI.notify("¡Saldo actualizado! 💸", "success");
                    }
                })
                .on('postgres_changes', { event: '*', schema: 'public', table: 'history' }, payload => {
                    const uid = payload.new ? payload.new.user_id : (payload.old ? payload.old.user_id : null);
                    if (uid === State.user.id) {
                        this.fetchHistory();
                        if(payload.new && payload.new.status === 'completed') UI.notify("Depósito aprobado ✅", "success");
                    }
                })
                .subscribe();
            },
            async fetchHistory() {
                const b = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'bets').order('created_at', { ascending: false }).limit(10);
                const d = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'deposits').order('created_at', { ascending: false }).limit(10);
                const container = document.getElementById('history-lists');
                if(!container) return;
                container.innerHTML = `
                    <div class="glass overflow-hidden border-white/5 mb-4">
                        <div onclick="UI.toggleAccordion('acc-bets', 'arrow-bets')" class="p-5 flex justify-between items-center bg-white/[0.02]">
                            <div class="flex items-center gap-3"><i class="fas fa-history text-emerald-500"></i><span class="font-casino text-[10px]">Apuestas</span></div>
                            <i id="arrow-bets" class="fas fa-chevron-down text-zinc-700 transition-transform"></i>
                        </div>
                        <div id="acc-bets" class="hidden-view p-3 space-y-2 bg-black/40 border-t border-white/5">${UI.renderList(b.data || [])}</div>
                    </div>
                    <div class="glass overflow-hidden border-white/5">
                        <div onclick="UI.toggleAccordion('acc-deps', 'arrow-deps')" class="p-5 flex justify-between items-center bg-white/[0.02]">
                            <div class="flex items-center gap-3"><i class="fas fa-wallet text-blue-400"></i><span class="font-casino text-[10px]">Depósitos</span></div>
                            <i id="arrow-deps" class="fas fa-chevron-down text-zinc-700 transition-transform"></i>
                        </div>
                        <div id="acc-deps" class="hidden-view p-3 space-y-2 bg-black/40 border-t border-white/5">${UI.renderList(d.data || [])}</div>
                    </div>`;
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value), file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Datos incompletos", "error");
                const btn = document.getElementById('final-dep-btn'); btn.disabled = true;
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending', evidence_url: publicUrl }]);
                UI.notify("Enviado con éxito", "success"); UI.closeModal('modal-deposit');
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString('en-US', {minimumFractionDigits: 2})}`; },
            updateBetDisplay() { document.querySelectorAll('.bet-val').forEach(el => el.innerText = `$${State.currentBet}`); },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); },
            handleFile(i) { if(i.files[0]) document.getElementById('file-label').innerText = "LISTO ✅"; },
            toggleAccordion(cid, aid) {
                const c = document.getElementById(cid), a = document.getElementById(aid), isH = c.classList.contains('hidden-view');
                if(isH) { c.classList.remove('hidden-view'); a.style.transform = 'rotate(180deg)'; a.classList.add('text-emerald-500'); } 
                else { c.classList.add('hidden-view'); a.style.transform = 'rotate(0deg)'; a.classList.remove('text-emerald-500'); }
            },
            renderList(data) {
                if(!data.length) return '<p class="text-[9px] text-zinc-700 text-center py-4">Sin datos</p>';
                return data.map(i => `
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/5 mb-1">
                        <div>
                            <p class="text-[10px] font-bold ${i.status === 'pending' ? 'text-yellow-500' : (i.amount >= 0 ? 'text-emerald-400' : 'text-zinc-600')} uppercase">${i.label} ${i.status === 'pending' ? '⏳' : ''}</p>
                            <p class="text-[8px] text-zinc-600">${new Date(i.created_at).toLocaleDateString()}</p>
                        </div>
                        <p class="font-casino text-[11px]">${i.amount >= 0 ? '+' : ''}$${Math.abs(i.amount).toLocaleString()}</p>
                    </div>`).join('');
            }
        };

        Core.init();
    </script>
</body>
</html>
