<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX - Premium Casino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .btn-primary { background: linear-gradient(135deg, #34d399 0%, #059669 100%); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.95); }
        .hidden-view { display: none !important; }
        
        /* Slot Machine Animations */
        .slot-container { height: 270px; overflow: hidden; display: flex; gap: 10px; justify-content: center; }
        .reel { width: 80px; background: rgba(255,255,255,0.02); border-radius: 12px; transition: transform 3.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .slot-item { height: 90px; display: flex; items-center; justify-content: center; font-size: 2.5rem; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 glass px-4 py-3 flex justify-between items-center mb-6">
        <h1 class="text-xl font-800 tracking-tighter text-emerald-500 italic">WIN<span class="text-white">MX</span></h1>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <p class="text-[10px] text-white/40 uppercase font-bold">Tu Saldo</p>
                <p id="balance-display" class="text-lg font-bold text-emerald-400">$0.00</p>
            </div>
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-emerald-500/20 border border-emerald-500/50 flex items-center justify-center font-bold">?</div>
        </div>
    </nav>

    <main id="app-container" class="max-w-md mx-auto px-4">
        <div id="games-grid" class="grid grid-cols-2 gap-4">
            <div onclick="UI.showGame('slots')" class="glass p-4 rounded-2xl text-center cursor-pointer hover:bg-white/5">
                <span class="text-4xl">🎰</span>
                <p class="mt-2 font-bold uppercase text-xs">Slots</p>
            </div>
            <div onclick="UI.showGame('mines')" class="glass p-4 rounded-2xl text-center cursor-pointer hover:bg-white/5">
                <span class="text-4xl">💣</span>
                <p class="mt-2 font-bold uppercase text-xs">Minas</p>
            </div>
            <div onclick="UI.showGame('tower')" class="glass p-4 rounded-2xl text-center cursor-pointer hover:bg-white/5">
                <span class="text-4xl">🗼</span>
                <p class="mt-2 font-bold uppercase text-xs">Torre</p>
            </div>
            <div onclick="UI.showGame('crash')" class="glass p-4 rounded-2xl text-center cursor-pointer hover:bg-white/5">
                <span class="text-4xl">🚀</span>
                <p class="mt-2 font-bold uppercase text-xs">Aviator</p>
            </div>
        </div>

        <div id="view-slots" class="hidden-view space-y-6">
            <button onclick="UI.showGame('grid')" class="text-white/40 text-sm mb-4">← Volver</button>
            <div class="slot-container glass p-4 rounded-3xl">
                <div id="reel-1" class="reel"></div>
                <div id="reel-2" class="reel"></div>
                <div id="reel-3" class="reel"></div>
            </div>
            <div class="glass p-6 rounded-3xl space-y-4">
                <input type="number" id="slots-bet-input" value="10" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center text-xl font-bold">
                <button id="btn-slots-play" onclick="GameLogic.slots.play()" class="w-full btn-primary py-4 rounded-xl font-800 text-lg uppercase">GIRAR</button>
            </div>
        </div>

        <div id="view-mines" class="hidden-view space-y-6">
            <button onclick="UI.showGame('grid')" class="text-white/40 text-sm mb-4">← Volver</button>
            <div id="mines-grid" class="grid grid-cols-5 gap-2 aspect-square"></div>
            
            <div id="mines-controls" class="glass p-6 rounded-3xl space-y-4">
                <input type="number" id="mines-bet-input" value="10" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center text-xl font-bold">
                <button onclick="GameLogic.mines.start()" class="w-full btn-primary py-4 rounded-xl font-800 text-lg uppercase">JUGAR</button>
            </div>
            <div id="mines-status" class="hidden-view glass p-6 rounded-3xl text-center space-y-4">
                <p id="mines-mult" class="text-3xl font-bold text-emerald-400">1.00x</p>
                <button id="mines-cashout-btn" onclick="GameLogic.mines.cashout()" class="w-full bg-amber-500 py-4 rounded-xl font-800 text-lg uppercase">COBRAR</button>
            </div>
        </div>

        <div id="view-tower" class="hidden-view space-y-6">
            <button onclick="UI.showGame('grid')" class="text-white/40 text-sm mb-4">← Volver</button>
            <div id="tower-container" class="flex flex-col-reverse gap-2 max-w-[200px] mx-auto"></div>
            <div id="tower-controls" class="glass p-6 rounded-3xl space-y-4 mt-6">
                <input type="number" id="tower-bet-input" value="10" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center text-xl font-bold">
                <button onclick="GameLogic.tower.start()" class="w-full btn-primary py-4 rounded-xl font-800 text-lg uppercase">SUBIR TORRE</button>
            </div>
            <button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="hidden-view w-full bg-amber-500 py-4 rounded-xl font-800 text-lg uppercase mt-4">COBRAR</button>
        </div>

        <div id="view-crash" class="hidden-view space-y-6">
            <button onclick="UI.showGame('grid')" class="text-white/40 text-sm mb-4">← Volver</button>
            <div class="glass h-64 rounded-3xl relative overflow-hidden flex items-center justify-center">
                <div id="crash-mult" class="text-6xl font-bold z-10">1.00x</div>
                <div id="crash-rocket" class="absolute bottom-5 left-5 text-4xl transition-transform duration-100">🚀</div>
            </div>
            <div class="glass p-6 rounded-3xl space-y-4">
                <input type="number" id="crash-bet-input" value="10" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-center text-xl font-bold">
                <button id="btn-crash" onclick="GameLogic.crash.start()" class="w-full btn-primary py-4 rounded-xl font-800 text-lg uppercase">DESPEGAR</button>
            </div>
        </div>
    </main>

    <div id="notifier" class="fixed bottom-24 left-4 right-4 z-[100] transform translate-y-20 opacity-0 transition-all duration-300">
        <div id="notifier-content" class="p-4 rounded-xl font-bold text-center shadow-2xl"></div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = 'TU_SUPABASE_URL';
        const SB_KEY = 'TU_SUPABASE_KEY';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        const SYMBOLS = ['🍒', '🍋', '🔔', '💎', '7️⃣', '⭐'];

        const State = {
            user: { id: 'test-user', name: 'Player' },
            balance: 1000,
            luckFactor: 1.0, // Factor de Suerte Adaptativo (APC)
            isSpinning: false,
            totalSpins: 0
        };

        const UI = {
            updateBalance() {
                document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`;
            },
            showGame(game) {
                const views = ['grid', 'slots', 'mines', 'tower', 'crash'];
                views.forEach(v => {
                    const el = document.getElementById(`view-${v}`) || document.getElementById('games-grid');
                    if(v === game || (v === 'grid' && game === 'grid')) el.classList.remove('hidden-view');
                    else el.classList.add('hidden-view');
                });
                if(game === 'slots') GameLogic.slots.init();
            },
            notify(msg, type) {
                const n = document.getElementById('notifier');
                const nc = document.getElementById('notifier-content');
                nc.className = `p-4 rounded-xl font-bold text-center shadow-2xl ${type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`;
                nc.innerText = msg;
                n.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => n.classList.add('translate-y-20', 'opacity-0'), 2500);
            }
        };

        // SONIDOS (MOCK)
        const playSfx = (type) => console.log(`SFX: ${type}`);

        const GameLogic = {
            adjustLuck(winAmount, betAmount) {
                if (winAmount > betAmount * 3) {
                    State.luckFactor = 0.65; // Baja suerte tras premio grande
                } else if (winAmount === 0) {
                    State.luckFactor = Math.min(1.45, State.luckFactor + 0.12); // Sube suerte tras pérdida para retener
                } else {
                    State.luckFactor = Math.min(1.0, State.luckFactor + 0.05);
                }
            },

            slots: {
                init() { 
                    [1,2,3].forEach(id => { 
                        const r = document.getElementById(`reel-${id}`); 
                        r.innerHTML = ''; 
                        Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); 
                    }); 
                },
                async play() {
                    if(State.isSpinning) return;
                    const bet = Math.abs(parseFloat(document.getElementById('slots-bet-input').value)) || 10;
                    if(State.balance < bet) return UI.notify("Saldo insuficiente", "error");
                    
                    State.isSpinning = true; State.balance -= bet; UI.updateBalance();
                    const btn = document.getElementById('btn-slots-play'); btn.disabled = true;

                    const getSym = () => SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    let res = [getSym(), getSym()];
                    
                    // LÓGICA DE ENGANCHE
                    let winChance = 0.12 * State.luckFactor;
                    if (Math.random() < winChance) {
                        res.push(res[0]); res[1] = res[0]; 
                    } else {
                        // Near-Miss (Casi gana)
                        if (res[0] === res[1] && Math.random() < 0.4) {
                            let idx = SYMBOLS.indexOf(res[0]);
                            res.push(SYMBOLS[(idx + 1) % SYMBOLS.length]);
                        } else {
                            res.push(getSym());
                        }
                    }

                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { 
                        const offset = (State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90);
                        document.getElementById(`reel-${id}`).style.transform = `translateY(-${offset}px)`; 
                    });

                    setTimeout(async () => {
                        State.isSpinning = false; btn.disabled = false;
                        let win = (res[0] === res[1] && res[1] === res[2]) ? bet * 10 : 0;
                        if(win > 0) { 
                            State.balance += win; UI.notify(`¡GANASTE $${win}!`, "success"); 
                        } else {
                            UI.notify("SIGUE INTENTANDO", "error");
                        }
                        UI.updateBalance();
                        GameLogic.adjustLuck(win, bet);
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    }, 3500);
                }
            },

            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 0,
                multSteps: [1.25, 1.85, 2.75, 4.20, 6.50, 10.20, 16.50, 28.00, 45.00, 80.00],
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer"></div>`;
                },
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('mines-bet-input').value)) || 10;
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.revealed = []; this.mines = [];
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    this.drawGrid();
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    if(this.revealed.length === 0) { // Garantizar primer clic
                        while(this.mines.length < 3) { let r = Math.floor(Math.random()*25); if(r!==i && !this.mines.includes(r)) this.mines.push(r); }
                    }
                    const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.classList.add('bg-red-500/20'); this.end(false);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500/20');
                        this.mult = this.multSteps[this.revealed.length];
                        this.revealed.push(i);
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2) + 'x';
                        document.getElementById('mines-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                    }
                },
                async cashout() { if(!this.active) return; State.balance += (this.bet * this.mult); UI.notify("¡COBRADO!", "success"); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    GameLogic.adjustLuck(win ? this.bet*this.mult : 0, this.bet);
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                    document.getElementById('mines-status').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },

            tower: {
                level: 0, active: false, bet: 0, mult: 1,
                towerSteps: [1.45, 2.30, 3.80, 6.50, 11.20, 19.80, 35.00, 75.00],
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        let row = document.createElement('div'); row.className = "grid grid-cols-3 gap-1.5 opacity-30"; row.id = `tower-row-${i}`;
                        for(let j=0; j<3; j++) row.innerHTML += `<div onclick="GameLogic.tower.select(${i}, ${j})" class="h-8 bg-white/5 rounded-lg border border-white/5"></div>`;
                        c.appendChild(row);
                    }
                },
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('tower-bet-input').value)) || 10;
                    if(State.balance < b) return;
                    State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.level = 0;
                    this.drawTower(); document.getElementById('tower-row-0').classList.remove('opacity-30');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.remove('hidden-view');
                },
                select(r, c) {
                    if(!this.active || r !== this.level) return;
                    let failProb = (this.level < 2 ? 0.10 : 0.40) / State.luckFactor;
                    if(Math.random() < failProb) { this.end(false); }
                    else {
                        this.mult = this.towerSteps[this.level];
                        this.level++;
                        if(this.level < 8) document.getElementById(`tower-row-${this.level}`).classList.remove('opacity-30');
                        else this.cashout();
                        document.getElementById('tower-cashout-btn').innerText = `COBRAR $${(this.bet*this.mult).toFixed(2)}`;
                    }
                },
                async cashout() { State.balance += (this.bet * this.mult); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    document.getElementById('tower-controls').classList.remove('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },

            crash: {
                active: false, mult: 1, bet: 0, interval: null,
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('crash-bet-input').value)) || 10;
                    if(State.balance < b) return;
                    State.balance -= b; UI.updateBalance(); this.active = true; this.bet = b; this.mult = 1;
                    const limit = (1.1 + Math.random() * 4) * State.luckFactor;
                    this.interval = setInterval(() => {
                        this.mult += 0.05;
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2) + 'x';
                        if(this.mult >= limit) { clearInterval(this.interval); this.explode(); }
                    }, 100);
                },
                explode() { UI.notify("¡EXPLOTÓ!", "error"); this.end(false); },
                cashout() { if(!this.active) return; clearInterval(this.interval); State.balance += (this.bet*this.mult); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    setTimeout(() => { document.getElementById('crash-mult').innerText = '1.00x'; }, 2000);
                }
            }
        };

        // Iniciar App
        UI.updateBalance();
    </script>
</body>
</html>
