<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Bonanza Replica Pro</title>
    <style>
        /* CSS - RÉPLICA VISUAL Y DE ANIMACIONES */
        :root {
            --ui-font: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            --sb-pink: #f29ec8;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: var(--ui-font);
            /* FONDO SÚPER PROFESIONAL TIPO CANDY LAND */
            background-color: #a4e0fd;
            background-image: 
                radial-gradient(at 10% 20%, rgba(242, 158, 200, 0.6) 0px, transparent 50%),
                radial-gradient(at 80% 80%, rgba(255, 234, 0, 0.4) 0px, transparent 50%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgMTAwIDEwMCI+PHBhdGggZD0iTTEwLDQwQzEwLDIwIDMwLDEwIDUwLDEwUzkwLDIwIDkwLDQwUzcwLDcwIDUwLDcwUzEwLDYwIDEwLDQwWiIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjIpIi8+PHBhdGggZD0iTTMwLDcwQzMwLDYwIDQwLDU1IDUwLDU1UzcwLDYwIDcwLDcwUzYwLDg1IDUwLDg1UzMwLDgwIDMwLDcwWiIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjExIi8+PC9zdmc+');
            background-size: cover;
        }

        #game-stage {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* TABLERO DE JUEGO PRINCIPAL */
        #grid-container {
            width: 800px;
            height: 660px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 25px;
            border: 10px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 30px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.5);
            padding: 15px;
            display: grid;
            /* 6 Columnas, 5 Filas */
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* SÍMBOLOS (Usando imágenes Base64 para Fidelidad) */
        .symbol {
            width: 100%;
            height: 100%;
            background-size: 85% 85%;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            transform: scale(1);
            transition: transform 0.15s ease-out;
            /* Soporte para animaciones JS */
            top: 0; 
        }

        /* ANIMACIONES DE ESTADO */
        @keyframes tumbleDown {

            100% { top: 0px; opacity: 1; }

            animation: tumbleDown 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) backwards;

        @keyframes symbolExplode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); filter: brightness(1.5) blur(2px); opacity: 0.8; }

        .symbol.exploding {
            animation: symbolExplode 0.3s ease-out forwards;

<body>

    <div id="game-stage">
        
        <div id="grid-container">
            </div>

        <div id="ui-panel">
            <div class="ui-section">
                <div class="display-box" id="credit-display">
                    <div class="display-label">Crédito</div>
                    <div class="display-value">1,000.00</div>
                </div>
                <div class="display-box" id="bet-display">
                    <div class="display-label">Apuesta</div>
                    <div class="display-value">20.00</div>
                </div>
            </div>

            <div class="ui-section" style="margin-right: 140px;"> <div class="display-box" id="win-display">
                    <div class="display-label">Premio Total</div>
                    <div class="display-value">0.00</div>
                </div>
            </div>

            <div id="spin-btn-container">
                <button id="spin-btn"></button>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA CORE - CLUSTER PAYS & TUMBLE REPLICA
        
        const ROWS = 5;
        const COLS = 6;
        const TOTAL_SYMBOLS = ROWS * COLS;
        const MIN_WIN_COUNT = 8; // Mínimo de símbolos para ganar (Cluster en cualquier lugar)
        const BET_AMOUNT = 20;

        // Definición de símbolos y sus valores base (8-9, 10-11, 12+)
        const symbolDefs = [
            { cls: 'sym-heart',  prizes: [200, 500, 1000], weight: 5 }, // Más raro, paga más
            { cls: 'sym-purple', prizes: [50, 200, 500],   weight: 8 },
            { cls: 'sym-blue',   prizes: [40, 150, 400],   weight: 10 },
            { cls: 'sym-apple',  prizes: [30, 100, 300],   weight: 12 },
            { cls: 'sym-melon',  prizes: [20, 80, 200],    weight: 15 },
            { cls: 'sym-swirl',  prizes: [10, 50, 150],    weight: 20 }, // Común, paga menos
        ];

        // Crear array ponderado para aleatoriedad fiel
        let weightedSymbols = [];
        symbolDefs.forEach((def, index) => {
            for(let i=0; i<def.weight; i++) weightedSymbols.push(index);
        });

        const grid = document.getElementById('grid-container');
        const spinBtn = document.getElementById('spin-btn');
        const creditDisp = document.querySelector('#credit-display .display-value');
        const winDisp = document.querySelector('#win-display .display-value');

        let currentCredits = 1000;
        let isPlaying = false;
        let currentTumbleWin = 0;

        // Inicializar
        updateUI();
        fillGridInitial();

        spinBtn.addEventListener('click', startSequence);

        function updateUI() {
            creditDisp.innerText = currentCredits.toFixed(2);
            winDisp.innerText = currentTumbleWin.toFixed(2);
        }

        // 1. LLENADO INICIAL (Rápido, sin animación de caída)
        function fillGridInitial() {
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL_SYMBOLS; i++) {
                const symData = getRandomSymbol();
                const symEl = document.createElement('div');
                symEl.className = `symbol ${symData.cls}`;
                symEl.dataset.symIndex = symData.index; // Guardar índice para lógica
                grid.appendChild(symEl);
            }
        }

        function getRandomSymbol() {
            const index = weightedSymbols[Math.floor(Math.random() * weightedSymbols.length)];
            return { ...symbolDefs[index], index: index };
        }

        // ========================================================
        // SECUENCIA PRINCIPAL DE JUEGO (DROP -> CHECK -> TUMBLE)
        // ========================================================
        async function startSequence() {
            if (isPlaying || currentCredits < BET_AMOUNT) return;
            
            isPlaying = true;
            spinBtn.disabled = true;
            spinBtn.classList.add('playing'); // Iniciar animación de giro del botón

            // Cobrar apuesta
            currentCredits -= BET_AMOUNT;
            currentTumbleWin = 0;
            updateUI();

            // A. "Limpiar" tablero (Ocultar símbolos actuales instantáneamente)
            const oldSymbols = document.querySelectorAll('.symbol');
            oldSymbols.forEach(s => s.style.opacity = '0');
            
            await wait(100); // Pequeña pausa dramática

            // B. NUEVA CAÍDA (Drop In)
            grid.innerHTML = '';
            for (let i = 0; i < TOTAL_SYMBOLS; i++) {
                const symData = getRandomSymbol();
                const symEl = document.createElement('div');
                // IMPORTANTE: Clase 'tumble-in' ejecuta la animación CSS de caída
                symEl.className = `symbol ${symData.cls} tumble-in`;
                symEl.dataset.symIndex = symData.index;
                
                // Retraso escalonado por columna para efecto fiel (Sweet Bonanza style)
                const col = i % COLS;
                const row = Math.floor(i / COLS);
                // Cae por columnas, de izquierda a derecha, arriba a abajo
                symEl.style.animationDelay = `${(col * 0.1) + (row * 0.02)}s`; 
                
                grid.appendChild(symEl);
            }

            // Esperar a que termine la animación de caída más larga (aprox 0.8s)
            await wait(850); 
            
            // Eliminar clases de animación para no interferir con explosiones
            document.querySelectorAll('.symbol').forEach(s => s.classList.remove('tumble-in', 'exploding'));

            // C. ENTRAR EN BUCLE DE TUMBLE (CASCADA)
            tumbleLoop();
        }

        // BUCLE RECURSIVO DE CASCADA TIPO SWEET BONANZA
        async function tumbleLoop() {
            const symbols = document.querySelectorAll('.symbol:not(.exploding)'); // Solo símbolos activos
            const symCounts = new Array(symbolDefs.length).fill(0);
            
            // 1. Contar ocurrencias
            symbols.forEach(s => {
                symCounts[parseInt(s.dataset.symIndex)]++;
            });

            // 2. Identificar ganadores
            let winningIndexes = [];
            symCounts.forEach((count, index) => {
                if (count >= MIN_WIN_COUNT) winningIndexes.push(index);
            });

            // 3. SI NO HAY MÁS GANANCIAS, TERMINAR GIRO
            if (winningIndexes.length === 0) {
                endSpin();
                return;
            }

            // 4. PROCESAR GANANCIAS ACTUALES
            let countExploding = 0;
            winningIndexes.forEach(symIdx => {
                const count = symCounts[symIdx];
                // Calcular premio basado en cantidad (rangos 8-9, 10-11, 12+)
                let prizeTier = 0;
                if (count >= 10) prizeTier = 1;
                if (count >= 12) prizeTier = 2;
                
                const winAmount = symbolDefs[symIdx].prizes[prizeTier];
                currentTumbleWin += winAmount;

                // Marcar símbolos para explotar
                symbols.forEach(s => {
                    if (parseInt(s.dataset.symIndex) === symIdx) {
                        s.classList.add('exploding'); // Lanza animación CSS de explosión
                        countExploding++;
                    }
                });
            });

            updateUI(); // Actualizar marcador de premio total

            // 5. ESPERAR ANIMACIÓN DE EXPLOSIÓN
            await wait(350); 
            
            // Efecto POP (Eliminar visualmente)
            document.querySelectorAll('.symbol.exploding').forEach(s => s.classList.add('sym-pop'));
            await wait(100);

            // 6. LÓGICA FÍSICA DE CASCADA (Tumble)
            await applyTumblePhysics();

            // 7. REPETIR BUCLE (Buscar nuevas combinaciones tras la caída)
            tumbleLoop();
        }

        async function applyTumblePhysics() {
            // Analizar columna por columna
            for (let c = 0; c < COLS; c++) {
                let emptySpaces = 0;
                // De abajo hacia arriba
                for (let r = ROWS - 1; r >= 0; r--) {
                    const index = r * COLS + c;
                    const cell = grid.children[index];

                    if (cell.classList.contains('exploding')) {
                        emptySpaces++;
                    } else if (emptySpaces > 0) {
                        // Mover símbolo actual hacia abajo
                        const destinationIndex = (r + emptySpaces) * COLS + c;
                        const destinationCell = grid.children[destinationIndex];
                        
                        // Transferir datos del símbolo visualmente
                        transferSymbolData(cell, destinationCell);
                        
                        // Vaciar celda actual (se convierte en hueco que baja)
                        cell.className = 'symbol exploding'; // Usamos explotando como marker de vacío
                    }
                }

                // Llenar huecos superiores de la columna con nuevos símbolos
                for (let r = 0; r < emptySpaces; r++) {
                    const index = r * COLS + c;
                    const cell = grid.container.children[index];
                    const newData = getRandomSymbol();
                    
                    // IMPORTANTE: Re-aplicar tumble-in para que se vea que caen nuevos
                    cell.className = `symbol ${newData.cls} tumble-in`;
                    cell.dataset.symIndex = newData.index;
                    // Retraso pequeño por fila para que caigan en orden
                    cell.style.animationDelay = `${r * 0.05}s`; 
                }
            }
            
            // Esperar a que terminen de caer los nuevos
            await wait(450);
            // Limpiar clases de animación
            document.querySelectorAll('.symbol').forEach(s => s.classList.remove('tumble-in', 'sym-pop'));
        }

        // Auxiliar para mover símbolos visualmente en el DOM
        function transferSymbolData(source, dest) {
            dest.className = source.className; // Mantiene clases visuales
            dest.dataset.symIndex = source.dataset.symIndex;
            dest.style.opacity = '1';
        }

        function endSpin() {
            if (currentTumbleWin > 0) {
                currentCredits += currentTumbleWin;
            }
            updateUI();
            isPlaying = false;
            spinBtn.disabled = false;
            spinBtn.classList.remove('playing'); // Detener giro del botón
        }

        // Promesa auxiliar para pausas (async/await)
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    </script>
