<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino Login</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:Arial;">

<h2>🎰 Casino Login</h2>

<input id="email" placeholder="Correo"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>

<button id="btnRegister">Registrar</button>
<button id="btnLogin">Entrar</button>

<p id="msg"></p>

<!-- SUPABASE SOLO UNA VEZ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔥 IMPORTANTE: solo una vez
const client = window.supabase.createClient(
  "https://dakhnqriwbzihlzhtfcb.supabase.co",
  "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

// helpers
function msg(t){
  document.getElementById("msg").innerText = t;
}

function val(id){
  return document.getElementById(id).value;
}

// ===== REGISTER =====
async function register(){
  msg("Registrando...");

  const email = val("email");
  const pass = val("pass");

  if(!email || !pass){
    msg("Completa los campos");
    return;
  }

  const { error } = await client.auth.signUp({
    email: email,
    password: pass
  });

  if(error){
    msg("❌ " + error.message);
  } else {
    msg("📩 Revisa tu correo y confirma tu cuenta");
  }
}

// ===== LOGIN =====
async function login(){
  msg("Entrando...");

  const email = val("email");
  const pass = val("pass");

  const { data, error } = await client.auth.signInWithPassword({
    email: email,
    password: pass
  });

  if(error){
    if(error.message.includes("Email not confirmed")){
      msg("⚠️ Debes confirmar tu correo");
    } else {
      msg("❌ " + error.message);
    }
    return;
  }

  msg("✅ LOGIN EXITOSO");
}

// 🔥 BOTONES (IMPORTANTE)
document.getElementById("btnRegister").onclick = register;
document.getElementById("btnLogin").onclick = login;

</script>

</body>
</html>
