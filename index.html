<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium Casino</title>
    
    <link rel="icon" href="data:,">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        .hidden-view { display: none !important; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; cursor: pointer; }
        .btn-action:active { transform: scale(0.95); }
        .input-base { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; color: white; outline: none; font-size: 13px; transition: 0.3s; }
        .input-base:focus { border-color: var(--mx-green); }

        /* Pestañas Cajero */
        .tab-btn { flex: 1; padding: 15px; font-family: 'Archivo Black', sans-serif; font-size: 11px; color: #444; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--mx-green); border-color: var(--mx-green); background: rgba(16, 185, 129, 0.05); }

        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-black">
        <div id="login-container" class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-casino mb-10 italic">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Correo" class="input-base">
                <input id="login-password" type="password" placeholder="Contraseña" class="input-base">
                <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino">Entrar</button>
                <p onclick="AuthManager.switchTab('register')" class="text-[10px] text-zinc-500 font-bold mt-4 cursor-pointer">REGISTRARSE</p>
            </div>
        </div>
        <div id="register-container" class="hidden-view glass p-8 w-full max-w-sm text-center">
            <h2 class="text-2xl font-casino mb-6 italic text-emerald-500">Registro</h2>
            <div class="space-y-4">
                <input id="reg-email" type="email" placeholder="Correo" class="input-base">
                <input id="reg-password" type="password" placeholder="Contraseña" class="input-base">
                <div class="flex items-center gap-2 p-2">
                    <input type="checkbox" id="terms-check" class="accent-emerald-500">
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Acepto términos y condiciones</span>
                </div>
                <button onclick="AuthManager.register()" class="btn-action w-full py-4 font-casino">Crear Cuenta</button>
                <p onclick="AuthManager.switchTab('login')" class="text-[10px] text-zinc-500 font-bold mt-2 cursor-pointer uppercase">Ya tengo cuenta</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        <header class="p-5 flex justify-between items-center bg-black/40 border-b border-white/5">
            <span class="font-casino italic text-xl">WIN<span class="text-emerald-500">MX</span></span>
            <div onclick="UI.openWallet()" class="bg-emerald-500/10 border border-emerald-500/20 rounded-full px-4 py-1 flex items-center gap-3 cursor-pointer active:scale-95 transition-transform">
                <span id="balance-display" class="font-casino text-emerald-500 text-lg">$0.00</span>
                <i class="fas fa-plus-circle text-emerald-500"></i>
            </div>
        </header>

        <div id="view-lobby" class="view-content p-5">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 text-center opacity-50"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[10px]">Slots</span></div>
                <div class="glass p-6 text-center opacity-50"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[10px]">Minas</span></div>
            </div>
        </div>

        <div id="view-profile" class="view-content p-5 hidden-view">
            <div class="glass p-10 text-center space-y-4">
                <p id="user-email-display" class="text-sm font-bold text-zinc-400"></p>
                <button id="admin-link" onclick="Admin.show()" class="hidden-view w-full text-[10px] font-casino text-emerald-500 border border-emerald-500/30 py-3 rounded-xl">Inpeccionar solicitudes</button>
                <button onclick="AuthManager.logout()" class="w-full text-[10px] font-casino text-red-500 border border-red-500/10 py-3 rounded-xl mt-10">Cerrar Sesión</button>
            </div>
        </div>

        <div id="view-admin" class="view-content p-5 hidden-view">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-casino text-emerald-500 text-sm">Panel de Control</h2>
                <button onclick="UI.view('profile')" class="text-zinc-600 text-[10px] font-bold">VOLVER</button>
            </div>
            <div id="admin-list" class="space-y-4"></div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center">
            <div onclick="UI.view('lobby')" class="nav-item active" id="nav-lobby"><i class="fas fa-gamepad text-xl mb-1"></i><span>Inicio</span></div>
            <div onclick="UI.view('profile')" class="nav-item" id="nav-profile"><i class="fas fa-user text-xl mb-1"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="modal-wallet" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm bg-[#0a0a0a] overflow-hidden flex flex-col animate__animated animate__fadeInUp animate__faster">
            <div class="flex border-b border-white/5">
                <button id="tab-dep" onclick="UI.switchWallet('dep')" class="tab-btn active">DEPOSITAR</button>
                <button id="tab-wit" onclick="UI.switchWallet('wit')" class="tab-btn">RETIRAR</button>
            </div>
            
            <div class="p-8 space-y-4">
                <div id="wallet-step-1">
                    <p id="wallet-instruction" class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest text-center mb-2">Cantidad</p>
                    <input id="wallet-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-6 text-white">
                    
                    <div class="space-y-3">
                        <div>
                            <label id="label-bank" class="text-[9px] font-bold text-zinc-500 uppercase ml-1">Banco</label>
                            <input id="wallet-bank" type="text" placeholder="..." class="input-base">
                        </div>
                        <div>
                            <label id="label-holder" class="text-[9px] font-bold text-zinc-500 uppercase ml-1">Beneficiario</label>
                            <input id="wallet-holder" type="text" placeholder="..." class="input-base">
                        </div>
                    </div>
                    
                    <button onclick="UI.walletNext()" class="btn-action w-full py-4 font-casino mt-6">Continuar</button>
                </div>

                <div id="wallet-step-2" class="hidden-view space-y-4">
                    <div id="dep-info-box" class="bg-emerald-500/5 p-4 rounded-xl border border-emerald-500/10 text-center">
                        <p class="text-[9px] text-zinc-500 font-bold uppercase mb-1">Cuenta Destino</p>
                        <p class="font-mono text-emerald-500">722969020533491161</p>
                    </div>
                    <input type="file" id="receipt-input" class="hidden" accept="image/*">
                    <label id="label-receipt" for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-2xl p-6 block text-center cursor-pointer">
                        <i class="fas fa-cloud-upload-alt text-2xl text-zinc-600 mb-2"></i>
                        <p id="file-label" class="text-[9px] font-bold text-zinc-500 uppercase">Subir Comprobante</p>
                    </label>
                    <button id="btn-wallet-confirm" onclick="Transac.submit()" class="btn-action w-full py-4 font-casino">Confirmar</button>
                </div>
            </div>
            <button onclick="UI.closeWallet()" class="p-4 text-[9px] text-zinc-700 font-bold uppercase border-t border-white/5">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] w-full max-w-[80%] flex flex-col gap-2"></div>

    <script>
        const sb = supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        let State = { user: null, balance: 0, mode: 'dep' };

        const UI = {
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-bold uppercase animate__animated animate__fadeInDown ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => { n.classList.replace('animate__fadeInDown', 'animate__fadeOutUp'); setTimeout(()=>n.remove(), 500); }, 3000);
            },
            view(v) {
                document.querySelectorAll('.view-content').forEach(e => e.classList.add('hidden-view'));
                document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
                document.getElementById(`view-${v}`).classList.remove('hidden-view');
                if(v !== 'admin') document.getElementById(`nav-${v}`).classList.add('active');
            },
            openWallet() { document.getElementById('modal-wallet').classList.remove('hidden-view'); this.switchWallet('dep'); },
            closeWallet() { document.getElementById('modal-wallet').classList.add('hidden-view'); },
            switchWallet(m) {
                State.mode = m;
                document.getElementById('tab-dep').classList.toggle('active', m==='dep');
                document.getElementById('tab-wit').classList.toggle('active', m==='wit');
                document.getElementById('wallet-step-1').classList.remove('hidden-view');
                document.getElementById('wallet-step-2').classList.add('hidden-view');
                
                document.getElementById('wallet-instruction').innerText = m === 'dep' ? "Monto a depositar" : "Monto a retirar";
                document.getElementById('label-bank').innerText = m === 'dep' ? "Banco desde el que depositas" : "Banco al que retiras";
                document.getElementById('label-holder').innerText = m === 'dep' ? "Nombre del titular que envía" : "Nombre del titular que recibe";
                document.getElementById('btn-wallet-confirm').innerText = m === 'dep' ? "Confirmar Depósito" : "Confirmar Retiro";
            },
            walletNext() {
                const amt = parseFloat(document.getElementById('wallet-amount').value);
                const bank = document.getElementById('wallet-bank').value;
                const holder = document.getElementById('wallet-holder').value;
                
                if(!amt || amt <= 0 || !bank || !holder) return this.notify("Faltan datos", "error");
                if(State.mode === 'wit' && amt > State.balance) return this.notify("Saldo insuficiente", "error");

                document.getElementById('wallet-step-1').classList.add('hidden-view');
                document.getElementById('wallet-step-2').classList.remove('hidden-view');
                
                // Si es retiro, no pedimos comprobante ni mostramos cuenta destino
                document.getElementById('dep-info-box').classList.toggle('hidden-view', State.mode === 'wit');
                document.getElementById('label-receipt').classList.toggle('hidden-view', State.mode === 'wit');
            }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) UI.notify("Acceso denegado", "error"); else location.reload();
            },
            async register() {
                if(!document.getElementById('terms-check').checked) return UI.notify("Acepta términos", "error");
                const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value;
                const { data, error } = await sb.auth.signUp({ email: e, password: p });
                if(error) UI.notify(error.message, "error");
                else { await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]); location.reload(); }
            },
            switchTab(t) {
                document.getElementById('login-container').classList.toggle('hidden-view', t==='register');
                document.getElementById('register-container').classList.toggle('hidden-view', t==='login');
            },
            logout() { sb.auth.signOut().then(()=>location.reload()); }
        };

        const Transac = {
            async submit() {
                const amt = parseFloat(document.getElementById('wallet-amount').value);
                const bank = document.getElementById('wallet-bank').value;
                const holder = document.getElementById('wallet-holder').value;
                const file = document.getElementById('receipt-input').files[0];

                if(State.mode === 'dep' && !file) return UI.notify("Sube el comprobante", "error");
                UI.notify("Enviando solicitud...", "success");

                let url = null;
                if(file && State.mode === 'dep') {
                    const path = `ev/${Date.now()}_${file.name}`;
                    await sb.storage.from('comprobantes').upload(path, file);
                    const { data } = sb.storage.from('comprobantes').getPublicUrl(path);
                    url = data.publicUrl;
                }

                // Insertamos en historial con la metadata de banco/beneficiario
                const { error } = await sb.from('history').insert([{
                    user_id: State.user.id,
                    type: State.mode === 'dep' ? 'deposit' : 'withdraw',
                    amount: amt,
                    status: 'pending',
                    label: State.mode === 'dep' ? 'DEPÓSITO PENDIENTE' : 'RETIRO PENDIENTE',
                    evidence_url: url,
                    meta: { bank, holder }
                }]);

                if(!error) {
                    if(State.mode === 'wit') {
                        State.balance -= amt;
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    }
                    UI.notify("Solicitud en revisión"); UI.closeWallet(); Core.sync();
                }
            }
        };

        const Admin = {
            async show() { UI.view('admin'); this.load(); },
            async load() {
                const { data } = await sb.from('history').select('*, usuarios(email)').eq('status', 'pending').order('created_at', {ascending: false});
                const list = document.getElementById('admin-list');
                list.innerHTML = data.length ? data.map(i => `
                    <div class="glass p-5 text-[10px] space-y-3 border-l-4 ${i.type==='deposit'?'border-emerald-500':'border-red-500'}">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-zinc-300">${i.usuarios.email}</span>
                            <span class="text-white font-casino">$${i.amount}</span>
                        </div>
                        <div class="bg-white/5 p-3 rounded-xl space-y-1">
                            <p class="text-zinc-500 font-bold uppercase">Tipo: <span class="text-white">${i.type === 'deposit' ? 'DEPÓSITO' : 'RETIRO'}</span></p>
                            <p class="text-zinc-500 font-bold uppercase">Banco: <span class="text-white">${i.meta?.bank || '---'}</span></p>
                            <p class="text-zinc-500 font-bold uppercase">Titular: <span class="text-white">${i.meta?.holder || '---'}</span></p>
                        </div>
                        ${i.evidence_url ? `<a href="${i.evidence_url}" target="_blank" class="block text-center bg-emerald-500/10 text-emerald-500 py-2 rounded-lg font-bold">VER COMPROBANTE</a>` : ''}
                        <div class="flex gap-2">
                            <button onclick="Admin.act('${i.id}', 'completed', ${i.amount}, '${i.user_id}', '${i.type}')" class="flex-1 bg-emerald-500 text-black py-3 rounded-xl font-bold uppercase">Aprobar</button>
                            <button onclick="Admin.act('${i.id}', 'rejected', ${i.amount}, '${i.user_id}', '${i.type}')" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold uppercase">Rechazar</button>
                        </div>
                    </div>
                `).join('') : '<p class="text-center text-zinc-600 py-10 font-bold">NO HAY SOLICITUDES PENDIENTES</p>';
            },
            async act(id, status, amt, uid, type) {
                await sb.from('history').update({ status }).eq('id', id);
                if(status === 'completed' && type === 'deposit') {
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', uid).single();
                    await sb.from('usuarios').update({ saldo: data.saldo + amt }).eq('id', uid);
                } else if(status === 'rejected' && type === 'withdraw') {
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', uid).single();
                    await sb.from('usuarios').update({ saldo: data.saldo + amt }).eq('id', uid);
                }
                UI.notify("Solicitud procesada"); this.load();
            }
        };

        const Core = {
            async init() {
                let p = 0; const b = setInterval(() => { p += 25; document.getElementById('boot-bar').style.width = p+'%'; if(p>=100){ clearInterval(b); this.check(); } }, 150);
                document.getElementById('receipt-input').onchange = (e) => { if(e.target.files[0]) document.getElementById('file-label').innerText = "ARCHIVO SELECCIONADO"; };
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    document.getElementById('user-email-display').innerText = State.user.email;
                    if(State.user.email === 'admin@winmx.com') document.getElementById('admin-link').classList.remove('hidden-view');
                    this.sync();
                } else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async sync() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if(data) { State.balance = data.saldo; document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; }
            }
        };

        Core.init();
    </script>
</body>
</html>
