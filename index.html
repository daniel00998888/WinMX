<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Premium Casino Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800;900&display=swap');

        :root {
            --mx-green: #10b981;
            --mx-green-glow: rgba(16, 185, 129, 0.3);
            --mx-dark: #050505;
            --mx-card: #0d0d0d;
            --mx-border: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--mx-dark); }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--mx-green); }

        body {
            background-color: var(--mx-dark);
            background-image: radial-gradient(circle at top right, #10b98108, transparent 40%);
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

        /* Paneles Estilo Cristal Compacto */
        .glass-panel {
            background: rgba(13, 13, 13, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--mx-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Slots Redimensionados */
        .slot-box {
            height: 120px; /* Reducido de 160px */
            overflow: hidden;
            background: #000;
            border: 2px solid #1a1a1a;
            border-radius: 1.5rem;
            position: relative;
        }

        .slot-box::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .slot-reel {
            transition: transform 3.5s cubic-bezier(0.1, 0, 0.1, 1);
            will-change: transform;
        }

        .slot-item {
            height: 120px; /* Reducido de 160px */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem; /* Símbolos más contenidos */
        }

        /* Botones Optimizados */
        .btn-action {
            background: var(--mx-green);
            color: black;
            font-weight: 900;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--mx-green-glow);
        }

        .btn-action:disabled { background: #222 !important; color: #444 !important; cursor: not-allowed; }

        /* Tabs */
        .tab-btn {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #444;
            padding-bottom: 8px;
            transition: 0.3s;
        }

        .tab-btn.active { color: var(--mx-green); border-bottom: 2px solid var(--mx-green); }

        .toast { animation: slideIn 0.4s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased">

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="text-5xl font-casino italic mb-4 animate-pulse">Win<span class="text-emerald-500">MX</span></div>
        <div class="w-48 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="glass-panel p-10 rounded-[3rem] w-full max-w-sm border-t-4 border-emerald-500 text-center animate__animated animate__fadeIn">
            <h2 class="text-4xl font-casino italic mb-8">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="EMAIL" class="w-full bg-black/40 p-4 rounded-xl border border-white/5 outline-none focus:border-emerald-500/50 text-white font-bold text-center text-sm">
                <input id="auth-password" type="password" placeholder="PASSWORD" class="w-full bg-black/40 p-4 rounded-xl border border-white/5 outline-none focus:border-emerald-500/50 text-white font-bold text-center text-sm">
                <button id="auth-btn" onclick="Core.handleAuth()" class="btn-action w-full py-4 rounded-xl font-casino italic tracking-widest text-lg mt-2">Acceder</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden transition-opacity duration-1000">
        <nav class="glass-panel sticky top-0 z-[100] px-6 py-3 border-b border-white/5">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-casino italic">Win<span class="text-emerald-500">MX</span></h1>
                
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <p class="text-[8px] text-zinc-500 font-black uppercase mb-0.5">Saldo Disponible</p>
                        <div id="balance-display" class="text-3xl font-casino text-white tracking-tighter">$0.00</div>
                    </div>
                    <button onclick="Core.logout()" class="p-3 bg-red-500/5 border border-red-500/10 rounded-xl hover:bg-red-500 group transition-all">
                        <i class="fas fa-power-off text-red-500 group-hover:text-white text-xs"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-8 space-y-6">
                <div class="glass-panel p-8 rounded-[3rem] relative overflow-hidden">
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>

                    <div class="flex flex-col md:flex-row items-center justify-between gap-6 bg-black/40 p-6 rounded-[2rem] border border-white/5">
                        <div class="flex items-center gap-4">
                            <button onclick="Game.changeBet(-10)" class="w-10 h-10 rounded-lg bg-zinc-900 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all"><i class="fas fa-minus text-xs"></i></button>
                            <div class="text-center min-w-[80px]">
                                <p class="text-[8px] text-zinc-500 font-black uppercase">Apuesta</p>
                                <span id="bet-display" class="text-2xl font-casino text-white">$10</span>
                            </div>
                            <button onclick="Game.changeBet(10)" class="w-10 h-10 rounded-lg bg-zinc-900 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all"><i class="fas fa-plus text-xs"></i></button>
                        </div>
                        
                        <button id="spin-btn" onclick="Game.spin()" class="btn-action px-16 py-5 rounded-2xl font-casino text-3xl italic">
                            GIRAR
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-4 gap-2">
                    <div class="glass-panel p-3 rounded-xl text-center text-[10px] font-bold border border-white/5">
                        🍒 x20
                    </div>
                    <div class="glass-panel p-3 rounded-xl text-center text-[10px] font-bold border border-white/5">
                        💎 x50
                    </div>
                    <div class="glass-panel p-3 rounded-xl text-center text-[10px] font-bold border border-white/5">
                        7️⃣ x100
                    </div>
                    <div class="glass-panel p-3 rounded-xl text-center text-[10px] font-bold border border-white/5">
                        🔔 x10
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-6 rounded-[2.5rem] flex flex-col h-[520px]">
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button onclick="UI.openModal('modal-deposit')" class="py-4 bg-emerald-500 text-black font-black text-[10px] uppercase rounded-xl shadow-lg">Depositar</button>
                        <button class="py-4 bg-zinc-800 text-zinc-600 font-black text-[10px] uppercase rounded-xl cursor-not-allowed">Retirar</button>
                    </div>

                    <div class="flex gap-6 mb-4 border-b border-white/5">
                        <button onclick="UI.switchTab('bets')" id="tab-bets-btn" class="tab-btn active">Actividad</button>
                        <button onclick="UI.switchTab('deps')" id="tab-deps-btn" class="tab-btn">Cajero</button>
                    </div>

                    <div id="history-content" class="flex-grow space-y-3 overflow-y-auto pr-1">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[1000] flex items-center justify-center hidden p-4">
        <div class="glass-panel p-10 rounded-[2.5rem] w-full max-w-sm text-center animate__animated animate__zoomIn">
            <div id="dep-step-1">
                <h3 class="font-casino text-2xl mb-6">Recargar</h3>
                <input id="dep-amount" type="number" placeholder="0.00" class="w-full bg-transparent text-center text-5xl font-casino border-b-2 border-zinc-800 focus:border-emerald-500 outline-none mb-8 text-white">
                <div class="grid grid-cols-3 gap-2 mb-8">
                    <button onclick="document.getElementById('dep-amount').value = 100" class="py-2 bg-white/5 rounded-lg text-[10px] font-bold hover:bg-emerald-500 hover:text-black">+$100</button>
                    <button onclick="document.getElementById('dep-amount').value = 500" class="py-2 bg-white/5 rounded-lg text-[10px] font-bold hover:bg-emerald-500 hover:text-black">+$500</button>
                    <button onclick="document.getElementById('dep-amount').value = 1000" class="py-2 bg-white/5 rounded-lg text-[10px] font-bold hover:bg-emerald-500 hover:text-black">+$1000</button>
                </div>
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 rounded-xl font-casino text-lg italic">Continuar</button>
            </div>

            <div id="dep-step-2" class="hidden">
                <div class="bg-emerald-500/5 p-4 rounded-xl border border-emerald-500/10 mb-6">
                    <p class="text-[9px] font-black text-emerald-500 mb-2">CLAVE STP</p>
                    <p class="text-lg font-mono font-black">722969020533491161</p>
                    <button onclick="UI.copyClave()" class="text-[8px] font-black uppercase text-emerald-500 mt-2 underline">Copiar</button>
                </div>
                <input type="file" id="receipt-input" class="hidden">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-xl p-6 block cursor-pointer hover:border-emerald-500 transition-all mb-6">
                    <p id="file-label" class="text-[9px] font-black text-zinc-500 uppercase">Subir Comprobante</p>
                </label>
                <button id="final-dep-btn" onclick="Core.confirmDeposit()" class="btn-action w-full py-4 rounded-xl font-casino text-lg italic">Confirmar</button>
            </div>
            <button onclick="UI.closeModal('modal-deposit')" class="mt-6 text-[9px] font-black text-zinc-700 uppercase tracking-widest underline">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed bottom-6 right-6 z-[2000] flex flex-col gap-2"></div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        
        let State = {
            user: null, balance: 0, currentBet: 10, isSpinning: false, activeTab: 'bets',
            symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣']
        };

        const PAYTABLE = {
            '🍒🍒🍒': 20, '7️⃣7️⃣7️⃣': 100, '💎💎💎': 50, '🔔🔔🔔': 10, '⭐️⭐️⭐️': 15, '🍋🍋🍋': 5
        };

        const Sound = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                if(type === 'spin') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, this.ctx.currentTime); gain.gain.setValueAtTime(0.03, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1); }
                else if(type === 'win') { osc.type = 'square'; osc.frequency.setValueAtTime(600, this.ctx.currentTime); gain.gain.setValueAtTime(0.06, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3); }
                else if(type === 'click') { osc.type = 'sine'; osc.frequency.setValueAtTime(700, this.ctx.currentTime); gain.gain.setValueAtTime(0.05, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.05); }
                osc.start(); osc.stop(this.ctx.currentTime + 0.4);
            }
        };

        const Core = {
            async init() {
                let p = 0;
                let int = setInterval(() => {
                    p += 20; document.getElementById('boot-bar').style.width = p + '%';
                    if(p >= 100) { clearInterval(int); this.checkSession(); }
                }, 100);
            },
            async checkSession() {
                const { data: { session } } = await sb.auth.getSession();
                if(session) { State.user = session.user; this.loadApp(); }
                else { UI.toggle('auth-screen', true); this.hideLoader(); }
            },
            async handleAuth() {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-password').value;
                if(!email || !pass) return;
                const { error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) {
                    const { data: up } = await sb.auth.signUp({ email, password: pass });
                    if(up.user) await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                }
                location.reload();
            },
            async loadApp() {
                UI.toggle('main-app', true);
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if(data) { State.balance = data.saldo; UI.updateBalance(); this.fetchHistory(); Game.initReels(); }
                this.hideLoader();
            },
            async fetchHistory() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', {ascending: false}).limit(15);
                UI.renderHistory(data);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return;
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert({ user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPÓSITO', status: 'pending', evidence_url: publicUrl });
                UI.closeModal('modal-deposit'); this.fetchHistory(); UI.notify("Enviado", "success");
            },
            hideLoader() { document.getElementById('boot-loader').style.opacity = '0'; setTimeout(() => document.getElementById('boot-loader').classList.add('hidden'), 700); },
            logout() { sb.auth.signOut(); location.reload(); }
        };

        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    const icons = [...State.symbols, ...State.symbols, ...State.symbols, ...State.symbols];
                    icons.forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`);
                });
            },
            changeBet(v) { Sound.play('click'); State.currentBet = Math.max(10, State.currentBet + v); document.getElementById('bet-display').innerText = `$${State.currentBet}`; },
            async spin() {
                if(State.isSpinning || State.balance < State.currentBet) return;
                State.isSpinning = true;
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;

                const res = [State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)]];
                const mult = PAYTABLE[res.join('')] || 0;
                const win = State.currentBet * mult;
                const net = win - State.currentBet;
                const newS = State.balance + net;

                [1,2,3].forEach((id, i) => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transform = `translateY(-${(State.symbols.indexOf(res[i]) * 120) + (120 * 18)}px)`;
                });

                let loop = setInterval(() => Sound.play('spin'), 180);
                setTimeout(async () => {
                    clearInterval(loop);
                    if(mult > 0) { Sound.play('win'); UI.notify("GANASTE X" + mult, "success"); }
                    await sb.from('usuarios').update({ saldo: newS }).eq('id', State.user.id);
                    await sb.from('history').insert({ user_id: State.user.id, type: 'bets', amount: net, label: mult > 0 ? 'PREMIO' : 'JUEGO', status: 'completed' });
                    State.balance = newS; UI.updateBalance(); Core.fetchHistory();
                    State.isSpinning = false; btn.disabled = false; this.resetVisual();
                }, 3500);
            },
            resetVisual() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transition = 'none'; r.style.transform = 'translateY(0)';
                    setTimeout(() => r.style.transition = 'transform 3.5s cubic-bezier(0.1, 0, 0.1, 1)', 50);
                });
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString('es-MX', {minimumFractionDigits:2})}`; },
            toggle(id, s) { const e = document.getElementById(id); if(s) { e.classList.remove('hidden'); setTimeout(() => e.classList.add('opacity-100'), 50); } },
            notify(m, t) {
                const c = document.getElementById('notif-container');
                const d = document.createElement('div');
                d.className = `${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-zinc-800'} toast px-5 py-3 rounded-xl font-black text-[10px] shadow-2xl`;
                d.innerText = m.toUpperCase(); c.appendChild(d);
                setTimeout(() => { d.style.opacity = '0'; setTimeout(() => d.remove(), 500); }, 3000);
            },
            switchTab(t) {
                State.activeTab = t;
                document.getElementById('tab-bets-btn').classList.toggle('active', t === 'bets');
                document.getElementById('tab-deps-btn').classList.toggle('active', t === 'deps');
                Core.fetchHistory();
            },
            renderHistory(data) {
                const c = document.getElementById('history-content'); c.innerHTML = '';
                const f = data?.filter(h => State.activeTab === 'bets' ? h.type === 'bets' : h.type === 'deposits');
                if(!f || f.length === 0) { c.innerHTML = '<p class="text-[8px] text-zinc-700 text-center mt-4 uppercase">Vacío</p>'; return; }
                f.forEach(h => {
                    const isW = h.amount >= 0;
                    c.innerHTML += `<div class="glass-panel p-3 rounded-xl flex justify-between items-center border border-white/5 animate__animated animate__fadeInUp">
                        <span class="text-[8px] font-black text-zinc-500 uppercase">${h.label}</span>
                        <span class="font-casino text-xs ${isW ? 'text-emerald-500' : 'text-red-500'}">${isW?'+':''}${h.amount.toFixed(2)}</span>
                    </div>`;
                });
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },
            depNextStep() {
                const a = document.getElementById('dep-amount').value;
                if(!a || a < 10) return;
                document.getElementById('dep-step-1').classList.add('hidden');
                document.getElementById('dep-step-2').classList.remove('hidden');
            },
            copyClave() { navigator.clipboard.writeText('722969020533491161'); this.notify("Copiado", "success"); }
        };

        document.getElementById('receipt-input')?.addEventListener('change', (e) => { if(e.target.files[0]) document.getElementById('file-label').innerText = "✅ OK"; });
        function loadPending() { Core.fetchHistory(); }
        Core.init();
    </script>
</body>
</html>
