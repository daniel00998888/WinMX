<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Casino Blindado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #050505; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); }
        .slot-box { height: 120px; overflow: hidden; background: #000; border: 2px solid #1a1a1a; border-radius: 2rem; }
        .slot-reel { transition: transform 2s cubic-bezier(0.1, 0, 0.1, 1); }
        .slot-item { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
        .btn-primary { background: var(--mx-green); color: black; font-weight: 900; transition: 0.3s; cursor: pointer; border:none; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .tab-btn { padding: 12px; font-size: 10px; font-weight: 900; color: #444; border-bottom: 2px solid transparent; text-transform: uppercase; cursor: pointer; }
        .tab-btn.active { color: var(--mx-green); border-bottom: 2px solid var(--mx-green); }
    </style>
</head>
<body class="antialiased">

    <script>
        (function() {
            // Bloqueo de clic derecho
            document.addEventListener('contextmenu', e => e.preventDefault());
            // Bloqueo de teclas de inspección
            document.onkeydown = function(e) {
                if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                    return false;
                }
            };
        })();
    </script>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-12 rounded-[3rem] w-full max-w-md text-center border-b-[8px] border-emerald-600 shadow-2xl">
            <h2 class="text-6xl font-casino italic mb-8 tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <input id="auth-email" type="email" placeholder="TU EMAIL" class="w-full bg-black/50 p-5 rounded-2xl border border-white/5 mb-4 text-center outline-none focus:border-emerald-500 text-white">
            <input id="auth-password" type="password" placeholder="TU CONTRASEÑA" class="w-full bg-black/50 p-5 rounded-2xl border border-white/5 mb-6 text-center outline-none focus:border-emerald-500 text-white">
            <button onclick="handleAuth()" class="btn-primary w-full py-5 rounded-2xl font-black uppercase italic tracking-widest text-lg">Entrar al Casino</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50 px-8">
            <h1 class="text-3xl font-casino italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h1>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end">
                    <span class="text-[8px] text-zinc-500 font-black uppercase">Tu Saldo</span>
                    <span id="balance-display" class="text-3xl font-casino text-emerald-400">$0.00</span>
                </div>
                <button onclick="logout()" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
            <div class="lg:col-span-7">
                <div class="glass p-8 rounded-[3rem] border border-white/5 shadow-2xl">
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    <div class="flex flex-col items-center gap-8">
                        <div class="flex items-center gap-8 bg-black/60 p-4 rounded-full border border-white/5 px-8">
                            <button onclick="changeBet(-10)" class="text-zinc-600 text-xl hover:text-white"><i class="fas fa-minus-circle"></i></button>
                            <span id="bet-display" class="text-4xl font-casino tracking-widest">$10</span>
                            <button onclick="changeBet(10)" class="text-zinc-600 text-xl hover:text-white"><i class="fas fa-plus-circle"></i></button>
                        </div>
                        <button id="spin-btn" onclick="spin()" class="btn-primary w-full py-8 rounded-[2.5rem] font-casino text-4xl uppercase italic tracking-tighter shadow-lg shadow-emerald-500/20">Jugar Ahora</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 flex flex-col gap-6">
                <div class="glass p-6 rounded-[2.5rem] border border-white/5 shadow-xl flex-grow">
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button onclick="openDeposit()" class="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-emerald-500 font-black text-[10px] uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition-all">Depósito</button>
                        <button onclick="alert('Retiros en mantenimiento')" class="p-4 bg-zinc-800 border border-white/5 rounded-2xl text-zinc-500 font-black text-[10px] uppercase tracking-widest cursor-not-allowed">Retiro</button>
                    </div>
                    
                    <div class="flex border-b border-white/5 mb-4">
                        <button onclick="switchTab('tab-bets')" id="btn-tab-bets" class="tab-btn active">Jugadas</button>
                        <button onclick="switchTab('tab-deposits')" id="btn-tab-deposits" class="tab-btn">Cajero</button>
                    </div>
                    
                    <div class="overflow-y-auto max-h-[350px] space-y-2" id="history-container">
                        <div id="tab-bets" class="tab-content"></div>
                        <div id="tab-deposits" class="tab-content hidden"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-bank" class="fixed inset-0 bg-black/95 backdrop-blur-sm flex items-center justify-center z-[100] hidden p-6">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-sm text-center border border-white/10 shadow-2xl">
            <div id="step-1">
                <h2 class="font-casino text-2xl mb-8 text-emerald-500 italic">RECARGAR SALDO</h2>
                <input id="modal-amount" type="number" placeholder="$0.00" class="w-full bg-transparent text-center text-5xl font-casino border-b-2 border-zinc-800 py-4 outline-none text-white mb-8">
                <button onclick="goToStep2()" class="btn-primary w-full py-5 rounded-2xl font-black uppercase text-lg">Siguiente</button>
            </div>
            <div id="step-2" class="hidden text-left">
                <h3 class="font-casino text-sm mb-4 text-emerald-500 text-center uppercase">Transferencia</h3>
                <div class="bg-black p-4 rounded-xl border border-white/5 mb-6 text-center">
                    <span class="text-zinc-500 block mb-1 uppercase font-bold text-[8px]">CLAVE STP</span>
                    <span class="text-white font-mono font-bold text-lg">722969020533491161</span>
                </div>
                <input type="file" id="receipt-upload" accept="image/*" class="hidden">
                <label for="receipt-upload" class="cursor-pointer border-2 border-dashed border-zinc-800 rounded-2xl p-6 block text-center bg-black/20 hover:border-emerald-500/50 transition-colors">
                    <i class="fas fa-upload text-xl text-zinc-600 mb-2"></i>
                    <p id="file-name" class="text-[9px] font-bold text-zinc-400 uppercase">Subir Comprobante</p>
                </label>
                <button id="confirm-btn" onclick="verifyAndUpload()" class="btn-primary w-full py-5 rounded-2xl font-black uppercase italic tracking-widest text-lg mt-6">Confirmar Pago</button>
            </div>
            <button onclick="closeModal()" class="text-zinc-700 text-[10px] font-black uppercase mt-6 block mx-auto underline">Cancelar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        
        let userId = null; let balance = 0; let currentBet = 10;
        const symbols = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert("Completa los datos");

            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if(error) {
                const { data: up, error: errUp } = await sb.auth.signUp({ email, password });
                if(up.user) await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                else return alert("Error al entrar");
            }
            checkUser();
        }

        async function checkUser() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                userId = session.user.id;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                syncData(); setupReels();
            }
        }

        async function syncData() {
            const { data } = await sb.from('usuarios').select('saldo').eq('id', userId).single();
            if (data) { balance = data.saldo; updateUI(); loadHistory(); }
        }

        function updateUI() { document.getElementById('balance-display').innerText = `$${balance.toLocaleString()}`; }

        // --- CAJERO ---
        function openDeposit() {
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('modal-bank').classList.remove('hidden');
        }

        function goToStep2() {
            const amt = document.getElementById('modal-amount').value;
            if(!amt || amt < 10) return alert("Monto mínimo $10");
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        document.getElementById('receipt-upload')?.addEventListener('change', (e) => {
            if(e.target.files[0]) document.getElementById('file-name').innerText = "ARCHIVO LISTO ✅";
        });

        async function verifyAndUpload() {
            const fileInput = document.getElementById('receipt-upload');
            const amt = parseFloat(document.getElementById('modal-amount').value);
            if (fileInput.files.length === 0) return alert("Sube la foto del pago");

            const btn = document.getElementById('confirm-btn');
            btn.innerText = "ENVIANDO..."; btn.disabled = true;

            const file = fileInput.files[0];
            const filePath = `comprobantes/${userId}-${Date.now()}.png`;

            const { error: uploadError } = await sb.storage.from('comprobantes').upload(filePath, file);
            if (uploadError) return alert("Error al subir");

            const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(filePath);

            await sb.from('history').insert({
                user_id: userId, type: 'deposits', amount: amt, 
                label: 'DEPÓSITO PENDIENTE', status: 'pending', evidence_url: publicUrl
            });

            alert("Depósito en revisión.");
            closeModal(); loadHistory();
        }

        // --- JUEGO ---
        function spin() {
            if (balance < currentBet) return alert("Saldo insuficiente.");
            document.getElementById('spin-btn').disabled = true;
            
            const res = { type: 'INTENTA OTRA VEZ', icons: ['🍋','🔔','🍒'], mult: 0 };
            const rng = Math.random() * 100;
            if(rng <= 1) { res.type = 'JACKPOT 🎰'; res.icons = ['7️⃣','7️⃣','7️⃣']; res.mult = 50; }
            else if(rng <= 10) { res.type = 'GANASTE'; res.icons = ['💎','💎','💎']; res.mult = 5; }

            const netChange = (currentBet * res.mult) - currentBet;
            const newSaldo = balance + netChange;

            [1,2,3].forEach((id, i) => {
                const reel = document.getElementById(`reel-${id}`);
                const pos = (symbols.indexOf(res.icons[i]) * 120) + (120 * 12);
                reel.style.transform = `translateY(-${pos}px)`;
            });

            setTimeout(async () => {
                // ACTUALIZACIÓN DE SALDO (Protegida por RLS)
                await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', userId);
                await sb.from('history').insert({ 
                    user_id: userId, type: 'bets', amount: netChange, 
                    label: res.type, status: 'completed' 
                });
                
                balance = newSaldo; updateUI(); loadHistory();
                document.getElementById('spin-btn').disabled = false;
                [1,2,3].forEach(id => { 
                    document.getElementById(`reel-${id}`).style.transition = 'none'; 
                    document.getElementById(`reel-${id}`).style.transform = 'translateY(0)'; 
                    setTimeout(() => { document.getElementById(`reel-${id}`).style.transition = 'transform 2s cubic-bezier(0.1, 0, 0.1, 1)'; }, 50); 
                });
            }, 2500);
        }

        // --- UTILIDADES ---
        function setupReels() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; [...symbols, ...symbols, ...symbols].forEach(s => { r.innerHTML += `<div class="slot-item">${s}</div>`; }); }); }
        
        function switchTab(id) { 
            document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden')); 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden'); 
            document.getElementById('btn-' + id).classList.add('active');
        }

        async function loadHistory() {
            const { data } = await sb.from('history').select('*').eq('user_id', userId).order('created_at', {ascending: false}).limit(15);
            const tBets = document.getElementById('tab-bets');
            const tDeps = document.getElementById('tab-deposits');
            tBets.innerHTML = ''; tDeps.innerHTML = '';
            
            data?.forEach(h => {
                const color = h.status === 'pending' ? 'text-yellow-500' : (h.amount >= 0 ? 'text-emerald-500' : 'text-red-500');
                const html = `<div class="bg-black/30 p-4 rounded-xl border border-white/5 flex justify-between items-center mb-1 animate-fadeIn">
                    <span class="text-[8px] font-bold text-zinc-500 uppercase">${h.label}</span>
                    <span class="font-casino text-sm ${color}">${h.amount >= 0 ? '+' : ''}$${h.amount.toFixed(2)}</span>
                </div>`;
                if(h.type === 'bets') tBets.innerHTML += html; else tDeps.innerHTML += html;
            });
        }

        // ALIAS PARA EVITAR ERROR loadPending
        function loadPending() { loadHistory(); }

        function closeModal() { document.getElementById('modal-bank').classList.add('hidden'); }
        function changeBet(v) { currentBet = Math.max(10, currentBet + v); document.getElementById('bet-display').innerText = `$${currentBet}`; }
        async function logout() { await sb.auth.signOut(); location.reload(); }
        
        window.onload = checkUser;
    </script>
</body>
</html>
