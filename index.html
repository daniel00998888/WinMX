    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --mx-green: #00ff88; --mx-bg: #050505; --mx-surface: #0f0f0f; }
        
        body { background-color: var(--mx-bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

        /* NAVBAR SUPERIOR */
        .top-nav { background: rgba(10,10,10,0.9); border-bottom: 1px solid #1a1a1a; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        
        /* AREA DE JUEGO PRINCIPAL */
        .arena {
            max-width: 900px; margin: 20px auto; flex-grow: 1;
            display: flex; flex-direction: column; background: #0c0c0c;
            border-radius: 2.5rem; border: 1px solid #1a1a1a; overflow: hidden;
            position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* SLOTS REELS */
        .slot-reel { height: 160px; overflow: hidden; border-radius: 1.5rem; background: #000; border: 1px solid #222; position: relative; }
        .reel-strip { transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }

        /* CONSOLA DE APUESTAS */
        .console { background: #000; border-top: 1px solid #1a1a1a; padding: 25px 40px; }
        .bet-input { background: #111; border: 1px solid #222; border-radius: 1.2rem; padding: 10px 20px; display: flex; align-items: center; }
        
        .btn-main {
            background: var(--mx-green); color: black; font-family: 'Archivo Black';
            font-size: 1.3rem; border-radius: 1.2rem; width: 100%; height: 60px;
            transition: 0.2s; box-shadow: 0 8px 25px rgba(0,255,136,0.2);
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }

        /* MODAL DEPOSITO ORIGINAL */
        #modal-dep { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .dep-card { background: #0f0f0f; border-radius: 3rem; padding: 45px; width: 100%; max-width: 400px; border: 1px solid #222; text-align: center; }

        /* HISTORIAL */
        .hist-item { background: rgba(255,255,255,0.03); border-radius: 0.8rem; padding: 10px 15px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); font-size: 11px; }
    </style>
</head>
<body class="flex flex-col">

        </div>
        <div class="flex items-center gap-3">

            <button onclick="UI.modal('dep', true)" class="w-12 h-12 bg-emerald-500 text-black rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20">

    <main class="flex-grow flex flex-col p-4">
        <div class="arena">
            <div class="bg-black/40 px-8 py-4 flex justify-between items-center border-b border-white/5">
                <div class="flex items-center gap-3">
                    <i class="fas fa-dice text-emerald-500"></i>
                    <span class="text-xs font-black uppercase tracking-widest">Lucky 7 Premium</span>
                </div>
                <div class="flex gap-2">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span class="text-[9px] text-zinc-500 font-bold">LIVE RTP: 98.4%</span>
                </div>
            </div>

            <div id="game-canvas" class="flex-grow flex items-center justify-center p-10 bg-[#050505]">
                <div class="grid grid-cols-3 gap-5 w-full max-w-lg">
                    <div class="slot-reel"><div id="r1" class="reel-strip"></div></div>
                    <div class="slot-reel"><div id="r2" class="reel-strip"></div></div>
                    <div class="slot-reel"><div id="r3" class="reel-strip"></div></div>
                </div>
            </div>

            <div class="console">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                    <div class="bet-input">
                        <button onclick="Game.setBet(State.bet - 10)" class="w-12 h-12 bg-zinc-800 rounded-xl text-xl font-bold">-</button>
                        <div class="flex-grow text-center">
                            <p class="text-[9px] text-zinc-600 font-black uppercase mb-1">Tu Apuesta</p>
                            <span id="bet-txt" class="text-3xl font-casino tracking-tighter">$10</span>
                        </div>
                        <button onclick="Game.setBet(State.bet + 10)" class="w-12 h-12 bg-zinc-800 rounded-xl text-xl font-bold">+</button>
                    </div>
                    <button id="main-btn" onclick="Game.play()" class="btn-main italic">GIRAR AHORA</button>
                </div>
                <div class="mt-6 flex justify-center gap-8">
                    <div class="text-center">
                        <p class="text-[8px] text-zinc-700 font-black uppercase">Última Ganancia</p>
                        <p id="last-win" class="text-emerald-500 font-casino">$0</p>
                    </div>
                    <div class="text-center">
                        <p class="text-[8px] text-zinc-700 font-black uppercase">Multiplicador Max</p>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-dep">
        <div class="dep-card relative">
            <button onclick="UI.modal('dep', false)" class="absolute top-8 right-8 text-zinc-600 hover:text-white"><i class="fas fa-times"></i></button>
            <h2 class="font-casino text-3xl mb-8 italic text-emerald-500">Depositar</h2>
            <div class="space-y-6">
                <div class="bg-black p-6 rounded-3xl border border-white/5">
                    <input id="dep-in" type="number" placeholder="$0.00" class="bg-transparent w-full text-center text-4xl font-casino text-emerald-500 outline-none">
                </div>
                <div class="bg-zinc-800/50 p-6 rounded-[2rem] border border-white/5 text-center">
                    <p class="text-[10px] text-zinc-500 font-black mb-2 uppercase tracking-widest">CLAVE STP INTERBANCARIA</p>
                    <p class="text-lg font-mono font-bold select-all tracking-tighter">722 969 020 533 491 161</p>
                </div>
                <button onclick="UI.confirmDep()" class="w-full py-5 bg-emerald-500 text-black font-casino text-lg rounded-2xl shadow-xl">Confirmar Envío</button>
                <p class="text-[9px] text-zinc-600 font-bold leading-relaxed">Tu saldo se actualizará automáticamente tras la verificación del sistema.</p>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let State = { user: null, balance: 0, bet: 10, playing: false, spinCount: 0 };
        const SYM = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Game = {
            setBet(v) { if(!State.playing) { State.bet = Math.max(10, v); document.getElementById('bet-txt').innerText = `$${State.bet}`; } },
            play() {
                if(State.balance < State.bet) return alert("Saldo insuficiente. Realiza un depósito.");
                State.playing = true;
                State.balance -= State.bet;
                UI.up();
                UI.lock(true);
                this.spin();
            },
            spin() {
                State.spinCount++;
                const result = [SYM[Math.floor(Math.random()*6)], SYM[Math.floor(Math.random()*6)], SYM[Math.floor(Math.random()*6)]];
                [1,2,3].forEach((id, i) => {
                    const r = document.getElementById(`r${id}`);
                    const pos = (State.spinCount * 160 * 12) + (SYM.indexOf(result[i]) * 160);
                    r.style.transform = `translateY(-${pos}px)`;
                });
                setTimeout(() => this.finish(result), 3100);
            },
            async finish(res) {
                const winMap = {'7️⃣7️⃣7️⃣':10, '💎💎💎':5, '⭐️⭐️⭐️':3, '🔔🔔🔔':2};
                const mult = winMap[res.join('')] || 0;
                const profit = State.bet * mult;
                
                State.balance += profit;
                State.playing = false;
                UI.up(); UI.lock(false);
                document.getElementById('last-win').innerText = `$${profit}`;

                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                if(profit > 0) alert(`¡FELICIDADES! GANASTE $${profit}`);
            }
        };

        const UI = {
            up() { document.getElementById('bal-txt').innerText = `$${State.balance.toLocaleString()}`; },
            lock(s) { document.getElementById('main-btn').disabled = s; },
            modal(id, s) { document.getElementById(`modal-${id}`).style.display = s ? 'flex' : 'none'; },
            async confirmDep() {
                const val = document.getElementById('dep-in').value;
                if(!val) return;
                await sb.from('depositos').insert([{ user_id: State.user.id, amount: val, status: 'pending' }]);
                alert("Notificación enviada con éxito.");
                this.modal('dep', false);
            }
        };

        const Logic = {
            init() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`r${id}`);
                    for(let i=0; i<60; i++) r.innerHTML += `<div class="h-[160px] flex items-center justify-center text-6xl">${SYM[i%6]}</div>`;
                });
            }
        };

        const Auth = {
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    State.user = session.user;
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                    State.balance = data.saldo || 0;
                    UI.up();
                } else {
                    alert("Por favor inicia sesión para jugar.");
                }
            }
        };

        Logic.init();
        Auth.check();
    </script>
</body>
</html>
