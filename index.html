<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Pro Casino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #050505; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); }
        .slot-box { height: 150px; overflow: hidden; background: #000; border: 3px solid #1a1a1a; border-radius: 2rem; position: relative; }
        .slot-box::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.7) 100%); pointer-events: none; }
        .slot-reel { transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .slot-item { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }
        .btn-main { background: var(--mx-green); color: black; font-weight: 900; transition: 0.3s; border:none; }
        .btn-main:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .tab-active { color: var(--mx-green); border-bottom: 2px solid var(--mx-green); }
    </style>
</head>
<body class="antialiased select-none">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-12 rounded-[3.5rem] w-full max-w-md text-center border-b-[8px] border-emerald-600 shadow-2xl">
            <h2 class="text-6xl font-casino italic mb-8 tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="EMAIL" class="w-full bg-black/50 p-5 rounded-2xl border border-white/5 text-center outline-none focus:border-emerald-500 text-white font-bold">
                <input id="auth-password" type="password" placeholder="CONTRASEÑA" class="w-full bg-black/50 p-5 rounded-2xl border border-white/5 text-center outline-none focus:border-emerald-500 text-white font-bold">
                <button onclick="Core.handleAuth()" class="btn-main w-full py-5 rounded-2xl font-black uppercase italic tracking-widest text-lg">Entrar</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
            <h1 class="text-4xl font-casino italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h1>
            <div class="flex items-center gap-10">
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest">Saldo</p>
                    <span id="balance-display" class="text-4xl font-casino text-emerald-400">$0.00</span>
                </div>
                <button onclick="Core.logout()" class="p-4 bg-red-500/10 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
            <div class="lg:col-span-8">
                <div class="glass p-10 rounded-[4rem] border border-white/5 shadow-2xl">
                    <div class="grid grid-cols-3 gap-6 mb-12">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    
                    <div class="flex flex-col md:flex-row items-center justify-between gap-8 bg-black/60 p-8 rounded-[3rem]">
                        <div class="flex items-center gap-6">
                            <button onclick="Game.changeBet(-10)" class="w-12 h-12 rounded-xl bg-zinc-900 flex items-center justify-center text-xl"><i class="fas fa-minus"></i></button>
                            <div class="text-center min-w-[100px]">
                                <p class="text-[10px] text-zinc-500 font-black mb-1">APUESTA</p>
                                <span id="bet-display" class="text-4xl font-casino">$10</span>
                            </div>
                            <button onclick="Game.changeBet(10)" class="w-12 h-12 rounded-xl bg-zinc-900 flex items-center justify-center text-xl"><i class="fas fa-plus"></i></button>
                        </div>
                        <button id="spin-btn" onclick="Game.spin()" class="btn-main px-20 py-8 rounded-[2.5rem] font-casino text-4xl italic shadow-2xl">GIRAR</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="glass p-8 rounded-[3rem] border border-white/5 flex-grow">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="UI.openModal('modal-deposit')" class="py-5 bg-emerald-500 text-black font-black rounded-2xl uppercase text-[11px] tracking-widest">Depositar</button>
                        <button class="py-5 bg-zinc-800 text-zinc-500 font-black rounded-2xl uppercase text-[11px] cursor-not-allowed">Retirar</button>
                    </div>
                    
                    <div class="flex gap-4 mb-6 border-b border-white/5">
                        <button onclick="UI.switchTab('bets')" id="tab-bets-btn" class="pb-3 text-[10px] font-black uppercase tab-active">Jugadas</button>
                        <button onclick="UI.switchTab('deps')" id="tab-deps-btn" class="pb-3 text-[10px] font-black uppercase text-zinc-500">Cajero</button>
                    </div>

                    <div id="history-content" class="space-y-3 overflow-y-auto max-h-[400px]"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center hidden p-6">
        <div class="glass p-12 rounded-[4rem] w-full max-w-md text-center animate__animated animate__zoomIn">
            <div id="dep-step-1">
                <h2 class="font-casino text-3xl mb-8 italic text-emerald-500">Recargar</h2>
                <input id="dep-amount" type="number" placeholder="0.00" class="w-full bg-transparent text-center text-6xl font-casino border-b-4 border-zinc-800 focus:border-emerald-500 outline-none mb-10">
                <button onclick="UI.depNext()" class="btn-main w-full py-6 rounded-3xl font-casino text-xl">Siguiente</button>
            </div>
            <div id="dep-step-2" class="hidden">
                <div class="bg-black/50 p-6 rounded-3xl border border-white/5 mb-8">
                    <p class="text-[10px] text-emerald-500 font-black mb-2">CLAVE STP</p>
                    <p class="text-2xl font-mono font-bold">722969020533491161</p>
                </div>
                <input type="file" id="receipt-input" class="hidden">
                <label for="receipt-input" class="border-4 border-dashed border-zinc-800 rounded-3xl p-8 block cursor-pointer hover:border-emerald-500/50 transition-all mb-8">
                    <i class="fas fa-cloud-upload-alt text-3xl text-zinc-700 mb-2"></i>
                    <p id="file-label" class="text-[10px] font-black text-zinc-500 uppercase">Subir Comprobante</p>
                </label>
                <button id="final-dep-btn" onclick="Core.confirmDeposit()" class="btn-main w-full py-6 rounded-3xl font-casino text-xl">Confirmar</button>
            </div>
            <button onclick="UI.closeModal('modal-deposit')" class="mt-6 text-[10px] font-black text-zinc-700 uppercase underline">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed bottom-10 right-10 z-[200] flex flex-col gap-3"></div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        
        let State = {
            user: null, balance: 0, currentBet: 10, isSpinning: false, activeTab: 'bets',
            symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣']
        };

        // TABLA DE PAGOS (Multiplicadores)
        const PAYTABLE = {
            '🍒🍒🍒': 20,
            '7️⃣7️⃣7️⃣': 100,
            '💎💎💎': 50,
            '🔔🔔🔔': 10,
            '⭐️⭐️⭐️': 15,
            '🍋🍋🍋': 5
        };

        const Sound = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(freq, type, duration) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
        };

        const Core = {
            async init() {
                const { data: { session } } = await sb.auth.getSession();
                if (session) { State.user = session.user; this.loadDashboard(); }
            },
            async handleAuth() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if(error) {
                    const { data: up } = await sb.auth.signUp({ email, password });
                    if(up.user) await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                }
                location.reload();
            },
            async loadDashboard() {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if (data) { State.balance = data.saldo; UI.updateBalance(); this.fetchHistory(); Game.initReels(); }
            },
            async fetchHistory() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', {ascending: false}).limit(15);
                UI.renderHistory(data);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return;
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert({ user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPÓSITO PENDIENTE', status: 'pending', evidence_url: publicUrl });
                UI.closeModal('modal-deposit'); this.fetchHistory();
            },
            logout() { sb.auth.signOut(); location.reload(); }
        };

        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    [...State.symbols, ...State.symbols, ...State.symbols, ...State.symbols].forEach(s => {
                        r.innerHTML += `<div class="slot-item">${s}</div>`;
                    });
                });
            },
            changeBet(v) { Sound.play(600, 'sine', 0.05); State.currentBet = Math.max(10, State.currentBet + v); document.getElementById('bet-display').innerText = `$${State.currentBet}`; },
            async spin() {
                if(State.isSpinning || State.balance < State.currentBet) return;
                State.isSpinning = true;
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;

                // Resultado aleatorio
                const resIcons = [
                    State.symbols[Math.floor(Math.random() * State.symbols.length)],
                    State.symbols[Math.floor(Math.random() * State.symbols.length)],
                    State.symbols[Math.floor(Math.random() * State.symbols.length)]
                ];

                // Verificamos multiplicador
                const combo = resIcons.join('');
                const multiplier = PAYTABLE[combo] || 0;
                const winAmount = State.currentBet * multiplier;
                const netChange = winAmount - State.currentBet;
                const newSaldo = State.balance + netChange;

                // Animación
                [1,2,3].forEach((id, i) => {
                    const reel = document.getElementById(`reel-${id}`);
                    const targetPos = (State.symbols.indexOf(resIcons[i]) * 150) + (150 * 18);
                    reel.style.transform = `translateY(-${targetPos}px)`;
                });

                let loop = setInterval(() => Sound.play(100, 'sawtooth', 0.1), 150);

                setTimeout(async () => {
                    clearInterval(loop);
                    if(multiplier > 0) {
                        Sound.play(880, 'square', 0.3);
                        UI.notify(`¡GANASTE X${multiplier}! +$${winAmount}`, 'success');
                    }

                    await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', State.user.id);
                    await sb.from('history').insert({ user_id: State.user.id, type: 'bets', amount: netChange, label: multiplier > 0 ? 'PREMIO' : 'JUGADA', status: 'completed' });
                    
                    State.balance = newSaldo; State.isSpinning = false; btn.disabled = false;
                    UI.updateBalance(); Core.fetchHistory(); this.resetReels();
                }, 3000);
            },
            resetReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transition = 'none'; r.style.transform = 'translateY(0)';
                    setTimeout(() => r.style.transition = 'transform 3s cubic-bezier(0.1, 0, 0.1, 1)', 50);
                });
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString('es-MX', {minimumFractionDigits: 2})}`; },
            notify(msg, type) {
                const c = document.getElementById('notif-container');
                const d = document.createElement('div');
                d.className = `${type === 'success' ? 'bg-emerald-500 text-black' : 'bg-zinc-800'} px-6 py-4 rounded-2xl font-bold text-xs animate__animated animate__fadeInRight`;
                d.innerText = msg; c.appendChild(d);
                setTimeout(() => { d.classList.replace('animate__fadeInRight', 'animate__fadeOutRight'); setTimeout(() => d.remove(), 500); }, 3000);
            },
            switchTab(tab) {
                State.activeTab = tab;
                document.getElementById('tab-bets-btn').className = tab === 'bets' ? 'pb-3 text-[10px] font-black uppercase tab-active' : 'pb-3 text-[10px] font-black uppercase text-zinc-500';
                document.getElementById('tab-deps-btn').className = tab === 'deps' ? 'pb-3 text-[10px] font-black uppercase tab-active' : 'pb-3 text-[10px] font-black uppercase text-zinc-500';
                Core.fetchHistory();
            },
            renderHistory(data) {
                const c = document.getElementById('history-content'); c.innerHTML = '';
                data?.filter(h => State.activeTab === 'bets' ? h.type === 'bets' : h.type === 'deposits').forEach(h => {
                    c.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5 animate__animated animate__fadeInUp">
                        <div><p class="text-[8px] font-black text-zinc-500 uppercase">${h.label}</p></div>
                        <p class="font-casino text-sm ${h.amount >= 0 ? 'text-emerald-500' : 'text-red-400'}">${h.amount >= 0 ? '+' : ''}$${h.amount.toFixed(2)}</p>
                    </div>`;
                });
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); },
            depNext() { document.getElementById('dep-step-1').classList.add('hidden'); document.getElementById('dep-step-2').classList.remove('hidden'); }
        };

        document.getElementById('receipt-input')?.addEventListener('change', (e) => { if(e.target.files[0]) document.getElementById('file-label').innerText = "✅ LISTO"; });
        
        // Anti-error
        function loadPending() { Core.fetchHistory(); }
        
        Core.init();
    </script>
</body>
</html>
