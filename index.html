<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino Real PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1d2a;color:white}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
background:#0f2a3d;
padding:10px 20px;
}

.logo{font-size:22px;font-weight:bold}
.balance{font-size:18px}
.logout{background:red;border:none;color:white;padding:5px 10px;cursor:pointer}

/* MAIN */
.main{display:flex;height:calc(100vh - 60px)}

/* SIDEBAR */
.sidebar{width:250px;background:#132f44;padding:20px}
.game-btn{background:#1d4b6a;padding:10px;margin:10px 0;cursor:pointer;border-radius:5px;text-align:center}

/* CONTENT */
.content{flex:1;padding:20px;overflow:auto}

/* CHAT */
.chat{width:300px;background:#000;display:flex;flex-direction:column}
.chat-box{flex:1;overflow:auto;padding:10px}

/* LOGIN */
#auth{text-align:center;margin-top:100px}
input{padding:10px;margin:5px;width:200px}

/* GAME */
.game{display:none}
.active{display:block}

/* SLOT */
.reels{display:flex;gap:10px;justify-content:center}
.reel{width:80px;height:80px;background:#000;font-size:40px;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<!-- 🔥 HEADER OCULTO -->
<header id="topbar" style="display:none;">
<div class="logo">🎰 CASINO REAL</div>
<div class="balance" id="saldo">$0</div>
<button class="logout" onclick="logout()">Salir</button>
</header>

<!-- LOGIN -->
<div id="auth">
<h2>Acceso</h2>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button id="btnRegister">Registrar</button>
<button id="btnLogin">Entrar</button>
<p id="msg"></p>
</div>

<!-- CASINO -->
<div id="casino" style="display:none">

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Juegos</h3>
<div class="game-btn" onclick="showGame('slot')">🎰 Slots</div>
<div class="game-btn" onclick="showGame('roulette')">🎡 Ruleta</div>
<div class="game-btn" onclick="showGame('dice')">🎲 Dado</div>
<div class="game-btn" onclick="showGame('bj')">🃏 Blackjack</div>

<h3>🏆 Ranking</h3>
<div id="rankingBox"></div>
</div>

<!-- CONTENT -->
<div class="content">

<div id="slot" class="game">
<h2>🎰 Slots</h2>
<div class="reels">
<div class="reel" id="r1"></div>
<div class="reel" id="r2"></div>
<div class="reel" id="r3"></div>
</div>
<input id="betSlot">
<button onclick="spinSlot()">Girar</button>
<p id="slotRes"></p>
</div>

<div id="roulette" class="game">
<h2>🎡 Ruleta</h2>
<input id="betRou">
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>
<button onclick="spinRoulette()">Girar</button>
<p id="rouRes"></p>
</div>

<div id="dice" class="game">
<h2>🎲 Dado</h2>
<input id="betDice">
<button onclick="playDice()">Lanzar</button>
<p id="diceRes"></p>
</div>

<div id="bj" class="game">
<h2>🃏 Blackjack</h2>
<input id="betBJ">
<button onclick="playBJ()">Jugar</button>
<p id="bjRes"></p>
</div>

</div>

<!-- CHAT -->
<div class="chat">
<div class="chat-box" id="chatBox"></div>
<input id="chatInput" placeholder="Escribe...">
<button onclick="sendMsg()">Enviar</button>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = window.supabase.createClient(
"https://dakhnqriwbzihlzhtfcb.supabase.co",
"sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

let user,saldo=0;

// INIT
window.onload=async()=>{
let {data}=await sb.auth.getSession();
if(data.session){user=data.session.user;start();}
};

// HELPERS
function msg(t){document.getElementById("msg").innerText=t}
function val(id){return document.getElementById(id).value}

// AUTH
async function register(){
msg("Registrando...");
let {error}=await sb.auth.signUp({email:val("email"),password:val("pass")});
msg(error?error.message:"📩 Revisa tu correo");
}

async function login(){
let {data,error}=await sb.auth.signInWithPassword({email:val("email"),password:val("pass")});
if(error){msg(error.message);return;}
user=data.user;
start();
}

// START
async function start(){
document.getElementById("auth").style.display="none";
document.getElementById("casino").style.display="block";
document.getElementById("topbar").style.display="flex"; // 🔥 FIX

let {data}=await sb.from("usuarios").select("*").eq("id",user.id);

if(!data.length){
await sb.from("usuarios").insert([{id:user.id,saldo:1000}]);
saldo=1000;
}else saldo=data[0].saldo;

update();
loadRanking();
initChat();
}

// UPDATE
function update(){
document.getElementById("saldo").innerText="💰 $"+saldo;
}

// SAVE
async function save(){
await sb.from("usuarios").update({saldo}).eq("id",user.id);
}

// NAV
function showGame(g){
document.querySelectorAll(".game").forEach(x=>x.classList.remove("active"));
document.getElementById(g).classList.add("active");
}

// JUEGOS
function spinSlot(){
let b=+val("betSlot");if(!b||b>saldo)return;
let s=["🍒","💎","7️⃣","⭐","🍀","🔔"];
let a=s[rand()],c=s[rand()],d=s[rand()];
r1.innerText=a;r2.innerText=c;r3.innerText=d;
let win=(a===c&&c===d);
saldo+=win?b*5:-b;
update();save();
}

function spinRoulette(){
let b=+val("betRou"),c=val("color");
let r=Math.random()<0.5?"rojo":"negro";
saldo+=r===c?b:-b;
document.getElementById("rouRes").innerText=r;
update();save();
}

function playDice(){
let b=+val("betDice");
let d=Math.floor(Math.random()*6)+1;
saldo+=d>=4?b:-b;
document.getElementById("diceRes").innerText=d;
update();save();
}

function playBJ(){
let b=+val("betBJ");
let p=Math.floor(Math.random()*10)+12,d=Math.floor(Math.random()*10)+12;
saldo+=((p>d&&p<=21)||d>21)?b:-b;
document.getElementById("bjRes").innerText=`${p} vs ${d}`;
update();save();
}

// CHAT
function initChat(){
sb.channel("chat")
.on("postgres_changes",{event:"INSERT",schema:"public",table:"chat"},p=>{
let box=document.getElementById("chatBox");
box.innerHTML+=`<div>${p.new.mensaje}</div>`;
box.scrollTop=box.scrollHeight;
}).subscribe();
}

async function sendMsg(){
let t=val("chatInput");
if(!t)return;
await sb.from("chat").insert([{user_id:user.id,mensaje:t}]);
document.getElementById("chatInput").value="";
}

// RANKING
async function loadRanking(){
let {data}=await sb.from("usuarios").select("*").order("saldo",{ascending:false}).limit(5);
let html="";
data.forEach(u=>html+=`<div>💰 $${u.saldo}</div>`);
document.getElementById("rankingBox").innerHTML=html;
}

// LOGOUT
async function logout(){
await sb.auth.signOut();
location.reload();
}

function rand(){return Math.floor(Math.random()*6)}

// BOTONES
document.getElementById("btnRegister").onclick=register;
document.getElementById("btnLogin").onclick=login;

</script>

</body>
</html>
