    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 100px; }
        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .game-info { background: rgba(16, 185, 129, 0.05); border-left: 3px solid var(--mx-green); padding: 12px; border-radius: 0 15px 15px 0; margin-bottom: 20px; }
        
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, totalSpins: 0 };

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[viewId];
                if(navId) document.getElementById(navId).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
            },
            templates: {
                slots: `<div class="game-info text-[10px]">Alinea 3 iguales para ganar 10x.</div><div class="glass p-6 text-center"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="game-info text-[10px]">4 minas ocultas. Recoge gemas.</div><div class="glass p-4 text-center"><div id="mines-grid" class="grid grid-cols-5 gap-2 mb-6"></div><div id="mines-status" class="hidden flex justify-between items-center p-3 mb-4 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500">1.00x</span><button onclick="GameLogic.mines.cashout()" class="bg-emerald-500 text-black px-4 py-1 rounded-lg font-bold text-[10px]">COBRAR</button></div><button id="btn-mines-start" onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino">APOSTAR $10</button></div>`,
                crash: `<div class="game-info text-[10px]">Retírate antes del Crash.</div><div class="glass p-8 text-center"><div id="crash-mult" class="text-6xl font-casino italic mb-6">1.00x</div><div id="crash-rocket" class="text-4xl transition-all duration-100 mb-8">🚀</div><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`,
                tower: `<div class="game-info text-[10px]">Sube la torre eligiendo 1 de 3.</div><div class="glass p-4"><div id="tower-container" class="space-y-2 mb-4 flex flex-col-reverse"></div><button id="btn-tower-start" onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino uppercase">Empezar $10</button></div>`
            }
        };

        const GameLogic = {
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(State.balance < 10 || State.isSpinning) return UI.notify("Sin saldo", "error");
                    State.isSpinning = true; State.balance -= 10; UI.updateBalance();
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });
                    setTimeout(() => {
                        State.isSpinning = false;
                        if(res[0] === res[1] && res[1] === res[2]) { State.balance += 100; UI.updateBalance(); UI.notify("¡GANASTE $100!", "success"); }
                        else UI.notify("Sigue intentando", "error");
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1,
                start() {
                    if(State.balance < 10) return UI.notify("Sin saldo", "error");
                    State.balance -= 10; UI.updateBalance();
                    this.active = true; this.revealed = []; this.mult = 1;
                    this.mines = Array.from({length:25}, (_,i)=>i).sort(()=>Math.random()-0.5).slice(0,4);
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 rounded-lg border border-white/5 flex items-center justify-center cursor-pointer"></div>`;
                    document.getElementById('mines-status').classList.remove('hidden');
                    document.getElementById('btn-mines-start').classList.add('hidden-view');
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    this.revealed.push(i); const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.classList.add('bg-red-500/20'); this.active = false; UI.notify("¡BOOM!", "error");
                        setTimeout(() => Router.openGame('mines'), 1500);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500/20'); this.mult += 0.35;
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2)+'x';
                    }
                },
                cashout() {
                    if(!this.active || !this.revealed.length) return;
                    const win = 10 * this.mult; State.balance += win; UI.updateBalance();
                    UI.notify(`Ganaste $${win.toFixed(2)}`, "success"); this.active = false; Router.openGame('mines');
                }
            },
            crash: {
                timer: null, mult: 1, active: false,
                start() {
                    if(State.balance < 10) return UI.notify("Sin saldo", "error");
                    State.balance -= 10; UI.updateBalance();
                    this.active = true; this.mult = 1;
                    const b = document.getElementById('btn-crash'); b.innerText = "COBRAR"; b.onclick = () => this.cashout();
                    const limit = 1.1 + (Math.random() * 4);
                    this.timer = setInterval(() => {
                        this.mult += 0.04; document.getElementById('crash-mult').innerText = this.mult.toFixed(2)+'x';
                        if(this.mult >= limit) { clearInterval(this.timer); this.active = false; UI.notify("CRASH!", "error"); setTimeout(() => Router.openGame('crash'), 2000); }
                    }, 100);
                },
                cashout() {
                    if(!this.active) return;
                    clearInterval(this.timer); this.active = false;
                    const win = 10 * this.mult; State.balance += win; UI.updateBalance();
                    UI.notify(`Cobraste $${win.toFixed(2)}`, "success"); setTimeout(() => Router.openGame('crash'), 2000);
                }
            },
            tower: {
                level: 0, active: false,
                start() {
                    if(State.balance < 10) return UI.notify("Sin saldo", "error");
                    State.balance -= 10; UI.updateBalance();
                    this.active = true; this.level = 0;
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        c.innerHTML += `<div id="row-${i}" class="grid grid-cols-3 gap-2 opacity-20 pointer-events-none">
                            <div onclick="GameLogic.tower.step(${i},0)" class="bg-white/5 p-3 rounded-lg border border-white/5 text-center">?</div>
                            <div onclick="GameLogic.tower.step(${i},1)" class="bg-white/5 p-3 rounded-lg border border-white/5 text-center">?</div>
                            <div onclick="GameLogic.tower.step(${i},2)" class="bg-white/5 p-3 rounded-lg border border-white/5 text-center">?</div>
                        </div>`;
                    }
                    this.unlockRow(0);
                    const b = document.getElementById('btn-tower-start'); b.innerText = "COBRAR $0.00"; b.onclick = () => this.cashout();
                },
                unlockRow(r) { const el = document.getElementById(`row-${r}`); if(el) el.classList.remove('opacity-20', 'pointer-events-none'); },
                step(r, c) {
                    if(!this.active || r !== this.level) return;
                    const mine = Math.floor(Math.random()*3);
                    const cells = document.getElementById(`row-${r}`).children;
                    if(c === mine) { this.active = false; cells[c].innerHTML = '❌'; UI.notify("Caíste", "error"); setTimeout(()=>Router.openGame('tower'), 1500); }
                    else { 
                        cells[c].innerHTML = '💎'; cells[c].classList.add('bg-emerald-500/10'); this.level++; 
                        const win = 10 * (1 + (this.level * 0.5));
                        document.getElementById('btn-tower-start').innerText = `COBRAR $${win.toFixed(2)}`;
                        if(this.level<8) this.unlockRow(this.level); else this.cashout(); 
                    }
                },
                cashout() {
                    if(!this.active || this.level === 0) return;
                    const win = 10 * (1 + (this.level * 0.5)); State.balance += win; UI.updateBalance();
                    UI.notify(`Ganaste $${win.toFixed(2)}`, "success"); this.active = false; Router.openGame('tower');
                }
            }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); }
                else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async loadBalance() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                State.balance = data ? data.saldo : 0; UI.updateBalance();
            },
            async fetchHistory() {
                // LLAMADA A TU HISTORIAL ORIGINAL
                const b = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'bets').order('created_at', { ascending: false }).limit(10);
                const d = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'deposits').order('created_at', { ascending: false }).limit(10);
                
                const container = document.getElementById('history-lists');
                container.innerHTML = `
                    <div class="glass overflow-hidden border-white/5 mb-4">
                        <div onclick="UI.toggleAccordion('acc-bets', 'arrow-bets')" class="p-5 flex justify-between items-center bg-white/[0.02] cursor-pointer">
                            <div class="flex items-center gap-3"><i class="fas fa-history text-emerald-500"></i><span class="font-casino text-[10px]">Mis Jugadas</span></div>
                            <i id="arrow-bets" class="fas fa-chevron-down text-zinc-700 transition-transform"></i>
                        </div>
                        <div id="acc-bets" class="hidden-view p-3 space-y-2 bg-black/40 border-t border-white/5">${this.renderList(b.data || [], 'bets')}</div>
                    </div>
                    <div class="glass overflow-hidden border-white/5">
                        <div onclick="UI.toggleAccordion('acc-deps', 'arrow-deps')" class="p-5 flex justify-between items-center bg-white/[0.02] cursor-pointer">
                            <div class="flex items-center gap-3"><i class="fas fa-wallet text-blue-400"></i><span class="font-casino text-[10px]">Mis Depósitos</span></div>
                            <i id="arrow-deps" class="fas fa-chevron-down text-zinc-700 transition-transform"></i>
                        </div>
                        <div id="acc-deps" class="hidden-view p-3 space-y-2 bg-black/40 border-t border-white/5">${this.renderList(d.data || [], 'deposits')}</div>
                    </div>`;
            },
            renderList(items, type) {
                if(!items.length) return `<p class="text-[8px] text-center text-zinc-600 py-2">Sin registros</p>`;
                return items.map(i => {
                    let text = i.label, color = i.amount >= 0 ? 'text-emerald-500' : 'text-red-500', pulse = "";
                    if (type === 'deposits') {
                        if (i.status === 'pending') { text = "Depósito Pendiente ⏳"; color = "text-yellow-500"; pulse = "pulse-pending"; }
                        else if (i.status === 'completed') { text = "Depósito Confirmado ✅"; color = "text-emerald-500"; }
                        else if (i.status === 'rejected') { text = "Depósito Rechazado ❌"; color = "text-red-500"; }
                    }
                    return `<div class="flex justify-between items-center p-3 rounded-xl bg-white/[0.02] border border-white/5 ${pulse}"><div class="flex flex-col"><span class="text-[9px] font-bold uppercase text-white">${text}</span><span class="text-[7px] text-zinc-600">${new Date(i.created_at).toLocaleDateString()}</span></div><div class="text-[10px] font-casino ${color}">$${Math.abs(i.amount).toFixed(2)}</div></div>`;
                }).join('');
            },
            async confirmDeposit() {
                const amtInput = document.getElementById('dep-amount');
                const amt = parseFloat(amtInput.value);
                if(!amt || !document.getElementById('receipt-input').files[0]) return UI.notify("Sube comprobante", "error");
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending' }]);
                UI.notify("Enviado a revisión", "success"); UI.closeModal('modal-deposit'); this.fetchHistory();
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            toggleAccordion(accId, arrowId) {
                const acc = document.getElementById(accId);
                const arrow = document.getElementById(arrowId);
                acc.classList.toggle('hidden-view');
                if(arrow) arrow.style.transform = acc.classList.contains('hidden-view') ? 'rotate(0deg)' : 'rotate(180deg)';
            },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); },
            handleFile(input) { if(input.files[0]) document.getElementById('file-label').innerText = "LISTO ✅"; },
            copyClabe() { navigator.clipboard.writeText("722969020533491161").then(() => this.notify("CLABE Copiada", "success")); }
        };

        const AuthManager = {
            async login() {
                const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('auth-email').value, password: document.getElementById('auth-password').value });
                if(error) UI.notify("Error", "error"); else location.reload();
            },
            async register() {
                const { error } = await sb.auth.signUp({ email: document.getElementById('auth-email').value, password: document.getElementById('auth-password').value });
                UI.notify(error ? "Error" : "¡Cuenta Creada!", error ? "error" : "success");
            },
            logout() { sb.auth.signOut().then(() => location.reload()); }
        };

        Core.init();
    </script>
</body>
</html>
