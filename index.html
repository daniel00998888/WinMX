<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1d2a;color:white;text-align:center}
header{background:#102c3c;padding:15px;font-size:24px}
.screen{display:none}
.active{display:block}
.games{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-top:20px}
.card{background:#16394f;padding:20px;border-radius:10px;width:200px;cursor:pointer}
button{padding:10px;margin-top:10px;border:none;border-radius:5px;background:#00c896;color:white;cursor:pointer;width:80%}
input,select{padding:8px;margin-top:10px;width:80%}
.logout{position:absolute;top:10px;right:10px;background:red}

/* SLOT */
.reels{display:flex;justify-content:center;gap:10px;margin:20px}
.reel{width:80px;height:80px;background:#000;border:3px solid #00c896;font-size:40px;display:flex;align-items:center;justify-content:center;border-radius:10px}

/* RULETA */
.wheel{
width:200px;height:200px;border-radius:50%;
background:conic-gradient(red 0 50%, black 50% 100%);
margin:20px auto;
transition:transform 1s;
}
</style>
</head>

<body>

<header>🎰 CASINO REAL PRO</header>
<button class="logout" onclick="logout()">Salir</button>

<!-- LOGIN -->
<div id="auth" class="screen active">
<h2>Acceso</h2>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button id="btnRegister">Registrar</button>
<button id="btnLogin">Entrar</button>
<p id="msg"></p>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
<h2>Lobby</h2>
<div id="saldo">Saldo: $0</div>

<div class="games">
<div class="card" onclick="openGame('slot')">🎰 Slots</div>
<div class="card" onclick="openGame('roulette')">🎡 Ruleta</div>
<div class="card" onclick="openGame('dice')">🎲 Dado</div>
<div class="card" onclick="openGame('blackjack')">🃏 Blackjack</div>
</div>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<h2>🎰 Slot</h2>
<div class="reels">
<div class="reel" id="r1"></div>
<div class="reel" id="r2"></div>
<div class="reel" id="r3"></div>
</div>
<input id="betSlot" type="number">
<button onclick="spinSlot()">Girar</button>
<button onclick="back()">Volver</button>
<p id="slotRes"></p>
</div>

<!-- RULETA -->
<div id="roulette" class="screen">
<h2>🎡 Ruleta</h2>
<div class="wheel" id="wheel"></div>
<input id="betRou" type="number">
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>
<button onclick="spinRoulette()">Girar</button>
<button onclick="back()">Volver</button>
<p id="rouRes"></p>
</div>

<!-- DADO -->
<div id="dice" class="screen">
<h2>🎲 Dado</h2>
<input id="betDice" type="number">
<button onclick="playDice()">Lanzar</button>
<button onclick="back()">Volver</button>
<p id="diceRes"></p>
</div>

<!-- BLACKJACK -->
<div id="blackjack" class="screen">
<h2>🃏 Blackjack</h2>
<input id="betBJ" type="number">
<button onclick="playBJ()">Jugar</button>
<button onclick="back()">Volver</button>
<p id="bjRes"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔥 CLIENTE
const sb = window.supabase.createClient(
  "https://dakhnqriwbzihlzhtfcb.supabase.co",
  "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

let user;
let saldo=0;

// INIT
window.onload=async()=>{
let {data}=await sb.auth.getSession();
if(data.session){
user=data.session.user;
start();
}else{
show("auth");
}
};

// UI
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function msg(t){document.getElementById("msg").innerText=t}
function val(id){return document.getElementById(id).value}

// AUTH
async function register(){
msg("Registrando...");
let {error}=await sb.auth.signUp({email:val("email"),password:val("pass")});
msg(error?error.message:"📩 Revisa tu correo");
}

async function login(){
msg("Entrando...");
let {data,error}=await sb.auth.signInWithPassword({email:val("email"),password:val("pass")});

if(error){
if(error.message.includes("Email not confirmed")){
msg("⚠️ Confirma tu correo");
}else{
msg(error.message);
}
return;
}

user=data.user;
start();
}

// START
async function start(){
show("lobby");

let {data}=await sb.from("usuarios").select("*").eq("id",user.id);

if(!data || data.length===0){
await sb.from("usuarios").insert([{id:user.id,saldo:1000}]);
saldo=1000;
}else saldo=data[0].saldo;

update();
}

// SAVE
async function save(){
await sb.from("usuarios").update({saldo}).eq("id",user.id);
}

// UPDATE
function update(){
document.getElementById("saldo").innerText="Saldo: $"+saldo;
}

// NAV
function openGame(g){show(g)}
function back(){show("lobby")}

// SLOT
function spinSlot(){
let bet=+val("betSlot");
if(!bet||bet>saldo) return alert("Apuesta inválida");

let s=["🍒","💎","7️⃣","⭐","🍀","🔔"];
let r1=document.getElementById("r1");
let r2=document.getElementById("r2");
let r3=document.getElementById("r3");

let inter=setInterval(()=>{
r1.innerText=s[rand()];
r2.innerText=s[rand()];
r3.innerText=s[rand()];
},100);

setTimeout(()=>{
clearInterval(inter);

let a=s[rand()],b=s[rand()],c=s[rand()];
r1.innerText=a;r2.innerText=b;r3.innerText=c;

let win=(a===b && b===c);
saldo+=win?bet*5:-bet;

document.getElementById("slotRes").innerText=win?"🎉 JACKPOT":"❌ PERDISTE";

update();save();
},1500);
}

// RULETA
function spinRoulette(){
let bet=+val("betRou");
let c=document.getElementById("color").value;

if(!bet||bet>saldo) return alert("Apuesta inválida");

let wheel=document.getElementById("wheel");
let deg=Math.random()*360;
wheel.style.transform=`rotate(${deg}deg)`;

setTimeout(()=>{
let r=(deg%360)<180?"rojo":"negro";
let win=r===c;

saldo+=win?bet:-bet;

document.getElementById("rouRes").innerText=r;

update();save();
},1000);
}

// DADO
function playDice(){
let bet=+val("betDice");
if(!bet||bet>saldo) return alert("Apuesta inválida");

let d=Math.floor(Math.random()*6)+1;
let win=d>=4;

saldo+=win?bet:-bet;

document.getElementById("diceRes").innerText="🎲 "+d;

update();save();
}

// BLACKJACK
function playBJ(){
let bet=+val("betBJ");
if(!bet||bet>saldo) return alert("Apuesta inválida");

let p=Math.floor(Math.random()*10)+12;
let d=Math.floor(Math.random()*10)+12;

let win=(p>d && p<=21)||d>21;

saldo+=win?bet:-bet;

document.getElementById("bjRes").innerText=`${p} vs ${d}`;

update();save();
}

// LOGOUT
async function logout(){
await sb.auth.signOut();
location.reload();
}

function rand(){return Math.floor(Math.random()*6)}

// BOTONES
document.getElementById("btnRegister").onclick = register;
document.getElementById("btnLogin").onclick = login;

</script>

</body>
</html>
