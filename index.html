<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background-color: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; overflow: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass-panel { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.07); }
        
        /* Slots */
        .slot-box { height: 140px; overflow: hidden; background: linear-gradient(180deg, #000 0%, #0a0a0a 50%, #000 100%); border: 3px solid #1a1a1a; border-radius: 1.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .slot-item { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 4rem; }

        .btn-action { background: var(--mx-green); color: black; font-weight: 900; transition: all 0.3s ease; }
        .btn-action:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); }
        
        /* Auth Inputs */
        .input-auth { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 1.2rem; border-radius: 1.5rem; width: 100%; outline: none; transition: all 0.3s; }
        .input-auth:focus { border-color: var(--mx-green); background: rgba(255,255,255,0.05); }

        .hidden-view { display: none !important; }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="text-6xl font-casino italic mb-6 animate-pulse text-emerald-500">WinMX</div>
        <div class="w-64 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-900/20 via-black to-black">
        <div class="glass-panel p-10 md:p-14 rounded-[3.5rem] w-full max-w-md animate__animated animate__fadeInUp">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-casino italic mb-2">Bienvenido</h2>
                <p class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.3em]">Premium Casino Access</p>
            </div>
            
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Correo electrónico" class="input-auth text-white">
                <input id="auth-password" type="password" placeholder="Contraseña" class="input-auth text-white">
                
                <div class="grid grid-cols-2 gap-4 pt-6">
                    <button onclick="Auth.login()" class="btn-action py-5 rounded-2xl font-casino text-lg">Entrar</button>
                    <button onclick="Auth.register()" class="bg-zinc-800 hover:bg-zinc-700 py-5 rounded-2xl font-casino text-sm">Registrar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden-view opacity-0 transition-opacity duration-1000">
        <nav class="glass-panel sticky top-0 z-[100] px-6 md:px-12 py-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl font-casino italic">Win<span class="text-emerald-500">MX</span></h1>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <span class="text-[10px] text-zinc-500 font-black uppercase">Balance Total</span>
                        <div id="balance-display" class="text-2xl md:text-4xl font-casino text-white">$0.00</div>
                    </div>
                    <button onclick="Auth.logout()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                        <i class="fas fa-power-off text-xl"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 space-y-6">
                <div class="glass-panel p-8 md:p-14 rounded-[3rem] md:rounded-[4rem]">
                    <div class="grid grid-cols-3 gap-4 md:gap-8 mb-12">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    <div class="flex flex-col md:flex-row items-center justify-between gap-8 bg-black/40 p-8 rounded-[3rem]">
                        <div class="flex items-center gap-6">
                            <button onclick="Game.changeBet(-10)" class="w-14 h-14 rounded-2xl bg-zinc-800 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all text-xl"><i class="fas fa-minus"></i></button>
                            <div class="text-center min-w-[100px]"><span id="bet-display" class="text-4xl font-casino text-white">$10</span></div>
                            <button onclick="Game.changeBet(10)" class="w-14 h-14 rounded-2xl bg-zinc-800 flex items-center justify-center hover:bg-emerald-500 hover:text-black transition-all text-xl"><i class="fas fa-plus"></i></button>
                        </div>
                        <button id="spin-btn" onclick="Game.spin()" class="btn-action w-full md:w-auto px-20 py-8 rounded-[2.5rem] font-casino text-4xl italic">GIRAR</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4">
                <div class="glass-panel p-8 rounded-[3rem] min-h-[500px] flex flex-col">
                    <button onclick="UI.openModal('modal-deposit')" class="py-4 bg-emerald-500 text-black font-black rounded-2xl text-[11px] uppercase mb-8">Depositar</button>
                    <div id="history-content" class="flex-grow space-y-3 overflow-y-auto max-h-[400px]"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-[1000] flex items-center justify-center hidden p-4">
        <div class="glass-panel p-10 rounded-[3.5rem] w-full max-w-lg">
            <h2 class="font-casino text-3xl text-center mb-8 italic">Recargar <span class="text-emerald-500">Saldo</span></h2>
            <input id="dep-amount" type="number" placeholder="Monto" class="input-auth text-center text-4xl font-casino mb-8 text-white">
            <button onclick="UI.closeModal('modal-deposit')" class="btn-action w-full py-6 rounded-2xl font-casino text-xl">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed bottom-10 right-10 z-[2000] flex flex-col gap-3"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'] };

        const Auth = {
            async login() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) return UI.notify(error.message, "error");
                location.reload();
            },
            async register() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signUp({ email, password });
                if (error) return UI.notify(error.message, "error");
                UI.notify("Cuenta creada. ¡Inicia sesión!", "success");
            },
            async logout() {
                await sb.auth.signOut();
                location.reload();
            }
        };

        const Core = {
            async init() {
                let p = 0;
                const int = setInterval(() => {
                    p += 25;
                    document.getElementById('boot-bar').style.width = p + "%";
                    if(p >= 100) { clearInterval(int); this.check(); }
                }, 40);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').classList.add('opacity-0');
                setTimeout(() => document.getElementById('boot-loader').remove(), 500);

                if (session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    setTimeout(() => document.getElementById('main-app').classList.add('opacity-100'), 50);
                    this.loadData();
                } else {
                    document.getElementById('auth-view').classList.remove('hidden-view');
                }
            },
            async loadData() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if (data) { State.balance = data.saldo; UI.updateBalance(); Game.initReels(); }
            }
        };

        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    [...State.symbols, ...State.symbols, ...State.symbols].forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`);
                });
            },
            changeBet(v) { State.currentBet = Math.max(10, State.currentBet + v); document.getElementById('bet-display').innerText = `$${State.currentBet}`; },
            spin() {
                if(State.isSpinning || State.balance < State.currentBet) return UI.notify("Saldo insuficiente", "error");
                State.isSpinning = true;
                const res = [State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)], State.symbols[Math.floor(Math.random()*6)]];
                [1,2,3].forEach((id, i) => {
                    document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.symbols.indexOf(res[i]) * 140) + 840}px)`;
                });
                setTimeout(() => { 
                    State.balance -= State.currentBet; UI.updateBalance(); State.isSpinning = false; 
                    [1,2,3].forEach(id => { document.getElementById(`reel-${id}`).style.transition = 'none'; document.getElementById(`reel-${id}`).style.transform = 'translateY(0)'; setTimeout(() => document.getElementById(`reel-${id}`).style.transition = 'transform 3.5s cubic-bezier(0.15, 0, 0.05, 1)', 50); });
                }, 3500);
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString()}`; },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-5 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInUp ${t==='success'?'bg-emerald-500 text-black':'bg-red-600 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        };

        Core.init();
    </script>
</body>
</html>
