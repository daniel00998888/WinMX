        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .history-scroll { max-height: 280px; overflow-y: auto; scrollbar-width: none; }

        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }

        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
        
        #crash-rocket { transform: translate(0, 20px); position: relative; }
    </style>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const sfx = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            spin: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            winExtra: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3'),
            lose: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            rocket: new Audio('https://assets.mixkit.co/active_storage/sfx/2015/2015-preview.mp3')
        };
        const playSfx = (key) => { sfx[key].currentTime = 0; sfx[key].play().catch(() => {}); };

        let State = { user: null, balance: 0, isSpinning: false, totalSpins: 0, luckFactor: 1.0 };

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                playSfx('click');
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[viewId];
                if(navId) document.getElementById(navId).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                playSfx('click');
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.drawGrid();
                if(game === 'tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" min="1" class="input-bet"><button id="btn-slots-play" onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden-view flex justify-between items-center p-3 mb-3 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500 text-xs">1.00x</span><button id="mines-cashout-btn" onclick="GameLogic.mines.cashout()" class="bg-emerald-500 text-black px-4 py-2 rounded-lg font-bold text-[9px] font-casino tracking-tighter">COBRAR $0.00</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" min="1" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino text-xs">APOSTAR</button></div></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino italic mb-4">1.00x</div><div class="h-24 flex items-center justify-center mb-6"><div id="crash-rocket" class="text-4xl transition-all duration-100">🚀</div></div><input id="crash-bet-input" type="number" value="10" min="1" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse"></div><div id="tower-controls"><input id="tower-bet-input" type="number" value="10" min="1" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino text-xs">JUGAR</button></div><button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="hidden-view btn-action w-full py-4 font-casino text-xs">COBRAR $0.00</button></div>`
            }
        };

        const Core = {
            async init() { let p = 0; const i = setInterval(() => { p += 25; document.getElementById('boot-bar').style.width = `${p}%`; if(p >= 100) { clearInterval(i); this.check(); } }, 100); },
            async check() { const { data: { session } } = await sb.auth.getSession(); document.getElementById('boot-loader').style.display = 'none'; if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); } else { document.getElementById('auth-view').classList.remove('hidden-view'); } },
            async loadBalance() { const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle(); State.balance = data ? data.saldo : 0; UI.updateBalance(); },
            async confirmDeposit() {
                const amt = Math.abs(parseFloat(document.getElementById('dep-amount').value));
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Datos inválidos", "error");
                UI.notify("Procesando...", "success");
                const fileName = `${State.user.id}-${Date.now()}`;
                const { error: uploadError } = await sb.storage.from('comprobantes').upload(`depositos/${fileName}`, file);
                if (uploadError) return UI.notify("Error subir archivo", "error");
                const { data: urlData } = sb.storage.from('comprobantes').getPublicUrl(`depositos/${fileName}`);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending', evidence_url: urlData.publicUrl }]);
                UI.notify("En revisión", "success");
                UI.closeModal('modal-deposit');
            },
            async fetchHistory() {
                const b = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'bets').order('created_at', { ascending: false }).limit(20);
                const d = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'deposits').order('created_at', { ascending: false }).limit(20);
                document.getElementById('history-lists').innerHTML = `<div class="glass p-4 space-y-2">` + (b.data||[]).map(i => `<div class="flex justify-between text-[10px] uppercase font-bold"><span>${i.label}</span><span class="${i.amount >= 0 ? 'text-emerald-500':'text-red-500'}">$${Math.abs(i.amount).toFixed(2)}</span></div>`).join('') + `</div>`;
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); },
            copyClabe() { navigator.clipboard.writeText("722969020533491161"); UI.notify("Copiado", "success"); },
            handleFile(i) { document.getElementById('file-label').innerText = i.files[0].name; },
            notify(m, t) { const n = document.createElement('div'); n.className = `p-4 rounded-2xl text-[10px] font-bold uppercase ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`; n.innerText = m; document.getElementById('notif-container').appendChild(n); setTimeout(() => n.remove(), 3000); }
        };

        const AuthManager = {
            async login() { const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value; const { data, error } = await sb.auth.signInWithPassword({ email: e, password: p }); if(error) UI.notify(error.message, "error"); else location.reload(); },
            async register() { if(!document.getElementById('terms-check').checked) return UI.notify("Acepta términos", "error"); const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value; const { data, error } = await sb.auth.signUp({ email: e, password: p }); if(error) UI.notify(error.message, "error"); else { await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]); location.reload(); } },
            async logout() { await sb.auth.signOut(); location.reload(); },
            switchTab(tab) { document.getElementById('login-container').classList.toggle('hidden-view', tab==='register'); document.getElementById('register-container').classList.toggle('hidden-view', tab==='login'); }
        };

        const GameLogic = {
            adjustLuck(winAmount, betAmount) {
                if (winAmount > betAmount * 5) {
                    State.luckFactor = 0.7; // Reduce suerte si gana mucho
                } else {
                    State.luckFactor = Math.min(1.0, State.luckFactor + 0.05);
                }
            },
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(State.isSpinning) return;
                    const betInput = document.getElementById('slots-bet-input');
                    const bet = Math.abs(parseFloat(betInput.value)) || 10;
                    betInput.value = bet;
                    if(State.balance < bet || bet <= 0) return UI.notify("Saldo insuficiente", "error");
                    
                    const btn = document.getElementById('btn-slots-play');
                    btn.disabled = true;
                    playSfx('spin'); State.isSpinning = true; State.balance -= bet; UI.updateBalance();

                    const getSymbol = () => SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    const res = [getSymbol(), getSymbol()];
                    
                    if (res[0] === res[1] && Math.random() > State.luckFactor) {
                        res.push(SYMBOLS[(SYMBOLS.indexOf(res[0]) + 1) % SYMBOLS.length]); 
                    } else {
                        res.push(getSymbol());
                    }

                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });
                    
                    setTimeout(async () => {
                        State.isSpinning = false; btn.disabled = false;
                        let win = 0;
                        if(res[0] === res[1] && res[1] === res[2]) { win = bet * 10; State.balance += win; playSfx('win'); playSfx('winExtra'); UI.notify(`GANASTE $${win.toFixed(2)}`, "success"); } 
                        else { playSfx('lose'); UI.notify("SIGUE INTENTANDO", "error"); }
                        
                        UI.updateBalance();
                        GameLogic.adjustLuck(win, bet); 
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win > 0 ? win : -bet, label: 'SLOTS' }]);
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 10,
                multSteps: [1.25, 1.85, 2.75, 4.20, 6.50, 10.20, 16.50, 28.00, 45.00, 80.00],
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer active:scale-90 transition-all"></div>`;
                },
                start() {
                    if(this.active) return;
                    const betInput = document.getElementById('mines-bet-input');
                    const b = Math.abs(parseFloat(betInput.value)) || 10;
                    betInput.value = b;
                    if(State.balance < b || b <= 0) return UI.notify("Saldo insuficiente", "error");
                    playSfx('click'); State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.mult = 1; this.revealed = [];
                    this.mines = []; while(this.mines.length < 3) { let r = Math.floor(Math.random()*25); if(!this.mines.includes(r)) this.mines.push(r); }
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    document.getElementById('mines-mult').innerText = '1.00x';
                    document.getElementById('mines-cashout-btn').innerText = `COBRAR $0.00`;
                    this.drawGrid();
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    const winCount = this.revealed.length;
                    let dynamicFail = (0.1 + (winCount * 0.08)) / State.luckFactor;
                    if (winCount > 2 && Math.random() < dynamicFail) {
                        if (!this.mines.includes(i)) { this.mines.pop(); this.mines.push(i); }
                    }
                    this.revealed.push(i); 
                    const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        playSfx('lose'); el.innerHTML = '💣'; el.classList.add('bg-red-500/20', 'border-red-500');
                        UI.notify("SIGUE INTENTANDO", "error");
                        this.end(false);
                    } else {
                        playSfx('click'); el.innerHTML = '💎'; el.classList.add('bg-emerald-500/20', 'border-emerald-500');
                        this.mult = this.multSteps[winCount] || this.mult * 1.5;
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2) + 'x';
                        document.getElementById('mines-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                    }
                },
                async cashout() {
                    if(!this.active) return;
                    const win = this.bet * this.mult; State.balance += win; 
                    playSfx('win'); playSfx('winExtra');
                    UI.notify(`GANASTE $${win.toFixed(2)}`, "success");
                    this.end(true);
                },
                async end(win) {
                    const winAmt = win ? (this.bet * this.mult) : 0;
                    GameLogic.adjustLuck(winAmt, this.bet); 
                    this.active = false; UI.updateBalance();
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                    document.getElementById('mines-status').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win ? winAmt : -this.bet, label: 'MINAS' }]);
                }
            },
            tower: {
                level: 0, active: false, bet: 0, mult: 1,
                towerSteps: [1.45, 2.30, 3.80, 6.50, 11.20, 19.80, 35.00, 75.00],
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        let row = document.createElement('div'); row.className = "grid grid-cols-3 gap-1.5 opacity-30"; row.id = `tower-row-${i}`;
                        for(let j=0; j<3; j++) { row.innerHTML += `<div onclick="GameLogic.tower.select(${i}, ${j})" class="h-8 bg-white/5 border border-white/5 rounded-lg flex items-center justify-center cursor-pointer transition-all"></div>`; }
                        c.appendChild(row);
                    }
                },
                start() {
                    if(this.active) return;
                    const betInput = document.getElementById('tower-bet-input');
                    const b = Math.abs(parseFloat(betInput.value)) || 10;
                    betInput.value = b;
                    if(State.balance < b || b <= 0) return UI.notify("Saldo insuficiente", "error");
                    playSfx('click'); State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.level = 0; this.mult = 1;
                    this.drawTower(); document.getElementById('tower-row-0').classList.remove('opacity-30');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    const btn = document.getElementById('tower-cashout-btn'); btn.classList.remove('hidden-view'); btn.innerText = `COBRAR $0.00`;
                },
                select(r, c) {
                    if(!this.active || r !== this.level) return;
                    let failProb = (this.level > 5 ? 0.60 : this.level > 2 ? 0.45 : 0.33) / State.luckFactor;
                    const isBomb = Math.random() < failProb;
                    const items = document.getElementById(`tower-row-${r}`).children;
                    if(isBomb) {
                        playSfx('lose'); items[c].innerHTML = '💣'; items[c].classList.add('bg-red-500/20', 'border-red-500');
                        UI.notify("SIGUE INTENTANDO", "error");
                        this.end(false);
                    } else {
                        playSfx('click'); items[c].innerHTML = '💎'; items[c].classList.add('bg-emerald-500/20', 'border-emerald-500');
                        this.mult = this.towerSteps[this.level];
                        this.level++;
                        document.getElementById('tower-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                        if(this.level < 8) document.getElementById(`tower-row-${this.level}`).classList.remove('opacity-30');
                        else this.cashout();
                    }
                },
                async cashout() {
                    if(!this.active || this.level === 0) return;
                    const win = this.bet * this.mult; State.balance += win; 
                    playSfx('win'); playSfx('winExtra');
                    UI.notify(`GANASTE $${win.toFixed(2)}`, "success");
                    this.end(true);
                },
                async end(win) {
                    const winAmt = win ? (this.bet * this.mult) : 0;
                    GameLogic.adjustLuck(winAmt, this.bet); 
                    this.active = false; UI.updateBalance();
                    document.getElementById('tower-controls').classList.remove('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win ? winAmt : -this.bet, label: 'TORRE' }]);
                }
            },
            crash: {
                active: false, mult: 1, bet: 0, interval: null,
                start() {
                    if(this.active) return;
                    const betInput = document.getElementById('crash-bet-input');
                    const b = Math.abs(parseFloat(betInput.value)) || 10;
                    betInput.value = b;
                    if(State.balance < b || b <= 0) return UI.notify("Saldo insuficiente", "error");
                    playSfx('rocket'); State.balance -= b; UI.updateBalance();
                    this.active = true; this.bet = b; this.mult = 1;
                    const btn = document.getElementById('btn-crash'); 
                    btn.innerText = `RETIRAR $${this.bet.toFixed(2)}`;
                    btn.onclick = () => this.cashout();
                    const limit = (1.05 + Math.random() * 4.5) * State.luckFactor;
                    this.interval = setInterval(() => {
                        this.mult += this.mult < 2 ? 0.04 : 0.08; 
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2) + 'x';
                        document.getElementById('crash-rocket').style.transform = `translate(${this.mult * 10}px, -${this.mult * 8}px)`;
                        btn.innerText = `RETIRAR $${(this.bet * this.mult).toFixed(2)}`;
                        if(this.mult >= limit) { clearInterval(this.interval); this.explode(); }
                    }, 100);
                },
                cashout() {
                    if(!this.active) return;
                    clearInterval(this.interval);
                    const win = this.bet * this.mult; State.balance += win; 
                    playSfx('win'); playSfx('winExtra');
                    UI.notify(`GANASTE $${win.toFixed(2)}`, "success");
                    this.end(true);
                },
                explode() {
                    playSfx('lose');
                    document.getElementById('crash-mult').classList.add('text-red-500');
                    document.getElementById('crash-rocket').innerHTML = '💥';
                    UI.notify("SIGUE INTENTANDO", "error");
                    this.end(false);
                },
                async end(win) {
                    const winAmt = win ? (this.bet * this.mult) : 0;
                    GameLogic.adjustLuck(winAmt, this.bet); 
                    this.active = false; UI.updateBalance();
                    const btn = document.getElementById('btn-crash');
                    btn.innerText = "EXPLOTÓ"; btn.disabled = true;
                    setTimeout(() => {
                        btn.disabled = false; btn.innerText = "DESPEGAR"; btn.onclick = () => GameLogic.crash.start();
                        document.getElementById('crash-mult').classList.remove('text-red-500');
                        document.getElementById('crash-mult').innerText = '1.00x';
                        document.getElementById('crash-rocket').innerHTML = '🚀';
                        document.getElementById('crash-rocket').style.transform = 'translate(0, 20px)';
                    }, 3000);
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win ? winAmt : -this.bet, label: 'AVIATOR' }]);
                }
            }
        };

        Core.init();
    </script>
</body>
</html>
