        const SUPABASE_URL = "https://dakhnqriwbzihlzhtfcb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs";
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_STATE = {
            user: null, balance: 0, bet: 10, isSpinning: false, activeTab: 'game', logs: [],
            symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'],

        };

        // MOTOR DE AUDIO PROFESIONAL
        const SoundEngine = {
            ctx: null, master: null,
            init() {
                if(!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.master = this.ctx.createGain();
                    this.master.connect(this.ctx.destination);
                    this.master.gain.value = 0.3;
                }
            },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.connect(g); g.connect(this.master);
                const t = this.ctx.currentTime;
                
                if(type === 'spin-click') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t);
                    osc.frequency.exponentialRampToValueAtTime(40, t+0.1);
                    g.gain.setValueAtTime(0.04, t); g.gain.linearRampToValueAtTime(0, t+0.1);
                } else if(type === 'jackpot') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(523.25, t);
                    osc.frequency.setValueAtTime(659.25, t+0.1);
                    osc.frequency.setValueAtTime(783.99, t+0.2);
                    g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.8);
                } else {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, t);
                    g.gain.setValueAtTime(0.02, t); g.gain.linearRampToValueAtTime(0, t+0.05);
                }
                osc.start(); osc.stop(t+1);
            }
        };

        // LÓGICA DE JUEGO (CASINO CORE)
        const Casino = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    for(let i=0; i<70; i++) {
                        const s = APP_STATE.symbols[Math.floor(Math.random()*6)];
                        r.innerHTML += `<div class="symbol-unit">${s}</div>`;
                    }
                });
            },
            updateBet(val) {
                SoundEngine.play('click');
                APP_STATE.bet = Math.max(10, APP_STATE.bet + val);
                document.getElementById('bet-display').innerText = `$${APP_STATE.bet}`;
            },
            async spin() {
                if(APP_STATE.isSpinning || APP_STATE.balance < APP_STATE.bet) {
                    if(APP_STATE.balance < APP_STATE.bet) UI.toast("Saldo Insuficiente", "error");
                    return;
                }

                APP_STATE.isSpinning = true;
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;

                // Resultado Generado
                const result = [
                    APP_STATE.symbols[Math.floor(Math.random()*6)],
                    APP_STATE.symbols[Math.floor(Math.random()*6)],
                    APP_STATE.symbols[Math.floor(Math.random()*6)]
                ];

                const multiplier = APP_STATE.odds[result.join('')] || 0;
                const netGain = (APP_STATE.bet * multiplier) - APP_STATE.bet;

                // Animación de Reels
                [1,2,3].forEach((id, i) => {
                    const el = document.getElementById(`reel-${id}`);
                    const iconIdx = APP_STATE.symbols.indexOf(result[i]);
                    const travel = (iconIdx * 140) + (140 * 55);
                    el.style.transform = `translateY(-${travel}px)`;
                });

                let audioLoop = setInterval(() => SoundEngine.play('spin-click'), 160);

                setTimeout(async () => {
                    clearInterval(audioLoop);
                    if(multiplier > 0) { SoundEngine.play('jackpot'); UI.toast(`¡GANANCIA X${multiplier}!`, "success"); }
                    
                    const newBalance = APP_STATE.balance + netGain;
                    const { error } = await sb.from('usuarios').update({ saldo: newBalance }).eq('id', APP_STATE.user.id);
                    
                    if(!error) {
                        await sb.from('history').insert({
                            user_id: APP_STATE.user.id, type: 'bets', amount: netGain, label: multiplier > 0 ? `PREMIO X${multiplier}` : 'JUEGO', status: 'completed'
                        });
                        APP_STATE.balance = newBalance;
                        UI.refreshBalance();
                        Bridge.syncLogs();
                    }

                    APP_STATE.isSpinning = false;
                    btn.disabled = false;
                    this.resetReelPosition();
                }, 4800);
            },
            resetReelPosition() {
                [1,2,3].forEach(id => {
                    const el = document.getElementById(`reel-${id}`);
                    el.style.transition = 'none';
                    el.style.transform = 'translateY(0)';
                    setTimeout(() => el.style.transition = 'transform 4.8s cubic-bezier(0.1, 0, 0, 1)', 50);
                });
            }
        };

        // COMUNICACIÓN CON SUPABASE
        const Bridge = {
            async syncUserData() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', APP_STATE.user.id).single();
                if(data) { APP_STATE.balance = data.saldo; UI.refreshBalance(); }
            },
            async syncLogs() {
                const { data } = await sb.from('history').select('*').eq('user_id', APP_STATE.user.id).order('created_at', {ascending: false}).limit(30);
                APP_STATE.logs = data || [];
                UI.renderHistory();

            async sendDeposit() {
                const file = document.getElementById('evidence-file').files[0];
                const amount = parseFloat(document.getElementById('cash-amount-input').value);
                
                if(!amount || !file) return UI.toast("Datos Incompletos", "error");

                try {
                    const fileName = `${Date.now()}_${APP_STATE.user.id}.png`;
                    await sb.storage.from('comprobantes').upload(`evidence/${fileName}`, file);
                    const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(`evidence/${fileName}`);
                    
                    await sb.from('history').insert({
                        user_id: APP_STATE.user.id, type: 'deposits', amount: amount, label: 'CARGA CRÉDITO', status: 'pending', evidence_url: publicUrl
                    });

                    UI.toast("Solicitud en revisión", "success");
                    UI.toggleModal('modal-cashier', false);
                    this.syncLogs();
                } catch(e) { UI.toast("Error de Conexión", "error"); }
                finally { btn.disabled = false; btn.innerText = "Confirmar Envío"; }
            }
        };

        // INTERFAZ DE USUARIO (UX/UI)
        const UI = {
            refreshBalance() {
                document.getElementById('balance-display').innerText = `$${APP_STATE.balance.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            },
            toast(msg, type) {
                const hub = document.getElementById('notification-hub');
                const t = document.createElement('div');
                t.className = `${type === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600'} px-10 py-6 rounded-[2rem] font-black text-[11px] uppercase tracking-widest shadow-2xl animate__animated animate__fadeInRight`;
                t.innerHTML = msg;
                hub.appendChild(t);
                setTimeout(() => {
                    t.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                    setTimeout(() => t.remove(), 500);
                }, 4000);
            },
            toggleModal(id, show) {
                SoundEngine.play('click');
                const m = document.getElementById(id);
                show ? m.classList.remove('hidden') : m.classList.add('hidden');
                this.toCashStep(1);
            },
            toCashStep(s) {
                document.getElementById('cash-step-1').classList.toggle('hidden', s !== 1);
                document.getElementById('cash-step-2').classList.toggle('hidden', s !== 2);
            },
            setAmount(v) { SoundEngine.play('click'); document.getElementById('cash-amount-input').value = v; },
            copyClave() { navigator.clipboard.writeText("722969020533491161"); this.toast("Copiado con éxito", "success"); },
            switchTab(tab) {
                APP_STATE.activeTab = tab;
                document.getElementById('tab-game').className = tab === 'game' ? 'text-[10px] font-black uppercase tracking-widest text-emerald-500 border-b-2 border-emerald-500 pb-4' : 'text-[10px] font-black uppercase tracking-widest text-zinc-600 pb-4';
                document.getElementById('tab-cash').className = tab === 'cash' ? 'text-[10px] font-black uppercase tracking-widest text-emerald-500 border-b-2 border-emerald-500 pb-4' : 'text-[10px] font-black uppercase tracking-widest text-zinc-600 pb-4';
                this.renderHistory();
            },
            renderHistory() {
                const container = document.getElementById('history-list');
                container.innerHTML = '';
                const items = APP_STATE.logs.filter(l => APP_STATE.activeTab === 'game' ? l.type === 'bets' : l.type === 'deposits');
                
                items.forEach(l => {
                    const isPos = l.amount >= 0;
                    container.innerHTML += `
                        <div class="glass-premium p-6 rounded-[2.5rem] flex justify-between items-center animate__animated animate__fadeInUp">
                            <div>
                                <p class="text-[9px] font-black text-zinc-600 uppercase tracking-tighter">${l.label}</p>
                                <p class="text-[7px] text-zinc-800 font-bold mt-1">${new Date(l.created_at).toLocaleTimeString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-casino text-2xl ${l.status === 'pending' ? 'text-amber-500' : (isPos ? 'text-emerald-500' : 'text-red-500')}">${isPos ? '+' : ''}${l.amount.toFixed(2)}</p>
                                ${l.status === 'pending' ? '<span class="text-[7px] font-black text-amber-500 uppercase">En Revisión</span>' : ''}
                            </div>
                        </div>
                    `;
                });
            }
        };

        // NÚCLEO DE ARRANQUE (CORE)
        const Core = {
            async boot() {
                const bar = document.getElementById('load-progress');
                const msg = document.getElementById('load-msg');
                const steps = ["Iniciando Motor...", "Seguridad SSL...", "Sincronizando DB...", "WinMX Listo"];
                
                for(let i=0; i<=100; i+=2) {
                    bar.style.width = i + '%';
                    if(i % 25 === 0) msg.innerText = steps[i/25];
                    await new Promise(r => setTimeout(r, 40));
                }

                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    APP_STATE.user = session.user;
                    this.launchLobby();
                } else {
                    document.getElementById('auth-view').classList.remove('hidden');
                    setTimeout(() => document.getElementById('auth-view').classList.add('opacity-100'), 100);
                    this.hideLoader();
                }
            },
            async handleAuth() {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-pass').value;
                if(!email || !pass) return UI.toast("Faltan Credenciales", "error");

                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) {
                    const { data: up } = await sb.auth.signUp({ email, password: pass });
                    if(up.user) {
                        await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                        location.reload();
                    } else { UI.toast("Error de Acceso", "error"); }
                } else location.reload();
            },
            async launchLobby() {
                document.getElementById('lobby-view').classList.remove('hidden');
                setTimeout(() => document.getElementById('lobby-view').classList.add('opacity-100'), 100);
                await Bridge.syncUserData();
                await Bridge.syncLogs();
                Casino.initReels();
                this.hideLoader();
            },
            hideLoader() {
                const loader = document.getElementById('sys-loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
            },
            logout() { sb.auth.signOut(); location.reload(); }
        };

        // Event Listeners
        document.getElementById('evidence-file').addEventListener('change', (e) => {
            if(e.target.files[0]) {
                const label = document.getElementById('file-status');
                label.innerText = "✅ COMPROBANTE LISTO";
                label.classList.add('text-emerald-500');
            }
        });

        // Inicio del Sistema
        Core.boot();

    </script>
</body>
</html>
