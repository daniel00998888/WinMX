<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #0b0b0b; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        .font-casino { font-family: 'Archivo Black', sans-serif; }
        
        /* Layout Mobile */
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        /* Bottom Nav */
        .bottom-nav { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #666; transition: 0.3s; }
        .nav-item.active { color: var(--mx-green); }
        
        /* Glass UI */
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .hidden-view { display: none !important; }

        /* Slot Reels Compact */
        .slot-box { height: 100px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #222; }
        .slot-item { height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="p-4 flex justify-between items-center bg-black/50">
            <span class="font-casino italic text-lg">WIN<span class="text-emerald-500">MX</span></span>
            <div id="balance-display" class="font-casino text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-lg border border-emerald-500/20">$0.00</div>
        </header>

        <div id="view-lobby" class="view-content p-4 space-y-4">
            <h2 class="text-xs font-bold uppercase tracking-widest text-zinc-500">Juegos Destacados</h2>
            <div class="grid grid-cols-2 gap-3">
                <div onclick="openGame('slots')" class="glass p-6 text-center cursor-pointer active:scale-95 transition-transform">
                    <div class="text-3xl mb-2">🎰</div>
                    <div class="font-casino text-[10px]">SLOTS</div>
                </div>
                <div onclick="openGame('dice')" class="glass p-6 text-center cursor-pointer active:scale-95 transition-transform">
                    <div class="text-3xl mb-2">🎲</div>
                    <div class="font-casino text-[10px]">DADOS</div>
                </div>
            </div>
            <button onclick="UI.openModal('modal-deposit')" class="w-full bg-emerald-500 text-black font-casino py-4 rounded-2xl shadow-lg shadow-emerald-500/20">RECARGAR SALDO</button>
        </div>

        <div id="view-game" class="view-content hidden-view p-4">
            <button onclick="showView('lobby')" class="mb-4 text-zinc-500 text-xs font-bold"><i class="fas fa-chevron-left mr-2"></i> VOLVER</button>
            <div id="game-mount" class="w-full"></div>
        </div>

        <div id="view-history" class="view-content hidden-view p-4 space-y-6">
            <div>
                <h3 class="font-casino text-xs mb-3 text-zinc-400">Tus Apuestas</h3>
                <div id="bet-history-content" class="space-y-2"></div>
            </div>
            <hr class="border-zinc-900">
            <div>
                <h3 class="font-casino text-xs mb-3 text-zinc-400">Tus Depósitos</h3>
                <div id="dep-history-content" class="space-y-2"></div>
            </div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-16 flex items-center">
            <div onclick="showView('lobby')" id="btn-home" class="nav-item active">
                <i class="fas fa-home text-lg"></i>
                <span>Inicio</span>
            </div>
            <div onclick="showView('history')" id="btn-history" class="nav-item">
                <i class="fas fa-list text-lg"></i>
                <span>Historial</span>
            </div>
            <div onclick="AuthManager.logout()" class="nav-item text-red-900">
                <i class="fas fa-sign-out-alt text-lg"></i>
                <span>Salir</span>
            </div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/90 z-[100] hidden-view flex items-center justify-center p-4">
        <div class="glass p-6 w-full max-w-xs bg-zinc-950">
            <h2 class="font-casino text-center text-emerald-500 mb-6">RECARGAR</h2>
            <input id="dep-amount" type="number" placeholder="$0.00" class="w-full bg-transparent text-center text-4xl font-casino border-none outline-none mb-6 text-white">
            <button onclick="Core.confirmDeposit()" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-casino">ENVIAR PAGO</button>
            <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-4 text-[10px] text-zinc-500 font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        // ... (Lógica de Supabase igual al anterior) ...
        
        function showView(viewId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
            document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(viewId === 'lobby') document.getElementById('btn-home').classList.add('active');
            if(viewId === 'history') {
                document.getElementById('btn-history').classList.add('active');
                Core.fetchHistory(); // Solo carga historial cuando el usuario entra a la pestaña
            }
        }

        function openGame(gameType) {
            showView('game');
            const mount = document.getElementById('game-mount');
            // Aquí inyectas el HTML del juego específico que teníamos antes
            mount.innerHTML = `<div class="glass p-4 text-center">
                <h2 class="font-casino mb-4">${gameType.toUpperCase()}</h2>
                <div class="grid grid-cols-3 gap-2 mb-6">
                    <div class="slot-box"><div class="slot-reel">🎰</div></div>
                    <div class="slot-box"><div class="slot-reel">🎰</div></div>
                    <div class="slot-box"><div class="slot-reel">🎰</div></div>
                </div>
                <button class="w-full bg-emerald-500 text-black py-4 rounded-xl font-casino">GIRAR</button>
            </div>`;
        }

        const UI = {
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            // ... (Resto de funciones de renderizado de historial) ...
        };
    </script>
</body>
</html>
