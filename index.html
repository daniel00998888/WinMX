        .hidden-view { display: none !important; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }

        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
    </style>

                <div onclick="UI.openModal('modal-deposit')" class="btn-plus active:scale-90 transition-transform cursor-pointer"><i class="fas fa-plus"></i></div>

        <div id="view-lobby" class="view-content p-5 space-y-6">

                <h2 class="text-2xl font-casino italic text-white">Suerte hoy</h2>
                <p class="text-[9px] font-bold text-emerald-100 uppercase tracking-widest mt-1 opacity-70">Sistema Realtime 2.0 Activo</p>

                <div onclick="Router.openGame('slots')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Minas</span></div>
                <div onclick="Router.openGame('crash')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🚀</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Aviator</span></div>
                <div onclick="Router.openGame('tower')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🗼</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Torre</span></div>

        <div id="view-profile" class="view-content p-5 space-y-4 hidden-view">
            <div class="glass p-10 text-center">
                <div class="w-24 h-24 bg-emerald-500 rounded-full mx-auto mb-6 flex items-center justify-center text-black text-4xl font-black"><i class="fas fa-user"></i></div>
                <p id="user-email-display" class="text-sm font-bold text-zinc-300 truncate mb-1">Cargando...</p>
                <button onclick="AuthManager.logout()" class="w-full p-4 rounded-2xl border border-red-500/20 text-red-500 font-casino text-[10px] bg-red-500/5 mt-6">Cerrar Sesión</button>
            </div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">
            <div id="nav-lobby" onclick="Router.showView('lobby')" class="nav-item active"><i class="fas fa-gamepad text-xl mb-1"></i><span>Jugar</span></div>
            <div id="nav-history" onclick="Router.showView('history')" class="nav-item"><i class="fas fa-receipt text-xl mb-1"></i><span>Historial</span></div>
            <div id="nav-profile" onclick="Router.showView('profile')" class="nav-item"><i class="fas fa-user-circle text-xl mb-1"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm bg-[#0a0a0a]">
            <div id="dep-step-1">
                <h2 class="font-casino text-emerald-500 text-center mb-6">Monto a cargar</h2>
                <input id="dep-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-10 text-white">
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 font-casino">Continuar</button>
            </div>
            <div id="dep-step-2" class="hidden-view space-y-4 text-center">
                <div class="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20">
                    <p class="text-[8px] font-bold text-emerald-500 mb-1 uppercase">CLABE (STP)</p>
                    <span class="text-xs font-mono font-bold">722969020533491161</span>
                </div>
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="UI.handleFile(this)">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-2xl p-4 block">
                    <i class="fas fa-camera text-xl mb-1 text-zinc-600"></i>
                    <p id="file-label" class="text-[8px] font-bold text-zinc-500 uppercase">Subir Comprobante</p>

            <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-4 text-[9px] text-zinc-700 font-bold uppercase tracking-widest">Cerrar</button>
        </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        let State = { user: null, balance: 0, isSpinning: false, totalSpins: 0 };

        const AuthManager = {
            switchView(view) {
                document.getElementById('login-form').classList.toggle('hidden-view', view !== 'login');
                document.getElementById('register-form').classList.toggle('hidden-view', view !== 'register');
            },
            async login() {
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) UI.notify("Datos incorrectos", "error"); else location.reload();
            },
            async register() {
                const email = document.getElementById('reg-email').value.trim();
                const pass = document.getElementById('reg-password').value;
                const terms = document.getElementById('terms-check').checked;

                if(!email || !pass) return UI.notify("Faltan datos", "error");
                if(!terms) return UI.notify("Debes aceptar los términos", "error");

                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if(!error && data.user) {
                    await sb.from('usuarios').upsert([{ id: data.user.id, saldo: 0, email: email }]);
                    UI.notify("Cuenta creada. ¡Inicia sesión!", "success");
                    this.switchView('login');
                } else {
                    UI.notify("Error: " + error.message, "error");
                }
            },
            logout() { sb.auth.signOut().then(() => location.reload()); }
        };

        const GameLogic = {
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    const bet = parseFloat(document.getElementById('slots-bet-input').value) || 10;
                    if(State.balance < bet || State.isSpinning) return UI.notify("Saldo insuficiente", "error");
                    State.isSpinning = true; State.balance -= bet; UI.updateBalance();
                    await Core.syncBet('SLOTS', -bet);
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });
                    setTimeout(async () => {
                        State.isSpinning = false;
                        if(res[0] === res[1] && res[1] === res[2]) { 
                            const win = bet * 10; State.balance += win; UI.updateBalance(); UI.notify(`¡WIN $${win}!`, "success"); 
                            await Core.syncBet('PREMIO SLOTS', win);
                        } else UI.notify("Intenta de nuevo", "error");
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 10,
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 rounded-lg border border-white/5 flex items-center justify-center text-sm cursor-pointer"></div>`;
                },
                async start() {
                    this.bet = parseFloat(document.getElementById('mines-bet-input').value) || 10;
                    if(State.balance < this.bet) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= this.bet; UI.updateBalance();
                    await Core.syncBet('MINAS', -this.bet);
                    this.active = true; this.revealed = []; this.mult = 1;
                    this.mines = Array.from({length:25}, (_,i)=>i).sort(()=>Math.random()-0.5).slice(0,4);
                    this.drawGrid();
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    document.getElementById('mines-mult').innerText = '1.00x';
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    this.revealed.push(i); const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.classList.add('bg-red-500/20'); this.active = false; UI.notify("BOOM", "error");
                        setTimeout(() => Router.openGame('mines'), 1500);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500/20'); this.mult += 0.35;
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2)+'x';
                    }
                },
                async cashout() {
                    if(!this.active || !this.revealed.length) return;
                    const win = this.bet * this.mult; State.balance += win; UI.updateBalance();
                    UI.notify(`+$${win.toFixed(2)}`, "success"); this.active = false; 
                    await Core.syncBet('WIN MINAS', win);
                    Router.openGame('mines');
                }
            },
            crash: {
                timer: null, mult: 1, active: false, bet: 10,
                async start() {
                    this.bet = parseFloat(document.getElementById('crash-bet-input').value) || 10;
                    if(State.balance < this.bet) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= this.bet; UI.updateBalance();
                    await Core.syncBet('AVIATOR', -this.bet);
                    this.active = true; this.mult = 1;
                    const b = document.getElementById('btn-crash'); b.innerText = "COBRAR"; b.onclick = () => this.cashout();
                    const limit = 1.1 + (Math.random() * 4);
                    this.timer = setInterval(() => {
                        this.mult += 0.04; document.getElementById('crash-mult').innerText = this.mult.toFixed(2)+'x';
                        if(this.mult >= limit) { clearInterval(this.timer); this.active = false; UI.notify("CRASH", "error"); setTimeout(() => Router.openGame('crash'), 2000); }
                    }, 100);
                },
                async cashout() {
                    if(!this.active) return;
                    clearInterval(this.timer); this.active = false;
                    const win = this.bet * this.mult; State.balance += win; UI.updateBalance();
                    UI.notify(`+$${win.toFixed(2)}`, "success"); 
                    await Core.syncBet('WIN AVIATOR', win);
                    setTimeout(() => Router.openGame('crash'), 2000);
                }
            },
            tower: {
                level: 0, active: false, bet: 10,
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        c.innerHTML += `<div id="row-${i}" class="grid grid-cols-3 gap-1.5 opacity-20 pointer-events-none">
                            <div onclick="GameLogic.tower.step(${i},0)" class="bg-white/5 p-2 rounded-lg border border-white/5 text-center text-xs">?</div>
                            <div onclick="GameLogic.tower.step(${i},1)" class="bg-white/5 p-2 rounded-lg border border-white/5 text-center text-xs">?</div>
                            <div onclick="GameLogic.tower.step(${i},2)" class="bg-white/5 p-2 rounded-lg border border-white/5 text-center text-xs">?</div>
                        </div>`;
                    }
                },
                async start() {
                    this.bet = parseFloat(document.getElementById('tower-bet-input').value) || 10;
                    if(State.balance < this.bet) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= this.bet; UI.updateBalance();
                    await Core.syncBet('TORRE', -this.bet);
                    this.active = true; this.level = 0; this.drawTower(); this.unlockRow(0);
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.remove('hidden-view');
                    document.getElementById('tower-cashout-btn').innerText = `COBRAR $${this.bet.toFixed(2)}`;
                },
                unlockRow(r) { const el = document.getElementById(`row-${r}`); if(el) el.classList.remove('opacity-20', 'pointer-events-none'); },
                step(r, c) {
                    if(!this.active || r !== this.level) return;
                    const mine = Math.floor(Math.random()*3);
                    const cells = document.getElementById(`row-${r}`).children;
                    if(c === mine) { this.active = false; cells[c].innerHTML = '❌'; UI.notify("PERDISTE", "error"); setTimeout(()=>Router.openGame('tower'), 1500); }
                    else { 
                        cells[c].innerHTML = '💎'; cells[c].classList.add('bg-emerald-500/10'); this.level++; 
                        const win = this.bet * (1 + (this.level * 0.5));
                        document.getElementById('tower-cashout-btn').innerText = `COBRAR $${win.toFixed(2)}`;
                        if(this.level<8) this.unlockRow(this.level); else this.cashout(); 
                    }
                },
                async cashout() {
                    if(!this.active) return;
                    const win = this.bet * (1 + (this.level * 0.5)); State.balance += win; UI.updateBalance();
                    UI.notify(`+$${win.toFixed(2)}`, "success"); this.active = false; 
                    await Core.syncBet('WIN TORRE', win);
                    Router.openGame('tower');
                }
            }
        };

        const Router = {
            showView(v) {
                document.querySelectorAll('.view-content').forEach(el => el.classList.add('hidden-view'));
                document.getElementById(`view-${v}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                if(document.getElementById(`nav-${v}`)) document.getElementById(`nav-${v}`).classList.add('active');
                if(v === 'profile') document.getElementById('user-email-display').innerText = State.user.email;
                if(v === 'history') Core.fetchHistory();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.drawGrid();
                if(game === 'tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden flex justify-between items-center p-3 mb-3 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500 text-xs">1.00x</span><button onclick="GameLogic.mines.cashout()" class="bg-emerald-500 text-black px-3 py-1 rounded-lg font-bold text-[9px]">COBRAR</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino text-xs">APOSTAR</button></div></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino italic mb-4">1.00x</div><div class="h-24 flex items-center justify-center mb-6"><div id="crash-rocket" class="text-4xl transition-all duration-100">🚀</div></div><input id="crash-bet-input" type="number" value="10" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse overflow-y-auto max-h-[250px]"></div><div id="tower-controls"><input id="tower-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino text-xs">JUGAR</button></div><button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="hidden-view btn-action w-full py-4 font-casino text-xs">COBRAR</button></div>`
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); },
            handleFile(input) { if(input.files[0]) document.getElementById('file-label').innerText = "VOUCHER CARGADO ✅"; },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) { 
                    State.user = session.user; 
                    document.getElementById('main-app').classList.remove('hidden-view'); 
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                    State.balance = data ? data.saldo : 0; UI.updateBalance();
                } else { 
                    document.getElementById('auth-view').classList.remove('hidden-view'); 
                }
            },
            async syncBet(label, amount) {
                if(!State.user) return;
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: amount, label: label, status: 'completed' }]);
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                if(!amt || !document.getElementById('receipt-input').files[0]) return UI.notify("Sube comprobante", "error");
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending' }]);
                UI.notify("Solicitud en revisión", "success"); UI.closeModal('modal-deposit');
            },
            async fetchHistory() {
                const b = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'bets').order('created_at', { ascending: false }).limit(10);
                const d = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'deposits').order('created_at', { ascending: false }).limit(10);
                const container = document.getElementById('history-lists');
                container.innerHTML = `
                    <div class="glass p-4"><h3 class="text-[9px] font-casino mb-3">Últimas Jugadas</h3><div class="history-scroll">${this.renderList(b.data || [])}</div></div>
                    <div class="glass p-4"><h3 class="text-[9px] font-casino mb-3">Movimientos de Caja</h3><div class="history-scroll">${this.renderList(d.data || [])}</div></div>`;
            },
            renderList(items) {
                if(!items.length) return `<p class="text-[8px] text-zinc-600">Sin movimientos</p>`;
                return items.map(i => `<div class="flex justify-between border-b border-white/5 py-2"><span class="text-[9px]">${i.label} ${i.status === 'pending' ? '(⏳)' : ''}</span><span class="${i.amount >= 0 ? 'text-emerald-500' : 'text-red-500'} text-[9px] font-bold">$${i.amount.toFixed(2)}</span></div>`).join('');
            }
        };

        Core.init();
    </script>
</body>
</html>
