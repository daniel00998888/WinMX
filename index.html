<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Ultra Premium Casino Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800;900&display=swap');
        :root {
            --mx-green: #10b981;
            --mx-green-glow: rgba(16, 185, 129, 0.4);
        }
        body {
            background-color: #070707;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass-panel {
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .neon-text { text-shadow: 0 0 15px var(--mx-green-glow); }
        .reel {
            height: 160px; overflow: hidden; background: #0a0a0a;
            border: 4px solid #1a1a1a; border-radius: 2rem;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        .slot-item {
            height: 160px; display: flex; align-items: center; justify-content: center;
            font-size: 4.5rem;
        }
        .btn-action {
            background: var(--mx-green); color: black; font-weight: 900;
            transition: all 0.4s ease;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 15px 30px var(--mx-green-glow); }
    </style>
</head>
<body>

    <!-- BOOT LOADER -->
    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-7xl font-casino italic mb-6 neon-text">Win<span class="text-emerald-500">MX</span></div>
        <div class="w-64 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-panel p-14 rounded-[3rem] w-full max-w-md">
            <h2 class="text-5xl font-casino italic text-center mb-2">Win<span class="text-emerald-500">MX</span></h2>
            <p class="text-center text-zinc-500 text-sm mb-10">Ultra Premium Casino</p>
            
            <input id="auth-email" type="email" placeholder="CORREO ELECTRÓNICO" 
                   class="w-full bg-zinc-900 p-6 rounded-2xl border border-white/10 focus:border-emerald-500 outline-none mb-5 text-center">
            <input id="auth-password" type="password" placeholder="CONTRASEÑA" 
                   class="w-full bg-zinc-900 p-6 rounded-2xl border border-white/10 focus:border-emerald-500 outline-none mb-8 text-center">
            
            <button onclick="handleLogin()" 
                    class="btn-action w-full py-7 rounded-3xl font-casino text-2xl tracking-wider">ENTRAR AL CASINO</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <nav class="glass-panel sticky top-0 z-50 px-6 py-5 border-b border-white/10">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-4xl">🎰</span>
                    <h1 class="text-4xl font-casino italic tracking-tighter neon-text">WinMX</h1>
                </div>
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <span class="text-xs text-zinc-500 uppercase tracking-widest">Saldo</span>
                        <div id="balance-display" class="text-4xl font-casino text-emerald-400">$0</div>
                    </div>
                    <button onclick="logout()" class="px-6 py-3 bg-red-500/10 hover:bg-red-500/20 rounded-2xl text-red-400 transition-all">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- SLOTS -->
            <div class="lg:col-span-8">
                <div class="glass-panel p-10 rounded-[3rem]">
                    <div class="grid grid-cols-3 gap-6 mb-10">
                        <div class="reel"><div id="reel-1" class="slot-reel flex flex-col"></div></div>
                        <div class="reel"><div id="reel-2" class="slot-reel flex flex-col"></div></div>
                        <div class="reel"><div id="reel-3" class="slot-reel flex flex-col"></div></div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-6 items-center justify-center">
                        <div class="flex gap-4">
                            <button onclick="changeBet(-10)" class="w-14 h-14 rounded-2xl bg-zinc-800 hover:bg-zinc-700 text-2xl">−</button>
                            <div class="text-center min-w-[120px]">
                                <span class="text-xs text-zinc-500">APUESTA</span>
                                <div id="bet-display" class="text-4xl font-casino">$10</div>
                            </div>
                            <button onclick="changeBet(10)" class="w-14 h-14 rounded-2xl bg-zinc-800 hover:bg-zinc-700 text-2xl">+</button>
                        </div>
                        <button onclick="spin()" id="spin-btn"
                                class="btn-action px-20 py-8 rounded-3xl text-4xl font-casino tracking-wider">GIRAR</button>
                    </div>
                </div>
            </div>

            <!-- BANK & HISTORY -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-panel p-8 rounded-[3rem]">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="openBankModal()" 
                                class="py-6 bg-emerald-500 text-black font-bold rounded-3xl hover:scale-105 transition-all">DEPOSITAR</button>
                        <button onclick="openBankModal()" 
                                class="py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl transition-all">RETIRAR</button>
                    </div>
                    <button onclick="openBankModal()" class="w-full py-5 bg-zinc-800 hover:bg-zinc-700 rounded-3xl text-sm font-bold tracking-widest">VER HISTORIAL</button>
                </div>
            </div>
        </main>
    </div>

    <!-- BANK MODAL -->
    <div id="bank-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[2000]">
        <div class="glass-panel p-10 rounded-[3rem] w-full max-w-md">
            <h2 class="text-3xl font-casino text-center mb-8">🏦 Banco WinMX</h2>
            
            <div class="mb-8 text-center">
                <p class="text-zinc-400 text-sm">Saldo actual</p>
                <p id="modal-balance" class="text-5xl font-casino text-emerald-400">$0</p>
            </div>

            <!-- Depósito -->
            <div class="bg-zinc-800 rounded-3xl p-8 mb-6">
                <h3 class="text-emerald-400 font-bold mb-4">Depósito SPEI</h3>
                <input id="dep-amount" type="number" placeholder="Monto ($100 mínimo)" 
                       class="w-full bg-zinc-900 p-6 rounded-2xl text-center text-3xl mb-6">
                <button onclick="generateCLABE()" 
                        class="w-full bg-emerald-500 text-black py-6 rounded-3xl font-bold">Generar CLABE</button>

                <div id="clabe-box" class="hidden mt-6 bg-black/50 p-6 rounded-2xl text-center">
                    <p class="text-xs text-zinc-400 mb-2">CLABE para depositar</p>
                    <p id="clabe-text" class="font-mono text-2xl break-all"></p>
                    <button onclick="copyCLABE()" class="mt-4 text-emerald-400 text-sm">Copiar CLABE</button>
                </div>
            </div>

            <button onclick="confirmDepositManually()" 
                    class="w-full py-6 bg-emerald-600 hover:bg-emerald-700 rounded-3xl font-bold mb-4">Confirmar Depósito Manual</button>

            <button onclick="closeBankModal()" class="w-full py-4 text-zinc-400 hover:text-white">Cerrar</button>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let currentUser = null;
        let balance = 0;
        let currentBet = 10;

        // ==================== AUTH ====================
        async function handleLogin() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();

            if (!email || !password) return alert("Ingresa correo y contraseña");

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                const { data: signUpData, error: signUpError } = await sb.auth.signUp({ email, password });
                if (signUpError) return alert("Error: " + signUpError.message);
                alert("Cuenta creada. Revisa tu correo si es necesario.");
                return;
            }

            currentUser = data.user;
            await loadUserBalance();
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            initReels();
        }

        async function loadUserBalance() {
            if (!currentUser) return;
            const { data } = await sb.from('usuarios').select('saldo').eq('id', currentUser.id).single();
            balance = data ? data.saldo : 0;
            document.getElementById('balance-display').textContent = '$' + balance.toLocaleString('es-MX');
        }

        async function saveBalance() {
            if (!currentUser) return;
            await sb.from('usuarios').update({ saldo: balance }).eq('id', currentUser.id);
        }

        // ==================== SLOTS ====================
        function initReels() {
            const symbols = ['🍒', '💎', '7️⃣', '⭐', '🔔', '🍉'];
            [1,2,3].forEach(i => {
                const reel = document.getElementById(`reel-${i}`);
                reel.innerHTML = '';
                for (let j = 0; j < 30; j++) {
                    reel.innerHTML += `<div class="slot-item">${symbols[Math.floor(Math.random()*symbols.length)]}</div>`;
                }
            });
        }

        async function spin() {
            if (balance < currentBet) return alert("Saldo insuficiente");

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.textContent = "GIRANDO...";

            // Animación
            [1,2,3].forEach(i => {
                const reel = document.getElementById(`reel-${i}`);
                reel.style.transition = 'transform 3.2s cubic-bezier(0.25, 0.1, 0.25, 1)';
                reel.style.transform = `translateY(-${160 * 15}px)`;
            });

            setTimeout(async () => {
                const symbols = ['🍒', '💎', '7️⃣', '⭐', '🔔', '🍉'];
                const result = [
                    symbols[Math.floor(Math.random()*symbols.length)],
                    symbols[Math.floor(Math.random()*symbols.length)],
                    symbols[Math.floor(Math.random()*symbols.length)]
                ];

                // Mostrar resultado
                [1,2,3].forEach((i, idx) => {
                    const reel = document.getElementById(`reel-${i}`);
                    reel.style.transition = 'none';
                    reel.style.transform = 'translateY(0)';
                    reel.innerHTML = `<div class="slot-item">${result[idx]}</div>`;
                });

                const isWin = result[0] === result[1] && result[1] === result[2];
                const winAmount = isWin ? currentBet * 15 : 0;
                balance += winAmount - currentBet;

                await saveBalance();
                await loadUserBalance();

                if (isWin) alert(`¡GANASTE! +$${winAmount}`);
                else alert(`Perdiste $${currentBet}`);

                btn.disabled = false;
                btn.textContent = "GIRAR";
            }, 3200);
        }

        function changeBet(delta) {
            currentBet = Math.max(10, currentBet + delta);
            document.getElementById('bet-display').textContent = '$' + currentBet;
        }

        // ==================== BANCO ====================
        function openBankModal() {
            document.getElementById('modal-balance').textContent = '$' + balance.toLocaleString('es-MX');
            document.getElementById('bank-modal').classList.remove('hidden');
        }

        function closeBankModal() {
            document.getElementById('bank-modal').classList.add('hidden');
        }

        function generateCLABE() {
            const amount = parseFloat(document.getElementById('dep-amount').value);
            if (!amount || amount < 100) {
                alert("El monto mínimo de depósito es $100");
                return;
            }

            const clabe = "012" + Math.floor(100000000000000 + Math.random() * 900000000000000);
            document.getElementById('clabe-text').textContent = clabe;
            document.getElementById('clabe-box').classList.remove('hidden');
        }

        function copyCLABE() {
            const clabe = document.getElementById('clabe-text').textContent;
            navigator.clipboard.writeText(clabe);
            alert("CLABE copiada");
        }

        async function confirmDepositManually() {
            const amount = parseFloat(document.getElementById('dep-amount').value);
            if (!amount || amount < 100) return alert("Monto inválido");

            balance += amount;
            await saveBalance();
            await loadUserBalance();

            alert(`Depósito de $${amount} acreditado correctamente`);
            closeBankModal();
        }

        function logout() {
            sb.auth.signOut();
            location.reload();
        }

        // Inicialización
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await loadUserBalance();
                initReels();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
