<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX App</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        
        /* Layout */
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .hidden-view { display: none !important; }

        /* Navigation */
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; transition: 0.2s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }

        /* UI Elements */
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1rem; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }

        /* Games Specific */
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 0.8rem; border: 1px solid #222; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .die { width: 55px; height: 55px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: black; font-weight: 900; }
        .animate-roll { animation: roll 0.2s linear infinite; }
        @keyframes roll { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Scroll */
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="antialiased select-none">

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-black">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-casino mb-8 italic">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-3">
                <input id="auth-email" type="email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <input id="auth-password" type="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none">
                <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino">Entrar</button>
                <button onclick="AuthManager.register()" class="w-full py-2 text-zinc-600 text-[10px] font-bold uppercase">Crear Cuenta</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        
        <header class="p-4 flex justify-between items-center bg-black/40 border-b border-white/5">
            <span class="font-casino italic text-lg tracking-tighter">WIN<span class="text-emerald-500">MX</span></span>
            <div id="balance-display" class="font-casino text-emerald-500 bg-emerald-500/10 px-4 py-1.5 rounded-full border border-emerald-500/20 text-sm">$0.00</div>
        </header>

        <div id="view-lobby" class="view-content p-4 space-y-6">
            <div class="bg-gradient-to-br from-emerald-600 to-emerald-900 p-6 rounded-[2rem] shadow-xl shadow-emerald-900/20">
                <p class="text-[10px] font-bold text-emerald-200 uppercase tracking-widest mb-1">Bienvenido de nuevo</p>
                <h2 class="text-2xl font-casino italic">¡Suerte hoy!</h2>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div onclick="Router.openGame('slots')" class="glass p-5 text-center active:scale-95 transition-transform">
                    <span class="text-3xl block mb-2">🎰</span>
                    <span class="font-casino text-[9px] text-zinc-400">Slots MX</span>
                </div>
                <div onclick="Router.openGame('dice')" class="glass p-5 text-center active:scale-95 transition-transform">
                    <span class="text-3xl block mb-2">🎲</span>
                    <span class="font-casino text-[9px] text-zinc-400">Lucky Dice</span>
                </div>
                <div onclick="Router.openGame('roulette')" class="glass p-5 text-center active:scale-95 transition-transform">
                    <span class="text-3xl block mb-2">🎡</span>
                    <span class="font-casino text-[9px] text-zinc-400">Roulette</span>
                </div>
                <div onclick="Router.openGame('chests')" class="glass p-5 text-center active:scale-95 transition-transform">
                    <span class="text-3xl block mb-2">🏴‍☠️</span>
                    <span class="font-casino text-[9px] text-zinc-400">Cofres</span>
                </div>
            </div>

            <button onclick="UI.openModal('modal-deposit')" class="btn-action w-full py-5 text-lg font-casino shadow-lg shadow-emerald-500/20">Recargar Saldo</button>
        </div>

        <div id="view-game" class="view-content hidden-view p-4">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-500 text-[10px] font-bold uppercase"><i class="fas fa-arrow-left mr-2"></i> Volver al Lobby</button>
            <div id="game-mount" class="w-full"></div>
        </div>

        <div id="view-history" class="view-content hidden-view p-4 space-y-6">
            <div>
                <h3 class="font-casino text-[10px] text-zinc-500 mb-3 tracking-widest">Historial de Apuestas</h3>
                <div id="bet-history-content" class="space-y-2"></div>
            </div>
            <div class="pt-4 border-t border-zinc-900">
                <h3 class="font-casino text-[10px] text-zinc-500 mb-3 tracking-widest">Depósitos Recientes</h3>
                <div id="dep-history-content" class="space-y-2"></div>
            </div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-6">
            <div onclick="Router.showView('lobby')" id="nav-home" class="nav-item active">
                <i class="fas fa-th-large text-xl mb-1"></i>
                <span>Lobby</span>
            </div>
            <div onclick="Router.showView('history')" id="nav-history" class="nav-item">
                <i class="fas fa-receipt text-xl mb-1"></i>
                <span>Historial</span>
            </div>
            <div onclick="AuthManager.logout()" class="nav-item text-red-900/50">
                <i class="fas fa-power-off text-xl mb-1"></i>
                <span>Salir</span>
            </div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm bg-zinc-950">
            <div id="dep-step-1">
                <h2 class="font-casino text-emerald-500 text-center mb-6">Monto a Recargar</h2>
                <input id="dep-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-8 text-white">
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 font-casino">Continuar</button>
            </div>
            <div id="dep-step-2" class="hidden-view space-y-4 text-center">
                <div class="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20">
                    <p class="text-[9px] font-bold text-emerald-500 uppercase">CLAVE STP</p>
                    <p class="text-md font-mono font-bold select-all">722 969 020 533 491 161</p>
                </div>
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="UI.handleFile(this)">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-xl p-6 flex flex-col items-center cursor-pointer">
                    <i class="fas fa-camera text-xl mb-2 text-zinc-500"></i>
                    <p id="file-label" class="text-[9px] font-bold text-zinc-500 uppercase">Subir Comprobante</p>
                </label>
                <button id="final-dep-btn" onclick="Core.confirmDeposit()" class="btn-action w-full py-4 font-casino">Confirmar</button>
            </div>
            <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-4 text-[9px] text-zinc-600 font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed top-4 left-4 right-4 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, totalSpins: 0 };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navMap = { 'lobby': 'nav-home', 'history': 'nav-history' };
                if(navMap[viewId]) document.getElementById(navMap[viewId]).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                UI.updateBetDisplay();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><div class="flex items-center justify-between bg-black/50 p-3 rounded-xl mb-4"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-lg">-</button><span class="bet-val font-casino text-xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-lg">+</button></div><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                dice: `<div class="glass p-8 text-center animate__animated animate__fadeIn"><div class="flex justify-center gap-4 mb-8"><div id="die-1" class="die">1</div><div id="die-2" class="die">1</div></div><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="GameLogic.dice.play('under')" class="bg-blue-500/20 border border-blue-500/50 py-4 rounded-xl font-bold text-[10px]">MENOR 7</button><button onclick="GameLogic.dice.play('over')" class="bg-red-500/20 border border-red-500/50 py-4 rounded-xl font-bold text-[10px]">MAYOR 7</button></div><div class="bg-black/50 p-3 rounded-xl flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-lg">-</button><span class="bet-val font-casino text-xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-lg">+</button></div></div>`,
                roulette: `<div class="glass p-8 text-center animate__animated animate__fadeIn"><div id="wheel" class="w-24 h-24 bg-zinc-900 rounded-full mx-auto mb-6 border-4 border-emerald-500 flex items-center justify-center text-3xl font-casino">?</div><div class="grid grid-cols-2 gap-2 mb-4"><button onclick="GameLogic.roulette.play('red')" class="bg-red-600 py-4 rounded-xl font-bold text-[10px]">ROJO</button><button onclick="GameLogic.roulette.play('black')" class="bg-zinc-800 py-4 rounded-xl font-bold text-[10px]">NEGRO</button></div><div class="bg-black/50 p-3 rounded-xl flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-lg">-</button><span class="bet-val font-casino text-xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-lg">+</button></div></div>`,
                chests: `<div class="glass p-8 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div onclick="GameLogic.chests.play(0)" class="bg-zinc-900 p-5 rounded-xl text-3xl">🎁</div><div onclick="GameLogic.chests.play(1)" class="bg-zinc-900 p-5 rounded-xl text-3xl">🎁</div><div onclick="GameLogic.chests.play(2)" class="bg-zinc-900 p-5 rounded-xl text-3xl">🎁</div></div><div class="bg-black/50 p-3 rounded-xl flex justify-between items-center"><button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-lg">-</button><span class="bet-val font-casino text-xl">$10</span><button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-lg">+</button></div></div>`
            }
        };

        const GameLogic = {
            changeBet(v) { State.currentBet = Math.max(10, State.currentBet + v); UI.updateBetDisplay(); },
            async startSpin() {
                if(State.isSpinning || State.balance < State.currentBet) { UI.notify("Saldo insuficiente", "error"); return false; }
                State.isSpinning = true; State.balance -= State.currentBet; UI.updateBalance();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async endSpin(winAmt, label) {
                if(winAmt > 0) {
                    State.balance += winAmt;
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    UI.notify(`¡GANASTE $${winAmt}!`, "success"); UI.updateBalance();
                }
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: winAmt - State.currentBet, label: label, status: 'completed' }]);
                State.isSpinning = false;
            },
            slots: {
                init() {
                    [1,2,3].forEach(id => {
                        const r = document.getElementById(`reel-${id}`); r.innerHTML = '';
                        Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`);
                    });
                },
                async play() {
                    if(!await GameLogic.startSpin()) return;
                    State.totalSpins++; const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    const pay = { '7️⃣7️⃣7️⃣': 500, '💎💎💎': 100, '⭐️⭐️⭐️': 50, '🔔🔔🔔': 20, '🍋🍋🍋': 10, '🍒🍒🍒': 5 };
                    const mult = pay[res.join('')] || 0;
                    [1,2,3].forEach((id, i) => {
                        const reel = document.getElementById(`reel-${id}`);
                        const pos = (State.totalSpins * 90 * 12) + (SYMBOLS.indexOf(res[i]) * 90);
                        reel.style.transform = `translateY(-${pos}px)`;
                    });
                    setTimeout(() => GameLogic.endSpin(State.currentBet * mult, mult > 0 ? 'SLOTS WIN' : 'SLOTS'), 3500);
                }
            },
            dice: {
                async play(choice) {
                    if(!await GameLogic.startSpin()) return;
                    const d1 = document.getElementById('die-1'); const d2 = document.getElementById('die-2');
                    d1.classList.add('animate-roll'); d2.classList.add('animate-roll');
                    setTimeout(() => {
                        d1.classList.remove('animate-roll'); d2.classList.remove('animate-roll');
                        const v1 = Math.floor(Math.random()*6)+1, v2 = Math.floor(Math.random()*6)+1, sum = v1 + v2;
                        d1.innerText = v1; d2.innerText = v2;
                        const win = (choice === 'under' && sum < 7) || (choice === 'over' && sum > 7);
                        GameLogic.endSpin(win ? State.currentBet * 2 : 0, win ? 'DICE WIN' : 'DICE');
                    }, 1500);
                }
            },
            roulette: {
                async play(color) {
                    if(!await GameLogic.startSpin()) return;
                    const w = document.getElementById('wheel'); w.classList.add('animate-roll');
                    setTimeout(() => {
                        w.classList.remove('animate-roll'); const n = Math.floor(Math.random()*15);
                        const resCol = n === 0 ? 'green' : (n % 2 === 0 ? 'red' : 'black');
                        w.innerText = n; w.className = `w-24 h-24 rounded-full mx-auto mb-6 border-4 flex items-center justify-center text-3xl font-casino ${resCol === 'red' ? 'border-red-500' : 'border-zinc-500'}`;
                        const win = color === resCol;
                        GameLogic.endSpin(win ? State.currentBet * 2 : 0, win ? 'ROULETTE WIN' : 'ROULETTE');
                    }, 2000);
                }
            },
            chests: {
                async play(idx) {
                    if(!await GameLogic.startSpin()) return;
                    const results = [0, 2, 10].sort(() => Math.random() - 0.5);
                    GameLogic.endSpin(State.currentBet * results[idx], results[idx] > 0 ? 'CHEST WIN' : 'CHEST');
                }
            }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) return UI.notify(error.message, 'error'); location.reload();
            },
            async register() {
                const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
                const { error } = await sb.auth.signUp({ email: e, password: p });
                if(error) return UI.notify(error.message, 'error'); UI.notify("Cuenta creada", "success");
            },
            logout() { sb.auth.signOut(); location.reload(); }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    this.load();
                } else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async load() {
                let { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                if(!data) { await sb.from('usuarios').insert([{ id: State.user.id, email: State.user.email, saldo: 0 }]); State.balance = 0; }
                else { State.balance = data.saldo; }
                UI.updateBalance();
            },
            async fetchHistory() {
                const bets = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'bets').order('created_at', { ascending: false }).limit(10);
                const deps = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'deposits').order('created_at', { ascending: false }).limit(10);
                UI.renderList('bet-history-content', bets.data || []);
                UI.renderList('dep-history-content', deps.data || []);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value), file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Faltan datos", "error");
                document.getElementById('final-dep-btn').disabled = true;
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPÓSITO', status: 'pending', evidence_url: publicUrl }]);
                UI.notify("Enviado para revisión", "success"); UI.closeModal('modal-deposit');
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toLocaleString()}`; },
            updateBetDisplay() { document.querySelectorAll('.bet-val').forEach(el => el.innerText = `$${State.currentBet}`); },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-bold uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); },
            handleFile(i) { if(i.files[0]) document.getElementById('file-label').innerText = "RECIBO CARGADO ✅"; },
            renderList(id, data) {
                const c = document.getElementById(id);
                c.innerHTML = data.map(i => `<div class="p-4 glass flex justify-between items-center"><div class="text-[10px] font-bold ${i.status === 'pending' ? 'text-yellow-500' : (i.amount >= 0 ? 'text-emerald-500' : 'text-zinc-600')}">${i.label} ${i.status === 'pending' ? '⏳' : ''}</div><div class="font-casino text-xs">${i.amount >= 0 ? '+' : ''}$${Math.abs(i.amount)}</div></div>`).join('');
                if(!data.length) c.innerHTML = '<p class="text-[10px] text-zinc-700 text-center py-4">Sin actividad</p>';
            }
        };

        Core.init();
    </script>
</body>
</html>
