<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Professional Casino System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        :root { --mx-green: #10b981; --mx-dark: #050505; --mx-card: #0f0f0f; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; }
        
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--mx-green); color: black; transition: 0.3s; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 35px rgba(16, 185, 129, 0.4); }
        
        /* CORRECCIÓN DE RODILLOS: Alineación Perfecta */
        .slot-box { height: 150px; overflow: hidden; background: #000; border: 3px solid #1a1a1a; border-radius: 2rem; position: relative; }
        .slot-box::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 30px #000; pointer-events: none; }
        
        .slot-reel { transition: transform 3s cubic-bezier(0.15, 0, 0.05, 1); display: flex; flex-direction: column; align-items: center; }
        .slot-item { height: 150px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 4rem; user-select: none; }

        /* Estilo de Pestañas (Tabs) */
        .tab-btn { padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #555; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--mx-green); border-bottom: 2px solid var(--mx-green); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div id="loading" class="fixed inset-0 bg-black flex items-center justify-center z-[9999] hidden">
        <div class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-12 rounded-[3.5rem] w-full max-w-md text-center border-b-[10px] border-emerald-600">
            <h2 class="text-7xl font-casino italic mb-2 tracking-tighter uppercase">Win<span class="text-emerald-500">MX</span></h2>
            <p class="text-zinc-600 text-[10px] tracking-[0.5em] font-black mb-12 uppercase">Royal Digital Casino</p>
            <input id="auth-email" type="email" placeholder="USUARIO / EMAIL" class="w-full bg-black p-5 rounded-2xl border border-white/10 outline-none focus:border-emerald-500 text-white font-bold mb-6 text-center">
            <button onclick="handleQuickAccess()" class="btn-primary w-full py-6 rounded-2xl font-black uppercase italic text-sm tracking-widest">Entrar a Ganar</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
            <h1 class="text-4xl font-casino italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h1>
            <div class="flex items-center gap-6">
                <div onclick="openBankPanel()" class="flex flex-col items-end cursor-pointer">
                    <span class="text-[9px] text-zinc-500 font-black uppercase">Balance de Cuenta</span>
                    <span id="balance-display" class="text-3xl font-casino text-emerald-400 leading-none">$1,000.00</span>
                </div>
                <button onclick="openBankPanel()" class="w-12 h-12 rounded-2xl bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 hover:bg-emerald-500 hover:text-black transition">
                    <i class="fas fa-wallet text-xl"></i>
                </button>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-zinc-900 text-zinc-600 hover:bg-red-600 hover:text-white transition">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-10 pt-10">
            
            <div class="lg:col-span-7">
                <div class="glass p-10 rounded-[4rem] relative shadow-2xl">
                    <div class="flex justify-between items-center mb-10">
                        <span class="bg-emerald-500/10 text-emerald-500 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-emerald-500/20">Live Casino</span>
                        <div class="flex gap-2">
                            <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
                            <span class="text-[10px] font-bold text-zinc-500 uppercase">Jackpot: $50,000</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-6 mb-12">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>

                    <div class="flex flex-col items-center gap-8">
                        <div class="flex items-center gap-8 bg-black/80 p-4 rounded-[2.5rem] border border-white/5">
                            <button onclick="changeBet(-50)" class="w-14 h-14 rounded-full bg-zinc-900 font-black text-xl hover:bg-emerald-500 hover:text-black transition">-</button>
                            <div class="text-center min-w-[120px]">
                                <span class="text-[9px] text-zinc-500 font-black uppercase mb-1 block">Apuesta</span>
                                <span id="bet-display" class="text-4xl font-casino">$10</span>
                            </div>
                            <button onclick="changeBet(50)" class="w-14 h-14 rounded-full bg-zinc-900 font-black text-xl hover:bg-emerald-500 hover:text-black transition">+</button>
                        </div>
                        <button id="spin-btn" onclick="spin()" class="btn-primary w-full py-8 rounded-[2.5rem] font-casino text-4xl uppercase italic tracking-tighter shadow-emerald-500/10">Jugar Ahora</button>
                    </div>
                </div>
            </div>

            <div id="bank-section" class="lg:col-span-5 space-y-8">
                <div class="glass p-8 rounded-[3.5rem] flex flex-col h-full border border-white/5">
                    
                    <h2 class="font-casino text-2xl mb-8 flex items-center gap-3"><i class="fas fa-university text-emerald-500"></i> BANCO WINMX</h2>
                    
                    <div class="grid grid-cols-2 gap-4 mb-10">
                        <button onclick="showTransactionModal('deposit')" class="p-6 rounded-3xl bg-zinc-950 border border-emerald-500/10 hover:border-emerald-500 transition group">
                            <i class="fas fa-plus-circle text-emerald-500 text-3xl mb-2 block group-hover:scale-110 transition"></i>
                            <span class="text-[10px] font-black uppercase">Ingresar Fondos</span>
                        </button>
                        <button onclick="showTransactionModal('withdraw')" class="p-6 rounded-3xl bg-zinc-950 border border-red-500/10 hover:border-red-500 transition group">
                            <i class="fas fa-minus-circle text-red-500 text-3xl mb-2 block group-hover:scale-110 transition"></i>
                            <span class="text-[10px] font-black uppercase">Retirar Ganancias</span>
                        </button>
                    </div>

                    <div class="flex justify-between border-b border-white/5 mb-6">
                        <button onclick="switchTab('tab-bets')" id="btn-tab-bets" class="tab-btn active">Apuestas</button>
                        <button onclick="switchTab('tab-deposits')" id="btn-tab-deposits" class="tab-btn">Depósitos</button>
                        <button onclick="switchTab('tab-withdraws')" id="btn-tab-withdraws" class="tab-btn">Retiros</button>
                    </div>

                    <div class="flex-grow overflow-y-auto max-h-[450px] space-y-3 custom-scroll pr-2">
                        <div id="tab-bets" class="tab-content space-y-3"></div>
                        <div id="tab-deposits" class="tab-content hidden space-y-3"></div>
                        <div id="tab-withdraws" class="tab-content hidden space-y-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-bank" class="fixed inset-0 bg-black/95 backdrop-blur-xl flex items-center justify-center z-[100] hidden p-6">
        <div class="glass p-12 rounded-[4rem] w-full max-w-sm text-center border border-white/10">
            <h2 id="modal-title" class="font-casino text-4xl mb-2 uppercase italic text-emerald-500">DEPOSITAR</h2>
            <p class="text-zinc-600 text-[10px] font-black tracking-widest mb-10 uppercase">Transacción Segura</p>
            <input id="modal-amount" type="number" placeholder="0.00" class="w-full bg-transparent text-center text-6xl font-casino outline-none border-b-2 border-white/10 focus:border-emerald-500 text-white py-4 mb-10">
            <button onclick="executeTransaction()" class="btn-primary w-full py-6 rounded-3xl font-black uppercase italic tracking-widest text-sm mb-4">Confirmar</button>
            <button onclick="closeBankModal()" class="text-zinc-500 text-[10px] font-black uppercase hover:text-white transition">Cancelar</button>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        let balance = 1000.00;
        let currentBet = 10;
        let currentAction = 'deposit'; 
        const symbols = ['💎', '🍋', '🍒', '🔔', '⭐️', '7️⃣'];

        // --- AUTH ---
        async function handleQuickAccess() {
            const email = document.getElementById('auth-email').value;
            if(!email) return;
            toggleLoading(true);
            const { data, error } = await sb.auth.signUp({ email, password: 'winmx_system_key' });
            if(error && error.message.includes("already registered")) {
                await sb.auth.signInWithPassword({ email, password: 'winmx_system_key' });
            }
            toggleLoading(false);
            initApp();
        }

        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            setupReels();
            updateUI();
        }

        // --- SISTEMA DE TABS ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById('btn-' + tabId).classList.add('active');
        }

        // --- BANCO ---
        function openBankPanel() {
            document.getElementById('bank-section').scrollIntoView({ behavior: 'smooth' });
        }

        function showTransactionModal(type) {
            currentAction = type;
            document.getElementById('modal-title').innerText = type === 'deposit' ? 'DEPOSITAR' : 'RETIRAR';
            document.getElementById('modal-title').className = `font-casino text-4xl mb-2 uppercase italic ${type==='deposit'?'text-emerald-500':'text-red-500'}`;
            document.getElementById('modal-bank').classList.remove('hidden');
        }

        function closeBankModal() {
            document.getElementById('modal-bank').classList.add('hidden');
            document.getElementById('modal-amount').value = '';
        }

        function executeTransaction() {
            const amount = parseFloat(document.getElementById('modal-amount').value);
            if(!amount || amount <= 0) return alert("MONTO INVÁLIDO");

            if(currentAction === 'withdraw' && amount > balance) return alert("SALDO INSUFICIENTE");

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if(currentAction === 'deposit') {
                balance += amount;
                addLog('tab-deposits', `Depósito Exitoso`, amount, 'text-emerald-500', 'fa-plus', time);
            } else {
                balance -= amount;
                addLog('tab-withdraws', `Retiro Procesado`, amount, 'text-red-500', 'fa-minus', time);
            }

            updateUI();
            closeBankModal();
        }

        function addLog(tabId, title, amount, color, icon, time) {
            const container = document.getElementById(tabId);
            const html = `
                <div class="bg-zinc-950 p-4 rounded-3xl border border-white/5 flex justify-between items-center animate-in slide-in-from-right duration-300">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center"><i class="fas ${icon} ${color} text-[8px]"></i></div>
                        <div>
                            <span class="text-[7px] text-zinc-600 font-black block uppercase">${time}</span>
                            <span class="text-[9px] font-bold text-zinc-300 uppercase">${title}</span>
                        </div>
                    </div>
                    <span class="font-casino ${color} text-lg tracking-tighter">$${amount.toLocaleString()}</span>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', html);
        }

        // --- LÓGICA DE SLOTS REFORZADA ---
        function setupReels() {
            [1, 2, 3].forEach(id => {
                const reel = document.getElementById(`reel-${id}`);
                reel.innerHTML = '';
                // Creamos 60 items para asegurar una rotación fluida
                for(let i=0; i<60; i++) {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.innerText = symbols[i % symbols.length];
                    reel.appendChild(item);
                }
                // Posición inicial: siempre en un símbolo limpio
                reel.style.transform = `translateY(0px)`;
            });
        }

        function spin() {
            if(balance < currentBet) return alert("SALDO INSUFICIENTE");
            
            balance -= currentBet;
            updateUI();

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            addLog('tab-bets', 'Apuesta Slot', currentBet, 'text-zinc-500', 'fa-dice', time);

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "GIRANDO...";

            const results = [];
            [1, 2, 3].forEach((id) => {
                const reel = document.getElementById(`reel-${id}`);
                const randomIndex = Math.floor(Math.random() * symbols.length);
                
                // CÁLCULO DE PRECISIÓN: 
                // Cada símbolo mide 150px. Para que quede centrado, multiplicamos el índice por 150.
                // Sumamos 3000px (20 símbolos de buffer) para que de muchas vueltas antes de parar.
                const extraSpins = 3000; 
                const finalPos = (randomIndex * 150) + extraSpins;
                
                reel.style.transform = `translateY(-${finalPos}px)`;
                results.push(symbols[randomIndex]);
            });

            setTimeout(() => {
                let win = 0;
                if(results[0] === results[1] && results[1] === results[2]) {
                    win = currentBet * 30;
                } else if(results[0] === results[1] || results[1] === results[2]) {
                    win = currentBet * 3;
                }

                if(win > 0) {
                    balance += win;
                    addLog('tab-bets', '¡GANANCIA!', win, 'text-yellow-400', 'fa-trophy', time);
                    alert("¡GANASTE! $" + win);
                }

                updateUI();
                btn.disabled = false;
                btn.innerText = "Jugar Ahora";

                // Resetear posición suavemente para el siguiente giro sin que se note el salto
                // (Opcional, pero ayuda a que el motor no se fatigue con números gigantes)
            }, 3100);
        }

        function changeBet(val) {
            currentBet = Math.max(10, currentBet + val);
            document.getElementById('bet-display').innerText = `$${currentBet}`;
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function toggleLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        async function logout() { await sb.auth.signOut(); location.reload(); }

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if(session) initApp();
        };
    </script>
</body>
</html>
