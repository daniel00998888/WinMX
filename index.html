<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .btn-action:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
        .risk-badge { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; margin-bottom: 10px; }
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden"><div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div></div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-black">
        <div id="login-container" class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-casino mb-10 italic">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-white">
                <input id="login-password" type="password" placeholder="Pass" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-white">
                <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino">Entrar</button>
                <button onclick="AuthManager.switchTab('register')" class="text-zinc-500 text-[10px] mt-4 underline">Registrarse</button>
            </div>
        </div>
        <div id="register-container" class="hidden-view glass p-8 w-full max-w-sm text-center">
             <h2 class="text-2xl font-casino mb-6 text-emerald-500">Registro</h2>
             <input id="reg-email" type="email" placeholder="Email" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-white mb-4">
             <input id="reg-password" type="password" placeholder="Pass" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-white mb-4">
             <button onclick="AuthManager.register()" class="btn-action w-full py-4 font-casino">Crear Cuenta</button>
             <button onclick="AuthManager.switchTab('login')" class="text-zinc-500 text-[10px] mt-4 underline">Volver</button>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        <header class="p-5 flex justify-between items-center border-b border-white/5">
            <span class="font-casino italic text-xl">WIN<span class="text-emerald-500">MX</span></span>
            <div class="balance-pill">
                <span id="balance-display" class="font-casino text-emerald-500 text-lg">$0.00</span>
                <div onclick="UI.openModal('modal-deposit')" class="btn-plus cursor-pointer"><i class="fas fa-plus"></i></div>
            </div>
        </header>

        <div id="view-lobby" class="view-content p-5 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="Router.openGame('slots')" class="glass p-6 text-center">🎰<span class="font-casino text-[9px] block">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center">💣<span class="font-casino text-[9px] block">Minas</span></div>
                <div onclick="Router.openGame('crash')" class="glass p-6 text-center">🚀<span class="font-casino text-[9px] block">Aviator</span></div>
                <div onclick="Router.openGame('tower')" class="glass p-6 text-center">🗼<span class="font-casino text-[9px] block">Torre</span></div>
            </div>
        </div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-600 text-[10px] font-bold uppercase"><i class="fas fa-arrow-left"></i> Volver</button>
            <div id="game-mount"></div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">
            <div onclick="Router.showView('lobby')" class="nav-item active"><i class="fas fa-gamepad"></i><span>Jugar</span></div>
            <div onclick="AuthManager.logout()" class="nav-item"><i class="fas fa-sign-out-alt"></i><span>Salir</span></div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm">
            <input id="dep-amount" type="number" placeholder="$Monto" class="w-full bg-transparent text-center text-4xl font-casino text-white mb-6">
            <button onclick="UI.notify('Depósito simulado', 'success'); UI.closeModal('modal-deposit')" class="btn-action w-full py-4 font-casino">Depositar</button>
            <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-4 text-[9px] text-zinc-500">CERRAR</button>
        </div>
    </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200]"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        let State = { 
            user: null, 
            balance: 0, 
            isSpinning: false, 
            totalSpins: 0,
            // NUEVO: heat (Calor de la cuenta). 0 = normal, 100 = racha muy alta.
            heat: 0 
        };

        const sfx = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            spin: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            lose: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3')
        };
        const playSfx = (k) => { try{ sfx[k].currentTime=0; sfx[k].play(); }catch(e){} };

        // LÓGICA DE PROBABILIDAD DINÁMICA
        const Probability = {
            // Se llama después de cada apuesta
            adjust(winMult) {
                if(winMult >= 10) {
                    State.heat = Math.min(100, State.heat + (winMult * 1.5)); // Sube el "calor"
                } else if(winMult <= 0) {
                    State.heat = Math.max(0, State.heat - 10); // Enfría la cuenta si pierde
                }
            },
            // Obtiene el factor de riesgo actual. 0 = nada, 1 = riesgo extra.
            getRiskFactor() {
                // Si el calor es bajo, no hay riesgo.
                if(State.heat < 20) return 0;
                // El factor escala con el calor, pero siempre deja un 10% de probabilidad de ignorarlo (suerte pura)
                if(Math.random() < 0.10) return 0;
                return State.heat / 250; // Retorna un valor sutil (máximo ~0.4 de riesgo extra)
            }
        };

        const Router = {
            showView(id) {
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${id}`).classList.remove('hidden-view');
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game==='slots') GameLogic.slots.init();
                if(game==='mines') GameLogic.mines.drawGrid();
                if(game==='tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet" type="number" value="10" class="input-bet"><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div class="risk-badge">3 Minas</div><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden-view mb-3"><button id="mines-cashout-btn" onclick="GameLogic.mines.cashout()" class="btn-action w-full py-3 font-casino">COBRAR $0</button></div><div id="mines-controls"><input id="mines-bet" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino">APOSTAR</button></div></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse"></div><div id="tower-controls"><input id="tower-bet" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino">JUGAR</button></div><button id="tower-cashout" onclick="GameLogic.tower.cashout()" class="hidden-view btn-action w-full py-4 font-casino">COBRAR</button></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino mb-4">1.00x</div><div id="crash-rocket" class="text-4xl mb-6">🚀</div><input id="crash-bet" type="number" value="10" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`
            }
        };

        const GameLogic = {
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(State.isSpinning) return;
                    const bet = parseFloat(document.getElementById('slots-bet').value);
                    if(State.balance < bet) return UI.notify("Saldo insuficiente", "error");
                    State.isSpinning = true; State.balance -= bet; UI.updateBalance(); playSfx('spin');

                    // Lógica sutil: El riesgo afecta si salen 3 iguales
                    const risk = Probability.getRiskFactor();
                    let forceLose = (Math.random() < risk * 1.5);
                    let res = forceLose ? [SYMBOLS[0], SYMBOLS[1], SYMBOLS[2]] : [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    
                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });
                    
                    setTimeout(async () => {
                        State.isSpinning = false;
                        let win = (res[0] === res[1] && res[1] === res[2]) ? bet * 10 : 0;
                        if(win > 0) { State.balance += win; UI.notify("¡GANASTE!", "success"); playSfx('win'); } else { playSfx('lose'); }
                        Probability.adjust(win/bet); UI.updateBalance();
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 0,
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer"></div>`;
                },
                start() {
                    const b = parseFloat(document.getElementById('mines-bet').value);
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    this.active = true; this.bet = b; this.mult = 1; this.revealed = []; State.balance -= b; UI.updateBalance();
                    this.mines = []; while(this.mines.length < 3) { let r = Math.floor(Math.random()*25); if(!this.mines.includes(r)) this.mines.push(r); }
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    this.drawGrid();
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    this.revealed.push(i);
                    const risk = Probability.getRiskFactor();
                    // Si hay riesgo alto, la mina tiene un pequeño % de "moverse" a donde el usuario tocó
                    if(Math.random() < risk && !this.mines.includes(i)) {
                        this.mines.pop(); this.mines.push(i);
                    }
                    const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.classList.add('bg-red-500/20'); this.end(0);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500/20');
                        this.mult *= 1.25;
                        document.getElementById('mines-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                    }
                },
                cashout() { this.end(this.bet * this.mult); },
                async end(win) {
                    this.active = false; State.balance += win; UI.updateBalance();
                    Probability.adjust(win/this.bet);
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                    document.getElementById('mines-status').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },
            tower: {
                level: 0, active: false, bet: 0, mult: 1,
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        let row = document.createElement('div'); row.className = "grid grid-cols-3 gap-1.5 opacity-30"; row.id = `t-r-${i}`;
                        for(let j=0; j<3; j++) row.innerHTML += `<div onclick="GameLogic.tower.select(${i},${j})" class="h-8 bg-white/5 border border-white/5 rounded-lg"></div>`;
                        c.appendChild(row);
                    }
                },
                start() {
                    const b = parseFloat(document.getElementById('tower-bet').value);
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    this.active = true; this.bet = b; this.level = 0; this.mult = 1; State.balance -= b; UI.updateBalance();
                    this.drawTower(); document.getElementById('t-r-0').classList.remove('opacity-30');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout').classList.remove('hidden-view');
                },
                select(r, c) {
                    if(!this.active || r !== this.level) return;
                    const risk = Probability.getRiskFactor();
                    const failProb = 0.33 + (risk * 0.5); // Aumenta sutilmente la probabilidad de bomba
                    if(Math.random() < failProb) { this.end(0); }
                    else {
                        this.mult *= 1.5; this.level++;
                        document.getElementById('tower-cashout').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                        if(this.level < 8) document.getElementById(`t-r-${this.level}`).classList.remove('opacity-30'); else this.cashout();
                    }
                },
                cashout() { this.end(this.bet * this.mult); },
                async end(win) {
                    this.active = false; State.balance += win; UI.updateBalance();
                    Probability.adjust(win/this.bet);
                    document.getElementById('tower-controls').classList.remove('hidden-view');
                    document.getElementById('tower-cashout').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },
            crash: {
                active: false, mult: 1, bet: 0, interval: null,
                start() {
                    const b = parseFloat(document.getElementById('crash-bet').value);
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    this.active = true; this.bet = b; this.mult = 1; State.balance -= b; UI.updateBalance();
                    const risk = Probability.getRiskFactor();
                    const limit = 1.05 + (Math.random() * (5 / (1 + risk * 2))); // El límite baja sutilmente con el riesgo
                    this.interval = setInterval(() => {
                        this.mult += 0.05; document.getElementById('crash-mult').innerText = this.mult.toFixed(2)+'x';
                        if(this.mult >= limit) this.explode();
                    }, 100);
                },
                explode() { clearInterval(this.interval); this.end(0); },
                cashout() { clearInterval(this.interval); this.end(this.bet * this.mult); },
                async end(win) {
                    this.active = false; State.balance += win; UI.updateBalance();
                    Probability.adjust(win/this.bet);
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            }
        };

        const AuthManager = {
            async login() { 
                const { data, error } = await sb.auth.signInWithPassword({ email: document.getElementById('login-email').value, password: document.getElementById('login-password').value });
                if(!error) location.reload();
            },
            async register() {
                const { data, error } = await sb.auth.signUp({ email: document.getElementById('reg-email').value, password: document.getElementById('reg-password').value });
                if(!error) { await sb.from('usuarios').insert([{ id: data.user.id, email: data.user.email, saldo: 0 }]); location.reload(); }
            },
            async logout() { await sb.auth.signOut(); location.reload(); },
            switchTab(t) { document.getElementById('login-container').classList.toggle('hidden-view', t==='register'); document.getElementById('register-container').classList.toggle('hidden-view', t==='login'); }
        };

        const Core = {
            async init() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) {
                    State.user = session.user;
                    document.getElementById('main-app').classList.remove('hidden-view');
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                    State.balance = data.saldo; UI.updateBalance();
                } else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            notify(m, t) { alert(m); }
        };

        Core.init();
    </script>
</body>
</html>
