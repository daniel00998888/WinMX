<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Professional Casino v4</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;900&display=swap');
        :root { --mx-green: #00ff88; --mx-bg: #050505; --mx-surface: #0f0f0f; }
        
        body { background-color: var(--mx-bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }

        /* HEADER Y NAVEGACIÓN */
        .top-nav { background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #222; z-index: 100; }
        
        /* SIDEBAR DE HISTORIAL (OCULTO POR DEFECTO) */
        #side-menu {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: #0a0a0a; border-right: 1px solid #222; z-index: 1000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px;
        }
        #side-menu.open { left: 0; }

        /* GRID DE JUEGOS REFINADO */
        .game-nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            max-width: 800px;
            margin: 0 auto 15px auto;
            padding: 10px;
        }
        .nav-icon {
            aspect-ratio: 1/1; background: var(--mx-surface); border-radius: 1.2rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid #222; transition: 0.2s; cursor: pointer; opacity: 0.6;
        }
        .nav-icon.active { opacity: 1; border-color: var(--mx-green); background: rgba(0,255,136,0.05); }
        .nav-icon span { font-size: 8px; font-weight: 900; margin-top: 5px; text-transform: uppercase; }

        /* MÁQUINA DE JUEGO */
        .arena {
            max-width: 900px; margin: 0 auto; flex-grow: 1;
            display: flex; flex-direction: column; background: #0c0c0c;
            border-radius: 2.5rem; border: 1px solid #1a1a1a; overflow: hidden;
        }

        /* PANEL DE CONTROL INFERIOR (ESTILO CONSOLA) */
        .console-panel { background: #000; border-top: 2px solid #1a1a1a; padding: 25px; }
        .bet-selector { background: #111; border: 1px solid #222; border-radius: 1.2rem; display: flex; align-items: center; padding: 10px 20px; }
        
        .btn-play {
            background: var(--mx-green); color: black; font-family: 'Archivo Black';
            font-size: 1.5rem; border-radius: 1.2rem; width: 100%; height: 65px;
            transition: 0.2s; box-shadow: 0 10px 30px rgba(0,255,136,0.2);
        }
        .btn-play:active { transform: scale(0.96); }

        /* MODALES */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; p: 20px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="side-menu" class="shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-casino text-emerald-500">Historial</h3>
            <button onclick="UI.toggleMenu()" class="text-zinc-500 text-xl"><i class="fas fa-times"></i></button>
        </div>
        <div id="hist-list" class="space-y-3 max-h-[70vh] overflow-y-auto pr-2 custom-scroll mb-8 text-[10px]">
            </div>
        <button onclick="Auth.logout()" class="w-full py-4 bg-red-500/10 text-red-500 border border-red-500/20 rounded-xl font-bold uppercase text-xs tracking-widest">
            <i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión
        </button>
    </div>

    <header class="top-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="UI.toggleMenu()" class="text-2xl hover:text-emerald-500"><i class="fas fa-bars-staggered"></i></button>
            <span class="font-casino text-2xl italic tracking-tighter">WIN<span class="text-emerald-500">MX</span></span>
        </div>
        <div class="flex items-center gap-3">
            <div class="bg-black px-4 py-2 rounded-xl border border-white/5 text-right min-w-[120px]">
                <span class="block text-[8px] text-zinc-600 font-black uppercase">Balance</span>
                <span id="bal-ui" class="text-lg font-casino text-emerald-400">$0.00</span>
            </div>
            <button onclick="UI.modal('dep', true)" class="w-10 h-10 bg-emerald-500 text-black rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow p-4 md:p-6 overflow-y-auto no-scrollbar">
        
        <div class="game-nav-grid">
            <div onclick="Router.go('slots')" id="gi-slots" class="nav-icon active">
                <i class="fas fa-dice text-2xl"></i><span>Slots</span>
            </div>
            <div onclick="Router.go('mines')" id="gi-mines" class="nav-icon">
                <i class="fas fa-bomb text-2xl"></i><span>Minas</span>
            </div>
            <div onclick="Router.go('crash')" id="gi-crash" class="nav-icon">
                <i class="fas fa-rocket text-2xl"></i><span>Crash</span>
            </div>
            <div onclick="Router.go('roulette')" id="gi-roulette" class="nav-icon">
                <i class="fas fa-circle-notch text-2xl"></i><span>Ruleta</span>
            </div>
            <div onclick="Router.go('dice')" id="gi-dice" class="nav-icon">
                <i class="fas fa-dice-five text-2xl"></i><span>Dados</span>
            </div>
            <div onclick="Router.go('cards')" id="gi-cards" class="nav-icon">
                <i class="fas fa-clone text-2xl"></i><span>Cartas</span>
            </div>
            <div onclick="Router.go('tower')" id="gi-tower" class="nav-icon">
                <i class="fas fa-chess-rook text-2xl"></i><span>Torre</span>
            </div>
            <div onclick="Router.go('wheel')" id="gi-wheel" class="nav-icon">
                <i class="fas fa-dharmachakra text-2xl"></i><span>Rueda</span>
            </div>
        </div>

        <div class="arena shadow-2xl">
            <div class="bg-black/80 px-8 py-3 flex justify-between items-center text-[10px] font-black tracking-widest text-zinc-500 border-b border-white/5">
                <div id="game-title">MODO: CLASSIC SLOTS</div>
                <div id="game-stats">JACKPOT: x500</div>
            </div>

            <div id="game-view" class="flex-grow flex items-center justify-center p-6 min-h-[300px]">
                </div>

            <div class="console-panel">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                    
                    <div class="space-y-4">
                        <div class="bet-selector">
                            <button onclick="Engine.bet(-10)" class="w-12 h-12 bg-zinc-800 rounded-lg text-xl">-</button>
                            <div class="flex-grow text-center">
                                <span class="block text-[8px] text-zinc-600 font-bold uppercase mb-1">Monto de Apuesta</span>
                                <span id="bet-ui" class="text-3xl font-casino">$10</span>
                            </div>
                            <button onclick="Engine.bet(10)" class="w-12 h-12 bg-zinc-800 rounded-lg text-xl">+</button>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="Engine.setBet(State.balance/2)" class="flex-grow py-2 bg-white/5 border border-white/10 rounded-lg text-[9px] font-bold">MITAD</button>
                            <button onclick="Engine.setBet(State.balance)" class="flex-grow py-2 bg-white/5 border border-white/10 rounded-lg text-[9px] font-bold text-emerald-500">TODO</button>
                        </div>
                    </div>

                    <div class="flex flex-col justify-end">
                        <button id="main-btn" onclick="Engine.play()" class="btn-play">JUGAR AHORA</button>
                        <p id="game-guide" class="text-[9px] text-zinc-600 mt-4 text-center italic">
                            Instrucciones: Alinea símbolos idénticos en el centro para ganar.
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="modal-dep" class="modal-overlay">
        <div class="bg-zinc-900 p-10 rounded-[3rem] w-full max-w-md border border-white/10 relative">
            <button onclick="UI.modal('dep', false)" class="absolute top-6 right-8 text-zinc-500"><i class="fas fa-times"></i></button>
            <h2 class="font-casino text-3xl text-center mb-8 italic">Cargar <span class="text-emerald-500">Saldo</span></h2>
            <div class="space-y-6">
                <input id="dep-val" type="number" placeholder="$0" class="w-full bg-black text-emerald-500 text-center text-5xl font-casino py-6 rounded-2xl border border-white/5 outline-none">
                <div class="bg-zinc-800 p-6 rounded-3xl text-center border border-white/5">
                    <p class="text-[10px] text-zinc-500 font-black mb-2 uppercase">Transferencia STP</p>
                    <p class="text-xl font-mono font-bold select-all tracking-tighter">722 969 020 533 491 161</p>
                </div>
                <button onclick="UI.confirmDep()" class="btn-play text-lg h-auto py-5">Notificar Depósito</button>
            </div>
        </div>
    </div>

    <div id="toast-box" class="fixed bottom-10 right-10 flex flex-col gap-2 z-[3000]"></div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        let State = { user: null, balance: 0, bet: 10, playing: false, game: 'slots', spinID: 0 };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Router = {
            go(g) {
                if(State.playing) return;
                State.game = g;
                document.querySelectorAll('.nav-icon').forEach(i => i.classList.toggle('active', i.id === `gi-${g}`));
                this.render();
            },
            render() {
                const view = document.getElementById('game-view');
                const title = document.getElementById('game-title');
                const stats = document.getElementById('game-stats');
                const guide = document.getElementById('game-guide');
                
                const db = this.games[State.game];
                title.innerText = `MODO: ${db.name}`;
                stats.innerText = `JACKPOT: ${db.max}`;
                guide.innerText = `Instrucciones: ${db.rules}`;
                view.innerHTML = db.html;

                if(State.game === 'slots') Logic.slots.init();
            },
            games: {
                slots: { name: "CLASSIC SLOTS", max: "x500", rules: "Alinea 3 figuras iguales. El 7️⃣ es el premio mayor.", html: `<div class="flex gap-4 w-full max-w-sm h-32"><div class="flex-1 bg-black rounded-xl overflow-hidden border border-zinc-800"><div id="r1" class="transition-all duration-[3s]"></div></div><div class="flex-1 bg-black rounded-xl overflow-hidden border border-zinc-800"><div id="r2" class="transition-all duration-[3s]"></div></div><div class="flex-1 bg-black rounded-xl overflow-hidden border border-zinc-800"><div id="r3" class="transition-all duration-[3s]"></div></div></div>` },
                mines: { name: "MINES PRO", max: "x25", rules: "Encuentra diamantes sin tocar las bombas.", html: `<div id="mine-grid" class="grid grid-cols-5 gap-2 w-full max-w-[280px]"></div>` },
                crash: { name: "ROCKET CRASH", max: "x1000", rules: "El multiplicador sube, retírate antes de explotar.", html: `<div class="text-center"><div id="crash-val" class="text-7xl font-casino mb-4">1.00x</div><div class="text-5xl">🚀</div></div>` }
            }
        };

        const Logic = {
            slots: {
                init() {
                    [1,2,3].forEach(id => {
                        const r = document.getElementById(`r${id}`); r.innerHTML = '';
                        for(let i=0; i<60; i++) r.innerHTML += `<div class="h-32 flex items-center justify-center text-4xl">${SYMBOLS[i%6]}</div>`;
                    });
                },
                async play() {
                    State.spinID++;
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    [1,2,3].forEach((id, i) => {
                        const r = document.getElementById(`r${id}`);
                        const pos = (State.spinID * 128 * 12) + (SYMBOLS.indexOf(res[i]) * 128);
                        r.style.transform = `translateY(-${pos}px)`;
                    });
                    setTimeout(() => {
                        const winMap = {'7️⃣7️⃣7️⃣': 500, '💎💎💎': 100, '⭐️⭐️⭐️': 50, '🔔🔔🔔': 20, '🍋🍋🍋': 10, '🍒🍒🍒': 5};
                        Engine.finish(winMap[res.join('')] || 0, "SLOTS");
                    }, 3100);
                }
            }
        };

        const Engine = {
            bet(v) { if(!State.playing) { State.bet = Math.max(10, State.bet + v); UI.up(); } },
            setBet(v) { if(!State.playing) { State.bet = Math.max(10, Math.floor(v)); UI.up(); } },
            async play() {
                if(State.balance < State.bet) return UI.notify("SALDO INSUFICIENTE", "error");
                State.playing = true; UI.btn(true);
                State.balance -= State.bet; UI.up();
                
                if(State.game === 'slots') Logic.slots.play();
                // Aquí se activan otros juegos...
            },
            async finish(m, label) {
                const win = State.bet * m;
                State.balance += win;
                State.playing = false; UI.btn(false); UI.up();
                if(win > 0) UI.notify(`¡GANASTE $${win}!`, "success");
                
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                await sb.from('history').insert([{ user_id: State.user.id, amount: win - State.bet, label: label }]);
                UI.loadHist();
            }
        };

        const UI = {
            up() {
                document.getElementById('bal-ui').innerText = `$${State.balance.toLocaleString()}`;
                document.getElementById('bet-ui').innerText = `$${State.bet.toLocaleString()}`;
            },
            btn(d) { document.getElementById('main-btn').disabled = d; document.getElementById('main-btn').style.opacity = d ? 0.3 : 1; },
            toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); },
            modal(id, s) { document.getElementById(`modal-${id}`).style.display = s ? 'flex' : 'none'; },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-xl text-[10px] font-black uppercase ${t==='success'?'bg-emerald-500 text-black':'bg-red-600'}`;
                n.innerText = m; document.getElementById('toast-box').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            async loadHist() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false }).limit(10);
                document.getElementById('hist-list').innerHTML = data.map(h => `
                    <div class="bg-white/5 p-3 rounded-xl flex justify-between border border-white/5">
                        <span class="text-zinc-500 font-bold">${h.label}</span>
                        <span class="${h.amount >= 0 ? 'text-emerald-500' : 'text-zinc-600'} font-casino">$${h.amount}</span>
                    </div>`).join('');
            }
        };

        const Auth = {
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    State.user = session.user;
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                    State.balance = data.saldo || 0;
                    UI.up(); UI.loadHist(); Router.go('slots');
                }
            },
            logout() { sb.auth.signOut(); location.reload(); }
        };

        Auth.check();
    </script>
</body>
</html>
