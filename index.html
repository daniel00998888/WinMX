<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX Platinum | Professional Casino Infrastructure</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;700;800;900&display=swap');

        :root {
            --stake-dark: #0f212e; /* El azul oscuro de Stake */
            --stake-bg: #1a2c38;
            --stake-card: #213743;
            --stake-green: #00e701;
            --stake-blue: #2f4553;
            --stake-text: #b1bad3;
        }

        body {
            background-color: var(--stake-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- STAKE SIDEBAR --- */
        .sidebar {
            width: 240px;
            background: var(--stake-dark);
            border-right: 1px solid var(--stake-blue);
            height: 100vh;
            position: fixed; left: 0; top: 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--stake-text);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
            background: var(--stake-blue);
        }

        .nav-item i { width: 25px; margin-right: 12px; }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: 240px;
            padding: 0;
            min-height: 100vh;
        }

        /* --- TOP NAVIGATION --- */
        .top-nav {
            background: var(--stake-bg);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 90;
        }

        .balance-pill {
            background: var(--stake-dark);
            padding: 6px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--stake-blue);
        }

        /* --- CASINO CARDS --- */
        .game-card {
            background: var(--stake-card);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-thumb {
            height: 160px;
            background-size: cover;
            background-position: center;
        }

        /* --- SLOT MACHINE ENGINE (Ajustado a Stake) --- */
        .slot-container {
            background: var(--stake-bg);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid var(--stake-blue);
        }

        .slot-box {
            height: 120px; 
            overflow: hidden;
            background: var(--stake-dark);
            border: 2px solid var(--stake-blue);
            border-radius: 8px;
            position: relative;
        }

        .slot-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .btn-stake-green {
            background: var(--stake-green);
            color: #000;
            font-weight: 800;
            padding: 18px;
            border-radius: 8px;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-stake-green:hover { filter: brightness(1.1); }
        .btn-stake-green:disabled { opacity: 0.5; filter: grayscale(1); }

    </style>
</head>
<body>

    <aside class="sidebar hidden md:block">
        <div class="p-6">
            <h1 class="text-2xl font-black italic">Win<span class="text-emerald-500">MX</span></h1>
        </div>
        <nav class="mt-2">
            <div class="nav-item active"><i class="fas fa-star"></i> Favoritos</div>
            <div class="nav-item"><i class="fas fa-history"></i> Reciente</div>
            <div class="nav-item"><i class="fas fa-trophy"></i> Desafíos</div>
            <div class="px-6 py-4 text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Casino</div>
            <div class="nav-item"><i class="fas fa-dice"></i> Slots</div>
            <div class="nav-item"><i class="fas fa-fire"></i> WinMX Originals</div>
            <div class="nav-item"><i class="fas fa-gem"></i> Live Casino</div>
        </nav>
    </aside>

    <div id="view-auth" class="fixed inset-0 z-[1000] bg-[#071620] flex items-center justify-center p-6">
        <div class="w-full max-w-md space-y-8 text-center">
            <h2 class="text-5xl font-black italic mb-12">Win<span class="text-emerald-500">MX</span></h2>
            <div class="bg-[#1a2c38] p-8 rounded-xl border border-[#2f4553] space-y-4">
                <input id="input-email" type="email" placeholder="Email" class="w-full bg-[#0f212e] p-4 rounded border border-[#2f4553] outline-none focus:border-emerald-500 text-white">
                <input id="input-pass" type="password" placeholder="Password" class="w-full bg-[#0f212e] p-4 rounded border border-[#2f4553] outline-none focus:border-emerald-500 text-white">
                <button onclick="AuthGate.process()" class="w-full bg-emerald-500 text-black font-bold py-4 rounded hover:bg-emerald-400 transition-all">Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <div id="view-main" class="main-content hidden">
        <nav class="top-nav">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-xl"><i class="fas fa-bars"></i></button>
                <div class="font-bold text-zinc-400 text-sm">WinMX Platinum</div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="balance-pill">
                    <span id="display-balance" class="font-bold text-white">$0.00</span>
                    <button onclick="InterfaceManager.toggleModal('modal-cashier', true)" class="bg-blue-600 px-3 py-1 rounded text-[10px] font-bold">MONEDERO</button>
                </div>
                <button onclick="AuthGate.logout()" class="text-zinc-500 hover:text-white"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <main class="p-6 md:p-12 max-w-6xl mx-auto">
            <div id="dashboard">
                <h3 class="font-bold text-lg mb-6 flex items-center gap-2">
                    <i class="fas fa-rocket text-emerald-500"></i> Originales de WinMX
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                    <div onclick="InterfaceManager.showGame()" class="game-card">
                        <div class="game-thumb" style="background-image: url('https://images.unsplash.com/photo-1518133835878-5a93cc3f89e5?q=80&w=300');"></div>
                        <div class="p-3 text-xs font-bold">PLATINUM SLOTS</div>
                    </div>
                    <div class="game-card opacity-50"><div class="game-thumb" style="background-image: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=300');"></div><div class="p-3 text-xs font-bold">DICE</div></div>
                    <div class="game-card opacity-50"><div class="game-thumb" style="background-image: url('https://images.unsplash.com/photo-1596743444221-a379434863f6?q=80&w=300');"></div><div class="p-3 text-xs font-bold">MINES</div></div>
                </div>
            </div>

            <div id="game-window" class="hidden animate__animated animate__fadeIn">
                <button onclick="InterfaceManager.hideGame()" class="mb-6 text-zinc-500 hover:text-white"><i class="fas fa-arrow-left"></i> Volver al Lobby</button>
                
                <div class="slot-container">
                    <div class="grid grid-cols-3 gap-4 mb-8">
                        <div id="reel-1" class="slot-box"><div class="slot-reel"></div></div>
                        <div id="reel-2" class="slot-box"><div class="slot-reel"></div></div>
                        <div id="reel-3" class="slot-box"><div class="slot-reel"></div></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                        <div class="bg-stake-dark p-4 rounded-lg border border-stake-blue">
                            <p class="text-[10px] text-zinc-500 font-bold mb-2">APUESTA</p>
                            <div class="flex justify-between items-center">
                                <span id="display-bet" class="font-bold text-xl">$100</span>
                                <div class="flex gap-1">
                                    <button onclick="GameProcessor.updateBet(-25)" class="bg-stake-blue px-2 py-1 rounded text-[10px]">½</button>
                                    <button onclick="GameProcessor.updateBet(25)" class="bg-stake-blue px-2 py-1 rounded text-[10px]">2x</button>
                                </div>
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <button id="spin-main-btn" onclick="GameProcessor.initSpin()" class="btn-stake-green">Apostar</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-cashier" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[2000] hidden items-center justify-center p-6">
        <div class="bg-stake-bg p-8 rounded-xl border border-stake-blue w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Depositar Fondos</h2>
            <input id="input-dep-amount" type="number" placeholder="Monto MXN" class="w-full bg-stake-dark p-4 rounded border border-stake-blue outline-none mb-4">
            <button onclick="DataBridge.confirmDeposit()" class="w-full bg-blue-600 text-white font-bold py-4 rounded">Confirmar</button>
            <button onclick="InterfaceManager.toggleModal('modal-cashier', false)" class="w-full mt-2 text-zinc-500 text-sm">Cerrar</button>
        </div>
    </div>

    <script>
        // --- TU CONFIGURACIÓN QUE YA FUNCIONA ---
        const SUPABASE_URL = "https://dakhnqriwbzihlzhtfcb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"; // Tu key original
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const APP_STATE = {
            user: null,
            balance: 0,
            currentBet: 100,
            isSpinning: false,
            symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'],
            odds: { '🍒🍒🍒': 5, '🍋🍋🍋': 10, '🔔🔔🔔': 20, '⭐️⭐️⭐️': 50, '💎💎💎': 150, '7️⃣7️⃣7️⃣': 500 }
        };

        const AuthGate = {
            async process() {
                const email = document.getElementById('input-email').value;
                const pass = document.getElementById('input-pass').value;
                
                // Usamos eq().eq() como en tu script original
                const { data, error } = await sb.from('usuarios').select('*').eq('email', email).eq('password', pass).single();
                
                if(data) {
                    APP_STATE.user = data;
                    APP_STATE.balance = data.saldo;
                    document.getElementById('view-auth').classList.add('hidden');
                    document.getElementById('view-main').classList.remove('hidden');
                    InterfaceManager.refreshBalance();
                    GameProcessor.setupReels();
                } else {
                    alert("Error: Usuario no encontrado o clave incorrecta");
                }
            },
            logout() { location.reload(); }
        };

        const GameProcessor = {
            setupReels() {
                [1,2,3].forEach(id => {
                    const el = document.querySelector(`#reel-${id} .slot-reel`);
                    el.innerHTML = '';
                    for(let i=0; i<100; i++) {
                        const sym = APP_STATE.symbols[Math.floor(Math.random() * APP_STATE.symbols.length)];
                        el.innerHTML += `<div class="slot-item">${sym}</div>`;
                    }
                });
            },
            updateBet(val) {
                APP_STATE.currentBet = Math.max(25, APP_STATE.currentBet + val);
                document.getElementById('display-bet').innerText = `$${APP_STATE.currentBet}`;
            },
            async initSpin() {
                if(APP_STATE.isSpinning || APP_STATE.balance < APP_STATE.currentBet) return;

                APP_STATE.isSpinning = true;
                const btn = document.getElementById('spin-main-btn');
                btn.disabled = true;

                APP_STATE.balance -= APP_STATE.currentBet;
                InterfaceManager.refreshBalance();

                const results = [
                    APP_STATE.symbols[Math.floor(Math.random()*6)],
                    APP_STATE.symbols[Math.floor(Math.random()*6)],
                    APP_STATE.symbols[Math.floor(Math.random()*6)]
                ];

                [1,2,3].forEach((id, i) => {
                    const reel = document.querySelector(`#reel-${id} .slot-reel`);
                    const symbolIndex = APP_STATE.symbols.indexOf(results[i]);
                    const offset = (80 + symbolIndex) * 120; // 120 es la altura del item
                    reel.style.transition = `transform ${3 + (i * 0.5)}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    reel.style.transform = `translateY(-${offset}px)`;
                });

                setTimeout(async () => {
                    const multiplier = APP_STATE.odds[results.join('')] || 0;
                    if(multiplier > 0) {
                        const win = APP_STATE.currentBet * multiplier;
                        APP_STATE.balance += win;
                        alert("¡GANASTE $" + win + "!");
                    }

                    await DataBridge.syncBalance();
                    InterfaceManager.refreshBalance();
                    APP_STATE.isSpinning = false;
                    btn.disabled = false;
                }, 4000);
            }
        };

        const DataBridge = {
            async syncBalance() {
                await sb.from('usuarios').update({ saldo: APP_STATE.balance }).eq('id', APP_STATE.user.id);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('input-dep-amount').value);
                if(amt > 0) {
                    APP_STATE.balance += amt;
                    await this.syncBalance();
                    InterfaceManager.refreshBalance();
                    InterfaceManager.toggleModal('modal-cashier', false);
                    alert("Depósito acreditado");
                }
            }
        };

        const InterfaceManager = {
            refreshBalance() {
                document.getElementById('display-balance').innerText = `$${APP_STATE.balance.toFixed(2)}`;
            },
            toggleModal(id, show) {
                document.getElementById(id).classList.toggle('hidden', !show);
                document.getElementById(id).classList.add('flex');
            },
            showGame() {
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('game-window').classList.remove('hidden');
            },
            hideGame() {
                document.getElementById('game-window').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
