        /* Tabuladores */

            letter-spacing: 0.1em;

        }

        .tab-btn.active::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 3px; background: var(--mx-green);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--mx-green-glow);

        /* Notificaciones */

        }

            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }

    <script>
        /**

         */

        // 1. CONFIGURACIÓN BASE
        const DB_CONFIG = {
            url: "https://dakhnqriwbzihlzhtfcb.supabase.co",
            key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        };
        
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        
        let State = {
            user: null,
            balance: 0,
            currentBet: 10,
            isSpinning: false,
            activeTab: 'bets',
            symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣']
        };

        // TABLA DE PAGOS REALES (Multiplicadores)
        const PAYTABLE = {
            '🍒🍒🍒': 20,
            '7️⃣7️⃣7️⃣': 100,
            '💎💎💎': 50,
            '🔔🔔🔔': 10,
            '⭐️⭐️⭐️': 15,
            '🍋🍋🍋': 5
        };

        // 2. MOTOR DE AUDIO (Web Audio API Procedural)
        const Sound = {
            ctx: null,
            init() { 
                if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);

                if(type === 'spin') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.15);
                } else if(type === 'win') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
                    osc.frequency.exponentialRampToValueAtTime(1046.50, this.ctx.currentTime + 0.3); // C6
                    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4);
                } else if(type === 'lose') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
                } else if(type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(700, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.05);
                }
                osc.start(); osc.stop(this.ctx.currentTime + 0.5);
            }
        };

        // 3. CORE: COMUNICACIÓN CON SUPABASE Y AUTENTICACIÓN
        const Core = {
            async init() {
                // Simulación de carga para estética pro
                let progress = 0;
                const interval = setInterval(() => {
                    progress += Math.random() * 15;
                    document.getElementById('boot-bar').style.width = `${Math.min(progress, 100)}%`;
                    if(progress >= 100) {
                        clearInterval(interval);
                        this.checkSession();
                    }
                }, 150);
            },

            async checkSession() {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    State.user = session.user;
                    this.setupDashboard();
                } else {
                    UI.toggleScreen('auth-screen', true);
                    this.hideLoader();
                }
            },

            async handleAuth() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                if(!email || !password) return UI.notify("Completa los campos", "warning");

                const btn = document.getElementById('auth-btn');
                btn.disabled = true; btn.innerText = "VERIFICANDO...";

                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                
                if(error) {
                    const { data: up, error: errUp } = await sb.auth.signUp({ email, password });
                    if(up.user) {
                        await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                        UI.notify("Cuenta Creada", "success");
                    } else {
                        UI.notify("Error de Credenciales", "error");
                        btn.disabled = false; btn.innerText = "Entrar Ahora";
                        return;
                    }
                }
                location.reload();
            },

            async setupDashboard() {
                UI.toggleScreen('main-app', true);
                const { data, error } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if (data) {
                    State.balance = data.saldo;
                    UI.updateBalance();
                    this.fetchHistory();
                    Game.initReels();
                }
                this.hideLoader();
            },

            async fetchHistory() {
                const { data } = await sb.from('history')
                    .select('*')
                    .eq('user_id', State.user.id)
                    .order('created_at', {ascending: false})
                    .limit(20);
                UI.renderHistory(data);
            },

            async confirmDeposit() {
                const fileInput = document.getElementById('receipt-input');
                const amt = parseFloat(document.getElementById('dep-amount').value);
                
                if(!amt || isNaN(amt) || amt < 10) return UI.notify("Monto Mínimo $10", "warning");
                if(!fileInput.files[0]) return UI.notify("Sube el comprobante", "warning");

                const btn = document.getElementById('final-dep-btn');
                btn.disabled = true; btn.innerText = "ENVIANDO...";

                const file = fileInput.files[0];
                const fileName = `${State.user.id}_${Date.now()}.png`;
                const path = `evidence/${State.user.id}/${fileName}`;

                const { error: upErr } = await sb.storage.from('comprobantes').upload(path, file);
                if(upErr) {
                    UI.notify("Error en Storage", "error");
                    btn.disabled = false; return;
                }

                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);

                await sb.from('history').insert({
                    user_id: State.user.id,
                    type: 'deposits',
                    amount: amt,
                    label: 'SOLICITUD DEPÓSITO',
                    status: 'pending',
                    evidence_url: publicUrl
                });

                UI.notify("Pago en revisión", "success");
                UI.closeModal('modal-deposit');
                this.fetchHistory();
                btn.disabled = false; btn.innerText = "Enviar para Revisión";
            },

            hideLoader() {
                const loader = document.getElementById('boot-loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.classList.add('hidden'), 1000);
            },

            logout() { sb.auth.signOut(); location.reload(); }
        };

        // 4. LÓGICA DE JUEGO (MOTOR DE AZAR)
        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    // Triple bucle para tener suficiente longitud de scroll
                    const icons = [...State.symbols, ...State.symbols, ...State.symbols, ...State.symbols];
                    icons.forEach(s => {
                        r.innerHTML += `<div class="slot-item">${s}</div>`;
                    });
                });
            },

            changeBet(v) {
                Sound.play('click');
                State.currentBet = Math.max(10, State.currentBet + v);
                document.getElementById('bet-display').innerText = `$${State.currentBet}`;
                // Pequeña animación de pulsación
                document.getElementById('bet-display').classList.add('animate__animated', 'animate__pulse');
                setTimeout(() => document.getElementById('bet-display').classList.remove('animate__pulse'), 500);
            },

            async spin() {
                if(State.isSpinning) return;
                if(State.balance < State.currentBet) return UI.notify("Saldo Insuficiente", "error");

                State.isSpinning = true;
                Sound.play('click');
                
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;
                btn.innerText = "GIRANDO...";

                // Generar Resultado (RNG)
                const resIcons = [
                    State.symbols[Math.floor(Math.random() * State.symbols.length)],
                    State.symbols[Math.floor(Math.random() * State.symbols.length)],
                    State.symbols[Math.floor(Math.random() * State.symbols.length)]
                ];

                // Lógica de Multiplicador (Cálculo del premio)
                const combo = resIcons.join('');
                const multiplier = PAYTABLE[combo] || 0;
                const winAmount = State.currentBet * multiplier;
                const netChange = winAmount - State.currentBet;
                const newSaldo = State.balance + netChange;

                // Animación Física
                [1,2,3].forEach((id, i) => {
                    const reel = document.getElementById(`reel-${id}`);
                    const iconIdx = State.symbols.indexOf(resIcons[i]);
                    // Calculamos posición para que se detenga justo en el símbolo
                    const targetPos = (iconIdx * 160) + (160 * 21); // 21 es el offset de vueltas
                    reel.style.transform = `translateY(-${targetPos}px)`;
                });

                // Sonido de giro rítmico
                let spinInt = setInterval(() => Sound.play('spin'), 180);

                setTimeout(async () => {
                    clearInterval(spinInt);
                    
                    if(multiplier > 0) {
                        Sound.play('win');
                        UI.notify(`¡GANASTE X${multiplier}! +$${winAmount}`, "success");
                    } else {
                        Sound.play('lose');
                    }

                    // Sincronización con Base de Datos (Blindado)
                    const { error } = await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', State.user.id);
                    
                    if(!error) {
                        await sb.from('history').insert({
                            user_id: State.user.id,
                            type: 'bets',
                            amount: netChange,
                            label: multiplier > 0 ? `PREMIO X${multiplier}` : 'JUEGO NORMAL',
                            status: 'completed'
                        });

                        State.balance = newSaldo;
                        UI.updateBalance();
                        Core.fetchHistory();
                    }

                    State.isSpinning = false;
                    btn.disabled = false;
                    btn.innerText = "GIRAR";
                    this.resetReelsVisual();
                }, 3500);
            },

            resetReelsVisual() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transition = 'none';
                    r.style.transform = 'translateY(0)';
                    setTimeout(() => r.style.transition = 'transform 3.5s cubic-bezier(0.15, 0, 0.05, 1)', 50);
                });
            }
        };

        // 5. CAPA DE INTERFAZ (UI)
        const UI = {
            updateBalance() {
                const el = document.getElementById('balance-display');
                // Efecto de conteo numérico simple
                el.innerText = `$${State.balance.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            },

            notify(msg, type = 'info') {
                const container = document.getElementById('notif-container');
                const toast = document.createElement('div');
                const colors = {
                    success: 'bg-emerald-500 text-black',
                    error: 'bg-red-500 text-white',
                    warning: 'bg-orange-500 text-black',
                    info: 'bg-zinc-800 text-white'
                };
                toast.className = `${colors[type]} toast px-8 py-5 rounded-2xl font-black text-xs shadow-2xl flex items-center gap-4`;
                toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-double' : 'info-circle'}"></i> ${msg.toUpperCase()}`;
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(50px)';
                    setTimeout(() => toast.remove(), 500);
                }, 4000);
            },

            toggleScreen(id, show) {
                const el = document.getElementById(id);
                if(show) {
                    el.classList.remove('hidden');
                    setTimeout(() => el.classList.add('opacity-100'), 50);
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('opacity-100');
                }
            },

            switchTab(tab) {
                Sound.play('click');
                State.activeTab = tab;
                document.getElementById('tab-bets-btn').classList.toggle('active', tab === 'bets');
                document.getElementById('tab-deps-btn').classList.toggle('active', tab === 'deps');
                Core.fetchHistory();
            },

            renderHistory(data) {
                const container = document.getElementById('history-content');
                container.innerHTML = '';
                
                const filtered = data?.filter(h => State.activeTab === 'bets' ? h.type === 'bets' : h.type === 'deposits');
                
                if(!filtered || filtered.length === 0) {
                    container.innerHTML = `<div class="py-10 text-center text-zinc-700 font-black text-[9px] uppercase tracking-widest">Sin actividad reciente</div>`;
                    return;
                }

                filtered.forEach(h => {
                    const isWin = h.amount >= 0;
                    const statusColor = h.status === 'pending' ? 'text-orange-500' : (isWin ? 'text-emerald-500' : 'text-red-500');
                    
                    container.innerHTML += `
                        <div class="glass-panel p-5 rounded-3xl flex justify-between items-center border border-white/5 animate__animated animate__fadeInUp">
                            <div class="flex flex-col">
                                <span class="text-[9px] font-black text-zinc-500 uppercase tracking-tighter">${h.label}</span>
                                <span class="text-[7px] text-zinc-700 font-bold">${new Date(h.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="text-right">
                                <div class="font-casino text-sm ${statusColor}">${isWin ? '+' : ''}$${Math.abs(h.amount).toFixed(2)}</div>
                                <div class="text-[6px] font-black text-zinc-800 uppercase">${h.status}</div>
                            </div>
                        </div>
                    `;
                });
            },

            openModal(id) { 
                Sound.play('click');
                document.getElementById(id).classList.remove('hidden');
                document.getElementById('dep-step-1').classList.remove('hidden');
                document.getElementById('dep-step-2').classList.add('hidden');
            },

            closeModal(id) { document.getElementById(id).classList.add('hidden'); },

            depNextStep() {
                const amt = document.getElementById('dep-amount').value;
                if(!amt || amt < 10) return this.notify("Monto mínimo $10", "warning");
                Sound.play('click');
                document.getElementById('dep-step-1').classList.add('hidden');
                document.getElementById('dep-step-2').classList.remove('hidden');
            },

            copyClave() {
                navigator.clipboard.writeText('722969020533491161');
                this.notify("Clave Copiada", "success");
            }
        };

        // Escuchadores Globales
        document.getElementById('receipt-input')?.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                document.getElementById('file-label').innerText = "✅ COMPROBANTE LISTO";
                document.getElementById('file-label').classList.add('text-emerald-500');
            }
        });

        // ALIAS DE SEGURIDAD (Para evitar errores de legacy)
        function loadPending() { Core.fetchHistory(); }

        // ARRANQUE DEL SISTEMA
        Core.init();

    </script>
</body>
</html>
