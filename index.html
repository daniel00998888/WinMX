<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX Platinum | Professional Casino Interface</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --stake-dark: #0f212e;
            --stake-bg: #1a2c38;
            --stake-card: #213743;
            --stake-green: #00e701;
            --stake-blue: #2f4553;
        }

        body {
            background-color: var(--stake-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background: var(--stake-dark);
            border-right: 2px solid var(--stake-blue);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            transition: 0.3s;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #b1bad3;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            color: #fff;
            background: var(--stake-blue);
        }

        .nav-item i { width: 25px; margin-right: 12px; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 240px;
            padding: 20px;
            min-height: 100vh;
        }

        /* --- STAKE STYLE CARDS --- */
        .game-card {
            background: var(--stake-card);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
            cursor: pointer;
            border-bottom: 4px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-bottom: 4px solid var(--stake-green);
        }

        .game-thumb {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* --- SLOT REELS --- */
        .slot-container {
            background: var(--stake-bg);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid var(--stake-blue);
        }

        .reel {
            height: 140px;
            background: var(--stake-dark);
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--stake-blue);
        }

        .reel-strip { transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .symbol { height: 140px; display: flex; align-items: center; justify-content: center; font-size: 3rem; }

        /* --- NAVBAR TOP --- */
        .top-nav {
            background: var(--stake-bg);
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .balance-pill {
            background: var(--stake-dark);
            padding: 8px 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            border: 1px solid var(--stake-blue);
        }

        .btn-deposit {
            background: #213743;
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn-deposit:hover { background: #2f4553; }

        .btn-spin {
            background: var(--stake-green);
            color: #000;
            width: 100%;
            padding: 20px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .btn-spin:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <aside class="sidebar hidden md:block">
        <div class="p-6">
            <h2 class="text-2xl font-black italic">Win<span class="text-emerald-500">MX</span></h2>
        </div>
        <nav class="mt-4">
            <div class="nav-item active"><i class="fas fa-star"></i> Favoritos</div>
            <div class="nav-item"><i class="fas fa-history"></i> Reciente</div>
            <div class="nav-item"><i class="fas fa-trophy"></i> Desafíos</div>
            <div class="nav-item"><i class="fas fa-receipt"></i> Mis Apuestas</div>
            <div class="px-6 py-4 text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Juegos</div>
            <div class="nav-item"><i class="fas fa-gem"></i> Solo en Stake</div>
            <div class="nav-item"><i class="fas fa-rocket"></i> Lanzamientos</div>
            <div class="nav-item"><i class="fas fa-dice"></i> Slots</div>
            <div class="nav-item"><i class="fas fa-fire"></i> Originales</div>
        </nav>
    </aside>

    <div id="app-view" class="main-content">
        
        <nav class="top-nav rounded-xl mb-8">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
                <span class="font-bold text-zinc-400">MX$0.05 🇲🇽 <i class="fas fa-chevron-down text-[10px]"></i></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="balance-pill">
                    <span id="display-balance" class="text-emerald-400">$0.00</span>
                    <button class="bg-blue-600 px-3 py-1 rounded text-xs">Monedero</button>
                </div>
                <i class="fas fa-search text-zinc-400"></i>
                <i class="fas fa-user text-zinc-400"></i>
                <i class="fas fa-bell text-zinc-400"></i>
            </div>
        </nav>

        <div id="dashboard" class="animate__animated animate__fadeIn">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fas fa-fire text-orange-500"></i> Originales De WinMX
            </h3>
            
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <div onclick="GameUI.loadGame('slots')" class="game-card">
                    <div class="game-thumb" style="background-image: url('https://images.unsplash.com/photo-1596743444221-a379434863f6?q=80&w=500&auto=format&fit=crop');">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                            <i class="fas fa-play text-4xl text-white"></i>
                        </div>
                    </div>
                    <div class="p-3 text-center">
                        <p class="font-bold text-sm">PLATINUM SLOTS</p>
                        <p class="text-[10px] text-zinc-500">WINMX ORIGINAL</p>
                    </div>
                </div>
                <div class="game-card opacity-50 grayscale">
                    <div class="game-thumb" style="background-image: url('https://images.unsplash.com/photo-1518133835878-5a93cc3f89e5?q=80&w=500&auto=format&fit=crop');"></div>
                    <div class="p-3 text-center"><p class="font-bold text-sm">MINES</p></div>
                </div>
                <div class="game-card opacity-50 grayscale">
                    <div class="game-thumb" style="background-image: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=500&auto=format&fit=crop');"></div>
                    <div class="p-3 text-center"><p class="font-bold text-sm">DICE</p></div>
                </div>
            </div>
        </div>

        <div id="game-window" class="hidden animate__animated animate__zoomIn">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="GameUI.closeGame()" class="text-zinc-500 hover:text-white"><i class="fas fa-arrow-left"></i> Volver</button>
                    <h2 class="font-bold">PLATINUM SLOTS</h2>
                    <div></div>
                </div>

                <div class="slot-container">
                    <div class="grid grid-cols-3 gap-6 mb-10">
                        <div class="reel"><div id="reel-1" class="reel-strip"></div></div>
                        <div class="reel"><div id="reel-2" class="reel-strip"></div></div>
                        <div class="reel"><div id="reel-3" class="reel-strip"></div></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                        <div class="bg-stake-dark p-4 rounded-lg border border-stake-blue">
                            <p class="text-[10px] text-zinc-500 font-bold mb-2">MONTO DE APUESTA</p>
                            <div class="flex items-center justify-between">
                                <span id="display-bet" class="font-bold">$100</span>
                                <div class="flex gap-2">
                                    <button onclick="GameEngine.changeBet(-25)" class="bg-stake-blue px-3 py-1 rounded">½</button>
                                    <button onclick="GameEngine.changeBet(25)" class="bg-stake-blue px-3 py-1 rounded">2x</button>
                                </div>
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <button id="spin-btn" onclick="GameEngine.spin()" class="btn-spin">Apostar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="login-screen" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-stake-bg p-10 rounded-xl w-full max-w-md border border-stake-blue">
            <h2 class="text-3xl font-black italic text-center mb-8">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Correo electrónico" class="w-full bg-stake-dark p-4 rounded border border-stake-blue outline-none focus:border-emerald-500">
                <input id="auth-pass" type="password" placeholder="Contraseña" class="w-full bg-stake-dark p-4 rounded border border-stake-blue outline-none focus:border-emerald-500">
                <button onclick="System.login()" class="w-full bg-emerald-500 text-black font-bold py-4 rounded hover:bg-emerald-400 transition-all">Iniciar Sesión</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN CENTRAL
        const SB_URL = "https://dakhnqriwbzihlzhtfcb.supabase.co";
        const SB_KEY = "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"; 
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const STATE = {
            user: null,
            balance: 0,
            bet: 100,
            playing: false,
            symbols: ['💎', '⭐️', '🔔', '🍋', '🍒', '7️⃣']
        };

        // GESTIÓN DE INTERFAZ
        const GameUI = {
            loadGame(game) {
                document.getElementById('dashboard').classList.add('hidden');
                document.getElementById('game-window').classList.remove('hidden');
                GameEngine.initReels();
            },
            closeGame() {
                document.getElementById('game-window').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            },
            updateBalance() {
                document.getElementById('display-balance').innerText = `$${STATE.balance.toFixed(2)}`;
            }
        };

        // MOTOR DE JUEGO
        const GameEngine = {
            initReels() {
                for(let i=1; i<=3; i++) {
                    const r = document.getElementById(`reel-${i}`);
                    r.innerHTML = '';
                    for(let s=0; s<50; s++) {
                        const sym = STATE.symbols[Math.floor(Math.random()*STATE.symbols.length)];
                        r.innerHTML += `<div class="symbol">${sym}</div>`;
                    }
                }
            },
            changeBet(amt) {
                STATE.bet = Math.max(25, STATE.bet + amt);
                document.getElementById('display-bet').innerText = `$${STATE.bet}`;
            },
            async spin() {
                if(STATE.playing || STATE.balance < STATE.bet) return;
                
                STATE.playing = true;
                document.getElementById('spin-btn').disabled = true;
                STATE.balance -= STATE.bet;
                GameUI.updateBalance();

                const results = [
                    Math.floor(Math.random()*6),
                    Math.floor(Math.random()*6),
                    Math.floor(Math.random()*6)
                ];

                for(let i=1; i<=3; i++) {
                    const r = document.getElementById(`reel-${i}`);
                    r.style.transition = `transform ${2 + (i*0.5)}s cubic-bezier(0.1, 0, 0.1, 1)`;
                    r.style.transform = `translateY(-${(40 + results[i-1]) * 140}px)`;
                }

                setTimeout(async () => {
                    if(results[0] === results[1] && results[1] === results[2]) {
                        const win = STATE.bet * 10;
                        STATE.balance += win;
                        alert(`¡GANASTE $${win}!`);
                    }
                    
                    await System.syncBalance();
                    STATE.playing = false;
                    document.getElementById('spin-btn').disabled = false;
                    this.resetReels(results);
                }, 4000);
            },
            resetReels(res) {
                for(let i=1; i<=3; i++) {
                    const r = document.getElementById(`reel-${i}`);
                    r.style.transition = 'none';
                    r.style.transform = `translateY(-${res[i-1] * 140}px)`;
                }
            }
        };

        // SISTEMA CORE
        const System = {
            async login() {
                const email = document.getElementById('auth-email').value;
                const pass = document.getElementById('auth-pass').value;

                const { data, error } = await sb.from('usuarios')
                    .select('*').eq('email', email).eq('password', pass).maybeSingle();

                if(data) {
                    STATE.user = data;
                    STATE.balance = data.saldo;
                    document.getElementById('login-screen').classList.add('hidden');
                    GameUI.updateBalance();
                } else {
                    alert("Error de acceso");
                }
            },
            async syncBalance() {
                await sb.from('usuarios').update({ saldo: STATE.balance }).eq('id', STATE.user.id);
            }
        };
    </script>
</body>
</html>
