<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | El Casino #1 de México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --mx-green: #006341; --mx-red: #ce1126; --gold: #fbbf24; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* SCROLL DEL BANCO */
        .bank-scroll-area {
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 8px;
            scroll-behavior: smooth;
        }
        .bank-scroll-area::-webkit-scrollbar { width: 4px; }
        .bank-scroll-area::-webkit-scrollbar-thumb { background: var(--mx-green); border-radius: 10px; }

        .card-game { transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .card-game:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(255,255,255,0.03); }
        
        .spinning { animation: spin 0.15s infinite linear; }
        @keyframes spin { from { transform: translateY(-10px); filter: blur(4px); } to { transform: translateY(10px); filter: blur(4px); } }
        
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast { transform: translateX(120%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="loading" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-[500]">
        <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
        <h2 class="text-white font-black tracking-[0.3em] uppercase text-sm mt-4 italic">Win<span class="text-emerald-500">MX</span></h2>
    </div>

    <header id="nav" class="hidden glass sticky top-0 z-50 py-4 px-8 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 px-3 py-1 rounded font-black italic text-black skew-x-[-15deg]">WinMX</div>
        </div>
        <div class="flex items-center gap-6">
            <div onclick="openBank()" class="cursor-pointer flex items-center gap-3 bg-zinc-900 px-5 py-2 rounded-2xl border border-white/10 hover:border-emerald-500 transition">
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Balance</p>
                    <p id="balance" class="text-emerald-400 font-black text-lg">$0</p>
                </div>
                <i class="fas fa-wallet text-emerald-500"></i>
            </div>
            <button onclick="logout()" class="text-zinc-500 hover:text-red-500 transition"><i class="fas fa-power-off text-xl"></i></button>
        </div>
    </header>

    <div id="auth" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center border-b-4 border-emerald-600">
            <h2 class="text-5xl font-black italic mb-8 italic">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4 mb-8">
                <input id="email" type="email" placeholder="Correo Electrónico" class="w-full bg-zinc-900 p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500">
                <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-900 p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleAuth('up')" class="bg-zinc-800 py-4 rounded-2xl font-bold">REGISTRO</button>
                <button onclick="handleAuth('in')" class="bg-emerald-600 text-black py-4 rounded-2xl font-black uppercase">ENTRAR</button>
            </div>
        </div>
    </div>

    <main id="app" class="hidden p-8 max-w-7xl mx-auto">
        <h2 class="text-2xl font-black mb-8 italic">SALAS <span class="text-emerald-500">VIP</span></h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
            <div onclick="tab('slots')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🎰</div>
                <p class="font-black text-xs uppercase tracking-widest">Tragamonedas</p>
            </div>
            <div onclick="tab('crash')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🚀</div>
                <p class="font-black text-xs uppercase tracking-widest">Crash Win</p>
            </div>
            <div onclick="tab('roulette')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🎯</div>
                <p class="font-black text-xs uppercase tracking-widest">Ruleta MX</p>
            </div>
            <div onclick="tab('flip')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🪙</div>
                <p class="font-black text-xs uppercase tracking-widest">Coin Flip</p>
            </div>
        </div>

        <div id="game-zone">
            <div id="tab-slots" class="tab-content glass p-12 rounded-[3rem] text-center max-w-2xl mx-auto border-t-4 border-emerald-500">
                <div class="flex justify-center gap-4 mb-10">
                    <div id="s1" class="w-24 h-32 bg-zinc-950 rounded-2xl text-6xl flex items-center justify-center border border-white/5">💎</div>
                    <div id="s2" class="w-24 h-32 bg-zinc-950 rounded-2xl text-6xl flex items-center justify-center border border-white/5">💎</div>
                    <div id="s3" class="w-24 h-32 bg-zinc-950 rounded-2xl text-6xl flex items-center justify-center border border-white/5">💎</div>
                </div>
                <button id="btn-slots" onclick="playSlots()" class="w-full max-w-sm bg-emerald-600 text-black py-5 rounded-2xl font-black text-xl italic uppercase">Girar Ahora</button>
            </div>
            </div>
    </main>

    <div id="bank-modal" class="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-4 hidden">
        <div class="bg-zinc-900 w-full max-w-lg rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl relative">
            
            <div class="bg-emerald-600 p-6 flex justify-between items-center text-black">
                <h2 class="text-xl font-black italic tracking-tighter uppercase">Banco WinMX</h2>
                <button onclick="closeBank()" class="text-3xl">&times;</button>
            </div>
            
            <div class="bank-scroll-area p-6">
                <div class="bg-black/40 p-6 rounded-3xl border border-white/5 mb-6 text-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase mb-1">Saldo Disponible</p>
                    <p id="bank-balance" class="text-4xl font-black text-emerald-400">$0.00</p>
                </div>

                <div class="flex gap-2 mb-6 bg-black p-1 rounded-2xl">
                    <button onclick="switchBankTab('dep')" id="tab-btn-dep" class="flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]">DEPOSITAR</button>
                    <button onclick="switchBankTab('ret')" id="tab-btn-ret" class="flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]">RETIRAR</button>
                </div>

                <div id="section-dep" class="space-y-4">
                    <div id="dep-input-group">
                        <input id="in-amt" type="number" placeholder="Monto MXN" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500 text-xl font-bold">
                        <button onclick="processDepositBtn()" class="w-full bg-white text-black py-5 rounded-2xl font-black mt-4 uppercase text-sm">Generar CLABE de Pago</button>
                    </div>
                    <div id="clabe-display" class="hidden bg-emerald-950/20 p-5 rounded-3xl border border-emerald-500/30 text-center">
                        <span class="text-zinc-500 text-[10px] block mb-2 uppercase">Cuenta CLABE SPEI</span>
                        <span id="generated-clabe" class="text-lg font-mono font-bold text-emerald-400 block mb-4 tracking-tighter">---</span>
                        <button onclick="confirmFinalDeposit()" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black text-xs uppercase">Confirmar Transferencia</button>
                    </div>
                </div>

                <div id="section-ret" class="hidden space-y-4">
                    <input id="out-amt" type="number" placeholder="Monto a retirar" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none font-bold">
                    <input id="out-clabe" type="text" maxlength="18" placeholder="Tu CLABE (18 dígitos)" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none font-mono">
                    <button onclick="processWithdrawalBtn()" class="w-full bg-zinc-800 text-red-500 py-5 rounded-2xl font-black uppercase text-sm border border-red-500/20">Solicitar Retiro</button>
                </div>

                <hr class="my-8 border-white/5">

                <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-4 italic">Historial de Transacciones</h3>
                <div id="history-list" class="space-y-2 pb-6">
                    <p class="text-center text-zinc-700 text-[9px] py-4 uppercase font-bold">Sin movimientos aún</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let user = null, saldo = 0, history = [];

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if(session) { user = session.user; await initApp(); } 
            else { document.getElementById('loading').classList.add('hidden'); document.getElementById('auth').classList.remove('hidden'); }
        };

        async function initApp() {
            const { data } = await sb.from('usuarios').select('*').eq('id', user.id).single();
            if(data) {
                saldo = data.saldo; 
                history = JSON.parse(localStorage.getItem(`history_${user.id}`)) || [];
                updateUI();
                renderHistory();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        // LÓGICA DE BOTONES (SIN DESLIZAR)
        function processDepositBtn() {
            const amt = parseInt(document.getElementById('in-amt').value);
            if(!amt || amt < 50) return toast("Mínimo $50 MXN", "err");
            document.getElementById('generated-clabe').innerText = "012" + Math.floor(Math.random() * 1000000000000000);
            document.getElementById('dep-input-group').classList.add('hidden');
            document.getElementById('clabe-display').classList.remove('hidden');
        }

        function confirmFinalDeposit() {
            const amt = parseInt(document.getElementById('in-amt').value);
            saldo += amt;
            addMovement('Depósito', amt);
            updateUI();
            toast("¡Depósito acreditado!", "ok");
            closeBank();
            document.getElementById('dep-input-group').classList.remove('hidden');
            document.getElementById('clabe-display').classList.add('hidden');
            document.getElementById('in-amt').value = "";
        }

        function processWithdrawalBtn() {
            const amt = parseInt(document.getElementById('out-amt').value);
            const clabe = document.getElementById('out-clabe').value;
            if(!amt || amt > saldo) return toast("Saldo insuficiente", "err");
            if(clabe.length !== 18) return toast("CLABE de 18 dígitos requerida", "err");
            
            saldo -= amt;
            addMovement('Retiro', amt, 'En proceso');
            updateUI();
            toast("Solicitud de retiro enviada", "ok");
            closeBank();
            document.getElementById('out-amt').value = "";
            document.getElementById('out-clabe').value = "";
        }

        // UI & SISTEMA
        function updateUI() {
            document.getElementById('balance').innerText = `$${saldo.toLocaleString()}`;
            document.getElementById('bank-balance').innerText = `$${saldo.toLocaleString()}.00`;
            sb.from('usuarios').update({ saldo }).eq('id', user.id).then();
            localStorage.setItem(`history_${user.id}`, JSON.stringify(history));
        }

        function addMovement(type, amount, status = 'Éxito') {
            const time = new Date().toLocaleString();
            history.unshift({ type, amount, status, time });
            if(history.length > 15) history.pop();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if(history.length === 0) return;
            container.innerHTML = history.map(m => `
                <div class="bg-black/30 p-3 rounded-xl flex justify-between items-center border border-white/5 text-[11px]">
                    <div>
                        <p class="font-black ${m.type === 'Depósito' ? 'text-emerald-500' : 'text-red-500'} uppercase">${m.type}</p>
                        <p class="text-[9px] text-zinc-600">${m.time}</p>
                    </div>
                    <div class="text-right font-black">
                        $${m.amount.toLocaleString()}
                        <p class="text-[8px] opacity-40 uppercase">${m.status}</p>
                    </div>
                </div>
            `).join('');
        }

        function switchBankTab(t) {
            document.getElementById('section-dep').classList.toggle('hidden', t !== 'dep');
            document.getElementById('section-ret').classList.toggle('hidden', t !== 'ret');
            document.getElementById('tab-btn-dep').className = t === 'dep' ? "flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]" : "flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]";
            document.getElementById('tab-btn-ret').className = t === 'ret' ? "flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]" : "flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]";
        }

        function openBank() { document.getElementById('bank-modal').classList.remove('hidden'); }
        function closeBank() { document.getElementById('bank-modal').classList.add('hidden'); }
        function tab(id) { document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden')); document.getElementById('tab-'+id).classList.remove('hidden'); }
        function toast(m, t) {
            const c = document.getElementById('notification-container');
            const e = document.createElement('div');
            e.className = `toast glass p-4 rounded-2xl mb-4 border-l-4 ${t==='ok'?'border-emerald-500':'border-red-500'} font-bold text-xs uppercase`;
            e.innerText = m;
            c.appendChild(e);
            setTimeout(() => e.classList.add('show'), 10);
            setTimeout(() => { e.classList.remove('show'); setTimeout(()=>e.remove(), 400); }, 3000);
        }
        async function logout() { await sb.auth.signOut(); location.reload(); }

        // SLOTS SIMPLE
        function playSlots() {
            const btn = document.getElementById('btn-slots');
            const reels = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
            if(saldo < 10) return toast("Saldo insuficiente", "err");
            btn.disabled = true; saldo -= 10; updateUI();
            reels.forEach(r => r.classList.add('spinning'));
            setTimeout(() => {
                reels.forEach(r => { r.classList.remove('spinning'); r.innerText = ["🍒", "💎", "7️⃣", "🔔"][Math.floor(Math.random()*4)]; });
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
