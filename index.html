    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #050505; --mx-card: #111111; }
        
        body { background-color: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass-panel { background: var(--mx-card); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Sistema de Rodillos y Animaciones */
        .slot-box { height: 120px; overflow: hidden; background: #000; border: 2px solid #222; border-radius: 1rem; }
        .slot-item { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }

        /* Botonera Global */
        .btn-main { background: var(--mx-green); color: black; font-weight: 900; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }
        .btn-nav { background: #1a1a1a; border: 1px solid transparent; transition: 0.3s; white-space: nowrap; font-size: 11px; }
        .btn-nav.active { border-color: var(--mx-green); color: var(--mx-green); background: rgba(16, 185, 129, 0.1); }

        /* Estilos de Juegos Específicos */
        .mine-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .mine-btn { aspect-ratio: 1; background: #222; border-radius: 8px; font-size: 1.5rem; transition: 0.2s; }
        .crash-canvas { height: 250px; background: radial-gradient(circle at bottom left, #10b98122, transparent); border-radius: 2rem; position: relative; overflow: hidden; border: 1px solid #222; }
        
        .hidden-view { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes bounce-light { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-win { animation: bounce-light 0.5s infinite; }
    </style>
</head>

                tower: { name: "Fortune Tower", desc: "Escala hasta la cima", min: "x1.5", max: "x50", rules: "Sube piso por piso. En cada nivel hay una trampa. Si llegas arriba, ganas el Jackpot." },
                wheel: { name: "Mega Wheel", desc: "Gira la fortuna", min: "x1", max: "x40", rules: "Una rueda gigante con diferentes premios. El segmento dorado paga x40." }
            },
            tpl: {
                slots: `<div class="grid grid-cols-3 gap-4 w-full max-w-md">

                            <div id="c-mult" class="text-7xl font-casino">1.00x</div>

                            <div class="grid grid-cols-2 gap-4"><button onclick="Logic.roulette.play('red')" class="bg-red-600 py-6 rounded-2xl font-bold">ROJO x2</button>

                            <div class="grid grid-cols-2 gap-4"><button onclick="Logic.cards.play('up')" class="bg-emerald-500/20 text-emerald-500 py-4 rounded-xl font-bold border border-emerald-500/30">MÁS ALTA</button>
                            <button onclick="Logic.cards.play('down')" class="bg-red-500/20 text-red-500 py-4 rounded-xl font-bold border border-red-500/30">MÁS BAJA</button></div></div>`,

        // --- LÓGICA DE MOTOR DE JUEGO ---
        const Logic = {
            async pre() {
                if(State.playing || State.balance < State.bet) { UI.notify("Saldo insuficiente o jugada en curso", "error"); return false; }
                State.playing = true; State.balance -= State.bet; UI.up();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async post(win, label) {
                if(win > 0) {
                    State.balance += win; UI.up();
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    UI.notify(`¡GANASTE $${win.toLocaleString()}!`, "success");
                }
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win - State.bet, label: label, status: 'completed' }]);
                Core.fHist(); State.playing = false;
            },
            slots: {
                init() {
                    [1,2,3].forEach(id => {
                        const r = document.getElementById(`r-${id}`); r.innerHTML = '';
                        Array(60).fill(SYM).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`);
                    });
                },
                async play() {
                    if(!await Logic.pre()) return;
                    State.spins++;
                    const res = [SYM[Math.floor(Math.random()*6)], SYM[Math.floor(Math.random()*6)], SYM[Math.floor(Math.random()*6)]];
                    const pts = { '7️⃣7️⃣7️⃣': 500, '💎💎💎': 100, '⭐️⭐️⭐️': 50, '🔔🔔🔔': 20, '🍋🍋🍋': 10, '🍒🍒🍒': 5 };
                    const mult = pts[res.join('')] || 0;
                    [1,2,3].forEach((id, i) => {
                        const r = document.getElementById(`r-${id}`);
                        r.style.transform = `translateY(-${(State.spins * 120 * 12) + (SYM.indexOf(res[i]) * 120)}px)`;
                    });
                    setTimeout(() => Logic.post(State.bet * mult, mult > 0 ? 'SLOT WIN' : 'SLOT LOSS'), 3500);
                }
            },
            mines: {
                bombs: [], revealed: 0, mult: 1, active: false,
                init() {
                    const b = document.getElementById('mine-board'); b.innerHTML = '';
                    for(let i=0; i<25; i++) b.innerHTML += `<button onclick="Logic.mines.flip(${i}, this)" class="mine-btn">?</button>`;
                },
                async flip(i, el) {
                    if(!this.active) {
                        if(!await Logic.pre()) return;
                        this.active = true; this.bombs = Array.from({length: 25}, (_, k) => k).sort(() => Math.random() - 0.5).slice(0, 3);
                        this.revealed = 0; this.mult = 1.2;
                        document.getElementById('mine-cashout').classList.remove('hidden');
                    }
                    if(el.disabled) return;
                    el.disabled = true;
                    if(this.bombs.includes(i)) {
                        el.innerText = '💣'; el.style.background = '#ef4444';
                        UI.notify("¡BOOM! Perdiste", "error");
                        this.endGame(false);
                    } else {
                        el.innerText = '💎'; el.style.background = '#10b98133';
                        this.revealed++; this.mult = parseFloat((this.mult * 1.4).toFixed(2));
                        document.getElementById('mine-cashout').innerText = `Retirar $${(State.bet * this.mult).toFixed(0)}`;
                        if(this.revealed === 22) this.cashout();
                    }
                },
                cashout() { if(this.active) this.endGame(true); },
                endGame(win) {
                    this.active = false; State.playing = false;
                    document.getElementById('mine-cashout').classList.add('hidden');
                    if(win) Logic.post(Math.floor(State.bet * this.mult), 'MINAS WIN');
                    else Logic.post(0, 'MINAS LOSS');
                    setTimeout(() => this.init(), 2000);
                }
            },
            crash: {
                async toggle() {
                    if(State.crashActive) { this.cashout(); return; }
                    if(!await Logic.pre()) return;
                    const btn = document.getElementById('c-btn');
                    btn.innerText = "CASH OUT"; btn.classList.replace('btn-main', 'bg-red-600');
                    State.crashActive = true; State.crashMult = 1.0;
                    const limit = Math.random() * 5 + 1;
                    this.loop = setInterval(() => {
                        State.crashMult += 0.01;
                        document.getElementById('c-mult').innerText = State.crashMult.toFixed(2) + "x";
                        document.getElementById('c-rocket').style.transform = `translate(${State.crashMult*10}px, -${State.crashMult*10}px)`;
                        if(State.crashMult >= limit) {
                            clearInterval(this.loop);
                            this.explode();
                        }
                    }, 50);
                },
                explode() {
                    State.crashActive = false;
                    document.getElementById('c-mult').classList.add('text-red-600');
                    document.getElementById('c-rocket').innerText = "💥";
                    setTimeout(() => {
                        document.getElementById('c-mult').classList.remove('text-red-600');
                        document.getElementById('c-rocket').innerText = "🚀";
                        document.getElementById('c-btn').innerText = "REINTENTAR";
                        document.getElementById('c-btn').classList.replace('bg-red-600', 'btn-main');
                        Logic.post(0, 'CRASH LOSS');
                    }, 2000);
                },
                cashout() {
                    clearInterval(this.loop);
                    State.crashActive = false;
                    Logic.post(Math.floor(State.bet * State.crashMult), 'CRASH WIN');
                    document.getElementById('c-btn').innerText = "GANASTE!";
                    document.getElementById('c-btn').classList.replace('bg-red-600', 'btn-main');
                }
            },
            roulette: {
                async play(c) {
                    if(!await Logic.pre()) return;
                    const w = document.getElementById('roul-val');
                    w.style.transform = `rotate(${Math.random()*2000}deg)`;
                    setTimeout(() => {
                        const n = Math.floor(Math.random()*15);
                        const isR = n % 2 === 0 && n !== 0;
                        const res = n === 0 ? 'green' : (isR ? 'red' : 'black');
                        w.innerText = n; w.style.borderColor = res === 'red' ? '#ef4444' : (res === 'black' ? '#fff' : '#10b981');
                        Logic.post(c === res ? State.bet * 2 : 0, 'ROULETTE');
                    }, 1000);
                }
            },
            dice: {
                async play(c) {
                    if(!await Logic.pre()) return;
                    setTimeout(() => {
                        const v1 = Math.floor(Math.random()*6)+1, v2 = Math.floor(Math.random()*6)+1, s = v1+v2;
                        document.getElementById('d-1').innerText = v1; document.getElementById('d-2').innerText = v2;
                        const win = (c === 'low' && s < 7) || (c === 'high' && s > 7);
                        Logic.post(win ? State.bet * 2 : 0, 'DICE');
                    }, 800);
                }
            },
            cards: {
                async play(c) {
                    if(!await Logic.pre()) return;
                    const old = parseInt(document.getElementById('card-v').innerText);
                    const v = Math.floor(Math.random()*13)+1, s = ['♥️','♦️','♠️','♣️'][Math.floor(Math.random()*4)];
                    document.getElementById('card-v').innerText = v; document.getElementById('card-s').innerText = s;
                    const win = (c === 'up' && v > old) || (c === 'down' && v < old);
                    Logic.post(win ? State.bet * 2 : 0, 'CARDS');
                }
            },
            chests: {
                async play(i) {
                    if(!await Logic.pre()) return;
                    const r = [0, 2, 10].sort(() => Math.random() - 0.5);
                    Logic.post(State.bet * r[i], 'CHESTS');
                }
            },
            target: {
                async play() {
                    if(!await Logic.pre()) return;
                    const r = [0, 0, 1.5, 5, 50][Math.floor(Math.random()*5)];
                    Logic.post(State.bet * r, 'TARGET');
                }
            },
            plinko: {
                async play() {
                    if(!await Logic.pre()) return;
                    const r = [5, 2, 0, 5, 0, 2, 5][Math.floor(Math.random()*7)];
                    Logic.post(State.bet * r, 'PLINKO');
                }
            },
            horses: {
                async play(i) {
                    if(!await Logic.pre()) return;
                    const win = Math.floor(Math.random()*4)+1 === i;
                    Logic.post(win ? State.bet * (i*2) : 0, 'HORSES');
                }
            },
            tower: {
                async play() {
                    if(!await Logic.pre()) return;
                    const win = Math.random() > 0.5;
                    Logic.post(win ? State.bet * 2 : 0, 'TOWER');
                }
            },
            wheel: {
                async play() {
                    if(!await Logic.pre()) return;
                    const w = document.getElementById('wheel-obj');
                    w.style.transform = `rotate(${Math.random()*3000}deg)`;
                    setTimeout(() => {
                        const r = [1, 2, 5, 10, 40][Math.floor(Math.random()*5)];
                        w.innerText = 'x' + r;
                        Logic.post(State.bet * r, 'WHEEL');
                    }, 3000);
                }
            }
        };

        const Auth = {
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    State.user = session.user;
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden-view');
                    setTimeout(() => document.getElementById('app').classList.add('opacity-100'), 50);
                    this.load(); Router.to('slots');
                } else { window.location.href = 'login.html'; }
            },
            async load() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                State.balance = data.saldo || 0; UI.up(); Core.fHist();
            },
            logout() { sb.auth.signOut(); location.reload(); }
        };

        const Engine = {
            updateBet(v) { State.bet = Math.max(10, State.bet + v); UI.upBet(); },
            setBet(v) { State.bet = Math.max(10, Math.floor(v)); UI.upBet(); }
        };

        const UI = {
            up() { document.getElementById('bal-display').innerText = `$${State.balance.toLocaleString()}`; },
            upBet() { document.getElementById('bet-val').innerText = `$${State.bet.toLocaleString()}`; },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInUp ${t==='success'?'bg-emerald-500 text-black':'bg-red-600'}`;
                n.innerText = m; document.getElementById('notif-box').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            modal(id, s=true) { document.getElementById(id).classList.toggle('hidden', !s); },
            depNext() {
                if(!document.getElementById('dep-in').value) return;
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            },
            fReady() { document.getElementById('f-label').innerText = "LISTO ✅"; },
            renderHist(data) {
                document.getElementById('history-log').innerHTML = data.map(i => `
                    <div class="p-3 bg-white/5 rounded-xl flex justify-between items-center text-[10px] border border-white/5">
                        <span class="font-bold text-zinc-500">${i.label}</span>
                        <span class="font-casino ${i.amount >= 0 ? 'text-emerald-500' : 'text-zinc-600'}">${i.amount>=0?'+':''}$${Math.abs(i.amount)}</span>
                    </div>`).join('');
            }
        };

        const Core = {
            async fHist() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false }).limit(10);
                UI.renderHist(data || []);
            },
            async saveDep() {
                const amt = document.getElementById('dep-in').value;
                const file = document.getElementById('f-dep').files[0];
                if(!amt || !file) return UI.notify("Sube el comprobante", "error");
                const btn = document.getElementById('btn-confirm-dep');
                btn.disabled = true; btn.innerText = "...";
                const path = `evidence/${State.user.id}/${Date.now()}.png`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'DEPÓSITO', status: 'pending', evidence_url: publicUrl }]);
                UI.notify("Enviado con éxito", "success"); UI.modal('modal-dep', false);
            }
        };

        // Iniciar carga
        let p = 0; const t = setInterval(() => { p += 10; document.getElementById('load-bar').style.width = p+'%'; if(p>=100){ clearInterval(t); Auth.check(); } }, 150);
    </script>
</body>
</html>
