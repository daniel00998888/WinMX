<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Casino Simulado</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1d2a;
      color: white;
      text-align: center;
    }

    header {
      background: #102c3c;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
    }

    .saldo {
      margin: 10px;
      font-size: 20px;
      color: #00ffcc;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .card {
      background: #16394f;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #00c896;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00a87d;
    }

    input {
      padding: 8px;
      width: 80%;
      margin-top: 10px;
    }

    .resultado {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>🎰 Casino Simulado</header>
<div class="saldo">Saldo: $<span id="saldo">1000</span></div>

<div class="container">

  <!-- SLOT -->
  <div class="card">
    <h3>🎰 Slot</h3>
    <input type="number" id="apuestaSlot" placeholder="Apuesta">
    <button onclick="jugarSlot()">Girar</button>
    <div class="resultado" id="resSlot"></div>
  </div>

  <!-- DADO -->
  <div class="card">
    <h3>🎲 Dado (1-6)</h3>
    <input type="number" id="apuestaDado" placeholder="Apuesta">
    <button onclick="jugarDado()">Lanzar</button>
    <div class="resultado" id="resDado"></div>
  </div>

  <!-- RULETA SIMPLE -->
  <div class="card">
    <h3>🎡 Ruleta (Rojo/Negro)</h3>
    <input type="number" id="apuestaRuleta" placeholder="Apuesta">
    <select id="color">
      <option value="rojo">Rojo</option>
      <option value="negro">Negro</option>
    </select>
    <button onclick="jugarRuleta()">Girar</button>
    <div class="resultado" id="resRuleta"></div>
  </div>

</div>

<script>
let saldo = 1000;

function actualizarSaldo() {
  document.getElementById("saldo").innerText = saldo;
}

function jugarSlot() {
  let apuesta = parseInt(document.getElementById("apuestaSlot").value);
  if (!apuesta || apuesta > saldo) return;

  let r = Math.random();
  if (r < 0.3) {
    saldo += apuesta;
    document.getElementById("resSlot").innerText = "Ganaste!";
  } else {
    saldo -= apuesta;
    document.getElementById("resSlot").innerText = "Perdiste";
  }
  actualizarSaldo();
}

function jugarDado() {
  let apuesta = parseInt(document.getElementById("apuestaDado").value);
  if (!apuesta || apuesta > saldo) return;

  let dado = Math.floor(Math.random() * 6) + 1;

  if (dado >= 4) {
    saldo += apuesta;
    document.getElementById("resDado").innerText = "Salió " + dado + " → Ganaste";
  } else {
    saldo -= apuesta;
    document.getElementById("resDado").innerText = "Salió " + dado + " → Perdiste";
  }
  actualizarSaldo();
}

function jugarRuleta() {
  let apuesta = parseInt(document.getElementById("apuestaRuleta").value);
  let color = document.getElementById("color").value;

  if (!apuesta || apuesta > saldo) return;

  let resultado = Math.random() < 0.5 ? "rojo" : "negro";

  if (resultado === color) {
    saldo += apuesta;
    document.getElementById("resRuleta").innerText = "Salió " + resultado + " → Ganaste";
  } else {
    saldo -= apuesta;
    document.getElementById("resRuleta").innerText = "Salió " + resultado + " → Perdiste";
  }
  actualizarSaldo();
}
</script>

</body>
</html>
