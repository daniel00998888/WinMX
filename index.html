<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1625, #1a2a3f);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .neon-text {
            text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee;
        }
        .reel {
            width: 90px;
            height: 90px;
            background: #0f1c2e;
            border: 3px solid #22d3ee;
            border-radius: 12px;
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
            transition: all 0.3s ease;
        }
        .reel.spinning {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: translateY(-300%); }
            100% { transform: translateY(0); }
        }
        .game-card {
            background: rgba(15, 28, 46, 0.95);
            border: 1px solid #334155;
        }
        .chat-box {
            scrollbar-width: thin;
            scrollbar-color: #22d3ee #1e2937;
        }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- HEADER -->
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-4 px-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-2xl font-bold tracking-wider neon-text">CASINO REAL</h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="text-xl font-semibold text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" 
                        class="flex items-center gap-2 bg-red-600 hover:bg-red-700 px-5 py-2 rounded-xl transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Salir</span>
                </button>
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="auth" class="min-h-screen flex items-center justify-center">
        <div class="bg-zinc-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-8">
                <span class="text-6xl">🎰</span>
                <h2 class="text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">Accede a tu cuenta</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-cyan-400">
            <input id="pass" type="password" placeholder="Contraseña" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-cyan-400">
            <div class="flex gap-4">
                <button onclick="register()" 
                        class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-semibold transition">
                    Registrarse
                </button>
                <button onclick="login()" 
                        class="flex-1 bg-cyan-500 hover:bg-cyan-600 text-black py-4 rounded-2xl font-semibold transition">
                    Entrar
                </button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[24px]"></p>
        </div>
    </div>

    <!-- CASINO MAIN -->
    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen">
            <!-- SIDEBAR -->
            <div class="w-72 bg-zinc-950 border-r border-zinc-800 p-6 flex flex-col">
                <h3 class="text-cyan-400 font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-gamepad"></i> JUEGOS
                </h3>
                <div onclick="showGame('slot')" class="game-btn cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition">
                    <span class="text-2xl">🎰</span>
                    <span class="font-medium">Slots</span>
                </div>
                <div onclick="showGame('roulette')" class="game-btn cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition">
                    <span class="text-2xl">🎡</span>
                    <span class="font-medium">Ruleta</span>
                </div>
                <div onclick="showGame('dice')" class="game-btn cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-2 flex items-center gap-3 transition">
                    <span class="text-2xl">🎲</span>
                    <span class="font-medium">Dados</span>
                </div>
                <div onclick="showGame('bj')" class="game-btn cursor-pointer hover:bg-zinc-900 p-4 rounded-2xl mb-8 flex items-center gap-3 transition">
                    <span class="text-2xl">🃏</span>
                    <span class="font-medium">Blackjack</span>
                </div>

                <h3 class="text-cyan-400 font-semibold text-lg mb-4 flex items-center gap-2">
                    <i class="fas fa-trophy"></i> TOP JUGADORES
                </h3>
                <div id="rankingBox" class="flex-1 space-y-3"></div>
            </div>

            <!-- CONTENT -->
            <div class="flex-1 p-8 overflow-auto">
                <!-- SLOTS -->
                <div id="slot" class="game hidden">
                    <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">
                        <span>🎰</span> Máquina Tragamonedas
                    </h2>
                    <div class="max-w-md mx-auto">
                        <div class="reels flex justify-center gap-4 mb-8">
                            <div class="reel" id="r1">🍒</div>
                            <div class="reel" id="r2">💎</div>
                            <div class="reel" id="r3">7️⃣</div>
                        </div>
                        <div class="flex gap-4 max-w-xs mx-auto">
                            <input id="betSlot" type="number" placeholder="Apuesta" 
                                   class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 text-center text-xl focus:outline-none focus:border-cyan-400">
                            <button onclick="spinSlot()" 
                                    class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 px-10 py-4 rounded-2xl font-bold text-lg transition">
                                GIRAR
                            </button>
                        </div>
                        <p id="slotRes" class="text-center mt-6 text-2xl font-semibold min-h-[60px]"></p>
                    </div>
                </div>

                <!-- Otros juegos (mantengo simples pero con mejor estilo) -->
                <div id="roulette" class="game hidden">
                    <h2 class="text-3xl font-bold mb-6">🎡 Ruleta</h2>
                    <div class="game-card p-8 rounded-3xl max-w-md mx-auto text-center">
                        <input id="betRou" type="number" placeholder="Apuesta" class="bg-zinc-800 w-full py-4 rounded-2xl text-center mb-4">
                        <select id="color" class="bg-zinc-800 w-full py-4 rounded-2xl mb-6">
                            <option value="rojo">🔴 Rojo</option>
                            <option value="negro">⚫ Negro</option>
                        </select>
                        <button onclick="spinRoulette()" class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl">Girar Ruleta</button>
                        <p id="rouRes" class="mt-6 text-xl"></p>
                    </div>
                </div>

                <div id="dice" class="game hidden">
                    <h2 class="text-3xl font-bold mb-6">🎲 Dados</h2>
                    <div class="game-card p-8 rounded-3xl max-w-md mx-auto text-center">
                        <input id="betDice" type="number" placeholder="Apuesta" class="bg-zinc-800 w-full py-4 rounded-2xl text-center mb-6">
                        <button onclick="playDice()" class="w-full bg-amber-600 hover:bg-amber-700 py-5 rounded-2xl font-bold text-xl">Lanzar Dados</button>
                        <p id="diceRes" class="mt-8 text-3xl"></p>
                    </div>
                </div>

                <div id="bj" class="game hidden">
                    <h2 class="text-3xl font-bold mb-6">🃏 Blackjack</h2>
                    <div class="game-card p-8 rounded-3xl max-w-md mx-auto text-center">
                        <input id="betBJ" type="number" placeholder="Apuesta" class="bg-zinc-800 w-full py-4 rounded-2xl text-center mb-6">
                        <button onclick="playBJ()" class="w-full bg-purple-600 hover:bg-purple-700 py-5 rounded-2xl font-bold text-xl">Jugar Mano</button>
                        <p id="bjRes" class="mt-8 text-xl font-mono"></p>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div class="w-80 bg-zinc-950 border-l border-zinc-800 flex flex-col">
                <div class="p-4 border-b border-zinc-800 bg-zinc-900">
                    <h3 class="font-semibold flex items-center gap-2"><i class="fas fa-comments text-cyan-400"></i> Chat en Vivo</h3>
                </div>
                <div id="chatBox" class="chat-box flex-1 p-4 overflow-auto text-sm space-y-3"></div>
                <div class="p-4 border-t border-zinc-800 bg-zinc-900">
                    <div class="flex gap-2">
                        <input id="chatInput" placeholder="Mensaje..." 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-cyan-400">
                        <button onclick="sendMsg()" 
                                class="bg-cyan-500 text-black px-6 rounded-2xl font-semibold">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti" class="fixed inset-0 pointer-events-none z-50 hidden"></canvas>

    <script>
        // === SUPABASE ===
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;

        // === HELPERS ===
        function msg(text, color = "text-white") {
            const el = document.getElementById("msg");
            el.innerHTML = `<span class="${color}">${text}</span>`;
        }

        function val(id) {
            return document.getElementById(id).value.trim();
        }

        function formatSaldo(n) {
            return new Intl.NumberFormat('es-MX').format(n);
        }

        function updateSaldo() {
            document.getElementById("saldo").innerText = "$" + formatSaldo(saldo);
        }

        // Confetti
        function launchConfetti() {
            const canvas = document.getElementById("confetti");
            canvas.classList.remove("hidden");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext("2d");
            let particles = [];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 5,
                    speed: Math.random() * 6 + 4,
                    color: ['#22d3ee', '#eab308', '#a855f7', '#ec4899'][Math.floor(Math.random()*4)],
                    angle: Math.random() * 360
                });
            }

            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, i) => {
                    p.y += p.speed;
                    p.angle += 5;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
                    ctx.restore();

                    if (p.y > canvas.height) particles.splice(i, 1);
                });

                if (particles.length > 0 && frame < 120) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.classList.add("hidden");
                }
                frame++;
            }
            animate();
        }

        // === AUTH ===
        async function register() {
            msg("Registrando...");
            const { error } = await sb.auth.signUp({
                email: val("email"),
                password: val("pass")
            });
            msg(error ? error.message : "✅ Revisa tu correo para confirmar", error ? "text-red-400" : "text-green-400");
        }

        async function login() {
            msg("Iniciando sesión...");
            const { data, error } = await sb.auth.signInWithPassword({
                email: val("email"),
                password: val("pass")
            });
            if (error) {
                msg(error.message, "text-red-400");
                return;
            }
            user = data.user;
            startCasino();
        }

        // === INICIO DEL CASINO ===
        async function startCasino() {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("casino").classList.remove("hidden");
            document.getElementById("topbar").classList.remove("hidden");

            const { data } = await sb.from("usuarios").select("*").eq("id", user.id).single();
            
            if (!data) {
                await sb.from("usuarios").insert([{ id: user.id, saldo: 2000 }]);
                saldo = 2000;
            } else {
                saldo = data.saldo;
            }

            updateSaldo();
            loadRanking();
            initChat();
            showGame('slot'); // Abre Slots por defecto
        }

        async function saveSaldo() {
            if (!user) return;
            await sb.from("usuarios").update({ saldo }).eq("id", user.id);
        }

        // === NAVEGACIÓN ===
        function showGame(gameId) {
            document.querySelectorAll('.game').forEach(g => g.classList.add('hidden'));
            document.getElementById(gameId).classList.remove('hidden');
        }

        // === JUEGOS ===
        async function spinSlot() {
            let bet = parseInt(val("betSlot"));
            if (!bet || bet <= 0 || bet > saldo) {
                document.getElementById("slotRes").innerHTML = `<span class="text-red-400">Apuesta inválida</span>`;
                return;
            }

            const r1 = document.getElementById('r1');
            const r2 = document.getElementById('r2');
            const r3 = document.getElementById('r3');

            // Animación de giro
            r1.classList.add('spinning');
            r2.classList.add('spinning');
            r3.classList.add('spinning');

            await new Promise(r => setTimeout(r, 1600));

            r1.classList.remove('spinning');
            r2.classList.remove('spinning');
            r3.classList.remove('spinning');

            const symbols = ["🍒", "💎", "7️⃣", "⭐", "🍀", "🔔", "🍉"];
            let a = symbols[Math.floor(Math.random() * symbols.length)];
            let b = symbols[Math.floor(Math.random() * symbols.length)];
            let c = symbols[Math.floor(Math.random() * symbols.length)];

            r1.innerText = a;
            r2.innerText = b;
            r3.innerText = c;

            const win = (a === b && b === c);
            const multiplier = win ? 12 : -1;
            saldo += bet * multiplier;

            const resEl = document.getElementById("slotRes");
            if (win) {
                resEl.innerHTML = `<span class="text-yellow-400 text-3xl">¡GRAN GANADOR! +$${bet * 12}</span>`;
                launchConfetti();
            } else {
                resEl.innerHTML = `<span class="text-red-400">-$${bet}</span>`;
            }

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function spinRoulette() {
            let bet = parseInt(val("betRou"));
            if (!bet || bet > saldo || bet <= 0) return alert("Apuesta inválida");

            const chosen = val("color");
            const result = Math.random() < 0.5 ? "rojo" : "negro";
            const win = result === chosen;

            saldo += win ? bet : -bet;

            document.getElementById("rouRes").innerHTML = `
                Salió <span class="${result === 'rojo' ? 'text-red-500' : 'text-zinc-300'} font-bold">${result.toUpperCase()}</span>
                ${win ? ' → ¡Ganaste!' : ' → Perdiste'}
            `;

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function playDice() {
            let bet = parseInt(val("betDice"));
            if (!bet || bet > saldo || bet <= 0) return;

            const roll = Math.floor(Math.random() * 6) + 1;
            const win = roll >= 4;
            saldo += win ? bet : -bet;

            document.getElementById("diceRes").innerHTML = `
                Salió <span class="text-4xl">${roll}</span><br>
                ${win ? '<span class="text-green-400">¡Ganaste!</span>' : '<span class="text-red-400">Perdiste</span>'}
            `;

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function playBJ() {
            let bet = parseInt(val("betBJ"));
            if (!bet || bet > saldo || bet <= 0) return;

            const player = Math.floor(Math.random() * 10) + 12;
            const dealer = Math.floor(Math.random() * 10) + 12;

            const win = (player > dealer && player <= 21) || dealer > 21;
            saldo += win ? bet : -bet;

            document.getElementById("bjRes").innerHTML = `
                Tú: <span class="font-bold">${player}</span> | Dealer: <span class="font-bold">${dealer}</span><br>
                <span class="${win ? 'text-green-400' : 'text-red-400'}">${win ? '¡Ganaste!' : 'Perdiste'}</span>
            `;

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        // === CHAT ===
        function initChat() {
            const channel = sb.channel('chat-room');

            channel.on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'chat'
            }, (payload) => {
                const box = document.getElementById("chatBox");
                box.innerHTML += `<div class="bg-zinc-900 p-3 rounded-2xl"><strong class="text-cyan-400">Usuario:</strong> ${payload.new.mensaje}</div>`;
                box.scrollTop = box.scrollHeight;
            }).subscribe();
        }

        async function sendMsg() {
            const text = val("chatInput");
            if (!text) return;

            await sb.from("chat").insert([{ user_id: user.id, mensaje: text }]);
            document.getElementById("chatInput").value = "";
        }

        // === RANKING ===
        async function loadRanking() {
            const { data } = await sb.from("usuarios")
                .select("saldo")
                .order("saldo", { ascending: false })
                .limit(5);

            let html = "";
            data.forEach((u, i) => {
                html += `<div class="flex justify-between bg-zinc-900 p-3 rounded-2xl">
                    <span>#${i+1}</span>
                    <span class="text-yellow-300">$${formatSaldo(u.saldo)}</span>
                </div>`;
            });
            document.getElementById("rankingBox").innerHTML = html;
        }

        // === LOGOUT ===
        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        // === INIT ===
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                startCasino();
            }
        };

        // Botones de auth
        // (se usan onclick en HTML)
    </script>
</body>
</html>
