<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .hidden-view { display: none !important; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-8 bg-black">
        
        <div id="login-form" class="glass p-8 w-full max-w-sm text-center animate__animated animate__fadeIn">
            <h2 class="text-3xl font-casino mb-10 italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Correo" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <input id="login-password" type="password" placeholder="Contraseña" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino mt-2">ENTRAR</button>
                <div class="pt-4 border-t border-white/5">
                    <button onclick="AuthManager.switchView('register')" class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">¿No tienes cuenta? <span class="text-emerald-500">Regístrate</span></button>
                </div>
            </div>
        </div>

        <div id="register-form" class="hidden-view glass p-8 w-full max-w-sm text-center animate__animated animate__fadeIn">
            <h2 class="text-3xl font-casino mb-8 italic tracking-tighter text-emerald-500">Registro</h2>
            <div class="space-y-4">
                <input id="reg-email" type="email" placeholder="Correo electrónico" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <input id="reg-password" type="password" placeholder="Crear contraseña" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                
                <div class="bg-emerald-500/5 border border-emerald-500/20 p-4 rounded-2xl text-left">
                    <div class="flex items-start gap-3">
                        <input type="checkbox" id="terms-check" class="mt-1 accent-emerald-500 scale-125">
                        <label for="terms-check" class="text-[10px] text-zinc-400 leading-tight">
                            Confirmo que soy <b>mayor de edad (+18)</b>. Acepto que el juego conlleva riesgos de pérdida económica y que esta plataforma no se hace responsable por daños derivados del uso de la misma. Juego con responsabilidad.
                        </label>
                    </div>
                </div>

                <button onclick="AuthManager.register()" class="btn-action w-full py-4 font-casino mt-2">CREAR MI CUENTA</button>
                <button onclick="AuthManager.switchView('login')" class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest mt-2 block w-full">Volver al inicio</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        <header class="p-5 flex justify-between items-center bg-black/40 border-b border-white/5">
            <span class="font-casino italic text-xl tracking-tighter">WIN<span class="text-emerald-500">MX</span></span>
            <div class="balance-pill">
                <span id="balance-display" class="font-casino text-emerald-500 text-lg tracking-tight">$0.00</span>
                <div onclick="UI.openModal('modal-deposit')" class="btn-plus active:scale-90 transition-transform cursor-pointer"><i class="fas fa-plus"></i></div>
            </div>
        </header>

        <div id="view-lobby" class="view-content p-5 space-y-6">
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-800 p-6 rounded-[2.2rem] shadow-xl">
                <h2 class="text-2xl font-casino italic text-white">Suerte hoy</h2>
                <p class="text-[9px] font-bold text-emerald-100 uppercase tracking-widest mt-1 opacity-70">Sistema Realtime 2.0 Activo</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="Router.openGame('slots')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Minas</span></div>
                <div onclick="Router.openGame('crash')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🚀</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Aviator</span></div>
                <div onclick="Router.openGame('tower')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🗼</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Torre</span></div>
            </div>
        </div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-600 text-[10px] font-bold uppercase flex items-center"><i class="fas fa-arrow-left mr-2"></i> Volver al Lobby</button>
            <div id="game-mount" class="w-full"></div>
        </div>

        <div id="view-profile" class="view-content p-5 space-y-4 hidden-view">
            <div class="glass p-10 text-center">
                <div class="w-24 h-24 bg-emerald-500 rounded-full mx-auto mb-6 flex items-center justify-center text-black text-4xl font-black"><i class="fas fa-user"></i></div>
                <p id="user-email-display" class="text-sm font-bold text-zinc-300 truncate mb-1">Cargando...</p>
                <button onclick="AuthManager.logout()" class="w-full p-4 rounded-2xl border border-red-500/20 text-red-500 font-casino text-[10px] bg-red-500/5 mt-6">Cerrar Sesión</button>
            </div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">
            <div onclick="Router.showView('lobby')" class="nav-item active"><i class="fas fa-gamepad text-xl mb-1"></i><span>Jugar</span></div>
            <div onclick="Router.showView('profile')" class="nav-item"><i class="fas fa-user-circle text-xl mb-1"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        let State = { user: null, balance: 0, isSpinning: false, totalSpins: 0 };

        const AuthManager = {
            switchView(view) {
                if(view === 'register') {
                    document.getElementById('login-form').classList.add('hidden-view');
                    document.getElementById('register-form').classList.remove('hidden-view');
                } else {
                    document.getElementById('register-form').classList.add('hidden-view');
                    document.getElementById('login-form').classList.remove('hidden-view');
                }
            },
            async login() {
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) UI.notify("Error en datos", "error"); else location.reload();
            },
            async register() {
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-password').value;
                const terms = document.getElementById('terms-check').checked;

                if(!email || !pass) return UI.notify("Faltan datos", "error");
                if(!terms) return UI.notify("Acepta los términos", "error");

                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if(!error && data.user) {
                    await sb.from('usuarios').insert([{ id: data.user.id, saldo: 0, email: email }]);
                    UI.notify("Cuenta creada. ¡Inicia sesión!", "success");
                    this.switchView('login');
                } else UI.notify("Error al registrar", "error");
            },
            logout() { sb.auth.signOut().then(() => location.reload()); }
        };

        const Router = {
            showView(v) {
                document.querySelectorAll('.view-content').forEach(el => el.classList.add('hidden-view'));
                document.getElementById(`view-${v}`).classList.remove('hidden-view');
                if(v === 'profile') document.getElementById('user-email-display').innerText = State.user.email;
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = `<div class='glass p-10 text-center'><h2 class='font-casino text-emerald-500'>${game}</h2><p class='text-xs mt-4'>Cargando motor de juego...</p></div>`;
                // Aquí irían las lógicas de juegos que ya teníamos
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            notify(m, t) {
                const c = document.getElementById('notif-container'), n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-black uppercase shadow-2xl animate__animated animate__fadeInDown ${t === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-600 text-white'}`;
                n.innerText = m; c.appendChild(n); setTimeout(() => n.remove(), 3000);
            }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) { 
                    State.user = session.user; 
                    document.getElementById('main-app').classList.remove('hidden-view'); 
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                    State.balance = data ? data.saldo : 0; UI.updateBalance();
                } else { 
                    document.getElementById('auth-view').classList.remove('hidden-view'); 
                }
            }
        };

        Core.init();
    </script>
</body>
</html>
