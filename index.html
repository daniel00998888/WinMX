            activeTab: 'bets',
            symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'],
            xp: 0
        };

        // 2. MOTOR DE SONIDO (Web Audio API)
        const Sound = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(type) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                if(type === 'spin') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                } else if(type === 'win') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3);
                } else if(type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.05);
                }
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            }
        };

        // 3. CORE: AUTENTICACIÓN Y DATOS
        const Core = {
            async init() {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {

                } else {

                setTimeout(() => document.getElementById('global-loader').style.opacity = '0', 500);
                setTimeout(() => document.getElementById('global-loader').classList.add('hidden'), 1200);

            async handleAuth() {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                if(!email || !password) return UI.notify("Ingresa credenciales", "error");

                UI.loadingBtn('auth-btn', true);
                const { data, error } = await sb.auth.signInWithPassword({ email, password });

            async fetchHistory() {

            async confirmDeposit() {
                const fileInput = document.getElementById('receipt-input');
                const amt = parseFloat(document.getElementById('dep-amount').value);
                
                if(!amt || isNaN(amt)) return UI.notify("Monto inválido", "error");

                UI.loadingBtn('final-dep-btn', true);
                const file = fileInput.files[0];

                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(path);

                await sb.from('history').insert({

                    type: 'deposits',
                    amount: amt,
                    label: 'DEPÓSITO PENDIENTE',
                    status: 'pending',

                });

                UI.notify("Solicitud enviada", "success");
                UI.closeModal('modal-deposit');
                this.fetchHistory();
                UI.loadingBtn('final-dep-btn', false);
            },

            logout() { sb.auth.signOut(); location.reload(); }

        // 4. LÓGICA DEL JUEGO
        const Game = {
            initReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    const strip = [...State.symbols, ...State.symbols, ...State.symbols, ...State.symbols];
                    strip.forEach(s => {
                        r.innerHTML += `<div class="slot-item">${s}</div>`;
                    });
                });
            },

            changeBet(v) {
                Sound.play('click');
                State.currentBet = Math.max(10, State.currentBet + v);
                document.getElementById('bet-display').innerText = `$${State.currentBet}`;

            async spin() {
                if(State.isSpinning || State.balance < State.currentBet) {
                    return UI.notify(State.balance < State.currentBet ? "Saldo insuficiente" : "Espera...", "warning");
                }

                State.isSpinning = true;
                const btn = document.getElementById('spin-btn');
                btn.disabled = true;
                document.getElementById('spin-text').innerText = "GIRANDO...";

                // RNG Lógica
                const rng = Math.random() * 100;
                let result = { label: 'SIN SUERTE', mult: 0, icons: [] };

                if(rng <= 2) { 
                    result = { label: '¡JACKPOT! 🎰', mult: 50, icons: ['7️⃣','7️⃣','7️⃣'] };

                    result = { label: 'GANANCIA', mult: 5, icons: ['💎','💎','💎'] }; 
                } else {
                    const randIcons = () => State.symbols[Math.floor(Math.random() * State.symbols.length)];
                    result.icons = [randIcons(), randIcons(), randIcons()];
                }

                const netChange = (State.currentBet * result.mult) - State.currentBet;
                const newSaldo = State.balance + netChange;

                // Animación Visual
                [1,2,3].forEach((id, i) => {
                    const reel = document.getElementById(`reel-${id}`);
                    const iconIdx = State.symbols.indexOf(result.icons[i]);
                    const targetPos = (iconIdx * 150) + (150 * 18);
                    reel.style.transform = `translateY(-${targetPos}px)`;
                });

                // Sonido de giro rítmico
                let spinSound = setInterval(() => Sound.play('spin'), 200);

                setTimeout(async () => {
                    clearInterval(spinSound);
                    if(result.mult > 0) {
                        Sound.play('win');
                        UI.notify(`¡${result.label}! +$${State.currentBet * result.mult}`, "success");
                    }

                    // Guardar en DB
                    await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', State.user.id);
                    await sb.from('history').insert({
                        user_id: State.user.id,
                        type: 'bets',
                        amount: netChange,
                        label: result.label,
                        status: 'completed'
                    });

                    State.balance = newSaldo;
                    State.xp += 10;
                    State.isSpinning = false;
                    btn.disabled = false;
                    document.getElementById('spin-text').innerText = "GIRAR";
                    
                    UI.updateBalance();
                    Core.fetchHistory();
                    this.resetReels();
                }, 3000);
            },

            resetReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.style.transition = 'none';
                    r.style.transform = 'translateY(0)';
                    setTimeout(() => r.style.transition = 'transform 3s cubic-bezier(0.25, 0.1, 0.25, 1)', 50);
                });
            }
        };

        // 5. INTERFAZ DE USUARIO (UI)
        const UI = {
            updateBalance() {
                const el = document.getElementById('balance-display');
                el.innerText = `$${State.balance.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
                document.getElementById('level-display').innerText = `LVL ${Math.floor(State.xp / 100) + 1}`;
            },

            notify(msg, type = 'info') {
                const container = document.getElementById('notif-container');
                const div = document.createElement('div');
                const colors = {
                    success: 'bg-emerald-500 text-black',
                    error: 'bg-red-500 text-white',
                    warning: 'bg-yellow-500 text-black',
                    info: 'bg-zinc-800 text-white'
                };
                div.className = `${colors[type]} px-6 py-4 rounded-2xl font-bold text-xs shadow-2xl animate__animated animate__fadeInRight flex items-center gap-3`;
                div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
                container.appendChild(div);
                setTimeout(() => {
                    div.classList.replace('animate__fadeInRight', 'animate__fadeOutRight');
                    setTimeout(() => div.remove(), 500);
                }, 4000);
            },

            toggleScreen(id, show) {
                const el = document.getElementById(id);
                if(show) {
                    el.classList.remove('hidden');
                    setTimeout(() => el.classList.add('opacity-100'), 50);
                } else {
                    el.classList.add('hidden');
                    el.classList.remove('opacity-100');
                }
            },

            switchTab(tab) {
                State.activeTab = tab;
                document.getElementById('tab-btn-bets').classList.toggle('tab-active', tab === 'bets');
                document.getElementById('tab-btn-deps').classList.toggle('tab-active', tab === 'deps');
                Core.fetchHistory();
            },

            renderHistory(data) {
                const container = document.getElementById('history-content');
                container.innerHTML = '';
                const filtered = data?.filter(h => State.activeTab === 'bets' ? h.type === 'bets' : h.type === 'deposits');
                
                if(!filtered || filtered.length === 0) {
                    container.innerHTML = `<p class="text-[10px] text-zinc-600 text-center mt-10 uppercase font-black">Sin registros aún</p>`;
                    return;
                }

                filtered.forEach(h => {
                    const isPos = h.amount >= 0;
                    const color = h.status === 'pending' ? 'text-yellow-500' : (isPos ? 'text-emerald-500' : 'text-red-400');
                    container.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5 animate__animated animate__fadeInUp">
                            <div>
                                <p class="text-[8px] font-black text-zinc-500 uppercase">${h.label}</p>
                                <p class="text-[7px] text-zinc-600">${new Date(h.created_at).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-casino text-sm ${color}">${isPos ? '+' : ''}$${Math.abs(h.amount).toFixed(2)}</p>
                                <p class="text-[6px] font-bold text-zinc-700 uppercase">${h.status}</p>
                            </div>
                        </div>
                    `;
                });
            },

            openModal(id) { 
                document.getElementById(id).classList.remove('hidden');
                document.getElementById('dep-step-1').classList.remove('hidden');
                document.getElementById('dep-step-2').classList.add('hidden');
            },

            closeModal(id) { document.getElementById(id).classList.add('hidden'); },

            depNextStep() {
                const amt = document.getElementById('dep-amount').value;
                if(!amt || amt < 10) return this.notify("Monto mínimo $10", "warning");
                document.getElementById('dep-step-1').classList.add('hidden');
                document.getElementById('dep-step-2').classList.remove('hidden');
            },

            loadingBtn(id, loading) {
                const btn = document.getElementById(id);
                if(btn) btn.disabled = loading;
            }
        };

        // Escuchar cambios de archivos
        document.getElementById('receipt-input')?.addEventListener('change', (e) => {
            if(e.target.files[0]) document.getElementById('file-label').innerText = "✅ COMPROBANTE LISTO";
        });

        // ALIAS DE SEGURIDAD PARA EVITAR ERRORES DE LLAMADAS ANTIGUAS
        function loadPending() { Core.fetchHistory(); }

        // Iniciar Sistema
        Core.init();

    </script>
</body>
</html>
