<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Casino Digital Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        
        :root { --mx-green: #10b981; --mx-dark: #050505; --mx-card: #0f0f0f; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; }
        .font-casino { font-family: 'Archivo Black', sans-serif; }
        
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-primary { background: var(--mx-green); color: black; transition: 0.3s; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 35px rgba(16, 185, 129, 0.4); }
        
        /* Slots Animación */
        .slot-box { height: 120px; overflow: hidden; background: #000; border: 2px solid #1a1a1a; border-radius: 1.5rem; }
        .slot-reel { transition: transform 2.5s cubic-bezier(0.1, 0, 0.1, 1); display: flex; flex-direction: column; align-items: center; }
        .slot-item { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .tab-active { border-bottom: 3px solid var(--mx-green); color: var(--mx-green); }
    </style>
</head>
<body class="antialiased">

    <div id="loading" class="fixed inset-0 bg-black flex items-center justify-center z-[9999] hidden">
        <div class="flex flex-col items-center">
            <div class="w-20 h-20 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-casino italic text-emerald-500 animate-pulse text-sm">CONECTANDO A WINMX...</p>
        </div>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-12 rounded-[3.5rem] w-full max-w-md text-center shadow-2xl border-b-[10px] border-emerald-600">
            <h2 class="text-7xl font-casino italic mb-2 tracking-tighter uppercase">Win<span class="text-emerald-500">MX</span></h2>
            <p class="text-zinc-500 text-[10px] tracking-[0.5em] font-black mb-12 uppercase">The House of Luxury Gaming</p>
            
            <div class="relative mb-6 text-left">
                <label class="text-[10px] font-bold text-zinc-500 mb-2 ml-2 block">EMAIL DE ACCESO</label>
                <i class="fas fa-user absolute left-5 top-[44px] text-zinc-600"></i>
                <input id="auth-email" type="email" placeholder="admin@winmx.com" class="w-full bg-black p-5 pl-14 rounded-2xl border border-white/10 outline-none focus:border-emerald-500 text-white font-bold transition-all">
            </div>
            <button onclick="handleQuickAccess()" class="btn-primary w-full py-6 rounded-2xl font-black uppercase italic text-sm tracking-widest">
                Entrar al Lobby
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="p-5 flex justify-between items-center glass sticky top-0 z-50 border-b border-white/5">
            <h1 class="text-3xl font-casino italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h1>
            
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-zinc-500 font-black tracking-widest uppercase">Mi Balance</span>
                    <span id="balance-display" class="text-2xl font-casino text-emerald-400 leading-none">$1,000.00</span>
                </div>
                <button onclick="openBank()" class="w-12 h-12 rounded-2xl bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 hover:bg-emerald-500 hover:text-black transition">
                    <i class="fas fa-wallet text-lg"></i>
                </button>
                <button onclick="logout()" class="w-12 h-12 rounded-2xl bg-zinc-900 text-zinc-500 hover:bg-red-600 hover:text-white transition">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8 pt-10">
            
            <div class="lg:col-span-2 space-y-8">
                <div class="glass p-10 rounded-[3.5rem] relative overflow-hidden">
                    <div class="flex justify-between items-end mb-10">
                        <div>
                            <h3 class="text-emerald-500 font-bold text-xs uppercase tracking-[0.3em]">Game Lobby</h3>
                            <h2 class="text-4xl font-casino uppercase italic">Royal Slots</h2>
                        </div>
                        <i class="fas fa-dice text-4xl text-white/10"></i>
                    </div>

                    <div class="grid grid-cols-3 gap-6 mb-10">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>

                    <div class="flex flex-col items-center gap-8">
                        <div class="flex items-center gap-6 bg-black p-3 rounded-3xl border border-white/5 shadow-inner">
                            <button onclick="changeBet(-50)" class="w-14 h-14 rounded-2xl bg-zinc-900 font-black text-xl hover:bg-zinc-800 transition">-</button>
                            <div class="px-10 text-center">
                                <span class="text-[10px] text-zinc-500 font-bold block uppercase tracking-widest mb-1">Apuesta Actual</span>
                                <span id="bet-display" class="text-3xl font-casino tracking-tighter">$10</span>
                            </div>
                            <button onclick="changeBet(50)" class="w-14 h-14 rounded-2xl bg-zinc-900 font-black text-xl hover:bg-zinc-800 transition">+</button>
                        </div>

                        <button id="spin-btn" onclick="spin()" class="btn-primary w-full py-8 rounded-[2rem] font-casino text-3xl uppercase italic tracking-tighter">
                            Girar Rodillos
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div id="bank-panel" class="glass p-8 rounded-[3rem] border border-white/5">
                    <h3 class="font-casino text-xl mb-6 uppercase italic"><i class="fas fa-university mr-2 text-emerald-500"></i>Banco Central</h3>
                    
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="showTransactionModal('deposit')" class="p-4 rounded-2xl bg-zinc-900 border border-white/5 hover:border-emerald-500 transition text-center group">
                            <i class="fas fa-plus-circle text-emerald-500 text-xl mb-2 group-hover:scale-110 transition"></i>
                            <span class="block text-[10px] font-bold uppercase">Depositar</span>
                        </button>
                        <button onclick="showTransactionModal('withdraw')" class="p-4 rounded-2xl bg-zinc-900 border border-white/5 hover:border-red-500 transition text-center group">
                            <i class="fas fa-minus-circle text-red-500 text-xl mb-2 group-hover:scale-110 transition"></i>
                            <span class="block text-[10px] font-bold uppercase">Retirar</span>
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-zinc-500 uppercase tracking-widest">Últimos Movimientos</span>
                            <i class="fas fa-history text-zinc-700 text-xs"></i>
                        </div>
                        <div id="history-container" class="max-h-[350px] overflow-y-auto space-y-3 pr-2">
                            <div class="text-center py-10 opacity-20">
                                <i class="fas fa-folder-open text-4xl mb-2"></i>
                                <p class="text-[10px] font-bold">Sin transacciones</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-bank" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[100] hidden p-4">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm border border-white/10">
            <h2 id="modal-title" class="font-casino text-3xl mb-2 uppercase italic text-center">Depósito</h2>
            <p class="text-center text-zinc-500 text-[10px] mb-8 font-bold tracking-widest uppercase">Cajero Automático WinMX</p>
            
            <div class="mb-8">
                <label class="text-[10px] font-black text-emerald-500 ml-2 mb-2 block uppercase">Monto a Operar</label>
                <input id="modal-amount" type="number" placeholder="0.00" class="w-full bg-black p-6 rounded-2xl border-2 border-emerald-500/20 focus:border-emerald-500 text-center text-4xl font-casino outline-none">
            </div>

            <div class="flex flex-col gap-3">
                <button id="btn-confirm-action" onclick="executeTransaction()" class="btn-primary py-5 rounded-2xl font-black uppercase italic text-sm">Confirmar Operación</button>
                <button onclick="closeBank()" class="py-4 text-zinc-500 text-[10px] font-black uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");

        // ESTADO GLOBAL
        let balance = 1000.00;
        let currentBet = 10;
        let history = [];
        let currentAction = 'deposit'; 
        const symbols = ['💎', '🍋', '🍒', '🔔', '⭐️', '7️⃣'];

        // --- AUTENTICACIÓN ---
        async function handleQuickAccess() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Ingresa tu correo oficial");
            toggleLoading(true);

            const { data, error } = await sb.auth.signUp({ email, password: 'winmx_system_key' });
            
            // Si ya existe logueamos
            if(error && error.message.includes("already registered")) {
                await sb.auth.signInWithPassword({ email, password: 'winmx_system_key' });
            }

            toggleLoading(false);
            initApp();
        }

        function initApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            setupReels();
            updateUI();
        }

        // --- BANCO E HISTORIAL ---
        function showTransactionModal(type) {
            currentAction = type;
            document.getElementById('modal-title').innerText = type === 'deposit' ? 'Depósito' : 'Retiro';
            document.getElementById('modal-bank').classList.remove('hidden');
        }

        function closeBank() {
            document.getElementById('modal-bank').classList.add('hidden');
            document.getElementById('modal-amount').value = '';
        }

        function executeTransaction() {
            const amount = parseFloat(document.getElementById('modal-amount').value);
            if(!amount || amount <= 0) return alert("MONTO INVÁLIDO");

            if(currentAction === 'withdraw' && amount > balance) {
                return alert("SALDO INSUFICIENTE EN BANCO");
            }

            if(currentAction === 'deposit') {
                balance += amount;
                addHistory('Depósito', amount, 'text-emerald-500');
            } else {
                balance -= amount;
                addHistory('Retiro', amount, 'text-red-500');
            }

            updateUI();
            closeBank();
        }

        function addHistory(type, amount, color) {
            const date = new Date().toLocaleTimeString();
            history.unshift({ type, amount, color, date });
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = history.map(h => `
                <div class="bg-zinc-900/50 p-4 rounded-2xl border border-white/5 flex justify-between items-center animate-in fade-in slide-in-from-right duration-300">
                    <div>
                        <span class="text-[9px] font-black text-zinc-500 block uppercase mb-1">${h.date}</span>
                        <span class="text-xs font-bold uppercase tracking-widest">${h.type}</span>
                    </div>
                    <span class="font-casino ${h.color}">$${h.amount.toLocaleString()}</span>
                </div>
            `).join('');
        }

        // --- LÓGICA DE SLOTS ---
        function setupReels() {
            [1, 2, 3].forEach(id => {
                const reel = document.getElementById(`reel-${id}`);
                reel.innerHTML = '';
                for(let i=0; i<40; i++) {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    reel.appendChild(item);
                }
            });
        }

        function changeBet(val) {
            currentBet = Math.max(10, currentBet + val);
            document.getElementById('bet-display').innerText = `$${currentBet}`;
        }

        function spin() {
            if(balance < currentBet) return alert("SALDO INSUFICIENTE");
            
            balance -= currentBet;
            updateUI();
            
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.innerText = "ESPERANDO SUERTE...";

            const results = [];
            [1, 2, 3].forEach((id) => {
                const reel = document.getElementById(`reel-${id}`);
                const randomIndex = Math.floor(Math.random() * symbols.length);
                const stopPos = (randomIndex * 120);
                reel.style.transform = `translateY(-${stopPos}px)`;
                results.push(symbols[randomIndex]);
            });

            setTimeout(() => {
                let win = 0;
                if(results[0] === results[1] && results[1] === results[2]) {
                    win = currentBet * 20;
                    alert("¡JACKPOT REAL! GANASTE $" + win);
                } else if(results[0] === results[1] || results[1] === results[2]) {
                    win = currentBet * 3;
                    alert("¡PREMIO MENOR! GANASTE $" + win);
                }

                if(win > 0) {
                    balance += win;
                    addHistory('Premio Slot', win, 'text-yellow-400');
                }

                updateUI();
                btn.disabled = false;
                btn.innerText = "Girar Rodillos";
            }, 2600);
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function toggleLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        
        async function logout() { await sb.auth.signOut(); location.reload(); }

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if(session) initApp();
        };
    </script>
</body>
</html>
