<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1625, #1a2a3f);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
        
        .reel {
            width: 85px; height: 85px; 
            background: #0f1c2e; 
            border: 4px solid #22d3ee;
            border-radius: 14px; 
            font-size: 46px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
        }
        @media (min-width: 640px) {
            .reel { width: 100px; height: 100px; font-size: 56px; }
        }

        .reel.spinning { animation: spin 0.85s linear infinite; }
        @keyframes spin { 0% { transform: translateY(-400%); } 100% { transform: translateY(0); } }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-4 px-4 sticky top-0 z-40">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-2xl font-bold tracking-wider neon-text">CASINO REAL PRO</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-zinc-900 px-6 py-3 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="font-semibold text-2xl text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-5 py-3 rounded-2xl text-sm flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-10">
                <span class="text-7xl">🎰</span>
                <h2 class="text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">¡Bienvenido!</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-4 focus:outline-none focus:border-cyan-400 text-lg">
            <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-6 focus:outline-none focus:border-cyan-400 text-lg">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="register()" class="bg-zinc-700 hover:bg-zinc-600 py-5 rounded-2xl font-semibold text-lg transition">Registrarse</button>
                <button onclick="login()" class="bg-cyan-500 hover:bg-cyan-600 text-black py-5 rounded-2xl font-semibold text-lg transition">Entrar</button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[28px]"></p>
        </div>
    </div>

    <!-- CASINO -->
    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen overflow-hidden">

            <!-- SIDEBAR -->
            <div id="sidebar" class="w-72 bg-zinc-950 border-r border-zinc-800 p-6 flex flex-col fixed md:static inset-y-0 left-0 z-50 -translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="md:hidden flex justify-between mb-8">
                    <h2 class="text-2xl font-bold neon-text">Menú</h2>
                    <button onclick="toggleSidebar()" class="text-4xl">×</button>
                </div>
                
                <h3 class="text-cyan-400 font-semibold mb-5 flex items-center gap-2 text-lg"><i class="fas fa-gamepad"></i> JUEGOS</h3>
                
                <div onclick="showGame('slot'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">
                    <span class="text-4xl">🎰</span> <span class="font-medium">Slots</span>
                </div>
                <div onclick="showGame('roulette'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">
                    <span class="text-4xl">🎡</span> <span class="font-medium">Ruleta</span>
                </div>
                <div onclick="showGame('dice'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">
                    <span class="text-4xl">🎲</span> <span class="font-medium">Dados</span>
                </div>
                <div onclick="showGame('bj'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-8 text-lg">
                    <span class="text-4xl">🃏</span> <span class="font-medium">Blackjack</span>
                </div>

                <h3 class="text-cyan-400 font-semibold mb-5 flex items-center gap-2 text-lg"><i class="fas fa-trophy"></i> TOP 5</h3>
                <div id="rankingBox" class="flex-1 space-y-4 overflow-auto"></div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="flex-1 flex flex-col">
                <div class="md:hidden bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between">
                    <button onclick="toggleSidebar()" class="text-3xl"><i class="fas fa-bars"></i></button>
                    <span class="font-bold text-xl">Casino Real PRO</span>
                    <button onclick="toggleChat()" class="text-3xl"><i class="fas fa-comments"></i></button>
                </div>

                <div class="flex-1 p-6 md:p-10 overflow-auto">
                    <!-- SLOTS -->
                    <div id="slot" class="game">
                        <h2 class="text-4xl font-bold mb-8 flex items-center gap-4"><span>🎰</span> Tragamonedas Premium</h2>
                        <div class="max-w-lg mx-auto">
                            <div class="flex justify-center gap-6 mb-12">
                                <div class="reel" id="r1">🍒</div>
                                <div class="reel" id="r2">💎</div>
                                <div class="reel" id="r3">7️⃣</div>
                            </div>
                            <div class="flex flex-col sm:flex-row gap-4 max-w-sm mx-auto">
                                <input id="betSlot" type="number" placeholder="Cantidad a apostar" 
                                       class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-center text-2xl focus:outline-none focus:border-cyan-400">
                                <button onclick="spinSlot()" 
                                        class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 px-12 py-5 rounded-3xl font-bold text-xl">GIRAR</button>
                            </div>
                            <p id="slotRes" class="text-center mt-12 text-3xl font-bold min-h-[80px]"></p>
                        </div>
                    </div>

                    <!-- RULETA -->
                    <div id="roulette" class="game hidden">
                        <h2 class="text-4xl font-bold mb-8 flex items-center gap-4"><span>🎡</span> Ruleta</h2>
                        <div class="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl">
                            <input id="betRou" type="number" placeholder="Apuesta" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-center text-2xl mb-6">
                            <select id="color" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-xl mb-8">
                                <option value="rojo">🔴 Rojo</option>
                                <option value="negro">⚫ Negro</option>
                            </select>
                            <button onclick="spinRoulette()" class="w-full bg-red-600 hover:bg-red-700 py-6 rounded-3xl font-bold text-2xl">GIRAR RULETA</button>
                            <p id="rouRes" class="text-center mt-10 text-2xl font-semibold"></p>
                        </div>
                    </div>

                    <!-- DADOS -->
                    <div id="dice" class="game hidden">
                        <h2 class="text-4xl font-bold mb-8 flex items-center gap-4"><span>🎲</span> Dados</h2>
                        <div class="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl text-center">
                            <input id="betDice" type="number" placeholder="Apuesta" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-center text-2xl mb-8">
                            <button onclick="playDice()" class="w-full bg-amber-600 hover:bg-amber-700 py-6 rounded-3xl font-bold text-2xl">LANZAR DADOS</button>
                            <p id="diceRes" class="mt-12 text-5xl font-bold"></p>
                        </div>
                    </div>

                    <!-- BLACKJACK -->
                    <div id="bj" class="game hidden">
                        <h2 class="text-4xl font-bold mb-8 flex items-center gap-4"><span>🃏</span> Blackjack</h2>
                        <div class="max-w-md mx-auto bg-zinc-900 p-8 rounded-3xl text-center">
                            <input id="betBJ" type="number" placeholder="Apuesta" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-5 text-center text-2xl mb-8">
                            <button onclick="playBJ()" class="w-full bg-purple-600 hover:bg-purple-700 py-6 rounded-3xl font-bold text-2xl">JUGAR MANO</button>
                            <p id="bjRes" class="mt-10 text-2xl font-mono"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div id="chatPanel" class="w-80 bg-zinc-950 border-l border-zinc-800 flex flex-col fixed md:static inset-y-0 right-0 z-50 translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="p-5 border-b border-zinc-800 bg-zinc-900 flex justify-between md:hidden">
                    <h3 class="font-semibold text-lg">Chat en Vivo</h3>
                    <button onclick="toggleChat()" class="text-3xl">×</button>
                </div>
                <div id="chatBox" class="chat-box flex-1 p-5 overflow-auto space-y-4 text-sm"></div>
                <div class="p-5 border-t border-zinc-800 bg-zinc-900">
                    <div class="flex gap-3">
                        <input id="chatInput" placeholder="Mensaje..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-4 focus:outline-none focus:border-cyan-400">
                        <button onclick="sendMsg()" class="bg-cyan-500 hover:bg-cyan-600 text-black px-8 rounded-3xl font-semibold">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;
        let chatChannel = null;

        function msg(text, color = "text-white") {
            const el = document.getElementById("msg");
            if (el) el.innerHTML = `<span class="${color}">${text}</span>`;
        }

        function val(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : "";
        }

        function formatSaldo(n) {
            return new Intl.NumberFormat('es-MX').format(Math.floor(n || 0));
        }

        function updateSaldo() {
            const el = document.getElementById("saldo");
            if (el) el.textContent = "$" + formatSaldo(saldo);
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("-translate-x-full");
        }

        function toggleChat() {
            document.getElementById("chatPanel").classList.toggle("translate-x-full");
        }

        function launchConfetti() {
            const canvas = document.getElementById("confetti");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext("2d");
            let particles = [];
            const colors = ['#22d3ee', '#eab308', '#a855f7', '#ec4899'];

            for (let i = 0; i < 200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 6,
                    speed: Math.random() * 9 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    angle: Math.random() * 360,
                    rotationSpeed: Math.random() * 20 - 10
                });
            }

            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.y += p.speed;
                    p.angle += p.rotationSpeed;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.7);
                    ctx.restore();
                    if (p.y > canvas.height + 100) particles.splice(i, 1);
                }
                if (particles.length > 0 && frame < 110) requestAnimationFrame(animate);
                frame++;
            }
            animate();
        }

        // ====================== AUTH ======================
        async function register() {
            msg("Registrando...");
            const { error } = await sb.auth.signUp({ email: val("email"), password: val("pass") });
            msg(error ? error.message : "✅ Revisa tu correo", error ? "text-red-400" : "text-green-400");
        }

        async function login() {
            msg("Iniciando sesión...");
            const { data, error } = await sb.auth.signInWithPassword({ email: val("email"), password: val("pass") });
            if (error) return msg(error.message, "text-red-400");
            user = data.user;
            startCasino();
        }

        async function startCasino() {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("casino").classList.remove("hidden");
            document.getElementById("topbar").classList.remove("hidden");

            let { data } = await sb.from("usuarios").select("*").eq("id", user.id).maybeSingle();

            if (!data) {
                await sb.from("usuarios").insert([{ id: user.id, saldo: 3000 }]);
                saldo = 3000;
            } else {
                saldo = data.saldo || 3000;
            }

            updateSaldo();
            loadRanking();
            initChat();
            showGame('slot');
        }

        async function saveSaldo() {
            if (user) await sb.from("usuarios").update({ saldo }).eq("id", user.id);
        }

        function showGame(gameId) {
            document.querySelectorAll('.game').forEach(g => g.classList.add('hidden'));
            document.getElementById(gameId).classList.remove('hidden');
        }

        // ====================== VALIDACIÓN DE APUESTA ======================
        function validarApuesta(bet, juego) {
            if (!bet || bet <= 0) {
                alert("La apuesta debe ser mayor a 0");
                return false;
            }
            if (bet > saldo) {
                alert(`No tienes suficiente saldo. Tu saldo actual es $${formatSaldo(saldo)}`);
                return false;
            }
            return true;
        }

        // ====================== JUEGOS ======================
        async function spinSlot() {
            let bet = parseInt(val("betSlot"));
            if (!validarApuesta(bet, "slot")) return;

            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            reels.forEach(r => r.classList.add('spinning'));
            await new Promise(r => setTimeout(r, 1600));
            reels.forEach(r => r.classList.remove('spinning'));

            const symbols = ["🍒","💎","7️⃣","⭐","🍀","🔔","🍉"];
            let a = symbols[Math.floor(Math.random()*symbols.length)];
            let b = symbols[Math.floor(Math.random()*symbols.length)];
            let c = symbols[Math.floor(Math.random()*symbols.length)];

            reels[0].innerText = a; reels[1].innerText = b; reels[2].innerText = c;

            const win = (a === b && b === c);
            saldo += win ? bet * 15 : -bet;

            document.getElementById("slotRes").innerHTML = win 
                ? `<span class="text-yellow-400">¡JACKPOT! +$${bet*15}</span>` 
                : `<span class="text-red-400">-$${bet}</span>`;

            if (win) launchConfetti();

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function spinRoulette() {
            let bet = parseInt(val("betRou"));
            if (!validarApuesta(bet, "ruleta")) return;

            const color = val("color");
            const result = Math.random() < 0.5 ? "rojo" : "negro";
            const win = result === color;
            saldo += win ? bet * 2 : -bet;

            document.getElementById("rouRes").innerHTML = `
                Salió <span class="${result==='rojo' ? 'text-red-500' : 'text-white'} font-bold">${result.toUpperCase()}</span><br>
                ${win ? '<span class="text-green-400">¡Ganaste 2x!</span>' : '<span class="text-red-400">Perdiste</span>'}
            `;

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function playDice() {
            let bet = parseInt(val("betDice"));
            if (!validarApuesta(bet, "dados")) return;

            const roll = Math.floor(Math.random() * 6) + 1;
            const win = roll >= 4;
            saldo += win ? bet : -bet;

            document.getElementById("diceRes").innerHTML = `🎲 ${roll}<br><span class="${win ? 'text-green-400' : 'text-red-400'} text-2xl">${win ? '¡Ganaste!' : 'Perdiste'}</span>`;

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        async function playBJ() {
            let bet = parseInt(val("betBJ"));
            if (!validarApuesta(bet, "blackjack")) return;

            const player = Math.floor(Math.random() * 10) + 12;
            const dealer = Math.floor(Math.random() * 10) + 12;
            const win = (player > dealer && player <= 21) || dealer > 21;
            saldo += win ? bet : -bet;

            document.getElementById("bjRes").innerHTML = `
                Tú: <strong>${player}</strong> — Dealer: <strong>${dealer}</strong><br>
                <span class="${win ? 'text-green-400' : 'text-red-400'} text-2xl">${win ? '¡Ganaste!' : 'Perdiste'}</span>
            `;

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        // Chat y Ranking (sin cambios)
        function initChat() {
            if (chatChannel) return;
            chatChannel = sb.channel('chat-room');
            chatChannel.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, (payload) => {
                const box = document.getElementById("chatBox");
                if (box) {
                    box.innerHTML += `<div class="bg-zinc-900 p-3 rounded-2xl"><span class="text-cyan-400">Usuario:</span> ${payload.new.mensaje || ''}</div>`;
                    box.scrollTop = box.scrollHeight;
                }
            }).subscribe();
        }

        async function sendMsg() {
            const text = val("chatInput");
            if (!text || !user) return;
            await sb.from("chat").insert([{ user_id: user.id, mensaje: text }]);
            document.getElementById("chatInput").value = "";
        }

        async function loadRanking() {
            const { data } = await sb.from("usuarios").select("saldo").order("saldo", { ascending: false }).limit(5);
            let html = "";
            (data || []).forEach((u, i) => {
                html += `<div class="bg-zinc-900 p-4 rounded-3xl flex justify-between"><span>#${i+1}</span><span class="text-yellow-300">$${formatSaldo(u.saldo)}</span></div>`;
            });
            document.getElementById("rankingBox").innerHTML = html || "<p class='text-zinc-500 p-4'>Cargando...</p>";
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                startCasino();
            }
        };
    </script>
</body>
</html>
