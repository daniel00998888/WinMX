<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://dakhnqriwbzihlzhtfcb.supabase.co",
  "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

let user;
let saldo = 0;

// ===== REGISTER =====
window.register = async ()=>{
  let email = emailInput();
  let pass = passInput();

  const { data, error } = await supabase.auth.signUp({
    email,
    password: pass
  });

  if(error) return alert(error.message);

  alert("Revisa tu correo 📩");
};

// ===== LOGIN =====
window.login = async ()=>{
  let email = emailInput();
  let pass = passInput();

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: pass
  });

  if(error) return alert(error.message);

  user = data.user;
  start();
};

// ===== START =====
async function start(){
  show("casino");

  let { data } = await supabase
    .from("usuarios")
    .select("*")
    .eq("id", user.id);

  if(data.length === 0){
    await supabase.from("usuarios").insert([
      { id: user.id, email: user.email, saldo: 1000 }
    ]);
    saldo = 1000;
  } else {
    saldo = data[0].saldo;
  }

  update();
}

// ===== SAVE =====
async function save(){
  await supabase
    .from("usuarios")
    .update({ saldo })
    .eq("id", user.id);
}

// ===== SLOT =====
window.slot = ()=>{
  let bet = +document.getElementById("bet").value;

  if(!bet || bet>saldo) return alert("Apuesta inválida");

  let win = Math.random()<0.3;

  saldo += win ? bet*3 : -bet;

  update();
  save();
};

// ===== HELPERS =====
function update(){
  document.getElementById("saldo").innerText = saldo;
}

function emailInput(){
  return document.getElementById("email").value;
}

function passInput(){
  return document.getElementById("pass").value;
}

</script>
