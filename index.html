<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .view-content::-webkit-scrollbar { width: 4px; }
        .view-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .history-scroll { max-height: 280px; overflow-y: auto; scrollbar-width: none; }
        .history-scroll::-webkit-scrollbar { display: none; }

        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
        
        .instruction-card { 
            background: rgba(16, 185, 129, 0.08); 
            border: 1px solid rgba(16, 185, 129, 0.3); 
            border-radius: 1.2rem; 
            padding: 20px; 
            margin-top: 24px; 
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .instruction-card h4 { font-family: 'Archivo Black', sans-serif; font-size: 12px; color: var(--mx-green); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .instruction-card p { font-size: 11px; color: #ccc; line-height: 1.6; font-weight: 500; }
    </style>
</head>
<body class="antialiased select-none">

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-black">
        <div id="login-container" class="glass p-8 w-full max-w-sm text-center animate__animated animate__fadeIn">
            <h2 class="text-3xl font-casino mb-10 italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <div class="space-y-4">
                <input id="login-email" type="email" placeholder="Correo electrónico" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <input id="login-password" type="password" placeholder="Contraseña" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino mt-2">Entrar</button>
                <button onclick="AuthManager.switchTab('register')" class="w-full py-2 text-zinc-500 text-[10px] font-bold uppercase tracking-widest mt-4 underline decoration-emerald-500/50">¿No tienes cuenta? Regístrate</button>
            </div>
        </div>
        <div id="register-container" class="hidden-view glass p-8 w-full max-w-sm text-center animate__animated animate__fadeIn">
            <h2 class="text-2xl font-casino mb-6 italic tracking-tighter text-emerald-500">Nueva Cuenta</h2>
            <div class="space-y-4 text-left">
                <input id="reg-email" type="email" placeholder="Correo electrónico" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <input id="reg-password" type="password" placeholder="Crea una contraseña" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm">
                <div class="bg-white/5 border border-white/5 p-4 rounded-xl space-y-3">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="terms-check" class="w-4 h-4 accent-emerald-500">
                        <span class="text-[10px] text-white font-bold uppercase">Acepto términos y soy mayor de edad</span>
                    </label>
                </div>
                <button onclick="AuthManager.register()" class="btn-action w-full py-4 font-casino mt-2">Crear Cuenta</button>
                <button onclick="AuthManager.switchTab('login')" class="w-full py-2 text-zinc-500 text-[10px] font-bold uppercase tracking-widest mt-2 text-center underline decoration-zinc-700">Ya tengo cuenta</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        <header class="p-5 flex justify-between items-center bg-black/40 border-b border-white/5">
            <span class="font-casino italic text-xl tracking-tighter">WIN<span class="text-emerald-500">MX</span></span>
            <div class="balance-pill">
                <span id="balance-display" class="font-casino text-emerald-500 text-lg tracking-tight">$0.00</span>
                <div onclick="UI.openModal('modal-deposit')" class="btn-plus active:scale-90 transition-transform cursor-pointer"><i class="fas fa-plus"></i></div>
            </div>
        </header>

        <div id="view-lobby" class="view-content p-5 space-y-6">
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-800 p-6 rounded-[2.2rem] shadow-xl">
                <h2 class="text-2xl font-casino italic text-white">Suerte hoy</h2>
                <p class="text-[9px] font-bold text-emerald-100 uppercase tracking-widest mt-1 opacity-70">Sistema Realtime 2.0 Activo</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="Router.openGame('slots')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Minas</span></div>
            </div>
        </div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-600 text-[10px] font-bold uppercase flex items-center"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
            <div id="game-mount" class="w-full"></div>
        </div>

        <div id="view-history" class="view-content p-5 space-y-4 hidden-view">
            <h2 class="font-casino text-center text-zinc-600 text-xs mb-4 tracking-widest italic">Mi Actividad</h2>
            <div id="history-lists" class="space-y-4"></div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">
            <div onclick="Router.showView('lobby')" id="nav-home" class="nav-item active"><i class="fas fa-gamepad text-xl mb-1"></i><span>Jugar</span></div>
            <div onclick="Router.showView('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt text-xl mb-1"></i><span>Historial</span></div>
            <div onclick="Router.showView('profile')" id="nav-profile" class="nav-item"><i class="fas fa-user-circle text-xl mb-1"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm bg-[#0a0a0a]">
            <div id="dep-step-1">
                <h2 class="font-casino text-emerald-500 text-center mb-6">Monto a cargar</h2>
                <input id="dep-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-10 text-white">
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 font-casino">Continuar</button>
            </div>
            <div id="dep-step-2" class="hidden-view space-y-4 text-center">
                <div class="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20">
                    <p class="text-[8px] font-bold text-emerald-500 mb-1 uppercase">CLABE (STP)</p>
                    <div class="flex items-center justify-center gap-3">
                        <span id="clabe-number" class="text-xs font-mono font-bold">722969020533491161</span>
                        <button onclick="UI.copyClabe()" class="text-emerald-500"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="UI.handleFile(this)">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-2xl p-4 block cursor-pointer">
                    <p id="file-label" class="text-[8px] font-bold text-zinc-500 uppercase">Subir Comprobante</p>
                </label>
                <button id="btn-confirm-dep" onclick="Core.confirmDeposit()" class="btn-action w-full py-4 font-casino">Confirmar</button>
            </div>
            <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-4 text-[9px] text-zinc-700 font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        // --- SISTEMA DE SONIDOS SFX (CON AMPLIFICACIÓN) ---
        const SFX = {
            ctx: null,
            gainNode: null,
            masterVol: 1.6, // VOLUMEN SUBIDO AL 160%

            init() { 
                if(!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.gainNode = this.ctx.createGain();
                    this.gainNode.gain.setValueAtTime(this.masterVol, this.ctx.currentTime);
                    this.gainNode.connect(this.ctx.destination);
                }
            },
            play(type) {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                const osc = this.ctx.createOscillator();
                const localGain = this.ctx.createGain();
                osc.connect(localGain);
                localGain.connect(this.gainNode);
                
                const now = this.ctx.currentTime;
                if (type === 'win') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now);
                    osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3);
                    localGain.gain.setValueAtTime(0.4, now); localGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(); osc.stop(now + 0.3);
                } else if (type === 'loss') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, now);
                    localGain.gain.setValueAtTime(0.2, now); localGain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                } else if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
                    localGain.gain.setValueAtTime(0.1, now); localGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(); osc.stop(now + 0.05);
                } else if (type === 'spin') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(150, now);
                    localGain.gain.setValueAtTime(0.05, now); localGain.gain.linearRampToValueAtTime(0, now + 3.5);
                    osc.start(); osc.stop(now + 3.5);
                }
            }
        };

        let State = { user: null, balance: 0, isSpinning: false, totalSpins: 0 };

        const Router = {
            showView(v) {
                SFX.play('click');
                document.querySelectorAll('.view-content').forEach(x => x.classList.add('hidden-view'));
                document.getElementById(`view-${v}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[v];
                if(navId) document.getElementById(navId).classList.add('active');
            },
            openGame(g) {
                SFX.play('click');
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[g];
                if(g === 'slots') GameLogic.slots.init();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`
            }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); }
                else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async loadBalance() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                State.balance = data ? data.saldo : 0; UI.updateBalance();
            },
            async confirmDeposit() {
                SFX.play('click');
                UI.notify("Enviado para revisión", "success");
                UI.closeModal('modal-deposit');
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            openModal(id) { SFX.play('click'); document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { SFX.play('click'); document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() {
                SFX.play('click');
                document.getElementById('dep-step-1').classList.add('hidden-view');
                document.getElementById('dep-step-2').classList.remove('hidden-view');
            },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-bold uppercase tracking-widest shadow-2xl animate__animated animate__fadeInDown ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            },
            handleFile(input) { if(input.files[0]) { SFX.play('click'); document.getElementById('file-label').innerText = "LISTO ✅"; } }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) UI.notify(error.message, "error"); else location.reload();
            },
            switchTab(tab) {
                document.getElementById('login-container').classList.toggle('hidden-view', tab==='register');
                document.getElementById('register-container').classList.toggle('hidden-view', tab==='login');
            }
        };

        const GameLogic = {
            slots: {
                init() { 
                    [1,2,3].forEach(id => { 
                        const r = document.getElementById(`reel-${id}`); 
                        r.innerHTML = ''; 
                        Array(30).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); 
                    }); 
                },
                async play() {
                    const bet = parseFloat(document.getElementById('slots-bet-input').value) || 10;
                    if(State.balance < bet || State.isSpinning) return UI.notify("Sin saldo", "error");
                    
                    SFX.play('spin');
                    State.isSpinning = true;
                    State.balance -= bet;
                    UI.updateBalance();

                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    State.totalSpins++;

                    [1,2,3].forEach((id, i) => {
                        const targetY = (State.totalSpins * 1800) + (SYMBOLS.indexOf(res[i]) * 90);
                        document.getElementById(`reel-${id}`).style.transform = `translateY(-${targetY}px)`;
                    });

                    setTimeout(() => {
                        State.isSpinning = false;
                        if(res[0] === res[1] && res[1] === res[2]) {
                            SFX.play('win');
                            const winAmt = bet * 10;
                            State.balance += winAmt;
                            UI.notify(`¡GANASTE $${winAmt}!`, "success");
                        } else {
                            SFX.play('loss');
                        }
                        UI.updateBalance();
                    }, 3600);
                }
            }
        };

        Core.init();
    </script>
</body>
</html>
