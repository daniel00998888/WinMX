<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1625, #1a2a3f);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
        
        .reel {
            width: 85px; height: 85px; 
            background: #0f1c2e; 
            border: 4px solid #22d3ee;
            border-radius: 14px; 
            font-size: 46px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.6);
        }
        @media (min-width: 640px) {
            .reel { width: 100px; height: 100px; font-size: 56px; }
        }
        .reel.spinning { animation: spin 0.85s linear infinite; }
        @keyframes spin { 0% { transform: translateY(-400%); } 100% { transform: translateY(0); } }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        
        /* Modal */
        .modal {
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-4 px-4 sticky top-0 z-40">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-2xl font-bold tracking-wider neon-text">CASINO REAL PRO</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-zinc-900 px-6 py-3 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="font-semibold text-2xl text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-5 py-3 rounded-2xl text-sm flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-zinc-900 p-10 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-10">
                <span class="text-7xl">🎰</span>
                <h2 class="text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">¡Bienvenido!</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-4 focus:outline-none focus:border-cyan-400 text-lg">
            <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 mb-6 focus:outline-none focus:border-cyan-400 text-lg">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="register()" class="bg-zinc-700 hover:bg-zinc-600 py-5 rounded-2xl font-semibold text-lg transition">Registrarse</button>
                <button onclick="login()" class="bg-cyan-500 hover:bg-cyan-600 text-black py-5 rounded-2xl font-semibold text-lg transition">Entrar</button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[28px]"></p>
        </div>
    </div>

    <!-- CASINO -->
    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen overflow-hidden">

            <!-- SIDEBAR -->
            <div id="sidebar" class="w-72 bg-zinc-950 border-r border-zinc-800 p-6 flex flex-col fixed md:static inset-y-0 left-0 z-50 -translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="md:hidden flex justify-between mb-8">
                    <h2 class="text-2xl font-bold neon-text">Menú</h2>
                    <button onclick="toggleSidebar()" class="text-4xl">×</button>
                </div>
                
                <h3 class="text-cyan-400 font-semibold mb-5 flex items-center gap-2 text-lg"><i class="fas fa-gamepad"></i> JUEGOS</h3>
                
                <div onclick="showGame('slot'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">
                    <span class="text-4xl">🎰</span> <span class="font-medium">Slots</span>
                </div>
                <div onclick="showGame('roulette'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">
                    <span class="text-4xl">🎡</span> <span class="font-medium">Ruleta</span>
                </div>
                <div onclick="showGame('dice'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-3 text-lg">
                    <span class="text-4xl">🎲</span> <span class="font-medium">Dados</span>
                </div>
                <div onclick="showGame('bj'); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer mb-6 text-lg">
                    <span class="text-4xl">🃏</span> <span class="font-medium">Blackjack</span>
                </div>

                <h3 class="text-cyan-400 font-semibold mb-5 flex items-center gap-2 text-lg"><i class="fas fa-university"></i> BANCO</h3>
                <div onclick="openBankModal(); toggleSidebar()" class="game-btn flex items-center gap-4 p-5 hover:bg-zinc-900 rounded-3xl cursor-pointer text-lg">
                    <span class="text-4xl">🏦</span> <span class="font-medium">Depósito / Retiro</span>
                </div>

                <h3 class="text-cyan-400 font-semibold mt-8 mb-5 flex items-center gap-2 text-lg"><i class="fas fa-trophy"></i> TOP 5</h3>
                <div id="rankingBox" class="flex-1 space-y-4 overflow-auto"></div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="flex-1 flex flex-col">
                <div class="md:hidden bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between">
                    <button onclick="toggleSidebar()" class="text-3xl"><i class="fas fa-bars"></i></button>
                    <span class="font-bold text-xl">Casino Real PRO</span>
                    <button onclick="toggleChat()" class="text-3xl"><i class="fas fa-comments"></i></button>
                </div>

                <div class="flex-1 p-6 md:p-10 overflow-auto">
                    <!-- SLOTS, Ruleta, Dados, Blackjack (mismo que antes) -->
                    <div id="slot" class="game"> ... (mantengo el código de slots) </div>
                    <div id="roulette" class="game hidden"> ... </div>
                    <div id="dice" class="game hidden"> ... </div>
                    <div id="bj" class="game hidden"> ... </div>
                </div>
            </div>

            <!-- CHAT -->
            <div id="chatPanel" class="w-80 bg-zinc-950 border-l border-zinc-800 flex flex-col fixed md:static inset-y-0 right-0 z-50 translate-x-full md:translate-x-0 transition-transform duration-300">
                <!-- Chat content -->
            </div>
        </div>
    </div>

    <!-- MODAL BANCO -->
    <div id="bankModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md modal">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold">🏦 Banco</h2>
                <button onclick="closeBankModal()" class="text-3xl text-zinc-400 hover:text-white">×</button>
            </div>

            <div class="mb-6">
                <p class="text-zinc-400">Saldo actual:</p>
                <p id="modalSaldo" class="text-4xl font-bold text-yellow-300">$0</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Depósito -->
                <div class="bg-zinc-800 p-6 rounded-2xl">
                    <h3 class="text-green-400 font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-arrow-down"></i> Depósito
                    </h3>
                    <input id="depositAmount" type="number" placeholder="Cantidad" 
                           class="w-full bg-zinc-700 border border-zinc-600 rounded-2xl px-5 py-4 text-center text-2xl mb-4 focus:outline-none focus:border-green-400">
                    <button onclick="makeDeposit()" 
                            class="w-full bg-green-600 hover:bg-green-700 py-4 rounded-2xl font-bold">Depositar</button>
                </div>

                <!-- Retiro -->
                <div class="bg-zinc-800 p-6 rounded-2xl">
                    <h3 class="text-red-400 font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-arrow-up"></i> Retiro
                    </h3>
                    <input id="withdrawAmount" type="number" placeholder="Cantidad" 
                           class="w-full bg-zinc-700 border border-zinc-600 rounded-2xl px-5 py-4 text-center text-2xl mb-4 focus:outline-none focus:border-red-400">
                    <button onclick="makeWithdraw()" 
                            class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-2xl font-bold">Retirar</button>
                </div>
            </div>

            <div class="mt-6 text-center text-sm text-zinc-400">
                <p>Mínimo depósito/retiro: $100</p>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;
        let chatChannel = null;

        function msg(text, color = "text-white") {
            const el = document.getElementById("msg");
            if (el) el.innerHTML = `<span class="${color}">${text}</span>`;
        }

        function val(id) {
            const el = document.getElementById(id);
            return el ? parseFloat(el.value) || 0 : 0;
        }

        function formatSaldo(n) {
            return new Intl.NumberFormat('es-MX').format(Math.floor(n || 0));
        }

        function updateSaldo() {
            const el = document.getElementById("saldo");
            if (el) el.textContent = "$" + formatSaldo(saldo);
        }

        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("-translate-x-full"); }
        function toggleChat() { document.getElementById("chatPanel").classList.toggle("translate-x-full"); }

        function openBankModal() {
            document.getElementById("modalSaldo").textContent = "$" + formatSaldo(saldo);
            document.getElementById("bankModal").classList.remove("hidden");
            document.getElementById("depositAmount").value = "";
            document.getElementById("withdrawAmount").value = "";
        }

        function closeBankModal() {
            document.getElementById("bankModal").classList.add("hidden");
        }

        // ====================== DEPÓSITO ======================
        async function makeDeposit() {
            let amount = val("depositAmount");
            if (amount < 100) {
                alert("El depósito mínimo es de $100");
                return;
            }

            saldo += amount;
            await saveSaldo();
            updateSaldo();
            alert(`¡Depósito de $${amount} realizado con éxito!`);
            closeBankModal();
            loadRanking();
        }

        // ====================== RETIRO ======================
        async function makeWithdraw() {
            let amount = val("withdrawAmount");
            if (amount < 100) {
                alert("El retiro mínimo es de $100");
                return;
            }
            if (amount > saldo) {
                alert("No tienes suficiente saldo para retirar esa cantidad");
                return;
            }

            saldo -= amount;
            await saveSaldo();
            updateSaldo();
            alert(`¡Retiro de $${amount} realizado con éxito!`);
            closeBankModal();
            loadRanking();
        }

        // ====================== RESTO DEL CÓDIGO (juegos, chat, etc.) ======================
        // ... (incluyo solo las funciones esenciales para que no sea demasiado largo)

        async function startCasino() {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("casino").classList.remove("hidden");
            document.getElementById("topbar").classList.remove("hidden");

            let { data } = await sb.from("usuarios").select("*").eq("id", user.id).maybeSingle();

            if (!data) {
                await sb.from("usuarios").insert([{ id: user.id, saldo: 3000 }]);
                saldo = 3000;
            } else {
                saldo = data.saldo || 3000;
            }

            updateSaldo();
            loadRanking();
            initChat();
            showGame('slot');
        }

        async function saveSaldo() {
            if (user) await sb.from("usuarios").update({ saldo }).eq("id", user.id);
        }

        function showGame(gameId) {
            document.querySelectorAll('.game').forEach(g => g.classList.add('hidden'));
            const game = document.getElementById(gameId);
            if (game) game.classList.remove('hidden');
        }

        // Slots (con validación mejorada)
        async function spinSlot() {
            let bet = parseInt(val("betSlot"));
            if (!bet || bet <= 0) {
                alert("La apuesta debe ser mayor a 0");
                return;
            }
            if (bet > saldo) {
                alert(`Saldo insuficiente. Tienes $${formatSaldo(saldo)}`);
                return;
            }

            // ... (resto del código de spinSlot igual que antes)
            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            reels.forEach(r => r.classList.add('spinning'));
            await new Promise(r => setTimeout(r, 1600));
            reels.forEach(r => r.classList.remove('spinning'));

            const symbols = ["🍒","💎","7️⃣","⭐","🍀","🔔","🍉"];
            let a = symbols[Math.floor(Math.random()*symbols.length)];
            let b = symbols[Math.floor(Math.random()*symbols.length)];
            let c = symbols[Math.floor(Math.random()*symbols.length)];

            reels[0].innerText = a; reels[1].innerText = b; reels[2].innerText = c;

            const win = (a === b && b === c);
            saldo += win ? bet * 15 : -bet;

            document.getElementById("slotRes").innerHTML = win 
                ? `<span class="text-yellow-400">¡JACKPOT! +$${bet*15}</span>` 
                : `<span class="text-red-400">-$${bet}</span>`;

            if (win) launchConfetti();

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        // Resto de funciones (spinRoulette, playDice, playBJ, initChat, sendMsg, loadRanking, logout, etc.)
        // ... puedes copiarlas de la versión anterior

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                startCasino();
            }
        };
    </script>
</body>
</html>
