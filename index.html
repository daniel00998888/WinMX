<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .view-content { height: calc(100vh - 160px); overflow-y: auto; padding-bottom: 20px; }
        .hidden-view { display: none !important; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1rem; transition: 0.2s; }
        
        /* Juegos Compactos */
        .grid-mines { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-width: 280px; margin: 0 auto; }
        .mine-tile { aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .tower-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 5px; opacity: 0.4; pointer-events: none; }
        .tower-row.active { opacity: 1; pointer-events: auto; }
        .tower-step { height: 40px; background: rgba(255,255,255,0.05); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        #crash-display { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; color: var(--mx-green); }
    </style>
</head>
<body class="antialiased select-none">

    <header class="p-5 flex justify-between items-center bg-black/40 border-b border-white/5">
        <span class="font-casino italic text-xl">WIN<span class="text-emerald-500">MX</span></span>
        <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-full px-4 py-1 flex items-center gap-3">
            <span id="balance-display" class="font-casino text-emerald-500 text-lg">$0.00</span>
            <div onclick="UI.openModal('modal-deposit')" class="w-7 h-7 bg-emerald-500 text-black rounded-full flex items-center justify-center text-xs"><i class="fas fa-plus"></i></div>
        </div>
    </header>

    <div id="main-app">
        <div id="view-lobby" class="view-content p-5 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div onclick="Router.openGame('slots')" class="glass p-5 text-center border-emerald-500/20">
                    <span class="text-3xl block mb-1">🎰</span>
                    <span class="font-casino text-[8px] tracking-widest">Slots MX</span>
                </div>
                <div onclick="Router.openGame('mines')" class="glass p-5 text-center">
                    <span class="text-3xl block mb-1">💣</span>
                    <span class="font-casino text-[8px] tracking-widest text-zinc-400">Mines</span>
                </div>
                <div onclick="Router.openGame('crash')" class="glass p-5 text-center">
                    <span class="text-3xl block mb-1">🚀</span>
                    <span class="font-casino text-[8px] tracking-widest text-zinc-400">Aviator</span>
                </div>
                <div onclick="Router.openGame('tower')" class="glass p-5 text-center">
                    <span class="text-3xl block mb-1">🗼</span>
                    <span class="font-casino text-[8px] tracking-widest text-zinc-400">Tower</span>
                </div>
            </div>
        </div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-500 text-[9px] font-bold uppercase"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
            <div id="game-mount"></div>
        </div>

        <div id="view-history" class="view-content p-5 hidden-view space-y-3">
            <div class="glass overflow-hidden">
                <div onclick="UI.toggleAcc('acc-bets')" class="p-4 flex justify-between bg-white/[0.02]">
                    <span class="font-casino text-[9px]">Apuestas Recientes</span>
                    <i class="fas fa-chevron-down text-zinc-600"></i>
                </div>
                <div id="acc-bets" class="hidden-view p-2 space-y-1" id="list-bets"></div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/90 flex items-center border-t border-white/5">
            <div onclick="Router.showView('lobby')" class="flex-1 text-center text-zinc-500 text-[9px] font-bold uppercase"><i class="fas fa-gamepad text-xl block mb-1"></i>Jugar</div>
            <div onclick="Router.showView('history')" class="flex-1 text-center text-zinc-500 text-[9px] font-bold uppercase"><i class="fas fa-receipt text-xl block mb-1"></i>Historial</div>
        </nav>
    </div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        let State = { user: null, balance: 0, currentBet: 10, playing: false };

        const Router = {
            showView(id) {
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${id}`).classList.remove('hidden-view');
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'mines') GameLogic.mines.init();
                if(game === 'tower') GameLogic.tower.init();
            },
            templates: {
                mines: `
                    <div class="glass p-4 text-center">
                        <div id="mines-grid" class="grid-mines mb-4"></div>
                        <div class="flex gap-2 mb-4">
                            <button onclick="GameLogic.changeBet(-10)" class="bg-zinc-800 px-4 rounded-lg">-</button>
                            <div class="flex-1 bg-black/40 py-2 rounded-lg font-casino text-emerald-500 bet-val">$10</div>
                            <button onclick="GameLogic.changeBet(10)" class="bg-zinc-800 px-4 rounded-lg">+</button>
                        </div>
                        <button id="btn-mines" onclick="GameLogic.mines.play()" class="btn-action w-full py-3 font-casino">Jugar</button>
                    </div>`,
                crash: `
                    <div class="glass p-4 text-center">
                        <div id="crash-display">1.00x</div>
                        <button id="btn-crash" onclick="GameLogic.crash.play()" class="btn-action w-full py-4 font-casino mt-4">Apostar $10</button>
                    </div>`,
                tower: `
                    <div class="glass p-4 text-center">
                        <div id="tower-grid" class="mb-4"></div>
                        <button id="btn-tower" onclick="GameLogic.tower.play()" class="btn-action w-full py-3 font-casino">Subir Torre</button>
                    </div>`
            }
        };

        const GameLogic = {
            changeBet(v) { State.currentBet = Math.max(10, State.currentBet + v); document.querySelectorAll('.bet-val').forEach(e => e.innerText = `$${State.currentBet}`); },
            async start() {
                if(State.balance < State.currentBet) return false;
                State.balance -= State.currentBet; UI.upBal();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async win(amt, label) {
                State.balance += amt; UI.upBal();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: amt - State.currentBet, label: label }]);
            },
            mines: {
                init() { 
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<16; i++) g.innerHTML += `<div id="m-${i}" class="mine-tile">?</div>`;
                },
                async play() {
                    if(!await GameLogic.start()) return;
                    const btn = document.getElementById('btn-mines');
                    btn.innerText = "RETIRAR"; btn.onclick = () => this.end(true);
                    this.data = { bombs: Array.from({length:3},()=>Math.floor(Math.random()*16)), hits: 0 };
                    for(let i=0; i<16; i++) {
                        const t = document.getElementById(`m-${i}`); t.className = 'mine-tile'; t.innerText = '?';
                        t.onclick = () => {
                            if(this.data.bombs.includes(i)) { t.innerText='💣'; t.classList.add('bg-red-500/20'); this.end(false); }
                            else { t.innerText='💎'; t.classList.add('bg-emerald-500/20'); this.data.hits++; btn.innerText = `CASH ${(State.currentBet*(1+(this.data.hits*0.3))).toFixed(2)}`; }
                        };
                    }
                },
                end(win) {
                    const winAmt = win ? State.currentBet*(1+(this.data.hits*0.3)) : 0;
                    GameLogic.win(winAmt, 'MINES');
                    this.init(); const btn = document.getElementById('btn-mines');
                    btn.innerText = "JUGAR"; btn.onclick = () => this.play();
                }
            },
            crash: {
                async play() {
                    if(!await GameLogic.start()) return;
                    let mult = 1.0; const crashAt = (Math.random() * 5 + 1).toFixed(2);
                    const btn = document.getElementById('btn-crash');
                    btn.innerText = "RETIRAR";
                    const timer = setInterval(() => {
                        mult += 0.05; document.getElementById('crash-display').innerText = mult.toFixed(2)+'x';
                        btn.innerText = `CASH ${(State.currentBet * mult).toFixed(2)}`;
                        if(mult >= crashAt) { clearInterval(timer); document.getElementById('crash-display').style.color='#ef4444'; this.end(0); }
                    }, 100);
                    btn.onclick = () => { clearInterval(timer); this.end(State.currentBet * mult); };
                },
                end(amt) {
                    GameLogic.win(amt, 'AVIATOR');
                    const btn = document.getElementById('btn-crash');
                    btn.innerText = `APOSTAR $${State.currentBet}`; btn.onclick = () => this.play();
                    setTimeout(()=> document.getElementById('crash-display').style.color='#10b981', 1000);
                }
            },
            tower: {
                init() {
                    const g = document.getElementById('tower-grid'); g.innerHTML = '';
                    for(let i=0; i<5; i++) {
                        let row = `<div id="tr-${i}" class="tower-row">`;
                        for(let j=0; j<3; j++) row += `<div class="tower-step" onclick="GameLogic.tower.step(${i},${j})">?</div>`;
                        g.innerHTML = row + `</div>` + g.innerHTML;
                    }
                },
                async play() {
                    if(!await GameLogic.start()) return;
                    this.lvl = 0; this.bombs = Array.from({length:5}, ()=> Math.floor(Math.random()*3));
                    document.getElementById('tr-0').classList.add('active');
                    document.getElementById('btn-tower').innerText = "RETIRAR $0";
                    document.getElementById('btn-tower').onclick = () => this.end(true);
                },
                step(l, s) {
                    if(s === this.bombs[l]) { this.end(false); }
                    else {
                        document.getElementById(`tr-${l}`).classList.remove('active');
                        this.lvl++; 
                        if(this.lvl < 5) document.getElementById(`tr-${this.lvl}`).classList.add('active');
                        document.getElementById('btn-tower').innerText = `CASH ${(State.currentBet * (1 + this.lvl)).toFixed(2)}`;
                        if(this.lvl === 5) this.end(true);
                    }
                },
                end(win) {
                    GameLogic.win(win ? State.currentBet * (1+this.lvl) : 0, 'TOWER');
                    this.init(); document.getElementById('btn-tower').innerText = "SUBIR TORRE";
                    document.getElementById('btn-tower').onclick = () => this.play();
                }
            }
        };

        const UI = {
            upBal() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            toggleAcc(id) { document.getElementById(id).classList.toggle('hidden-view'); },
            openModal(id) { alert("Sistema de carga activo. Envía tu captura al administrador."); }
        };

        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if(session) {
                State.user = session.user;
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                State.balance = data ? data.saldo : 0; UI.upBal();
            } else { location.reload(); }
        })();
    </script>
</body>
</html>
