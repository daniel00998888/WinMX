<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premier Gaming Platform</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { --accent: #00ff88; --bg: #0f1116; --surface: #1a1d23; --border: #262a33; }
        
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; }

        /* SIDEBAR PROFESIONAL */
        aside { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: #8a8e97; transition: 0.2s; cursor: pointer; font-size: 14px; font-weight: 600; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.03); }
        .nav-link.active { border-right: 3px solid var(--accent); color: var(--accent); }

        /* CONTENIDO PRINCIPAL */
        main { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .top-bar { height: 70px; display: flex; align-items: center; justify-content: space-between; px: 30px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 50; }

        /* AREA DE JUEGO (CANVAS) */
        .game-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .game-frame { 
            width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; 
            border-radius: 20px; border: 1px solid var(--border); overflow: hidden; 
            position: relative; display: flex; flex-direction: column;
        }

        /* PANEL DE APUESTA INFERIOR (ESTILO REAL) */
        .bet-panel { background: var(--surface); border-top: 1px solid var(--border); padding: 25px 40px; display: flex; gap: 30px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .input-field { background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 8px; outline: none; font-weight: bold; font-family: monospace; }
        
        .btn-action { 
            background: var(--accent); color: #000; font-weight: 900; text-transform: uppercase; 
            padding: 16px 50px; border-radius: 8px; font-size: 18px; transition: 0.2s; 
            box-shadow: 0 4px 15px rgba(0,255,136,0.3);
        }
        .btn-action:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        /* LOBBY DE JUEGOS (CARDS) */
        .lobby-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 40px; }
        .game-card { 
            aspect-ratio: 3/4; background: var(--surface); border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--border); transition: 0.3s; cursor: pointer; position: relative;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .game-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .game-card-title { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px; background: linear-gradient(to top, #000, transparent); font-weight: bold; }

        /* COMPONENTES DE JUEGO */
        .slots-reel { flex: 1; height: 100%; border-right: 1px solid #111; display: flex; flex-direction: column; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .mine-btn { aspect-ratio: 1; background: #262a33; border-radius: 8px; font-size: 1.5rem; transition: 0.2s; }
        .mine-btn:hover:not(:disabled) { background: #353b47; transform: scale(1.05); }

        /* SCROLL PERSONALIZADO */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <aside>
        <div class="p-8 text-2xl font-black italic tracking-tighter text-white">
            WIN<span class="text-emerald-500">MX</span>
        </div>
        <nav class="flex-grow">
            <div onclick="UI.view('lobby')" class="nav-link active" id="l-lobby"><i class="fas fa-th-large"></i> Lobby</div>
            <div class="px-5 py-4 text-[10px] font-black text-zinc-600 uppercase tracking-widest">Originales</div>
            <div onclick="Router.load('slots')" class="nav-link"><i class="fas fa-dice"></i> Slots</div>
            <div onclick="Router.load('mines')" class="nav-link"><i class="fas fa-bomb"></i> Minas</div>
            <div onclick="Router.load('crash')" class="nav-link"><i class="fas fa-rocket"></i> Crash</div>
            <div onclick="Router.load('dice')" class="nav-link"><i class="fas fa-dice-five"></i> Dados</div>
            <div onclick="Router.load('plinko')" class="nav-link"><i class="fas fa-braille"></i> Plinko</div>
            <div class="px-5 py-4 text-[10px] font-black text-zinc-600 uppercase tracking-widest">Cuenta</div>
            <div onclick="UI.modal('history', true)" class="nav-link"><i class="fas fa-history"></i> Historial</div>
            <div onclick="Auth.logout()" class="nav-link text-red-500"><i class="fas fa-sign-out-alt"></i> Salir</div>
        </nav>
    </aside>

    <main>
        <div class="top-bar px-10">
            <div id="game-breadcrumb" class="text-zinc-500 font-bold text-sm">Casino > Lobby</div>
            <div class="flex items-center gap-4">
                <div class="bg-black/40 border border-white/5 px-6 py-2 rounded-lg flex items-center gap-3">
                    <span class="text-zinc-500 font-bold text-xs">MXN</span>
                    <span id="bal-txt" class="text-emerald-400 font-black tracking-tighter text-lg">$0.00</span>
                </div>
                <button onclick="UI.modal('dep', true)" class="bg-emerald-500 text-black font-black px-6 py-2 rounded-lg text-sm hover:brightness-110">DEPOSITAR</button>
            </div>
        </div>

        <div id="view-lobby" class="lobby-grid">
            <div onclick="Router.load('slots')" class="game-card">
                <div class="game-card-title text-emerald-400">CLASSIC SLOTS</div>
            </div>
            <div onclick="Router.load('mines')" class="game-card">
                <div class="game-card-title text-emerald-400">MINES PRO</div>
            </div>
            <div onclick="Router.load('crash')" class="game-card">
                <div class="game-card-title text-emerald-400">CRASH ROCKET</div>
            </div>
            </div>

        <div id="view-game" class="hidden flex-grow flex flex-col">
            <div class="game-container">
                <div class="game-frame">
                    <div id="game-canvas" class="flex-grow flex items-center justify-center p-10 bg-[#050505]">
                        </div>
                </div>
            </div>

            <div class="bet-panel">
                <div class="input-group">
                    <label class="text-[10px] font-black text-zinc-500 uppercase">Cantidad de Apuesta</label>
                    <div class="flex gap-1">
                        <input id="bet-in" type="number" value="10" class="input-field flex-grow">
                        <button onclick="Game.setBet(State.bet/2)" class="bg-zinc-800 px-4 rounded-lg font-bold text-xs">1/2</button>
                        <button onclick="Game.setBet(State.bet*2)" class="bg-zinc-800 px-4 rounded-lg font-bold text-xs">x2</button>
                    </div>
                </div>
                <button id="main-btn" onclick="Game.play()" class="btn-action">Apostar</button>
            </div>
        </div>
    </main>

    <div id="modal-dep" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center">
        <div class="bg-zinc-900 w-full max-w-md p-10 rounded-2xl border border-white/5">
            <h2 class="text-2xl font-black mb-6">Recargar Saldo</h2>
            <div class="space-y-4">
                <div class="bg-black p-4 rounded-lg border border-white/5">
                    <p class="text-[10px] text-zinc-500 font-bold mb-1 uppercase">Clave STP</p>
                    <p class="text-lg font-mono font-bold select-all tracking-tighter">722 969 020 533 491 161</p>
                </div>
                <button onclick="UI.modal('dep', false)" class="w-full py-4 font-bold text-zinc-500 uppercase text-xs">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let State = { user: null, balance: 0, bet: 10, playing: false, game: null, spin: 0 };

        // --- NAVEGACIÓN ---
        const Router = {
            load(game) {
                State.game = game;
                UI.view('game');
                document.getElementById('game-breadcrumb').innerText = `Casino > ${game.toUpperCase()}`;
                this.render();
            },
            render() {
                const canvas = document.getElementById('game-canvas');
                const btn = document.getElementById('main-btn');
                btn.innerText = "Apostar";
                btn.disabled = false;

                if(State.game === 'slots') {
                    canvas.innerHTML = `<div class="flex gap-4 w-full h-full"><div class="slots-reel" id="r1"></div><div class="slots-reel" id="r2"></div><div class="slots-reel" id="r3"></div></div>`;
                    Logic.slots.init();
                } else if(State.game === 'mines') {
                    canvas.innerHTML = `<div id="m-grid" class="grid grid-cols-5 gap-3 w-full max-w-sm"></div>`;
                    Logic.mines.init();
                }
            }
        };

        // --- LÓGICA DE JUEGOS REALES ---
        const Logic = {
            slots: {
                symbols: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'],
                init() {
                    [1,2,3].forEach(id => {
                        const r = document.getElementById(`r${id}`); r.innerHTML = '';
                        for(let i=0; i<60; i++) r.innerHTML += `<div class="h-full min-h-[150px] flex items-center justify-center text-6xl">${this.symbols[i%6]}</div>`;
                    });
                },
                async start() {
                    State.spin++;
                    const res = [this.symbols[Math.floor(Math.random()*6)], this.symbols[Math.floor(Math.random()*6)], this.symbols[Math.floor(Math.random()*6)]];
                    [1,2,3].forEach((id, i) => {
                        const r = document.getElementById(`r${id}`);
                        const target = (State.spin * 150 * 12) + (this.symbols.indexOf(res[i]) * 150);
                        r.style.transform = `translateY(-${target}px)`;
                    });
                    setTimeout(() => {
                        const winMap = {'7️⃣7️⃣7️⃣':500,'💎💎💎':100,'⭐️⭐️⭐️':50,'🔔🔔🔔':20,'🍋🍋🍋':10,'🍒🍒🍒':5};
                        Game.finish(winMap[res.join('')] || 0, "SLOTS");
                    }, 3100);
                }
            },
            mines: {
                active: false, bombs: [], found: 0, mult: 1,
                init() {
                    const g = document.getElementById('m-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<button onclick="Logic.mines.step(${i}, this)" class="mine-btn">?</button>`;
                },
                step(i, btn) {
                    if(!this.active) {
                        if(State.balance < State.bet) return;
                        this.active = true; State.playing = true; this.found = 0; this.mult = 1.2;
                        this.bombs = Array.from({length:25},(_,k)=>k).sort(()=>Math.random()-0.5).slice(0,3);
                        document.getElementById('main-btn').innerText = "CASH OUT";
                    }
                    if(btn.disabled) return;
                    btn.disabled = true;
                    if(this.bombs.includes(i)) {
                        btn.innerText = "💣"; btn.style.background = "#ff4444";
                        this.end(false);
                    } else {
                        btn.innerText = "💎"; btn.style.background = "rgba(0,255,136,0.1)";
                        btn.style.borderColor = "#00ff88";
                        this.found++; this.mult *= 1.4;
                        document.getElementById('main-btn').innerText = `CASH OUT $${Math.floor(State.bet * this.mult)}`;
                    }
                },
                end(win) {
                    this.active = false;
                    Game.finish(win ? this.mult : 0, "MINAS");
                    setTimeout(()=>this.init(), 2000);
                }
            }
        };

        // --- SISTEMA CORE ---
        const Game = {
            setBet(v) { State.bet = Math.max(10, Math.floor(v)); document.getElementById('bet-in').value = State.bet; },
            play() {
                if(State.game === 'mines' && Logic.mines.active) { Logic.mines.end(true); return; }
                const val = parseInt(document.getElementById('bet-in').value);
                if(State.balance < val) return alert("Saldo insuficiente");
                
                State.bet = val; State.playing = true;
                State.balance -= State.bet; UI.up();
                document.getElementById('main-btn').disabled = true;

                if(State.game === 'slots') Logic.slots.start();
                if(State.game === 'mines') { /* El primer click en la rejilla inicia */ document.getElementById('main-btn').disabled = false; }
            },
            async finish(m, label) {
                const win = Math.floor(State.bet * m);
                State.balance += win;
                State.playing = false; 
                document.getElementById('main-btn').disabled = false;
                document.getElementById('main-btn').innerText = "Apostar";
                UI.up();

                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                await sb.from('history').insert([{ user_id: State.user.id, amount: win - State.bet, label: label }]);
            }
        };

        const UI = {
            view(v) {
                document.getElementById('view-lobby').classList.toggle('hidden', v !== 'lobby');
                document.getElementById('view-game').classList.toggle('hidden', v !== 'game');
            },
            up() { document.getElementById('bal-txt').innerText = `$${State.balance.toLocaleString()}`; },
            modal(id, s) { document.getElementById(`modal-${id}`).classList.toggle('hidden', !s); }
        };

        const Auth = {
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    State.user = session.user;
                    const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                    State.balance = data.saldo || 0;
                    UI.up();
                }
            },
            logout() { sb.auth.signOut().then(() => location.reload()); }
        };

        Auth.check();
    </script>
</body>
</html>
