<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | Professional Casino System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #050505; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-casino { font-family: 'Archivo Black', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Slot Reels */
        .slot-box { height: 150px; overflow: hidden; background: #000; border: 3px solid #151515; border-radius: 2rem; position: relative; }
        .slot-reel { display: flex; flex-direction: column; align-items: center; }
        .slot-item { height: 150px; min-height: 150px; display: flex; align-items: center; justify-content: center; font-size: 4.5rem; }
        
        /* Tabs */
        .tab-btn { padding: 12px; font-size: 10px; font-weight: 900; color: #444; border-bottom: 2px solid transparent; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: var(--mx-green); border-bottom: 2px solid var(--mx-green); }
        
        .btn-primary { background: var(--mx-green); color: black; font-weight: 900; transition: 0.3s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="antialiased">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass p-12 rounded-[4rem] w-full max-w-md text-center border-b-[12px] border-emerald-600 shadow-2xl">
            <h2 class="text-7xl font-casino italic mb-2 tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <p class="text-zinc-600 text-[10px] tracking-[0.5em] font-black mb-12 uppercase">Base de Datos: Usuarios</p>
            <input id="auth-email" type="email" placeholder="TU EMAIL" class="w-full bg-black p-6 rounded-3xl border border-white/5 outline-none focus:border-emerald-500 text-white font-bold mb-6 text-center text-xl">
            <button onclick="handleLogin()" class="btn-primary w-full py-6 rounded-3xl font-black uppercase italic tracking-widest">Sincronizar y Entrar</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
            <h1 class="text-4xl font-casino italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h1>
            <div class="flex items-center gap-6">
                <div class="flex flex-col items-end">
                    <span class="text-[9px] text-zinc-500 font-black uppercase tracking-widest">Saldo en Cuenta</span>
                    <span id="balance-display" class="text-3xl font-casino text-emerald-400">$---.--</span>
                </div>
                <button onclick="logout()" class="text-zinc-700 hover:text-red-500 transition"><i class="fas fa-power-off text-xl"></i></button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-10 pt-10">
            <div class="lg:col-span-7">
                <div class="glass p-10 rounded-[3.5rem] border border-white/5 shadow-2xl">
                    <div class="grid grid-cols-3 gap-6 mb-12">
                        <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                        <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                    </div>
                    <div class="flex flex-col items-center gap-8">
                        <div class="flex items-center gap-10 bg-black p-4 rounded-full border border-white/5">
                            <button onclick="changeBet(-50)" class="w-12 h-12 rounded-full bg-zinc-900 font-black">-</button>
                            <span id="bet-display" class="text-4xl font-casino">$10</span>
                            <button onclick="changeBet(50)" class="w-12 h-12 rounded-full bg-zinc-900 font-black">+</button>
                        </div>
                        <button id="spin-btn" onclick="spin()" class="btn-primary w-full py-8 rounded-[2.5rem] font-casino text-4xl uppercase italic">Girar Rodillos</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5 space-y-6">
                <div class="glass p-8 rounded-[3rem] h-full border border-white/5 flex flex-col">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="showModal('deposit')" class="p-4 bg-zinc-950 rounded-2xl border border-emerald-500/10 hover:border-emerald-500 transition uppercase font-bold text-[10px]"><i class="fas fa-plus block text-xl mb-1 text-emerald-500"></i>Depósito</button>
                        <button onclick="showModal('withdraw')" class="p-4 bg-zinc-950 rounded-2xl border border-red-500/10 hover:border-red-500 transition uppercase font-bold text-[10px]"><i class="fas fa-minus block text-xl mb-1 text-red-500"></i>Retiro</button>
                    </div>

                    <div class="flex border-b border-white/5 mb-4">
                        <button onclick="switchTab('tab-bets')" id="btn-tab-bets" class="tab-btn active">Apuestas</button>
                        <button onclick="switchTab('tab-deposits')" id="btn-tab-deposits" class="tab-btn">Depósitos</button>
                        <button onclick="switchTab('tab-withdraws')" id="btn-tab-withdraws" class="tab-btn">Retiros</button>
                    </div>

                    <div class="flex-grow overflow-y-auto max-h-[400px] custom-scroll space-y-2">
                        <div id="tab-bets" class="tab-content"></div>
                        <div id="tab-deposits" class="tab-content hidden"></div>
                        <div id="tab-withdraws" class="tab-content hidden"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-bank" class="fixed inset-0 bg-black/95 backdrop-blur-3xl flex items-center justify-center z-[100] hidden p-6">
        <div class="glass p-12 rounded-[4rem] w-full max-w-sm text-center">
            <h2 id="modal-title" class="font-casino text-5xl mb-10">BANCO</h2>
            <input id="modal-amount" type="number" placeholder="0.00" class="w-full bg-transparent text-center text-6xl font-casino border-b-2 border-emerald-500 py-4 mb-10 outline-none">
            <button onclick="executeTransaction()" class="btn-primary w-full py-6 rounded-3xl uppercase tracking-widest mb-4">Confirmar</button>
            <button onclick="closeModal()" class="text-zinc-600 text-[10px] font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        
        let user = null;
        let balance = 0;
        let currentBet = 10;
        let currentAction = 'deposit';
        const symbols = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        // --- AUTH & SYNC ---
        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Ingresa tu email");
            
            // Simulación de sesión (Ajustar según tu configuración de Supabase Auth)
            const { data: authData } = await sb.auth.signUp({ email, password: 'password123' });
            await sb.auth.signInWithPassword({ email, password: 'password123' });
            
            checkUser();
        }

        async function checkUser() {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                await syncData();
                setupReels();
            }
        }

        async function syncData() {
            // Buscamos en la tabla 'usuarios' usando la columna 'saldo'
            let { data: usuario, error } = await sb.from('usuarios').select('saldo').eq('id', user.id).single();
            
            if (error || !usuario) {
                // Crear usuario si no existe
                await sb.from('usuarios').insert({ id: user.id, email: user.email, saldo: 1000 });
                balance = 1000;
            } else {
                balance = usuario.saldo;
            }
            updateUI();
            loadHistory();
        }

        async function loadHistory() {
            const { data: logs } = await sb.from('history').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
            if (logs) {
                document.getElementById('tab-bets').innerHTML = '';
                document.getElementById('tab-deposits').innerHTML = '';
                document.getElementById('tab-withdraws').innerHTML = '';
                logs.forEach(log => renderLog(log));
            }
        }

        // --- MOTOR DE PROBABILIDAD ESTRICTO (0.2% Jackpot) ---
        function calculateMathResult() {
            const rng = Math.random() * 100;
            
            // JACKPOT (0.2% Probabilidad) -> Paga x200
            if (rng <= 0.2) return { type: 'JACKPOT SUPREMO', icons: ['7️⃣', '7️⃣', '7️⃣'], mult: 200 };
            
            // DIAMANTE (1.5% Probabilidad) -> Paga x50
            if (rng <= 1.7) return { type: 'DIAMANTE REAL', icons: ['💎', '💎', '💎'], mult: 50 };
            
            // ESTRELLAS (5% Probabilidad) -> Paga x10
            if (rng <= 6.7) return { type: 'ESTRELLAS', icons: ['⭐️', '⭐️', '⭐️'], mult: 10 };
            
            // PAR PEQUEÑO (15% Probabilidad) -> Paga x1.5 (Recuperas algo)
            if (rng <= 21.7) return { type: 'PAR', icons: ['🍒', '🍒', '🍋'], mult: 1.5 };

            // PIERDES (78.3% Probabilidad)
            return { type: 'LOSE', icons: ['🍋', '🔔', '🍒'], mult: 0 };
        }

        // --- LÓGICA DE JUEGO ---
        async function spin() {
            if (balance < currentBet) return alert("Saldo insuficiente");
            
            const res = calculateMathResult();
            const winAmount = currentBet * res.mult;
            const newBalance = (balance - currentBet) + winAmount;

            const btn = document.getElementById('spin-btn');
            btn.disabled = true;

            // Animación Física Real
            [1, 2, 3].forEach((id, i) => {
                const reel = document.getElementById(`reel-${id}`);
                reel.style.transition = 'none';
                reel.style.transform = `translateY(0px)`;
                reel.offsetHeight;
                
                const finalPos = (symbols.indexOf(res.icons[i]) * 150) + 4500;
                reel.style.transition = `transform ${2.5 + (i*0.4)}s cubic-bezier(0.1, 0, 0.1, 1)`;
                reel.style.transform = `translateY(-${finalPos}px)`;
            });

            // Persistencia en tabla 'usuarios'
            setTimeout(async () => {
                const { error } = await sb.from('usuarios').update({ saldo: newBalance }).eq('id', user.id);
                if (!error) {
                    balance = newBalance;
                    await sb.from('history').insert({ 
                        user_id: user.id, 
                        type: 'bets', 
                        amount: winAmount > 0 ? winAmount : -currentBet, 
                        label: res.type 
                    });
                    loadHistory();
                    updateUI();
                }
                btn.disabled = false;
            }, 3500);
        }

        // --- BANCO ---
        async function executeTransaction() {
            const amt = parseFloat(document.getElementById('modal-amount').value);
            if (!amt || amt <= 0) return;

            let newBalance = currentAction === 'deposit' ? balance + amt : balance - amt;
            if (newBalance < 0) return alert("Saldo insuficiente");

            const { error } = await sb.from('usuarios').update({ saldo: newBalance }).eq('id', user.id);
            if (!error) {
                await sb.from('history').insert({ 
                    user_id: user.id, 
                    type: currentAction === 'deposit' ? 'deposits' : 'withdraws', 
                    amount: amt, 
                    label: currentAction.toUpperCase() 
                });
                balance = newBalance;
                updateUI();
                loadHistory();
                closeModal();
            }
        }

        // --- INTERFAZ ---
        function renderLog(log) {
            const container = document.getElementById(`tab-${log.type}`);
            const color = log.amount >= 0 ? 'text-emerald-500' : 'text-red-500';
            const icon = log.amount >= 0 ? 'fa-arrow-up' : 'fa-arrow-down';
            
            const html = `
                <div class="bg-zinc-950 p-4 rounded-2xl border border-white/5 flex justify-between items-center mb-2 animate-in fade-in slide-in-from-right duration-500">
                    <div class="flex items-center gap-3">
                        <i class="fas ${icon} ${color} text-[8px]"></i>
                        <span class="text-[9px] font-bold text-zinc-400 uppercase">${log.label}</span>
                    </div>
                    <span class="font-casino ${color} text-lg">$${Math.abs(log.amount).toLocaleString()}</span>
                </div>`;
            container.insertAdjacentHTML('afterbegin', html);
        }

        function setupReels() {
            [1, 2, 3].forEach(id => {
                const reel = document.getElementById(`reel-${id}`);
                reel.innerHTML = '';
                [...symbols, ...symbols, ...symbols, ...symbols, ...symbols, ...symbols].forEach(s => {
                    const d = document.createElement('div'); d.className = 'slot-item'; d.innerText = s; reel.appendChild(d);
                });
            });
        }

        function updateUI() { document.getElementById('balance-display').innerText = `$${balance.toLocaleString(undefined, {minimumFractionDigits: 2})}`; }
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active');
        }
        function showModal(t) { currentAction = t; document.getElementById('modal-title').innerText = t === 'deposit' ? 'DEPOSITAR' : 'RETIRAR'; document.getElementById('modal-bank').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-bank').classList.add('hidden'); }
        function changeBet(v) { currentBet = Math.max(10, currentBet + v); document.getElementById('bet-display').innerText = `$${currentBet}`; }
        async function logout() { await sb.auth.signOut(); location.reload(); }

        window.onload = checkUser;
    </script>
</body>
</html>
