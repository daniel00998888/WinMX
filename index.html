                rgba(0,0,0,0.9) 0%,

            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .slot-reel {
            transition: transform 3.8s cubic-bezier(0.15, 0, 0.05, 1);

        }

        .slot-item {
            height: 150px;
            display: flex;
            align-items: center;

            position: relative;

        .btn-main::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;

            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: 0.6s;
            z-index: -1;
        }

        .btn-main:hover:not(:disabled)::before { left: 100%; }

        .btn-main:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 50px var(--mx-green-glow);
        }

        .btn-main:active { transform: scale(0.98); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--mx-border);
            transition: all 0.3s;

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2); }

            text-transform: uppercase;
            color: #555;

            75% { transform: translateX(10px); }
            90% { transform: translateX(-5px); }

    <script>

        // 1. DATA CORE & STATE
        const CONFIG = {
            sb_url: "https://dakhnqriwbzihlzhtfcb.supabase.co",
            sb_key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        };
        
        const sb = window.supabase.createClient(CONFIG.sb_url, CONFIG.sb_key);
        
        let State = {
            user: null,
            balance: 0,
            bet: 10,
            spinning: false,
            tab: 'bets',
            icons: ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣']
        };

        const PAYTABLE = {
            '🍒🍒🍒': 20,
            '7️⃣7️⃣7️⃣': 100,
            '💎💎💎': 50,
            '🔔🔔🔔': 10,
            '⭐️⭐️⭐️': 15,
            '🍋🍋🍋': 5
        };

        // 2. MOTOR DE SONIDO DINÁMICO
        const AudioFX = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);

                if(type === 'spin') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(90, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.03, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
                } else if(type === 'jackpot') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.5);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
                } else if(type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
                }
                osc.start(); osc.stop(this.ctx.currentTime + 0.6);
            }
        };

        // 3. CORE LOGIC (AUTH, DB, SYNC)
        const Core = {
            async boot() {
                let progress = 0;
                const bar = document.getElementById('loader-bar');
                const bootInt = setInterval(() => {
                    progress += Math.random() * 20;
                    bar.style.width = Math.min(progress, 100) + '%';
                    if(progress >= 100) {
                        clearInterval(bootInt);
                        this.verifySession();
                    }
                }, 200);
            },

            async verifySession() {
                const { data: { session } } = await sb.auth.getSession();
                if (session) {
                    State.user = session.user;
                    this.loadUserAccount();
                } else {
                    UI.show('auth-app');
                    this.killLoader();
                }
            },

            async processAuth() {
                const email = document.getElementById('email-field').value;
                const password = document.getElementById('pass-field').value;
                const btn = document.getElementById('auth-submit');

                if(!email || !password) return UI.toast("Ingresa credenciales", "error");
                
                btn.disabled = true; btn.innerText = "PROCESANDO...";

                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                
                if(error) {
                    const { data: up, error: errUp } = await sb.auth.signUp({ email, password });
                    if(up.user) {
                        await sb.from('usuarios').insert({ id: up.user.id, saldo: 0 });
                        UI.toast("Usuario registrado", "success");
                    } else {
                        UI.toast("Acceso denegado", "error");
                        btn.disabled = false; btn.innerText = "Acceder al Casino";
                        return;
                    }
                }
                location.reload();
            },

            async loadUserAccount() {
                UI.show('casino-app');
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).single();
                if (data) {
                    State.balance = data.saldo;
                    UI.syncBalance();
                    this.refreshLogs();
                    Game.setupReels();
                }
                this.killLoader();
            },

            async refreshLogs() {
                const { data } = await sb.from('history')
                    .select('*')
                    .eq('user_id', State.user.id)
                    .order('created_at', {ascending: false})
                    .limit(25);
                UI.drawLogs(data);
            },

            async saveDeposit() {
                const fileInput = document.getElementById('evidence-file');
                const amount = parseFloat(document.getElementById('amt-input').value);
                
                if(!amount || amount < 10) return UI.toast("Monto inválido (Min $10)", "error");
                if(!fileInput.files[0]) return UI.toast("Sube el comprobante", "error");

                const btn = document.getElementById('confirm-btn');
                btn.disabled = true; btn.innerText = "SUBIENDO...";

                const file = fileInput.files[0];
                const filePath = `evidence/${State.user.id}/${Date.now()}.png`;

                const { error: storageErr } = await sb.storage.from('comprobantes').upload(filePath, file);
                if(storageErr) return UI.toast("Error de red", "error");

                const { data: { publicUrl } } = sb.storage.from('comprobantes').getPublicUrl(filePath);

                await sb.from('history').insert({
                    user_id: State.user.id,
                    type: 'deposits',
                    amount: amount,
                    label: 'SOLICITUD DEPÓSITO',
                    status: 'pending',
                    evidence_url: publicUrl
                });

                UI.toast("Enviado para validación", "success");
                UI.modal('modal-dep', false);
                this.refreshLogs();
                btn.disabled = false; btn.innerText = "Confirmar Transacción";
            },

            killLoader() {
                const l = document.getElementById('loader-screen');
                l.style.opacity = '0';
                setTimeout(() => l.classList.add('hidden'), 1000);
            },

            shutdown() { sb.auth.signOut(); location.reload(); }
        };

        // 4. GAME ENGINE (RNG & ANIMATION)
        const Game = {
            setupReels() {
                [1,2,3].forEach(id => {
                    const r = document.getElementById(`reel-${id}`);
                    r.innerHTML = '';
                    const pool = [...State.icons, ...State.icons, ...State.icons, ...State.icons, ...State.icons];
                    pool.forEach(s => {
                        r.innerHTML += `<div class="slot-item">${s}</div>`;
                    });
                });
            },

            adjustBet(val) {
                AudioFX.play('click');
                State.bet = Math.max(10, State.bet + val);
                document.getElementById('bet-val').innerText = `$${State.bet}`;
                document.getElementById('bet-val').classList.add('animate__animated', 'animate__bounceIn');
                setTimeout(() => document.getElementById('bet-val').classList.remove('animate__bounceIn'), 500);
            },

            async executeSpin() {
                if(State.spinning) return;
                if(State.balance < State.bet) return UI.toast("Saldo insuficiente", "error");

                State.spinning = true;
                AudioFX.play('click');
                
                const btn = document.getElementById('spin-master');
                btn.disabled = true; btn.innerText = "GIRANDO...";

                // Generación de Resultados (Pseudo-RNG)
                const result = [
                    State.icons[Math.floor(Math.random() * State.icons.length)],
                    State.icons[Math.floor(Math.random() * State.icons.length)],
                    State.icons[Math.floor(Math.random() * State.icons.length)]
                ];

                // Cálculo de Multiplicadores
                const combination = result.join('');
                const multiplier = PAYTABLE[combination] || 0;
                const winValue = State.bet * multiplier;
                const balanceDelta = winValue - State.bet;
                const finalBalance = State.balance + balanceDelta;

                // Animación Física de Reels
                [1,2,3].forEach((id, i) => {
                    const el = document.getElementById(`reel-${id}`);
                    const iconPos = State.icons.indexOf(result[i]);
                    const offset = (iconPos * 150) + (150 * 24); // 24 Vueltas de inercia
                    el.style.transform = `translateY(-${offset}px)`;
                });

                let spinNoise = setInterval(() => AudioFX.play('spin'), 150);

                setTimeout(async () => {
                    clearInterval(spinNoise);
                    
                    if(multiplier > 0) {
                        AudioFX.play('jackpot');
                        UI.toast(`¡WIN X${multiplier}! +$${winValue}`, "success");
                    }

                    // Sincronización Blindada
                    const { error } = await sb.from('usuarios').update({ saldo: finalBalance }).eq('id', State.user.id);
                    
                    if(!error) {
                        await sb.from('history').insert({
                            user_id: State.user.id,
                            type: 'bets',
                            amount: balanceDelta,
                            label: multiplier > 0 ? `PREMIO X${multiplier}` : 'JUGADA',
                            status: 'completed'
                        });

                        State.balance = finalBalance;
                        UI.syncBalance();
                        Core.refreshLogs();
                    }

                    State.spinning = false;
                    btn.disabled = false; btn.innerText = "GIRAR";
                    this.cleanupReels();
                }, 4000);
            },

            cleanupReels() {
                [1,2,3].forEach(id => {
                    const el = document.getElementById(`reel-${id}`);
                    el.style.transition = 'none';
                    el.style.transform = 'translateY(0)';
                    setTimeout(() => el.style.transition = 'transform 3.8s cubic-bezier(0.15, 0, 0.05, 1)', 50);
                });
            }
        };

        // 5. UI & INTERFACE MANAGER
        const UI = {
            syncBalance() {
                const el = document.getElementById('balance-val');
                el.innerText = `$${State.balance.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            },

            toast(msg, type = 'info') {
                const hub = document.getElementById('toast-hub');
                const t = document.createElement('div');
                const styles = {
                    success: 'bg-emerald-500 text-black',
                    error: 'bg-red-500 text-white',
                    info: 'bg-zinc-800 text-white'
                };
                t.className = `${styles[type]} toast-mx px-10 py-5 rounded-2xl font-black text-xs shadow-2xl flex items-center gap-5 border border-white/10`;
                t.innerHTML = `<i class="fas fa-bolt"></i> ${msg.toUpperCase()}`;
                hub.appendChild(t);
                
                setTimeout(() => {
                    t.style.opacity = '0';
                    t.style.transform = 'translateX(100px)';
                    setTimeout(() => t.remove(), 600);
                }, 4000);
            },

            show(id) {
                const el = document.getElementById(id);
                el.classList.remove('hidden');
                setTimeout(() => el.classList.add('opacity-100'), 50);
            },

            tab(mode) {
                AudioFX.play('click');
                State.tab = mode;
                document.getElementById('tab-bets-trigger').classList.toggle('active', mode === 'bets');
                document.getElementById('tab-deps-trigger').classList.toggle('active', mode === 'deps');
                Core.refreshLogs();
            },

            drawLogs(data) {
                const box = document.getElementById('history-box');
                box.innerHTML = '';
                
                const filtered = data?.filter(h => State.tab === 'bets' ? h.type === 'bets' : h.type === 'deposits');
                
                if(!filtered || filtered.length === 0) {
                    box.innerHTML = `<div class="py-20 text-center text-zinc-800 font-black text-[10px] uppercase tracking-widest">Sin registros</div>`;
                    return;
                }

                filtered.forEach(h => {
                    const isPlus = h.amount >= 0;
                    const color = h.status === 'pending' ? 'text-amber-500' : (isPlus ? 'text-emerald-500' : 'text-red-500');
                    
                    box.innerHTML += `
                        <div class="glass-panel p-6 rounded-[2rem] flex justify-between items-center border border-white/5 animate__animated animate__fadeInUp">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-zinc-500 uppercase tracking-tighter">${h.label}</span>
                                <span class="text-[7px] text-zinc-700 font-bold">${new Date(h.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="text-right">
                                <div class="font-casino text-lg ${color}">${isPlus ? '+' : ''}$${Math.abs(h.amount).toFixed(2)}</div>
                                <div class="text-[7px] font-black text-zinc-800 uppercase tracking-widest">${h.status}</div>
                            </div>
                        </div>
                    `;
                });
            },

            modal(id, show) { 
                AudioFX.play('click');
                const el = document.getElementById(id);
                if(show) {
                    el.classList.remove('hidden');
                    document.getElementById('step-1').classList.remove('hidden');
                    document.getElementById('step-2').classList.add('hidden');
                } else {
                    el.classList.add('hidden');
                }
            },

            nextDep() {
                const a = document.getElementById('amt-input').value;
                if(!a || a < 10) return this.toast("Monto mínimo $10", "error");
                AudioFX.play('click');
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            },

            copy() {
                navigator.clipboard.writeText('722969020533491161');
                this.toast("Clave copiada al portapapeles", "success");
            }
        };

        // EVENT LISTENERS
        document.getElementById('evidence-file')?.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                document.getElementById('file-status').innerText = "✅ ARCHIVO CARGADO CORRECTAMENTE";
                document.getElementById('file-status').classList.add('text-emerald-500');
            }
        });

        // ALIAS DE SEGURIDAD
        function loadPending() { Core.refreshLogs(); }

        // START ENGINE
        Core.boot();

    </script>
</body>
</html>
