<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino Royale</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1d2a;
  color:white;
  text-align:center;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  z-index:999;
}

/* HEADER */
header{
  background:#102c3c;
  padding:15px;
  font-size:24px;
}

/* SCREENS */
.screen{display:none;}
.active{display:block}

/* LOBBY */
.games{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.gameBtn{
  background:#16394f;
  padding:20px;
  border-radius:15px;
  width:200px;
  cursor:pointer;
  transition:.3s;
}

.gameBtn:hover{
  transform:scale(1.1);
}

/* SLOT */
.slot{
  font-size:40px;
  letter-spacing:10px;
  margin:20px;
}

/* BOTONES */
button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#00c896;
  color:white;
  cursor:pointer;
}

/* INPUTS */
input{
  padding:8px;
  margin-top:10px;
}

/* SALDO */
#saldo{
  font-size:22px;
  color:#00ffcc;
}
</style>
</head>

<body>

<div id="loader">Cargando casino...</div>

<header>🎰 CASINO ROYALE</header>

<!-- LOGIN -->
<div id="auth" class="screen active">
<h2>Acceso</h2>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
<h2>Bienvenido</h2>
<div id="saldo">Saldo: $0</div>

<div class="games">
<div class="gameBtn" onclick="openGame('slot')">🎰 Slots</div>
<div class="gameBtn" onclick="openGame('roulette')">🎡 Ruleta</div>
</div>

<button onclick="logout()">Salir</button>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<h2>🎰 Slot Machine</h2>

<div class="slot" id="slotDisplay">🍒 🍒 🍒</div>

<input id="bet" type="number" placeholder="Apuesta"><br>
<button onclick="spin()">Girar</button>
<button onclick="back()">Volver</button>

<p id="slotResult"></p>
</div>

<!-- RULETA -->
<div id="roulette" class="screen">
<h2>🎡 Ruleta</h2>

<p id="rouletteResult">---</p>

<input id="betR" type="number" placeholder="Apuesta"><br>
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>

<button onclick="spinRoulette()">Girar</button>
<button onclick="back()">Volver</button>
</div>

<script>

// ===== LOADER =====
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";

    let current = localStorage.getItem("currentUser");
    if(current){
      cargar(JSON.parse(current));
      show("lobby");
    }else{
      show("auth");
    }

  },1000);
};

// ===== USERS =====
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(u){
  localStorage.setItem("users", JSON.stringify(u));
}

// ===== AUTH =====
function register(){
  let email=emailInput();
  let pass=passInput();

  let users=getUsers();

  if(users.find(u=>u.email===email)){
    alert("Usuario ya existe");
    return;
  }

  users.push({email,pass,saldo:1000});
  saveUsers(users);

  alert("Cuenta creada");
}

function login(){
  let email=emailInput();
  let pass=passInput();

  let user=getUsers().find(u=>u.email===email && u.pass===pass);

  if(!user) return alert("Datos incorrectos");

  localStorage.setItem("currentUser",JSON.stringify(user));
  cargar(user);
  show("lobby");
}

function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// ===== HELPERS =====
function emailInput(){return document.getElementById("email").value}
function passInput(){return document.getElementById("pass").value}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== USER =====
let userActual;

function cargar(user){
  userActual=user;
  update();
}

function update(){
  document.getElementById("saldo").innerText="Saldo: $"+userActual.saldo;
}

// ===== SAVE =====
function save(){
  let users=getUsers();

  users=users.map(u=>{
    if(u.email===userActual.email){
      u.saldo=userActual.saldo;
    }
    return u;
  });

  saveUsers(users);
  localStorage.setItem("currentUser",JSON.stringify(userActual));
}

// ===== NAV =====
function openGame(g){
  show(g);
}

function back(){
  show("lobby");
}

// ===== SLOT REAL =====
function spin(){
  let bet=+document.getElementById("bet").value;
  if(!bet || bet>userActual.saldo) return alert("Apuesta inválida");

  let symbols=["🍒","💎","7️⃣","⭐"];
  let display=document.getElementById("slotDisplay");

  let interval=setInterval(()=>{
    display.innerText=
      symbols[rand()]+ " "+
      symbols[rand()]+ " "+
      symbols[rand()];
  },100);

  setTimeout(()=>{
    clearInterval(interval);

    let a=symbols[rand()];
    let b=symbols[rand()];
    let c=symbols[rand()];

    display.innerText=`${a} ${b} ${c}`;

    let win=(a===b && b===c);

    userActual.saldo += win ? bet*3 : -bet;

    document.getElementById("slotResult").innerText=
      win?"JACKPOT 💰":"PERDISTE";

    update();
    save();

  },1500);
}

// ===== RULETA =====
function spinRoulette(){
  let bet=+document.getElementById("betR").value;
  let c=document.getElementById("color").value;

  if(!bet || bet>userActual.saldo) return alert("Apuesta inválida");

  let res=document.getElementById("rouletteResult");
  res.innerText="Girando...";

  setTimeout(()=>{
    let r=Math.random()<0.5?"rojo":"negro";
    let win=r===c;

    userActual.saldo += win ? bet : -bet;

    res.innerText=r.toUpperCase();

    update();
    save();
  },1500);
}

function rand(){
  return Math.floor(Math.random()*4);
}

</script>

</body>
</html>
