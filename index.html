<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | El Casino #1 de México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --mx-green: #006341; --mx-red: #ce1126; --gold: #fbbf24; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .winmx-gradient { background: linear-gradient(90deg, #006341 0%, #000 50%, #ce1126 100%); }
        
        /* Animaciones */
        .spinning { animation: spin 0.15s infinite linear; }
        @keyframes spin { from { transform: translateY(-10px); filter: blur(4px); } to { transform: translateY(10px); filter: blur(4px); } }
        
        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast { transform: translateX(120%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .toast.show { transform: translateX(0); }

        .card-game { transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .card-game:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(255,255,255,0.03); }
        .wheel-anim { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="notification-container"></div>

    <div id="loading" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-[500] transition-opacity duration-500">
        <div class="mb-6 relative">
            <div class="w-24 h-24 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center font-black text-xs">WinMX</div>
        </div>
        <h2 class="text-white font-black tracking-[0.3em] animate-pulse uppercase text-xl">Win<span class="text-emerald-500">MX</span></h2>
    </div>

    <header id="nav" class="hidden glass sticky top-0 z-50 py-4 px-8 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-600 px-3 py-1 rounded font-black italic text-black skew-x-[-15deg]">WinMX</div>
        </div>
        <div class="flex items-center gap-6">
            <div onclick="openBank()" class="cursor-pointer group flex items-center gap-3 bg-zinc-900 px-5 py-2 rounded-2xl border border-white/10 hover:border-emerald-500 transition">
                <div class="text-right">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase">Balance</p>
                    <p id="balance" class="text-emerald-400 font-black text-lg leading-tight">$0</p>
                </div>
                <i class="fas fa-wallet text-emerald-500"></i>
            </div>
            <button onclick="logout()" class="text-zinc-500 hover:text-red-500"><i class="fas fa-power-off text-xl"></i></button>
        </div>
    </header>

    <div id="auth" class="min-h-screen flex items-center justify-center p-6 hidden">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center border-b-4 border-emerald-600">
            <div class="mb-8">
                <h2 class="text-5xl font-black italic tracking-tighter mb-2">Win<span class="text-emerald-500">MX</span></h2>
                <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Siente la emoción de ganar</p>
            </div>
            <div class="space-y-4 mb-8">
                <input id="email" type="email" placeholder="Correo Electrónico" class="w-full bg-zinc-900 p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500 transition">
                <input id="pass" type="password" placeholder="Contraseña" class="w-full bg-zinc-900 p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500 transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="handleAuth('up')" class="bg-zinc-800 py-4 rounded-2xl font-bold">REGISTRO</button>
                <button onclick="handleAuth('in')" class="bg-emerald-600 text-black py-4 rounded-2xl font-black uppercase">ENTRAR</button>
            </div>
        </div>
    </div>

    <main id="app" class="hidden p-8 max-w-7xl mx-auto">
        <h2 class="text-2xl font-black mb-8">SALAS <span class="text-emerald-500">VIP</span></h2>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-6 mb-12">
            <div onclick="tab('slots')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🎰</div>
                <p class="font-black text-xs uppercase tracking-widest">Tragamonedas</p>
            </div>
            <div onclick="tab('crash')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🚀</div>
                <p class="font-black text-xs uppercase tracking-widest">Crash Win</p>
            </div>
            <div onclick="tab('roulette')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🎯</div>
                <p class="font-black text-xs uppercase tracking-widest">Ruleta MX</p>
            </div>
            <div onclick="tab('flip')" class="card-game glass p-8 rounded-[2rem] text-center">
                <div class="text-5xl mb-4">🪙</div>
                <p class="font-black text-xs uppercase tracking-widest">Coin Flip</p>
            </div>
        </div>

        <div id="game-zone">
            <div id="tab-slots" class="tab-content glass p-12 rounded-[3rem] text-center max-w-2xl mx-auto border-t-4 border-emerald-500">
                <div class="flex justify-center gap-4 mb-10">
                    <div id="s1" class="w-24 h-32 bg-zinc-950 rounded-2xl text-6xl flex items-center justify-center border border-white/5 shadow-inner">💎</div>
                    <div id="s2" class="w-24 h-32 bg-zinc-950 rounded-2xl text-6xl flex items-center justify-center border border-white/5 shadow-inner">💎</div>
                    <div id="s3" class="w-24 h-32 bg-zinc-950 rounded-2xl text-6xl flex items-center justify-center border border-white/5 shadow-inner">💎</div>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <input id="bet-slots" type="number" value="10" class="bg-black border border-white/10 p-4 rounded-xl text-center text-xl font-bold w-40 outline-none">
                    <button id="btn-slots" onclick="playSlots()" class="w-full max-w-sm bg-emerald-600 text-black py-5 rounded-2xl font-black text-xl hover:scale-105 transition">GIRAR</button>
                </div>
            </div>

            <div id="tab-crash" class="tab-content hidden glass p-12 rounded-[3rem] text-center max-w-md mx-auto">
                <div class="h-32 flex items-center justify-center mb-8">
                    <span id="crash-mult" class="text-7xl font-black text-emerald-400">1.00x</span>
                </div>
                <input id="bet-crash" type="number" value="50" class="w-full bg-black p-5 rounded-2xl border border-white/10 text-center text-2xl font-black mb-4 outline-none">
                <button id="btn-crash" onclick="startCrash()" class="w-full bg-orange-600 py-5 rounded-2xl font-black text-xl uppercase">Apostar</button>
            </div>

            <div id="tab-roulette" class="tab-content hidden glass p-12 rounded-[3rem] text-center max-w-xl mx-auto">
                <div class="flex justify-center mb-10">
                    <div id="wheel" class="w-48 h-48 rounded-full border-8 border-zinc-800 bg-zinc-900 flex items-center justify-center wheel-anim">
                        <div id="wheel-res" class="text-5xl">❓</div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button onclick="setR(this, 'red')" class="btn-r bg-red-600 p-4 rounded-xl font-bold border-4 border-emerald-500">ROJO</button>
                    <button onclick="setR(this, 'black')" class="btn-r bg-black p-4 rounded-xl font-bold border-4 border-transparent">NEGRO</button>
                </div>
                <button id="btn-r" onclick="playR()" class="w-full bg-emerald-600 text-black py-5 rounded-2xl font-black">GIRAR RULETA</button>
            </div>

            <div id="tab-flip" class="tab-content hidden glass p-12 rounded-[3rem] text-center max-w-sm mx-auto">
                <div id="coin" class="w-32 h-32 bg-yellow-500 rounded-full mx-auto mb-10 border-8 border-yellow-600 flex items-center justify-center text-4xl text-yellow-900 font-bold">MX</div>
                <div class="flex gap-2 mb-6">
                    <button onclick="setF(this, 'heads')" class="btn-f flex-1 bg-zinc-800 p-4 rounded-xl font-bold border-2 border-emerald-500">SOL</button>
                    <button onclick="setF(this, 'tails')" class="btn-f flex-1 bg-zinc-800 p-4 rounded-xl font-bold border-2 border-transparent">ÁGUILA</button>
                </div>
                <button id="btn-flip" onclick="playFlip()" class="w-full bg-white text-black py-5 rounded-2xl font-black">VOLADO</button>
            </div>
        </div>
    </main>

    <div id="bank-modal" class="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-6 hidden">
        <div class="bg-zinc-900 w-full max-w-lg rounded-[2.5rem] overflow-hidden border border-white/10">
            <div class="bg-emerald-600 p-8 flex justify-between items-center">
                <h2 class="text-black text-2xl font-black italic">BANCO WinMX</h2>
                <button onclick="closeBank()" class="bg-black/20 w-10 h-10 rounded-full text-black flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-8">
                <div class="bg-black/50 p-6 rounded-3xl border border-white/5 mb-8">
                    <p class="text-[10px] text-zinc-500 font-black uppercase mb-1">Tu Saldo Actual</p>
                    <p id="bank-balance" class="text-4xl font-black text-emerald-400">$0.00</p>
                </div>
                <div class="space-y-4">
                    <input id="in-amt" type="number" placeholder="Monto a depositar" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500">
                    <button onclick="processIn()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-lg">EFECTUAR DEPÓSITO</button>
                    <button onclick="processOut()" class="w-full bg-zinc-800 text-red-500 py-5 rounded-2xl font-black">RETIRAR FONDOS</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let user = null, saldo = 0;

        // INICIALIZACIÓN SEGURA
        window.addEventListener('load', async () => {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if(session) {
                    user = session.user;
                    await initApp();
                } else {
                    showAuth();
                }
            } catch (err) {
                console.error("Error al cargar:", err);
                showAuth();
            }
        });

        // Forzar salida del loading si algo falla
        setTimeout(() => {
            if(!document.getElementById('loading').classList.contains('hidden')) {
                console.warn("Forzando salida de pantalla de carga");
                showAuth();
            }
        }, 5000);

        async function initApp() {
            const { data } = await sb.from('usuarios').select('*').eq('id', user.id).single();
            if(data) {
                saldo = data.saldo;
                updateUI();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('auth').classList.add('hidden');
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('auth').classList.remove('hidden');
        }

        async function handleAuth(type) {
            const email = document.getElementById('email').value, pass = document.getElementById('pass').value;
            if(!email || !pass) return toast("Llena los campos", "err");
            
            if(type === 'up') {
                const { data, error } = await sb.auth.signUp({ email, password: pass });
                if(error) return toast(error.message, 'err');
                await sb.from('usuarios').insert([{ id: data.user.id, email, saldo: 500 }]);
                toast("Cuenta creada!");
            } else {
                const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
                if(error) return toast("Error de acceso", 'err');
                user = data.user; await initApp();
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = `$${saldo.toLocaleString()}`;
            document.getElementById('bank-balance').innerText = `$${saldo.toLocaleString()}.00`;
            sb.from('usuarios').update({ saldo }).eq('id', user.id).then();
        }

        function toast(m, t = 'ok') {
            const c = document.getElementById('notification-container');
            const e = document.createElement('div');
            e.className = `toast glass p-5 rounded-2xl mb-4 border-l-4 ${t==='ok'?'border-emerald-500':'border-red-500'} flex items-center gap-4`;
            e.innerHTML = `<span class="font-bold uppercase text-xs">${m}</span>`;
            c.appendChild(e);
            setTimeout(() => e.classList.add('show'), 10);
            setTimeout(() => { e.classList.remove('show'); setTimeout(()=>e.remove(), 400); }, 3000);
        }

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-'+id).classList.remove('hidden');
        }

        // JUEGOS
        const icons = ["🍒", "💎", "7️⃣", "🔔", "⭐"];
        function playSlots() {
            const btn = document.getElementById('btn-slots');
            const bet = parseInt(document.getElementById('bet-slots').value) || 0;
            if(bet > saldo || bet <= 0) return toast("Saldo insuficiente", 'err');
            btn.disabled = true; saldo -= bet; updateUI();
            const reels = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
            reels.forEach(r => r.classList.add('spinning'));
            setTimeout(() => {
                const res = reels.map(r => { r.classList.remove('spinning'); const i = icons[Math.floor(Math.random()*icons.length)]; r.innerText = i; return i; });
                if(res[0] === res[1] && res[1] === res[2]) { saldo += bet*15; toast("WIN x15!"); }
                else if(res[0] === res[1]) { saldo += bet*2; toast("WIN x2!"); }
                updateUI(); btn.disabled = false;
            }, 1000);
        }

        let cMult = 1, cInterval;
        function startCrash() {
            const btn = document.getElementById('btn-crash');
            const bet = parseInt(document.getElementById('bet-crash').value) || 0;
            if(btn.innerText === "RETIRAR") {
                saldo += Math.floor(bet * cMult); stopCrash(); updateUI(); return;
            }
            if(bet > saldo || bet <= 0) return toast("Saldo insuficiente", 'err');
            saldo -= bet; updateUI(); cMult = 1;
            btn.innerText = "RETIRAR"; btn.className = "w-full bg-emerald-500 text-black py-5 rounded-2xl font-black text-xl";
            const limit = (Math.random() * 4 + 1.1).toFixed(2);
            cInterval = setInterval(() => {
                cMult += 0.04;
                document.getElementById('crash-mult').innerText = cMult.toFixed(2) + "x";
                if(cMult >= limit) {
                    clearInterval(cInterval);
                    document.getElementById('crash-mult').innerText = "BOOM!";
                    btn.innerText = "PERDISTE"; btn.disabled = true;
                    setTimeout(() => { stopCrash(); btn.disabled = false; }, 2000);
                }
            }, 100);
        }
        function stopCrash() {
            clearInterval(cInterval);
            const btn = document.getElementById('btn-crash');
            btn.innerText = "APOSTAR"; btn.className = "w-full bg-orange-600 py-5 rounded-2xl font-black text-xl uppercase";
            document.getElementById('crash-mult').innerText = "1.00x";
        }

        let rColor = 'red';
        function setR(el, c) {
            rColor = c;
            document.querySelectorAll('.btn-r').forEach(b => b.style.borderColor = 'transparent');
            el.style.borderColor = '#10b981';
        }
        function playR() {
            const btn = document.getElementById('btn-r'), bet = 20;
            if(bet > saldo) return toast("Saldo insuficiente", 'err');
            btn.disabled = true; saldo -= bet; updateUI();
            const res = Math.random() > 0.5 ? 'red' : 'black';
            document.getElementById('wheel').style.transform = `rotate(${3600 + Math.random()*360}deg)`;
            setTimeout(() => {
                document.getElementById('wheel-res').innerText = res === 'red' ? '🔴' : '⚫';
                if(res === rColor) { saldo += bet*2; toast("¡Ganaste!"); }
                updateUI(); btn.disabled = false;
            }, 4000);
        }

        let fSide = 'heads';
        function setF(el, s) {
            fSide = s;
            document.querySelectorAll('.btn-f').forEach(b => b.style.borderColor = 'transparent');
            el.style.borderColor = '#10b981';
        }
        function playFlip() {
            const btn = document.getElementById('btn-flip');
            if(10 > saldo) return toast("Saldo insuficiente", 'err');
            btn.disabled = true; saldo -= 10; updateUI();
            setTimeout(() => {
                const res = Math.random() > 0.5 ? 'heads' : 'tails';
                document.getElementById('coin').innerText = res === 'heads' ? '🌞' : '🦅';
                if(res === fSide) { saldo += 20; toast("¡Ganaste!"); }
                updateUI(); btn.disabled = false;
            }, 800);
        }

        // BANCO
        function openBank() { document.getElementById('bank-modal').classList.remove('hidden'); }
        function closeBank() { document.getElementById('bank-modal').classList.add('hidden'); }
        function processIn() {
            const a = parseInt(document.getElementById('in-amt').value) || 0;
            saldo += a; updateUI(); toast(`+$${a} depositado`);
        }
        function processOut() {
            const a = parseInt(document.getElementById('in-amt').value) || 0;
            if(a > saldo) return toast("Saldo insuficiente", 'err');
            saldo -= a; updateUI(); toast(`Retiro de $${a} solicitado`);
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
