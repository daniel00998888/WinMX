<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .view-content::-webkit-scrollbar { width: 4px; }
        .view-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .btn-action:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .history-scroll { max-height: 280px; overflow-y: auto; scrollbar-width: none; }
        .history-scroll::-webkit-scrollbar { display: none; }

        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
        
        #crash-rocket { transform: translate(0, 20px); position: relative; }

        .instruction-card { 
            background: rgba(16, 185, 129, 0.08); 
            border: 1px solid rgba(16, 185, 129, 0.3); 
            border-radius: 1.2rem; 
            padding: 20px; 
            margin-top: 24px; 
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="antialiased select-none">

        <div id="view-lobby" class="view-content p-5 space-y-6">
            <div class="bg-gradient-to-br from-emerald-500 to-emerald-800 p-6 rounded-[2.2rem] shadow-xl">
                <h2 class="text-2xl font-casino italic text-white">Lobby de Juegos</h2>
                <p class="text-[9px] font-bold text-emerald-100 uppercase tracking-widest mt-1 opacity-70">Suerte controlada por WinMX</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="Router.openGame('slots')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Minas</span></div>
                <div onclick="Router.openGame('crash')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🚀</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Aviator</span></div>
                <div onclick="Router.openGame('tower')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🗼</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Torre</span></div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-600 text-[10px] font-bold uppercase flex items-center"><i class="fas fa-arrow-left mr-2"></i> Volver al Lobby</button>
            <div id="game-mount" class="w-full"></div>

        <div id="view-history" class="view-content p-5 space-y-4 hidden-view">

            <div id="history-lists" class="space-y-4"></div>
        </div>

        <div id="view-profile" class="view-content p-5 space-y-4 hidden-view">
            <div class="glass p-10 text-center">
                <div class="w-24 h-24 bg-emerald-500 rounded-full mx-auto mb-6 flex items-center justify-center text-black text-4xl font-black"><i class="fas fa-user"></i></div>
                <p id="user-email-display" class="text-sm font-bold text-zinc-300 truncate mb-1">Cargando...</p>
                <button onclick="AuthManager.logout()" class="w-full p-4 rounded-xl border border-red-500/20 text-red-500 font-casino text-[10px] bg-red-500/5 mt-6">Cerrar Sesión</button>
            </div>
        </div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">
            <div onclick="Router.showView('lobby')" id="nav-home" class="nav-item active"><i class="fas fa-gamepad text-xl mb-1"></i><span>Jugar</span></div>
            <div onclick="Router.showView('history')" id="nav-history" class="nav-item"><i class="fas fa-receipt text-xl mb-1"></i><span>Historial</span></div>
            <div onclick="Router.showView('profile')" id="nav-profile" class="nav-item"><i class="fas fa-user-circle text-xl mb-1"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm bg-[#0a0a0a]">
            <div id="dep-step-1">
                <h2 class="font-casino text-emerald-500 text-center mb-6">Monto a cargar</h2>
                <input id="dep-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-10 text-white">
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 font-casino">Continuar</button>
            </div>
            <div id="dep-step-2" class="hidden-view space-y-4 text-center">
                <div class="bg-emerald-500/10 p-4 rounded-xl border border-emerald-500/20">
                    <p class="text-[8px] font-bold text-emerald-500 mb-1 uppercase">CLABE (STP)</p>
                    <span id="clabe-number" class="text-xs font-mono font-bold">722969020533491161</span>
                </div>
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="UI.handleFile(this)">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-2xl p-4 block cursor-pointer text-zinc-500">Subir Comprobante</label>
                <button id="btn-confirm-dep" onclick="Core.confirmDeposit()" class="btn-action w-full py-4 font-casino">Confirmar</button>
            </div>
            <button onclick="UI.closeModal('modal-deposit')" class="w-full mt-4 text-[9px] text-zinc-700 font-bold uppercase tracking-widest">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const sfx = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            spin: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            winExtra: new Audio('https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3'),
            lose: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            rocket: new Audio('https://assets.mixkit.co/active_storage/sfx/2015/2015-preview.mp3')
        };
        const playSfx = (key) => { sfx[key].currentTime = 0; sfx[key].play().catch(() => {}); };

        // ESTADO GLOBAL CON MEMORIA DE PENALIZACIÓN
        let State = { 
            user: null, 
            balance: 0, 
            isSpinning: false, 
            totalSpins: 0,
            penaltyRounds: 0, // Cuántas rondas faltan de dificultad alta
            penaltyFactor: 1.0 // Nivel de dificultad (1.0 = normal, >1.0 = difícil)
        };

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                playSfx('click');
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[viewId];
                if(navId) document.getElementById(navId).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                playSfx('click');
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.drawGrid();
                if(game === 'tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button id="btn-slots-play" onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden-view flex justify-between items-center p-3 mb-3 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500 text-xs">1.00x</span><button id="mines-cashout-btn" onclick="GameLogic.mines.cashout()" class="bg-emerald-500 text-black px-4 py-2 rounded-lg font-bold text-[9px] font-casino">COBRAR $0.00</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino text-xs">APOSTAR</button></div></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino italic mb-4">1.00x</div><div class="h-24 flex items-center justify-center mb-6"><div id="crash-rocket" class="text-4xl">🚀</div></div><input id="crash-bet-input" type="number" value="10" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse"></div><div id="tower-controls"><input id="tower-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino text-xs">JUGAR</button></div><button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="hidden-view btn-action w-full py-4 font-casino text-xs">COBRAR $0.00</button></div>`
            }
        };

        const Core = {
            async init() { let p = 0; const i = setInterval(() => { p += 25; document.getElementById('boot-bar').style.width = `${p}%`; if(p >= 100) { clearInterval(i); this.check(); } }, 100); },
            async check() { const { data: { session } } = await sb.auth.getSession(); document.getElementById('boot-loader').style.display = 'none'; if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); } else { document.getElementById('auth-view').classList.remove('hidden-view'); } },
            async loadBalance() { const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle(); State.balance = data ? data.saldo : 0; UI.updateBalance(); },
            
            // Lógica de "Memoria de Multiplicador"
            getDifficulty() {
                if(State.penaltyRounds > 0) {
                    return State.penaltyFactor;
                }
                return 1.0;
            },
            recordWin(mult) {
                if(mult > 1.1) {
                    // Si gana un x5, las próximas 5 rondas son x1.5 más difíciles
                    State.penaltyRounds = Math.ceil(mult); 
                    State.penaltyFactor = 1.2 + (mult * 0.05); 
                }
            },
            consumeRound() {
                if(State.penaltyRounds > 0) {
                    State.penaltyRounds--;
                    if(State.penaltyRounds <= 0) State.penaltyFactor = 1.0;
                }
            },

            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Faltan datos", "error");
                UI.notify("Procesando...", "success");
                const path = `depositos/${State.user.id}-${Date.now()}`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: url } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending', evidence_url: url.publicUrl }]);
                UI.closeModal('modal-deposit');
            },
            async fetchHistory() {
                const { data: b } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false }).limit(20);
                const container = document.getElementById('history-lists');
                container.innerHTML = b.map(i => `<div class="glass p-3 flex justify-between items-center"><span class="text-[9px] font-bold">${i.label}</span><span class="font-casino ${i.amount > 0 ? 'text-emerald-500':'text-red-500'}">$${i.amount.toFixed(2)}</span></div>`).join('');
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() { document.getElementById('dep-step-1').classList.add('hidden-view'); document.getElementById('dep-step-2').classList.remove('hidden-view'); },
            handleFile(input) { UI.notify("Imagen cargada", "success"); },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-xl text-[10px] font-bold ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'} animate__animated animate__fadeInDown`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            }
        };

        const AuthManager = {
            async login() { const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value; const { error } = await sb.auth.signInWithPassword({ email: e, password: p }); if(error) UI.notify("Error", "error"); else location.reload(); },
            async register() { const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value; const { data, error } = await sb.auth.signUp({ email: e, password: p }); if(!error) { await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]); location.reload(); } },
            async logout() { await sb.auth.signOut(); location.reload(); },
            switchTab(tab) { document.getElementById('login-container').classList.toggle('hidden-view', tab==='register'); document.getElementById('register-container').classList.toggle('hidden-view', tab==='login'); }
        };

        const GameLogic = {
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(State.isSpinning) return;
                    const bet = parseFloat(document.getElementById('slots-bet-input').value) || 10;
                    if(State.balance < bet) return UI.notify("Saldo insuficiente", "error");
                    
                    State.isSpinning = true; State.balance -= bet; UI.updateBalance();
                    Core.consumeRound(); // Consume una ronda de penalización

                    const diff = Core.getDifficulty();
                    // Si hay penalización activa, hay un 30% de probabilidad extra de fallar aunque salgan iguales
                    const forcedLoss = (diff > 1.0 && Math.random() < 0.3);

                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });

                    setTimeout(async () => {
                        State.isSpinning = false;
                        let win = 0;
                        if(res[0] === res[1] && res[1] === res[2] && !forcedLoss) {
                            win = bet * 10; State.balance += win; 
                            Core.recordWin(10);
                            UI.notify("¡GANASTE!", "success");
                        } else {
                            UI.notify("Sigue intentando", "error");
                        }
                        UI.updateBalance();
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win > 0 ? win : -bet, label: 'SLOTS' }]);
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 10,
                multSteps: [1.2, 1.8, 2.5, 3.8, 5.5, 9.0, 15.0, 25.0],
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer"></div>`;
                },
                start() {
                    const b = parseFloat(document.getElementById('mines-bet-input').value) || 10;
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance();
                    Core.consumeRound();
                    this.active = true; this.bet = b; this.mult = 1; this.revealed = [];
                    this.mines = []; while(this.mines.length < 3) { let r = Math.floor(Math.random()*25); if(!this.mines.includes(r)) this.mines.push(r); }
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    this.drawGrid();
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    const diff = Core.getDifficulty();
                    // Si hay penalización, hay probabilidad de que una celda vacía se convierta en bomba al tocarla
                    if(diff > 1.0 && Math.random() < 0.2 && !this.mines.includes(i)) {
                        this.mines.pop(); this.mines.push(i);
                    }
                    this.revealed.push(i);
                    const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.classList.add('bg-red-500'); this.end(false);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500');
                        this.mult = this.multSteps[this.revealed.length-1];
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2) + 'x';
                        document.getElementById('mines-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                    }
                },
                cashout() { const win = this.bet * this.mult; State.balance += win; Core.recordWin(this.mult); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                    document.getElementById('mines-status').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win ? (this.bet * this.mult) : -this.bet, label: 'MINAS' }]);
                }
            },
            tower: {
                level: 0, active: false, bet: 0, mult: 1,
                steps: [1.5, 2.5, 4.0, 7.0, 12.0, 25.0],
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<6; i++) {
                        let row = document.createElement('div'); row.className = "grid grid-cols-3 gap-2 opacity-30"; row.id = `t-row-${i}`;
                        for(let j=0; j<3; j++) row.innerHTML += `<div onclick="GameLogic.tower.select(${i},${j})" class="h-8 bg-white/10 rounded-lg"></div>`;
                        c.appendChild(row);
                    }
                },
                start() {
                    const b = parseFloat(document.getElementById('tower-bet-input').value) || 10;
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance();
                    Core.consumeRound();
                    this.active = true; this.bet = b; this.level = 0;
                    this.drawTower(); document.getElementById('t-row-0').classList.remove('opacity-30');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.remove('hidden-view');
                },
                select(r, c) {
                    if(!this.active || r !== this.level) return;
                    const diff = Core.getDifficulty();
                    const probFallo = 0.33 * diff; 
                    if(Math.random() < probFallo) { this.end(false); }
                    else {
                        this.mult = this.steps[this.level];
                        this.level++;
                        document.getElementById('tower-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                        if(this.level === 6) this.cashout();
                        else document.getElementById(`t-row-${this.level}`).classList.remove('opacity-30');
                    }
                },
                cashout() { State.balance += (this.bet * this.mult); Core.recordWin(this.mult); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    document.getElementById('tower-controls').classList.remove('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.add('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            },
            crash: {
                active: false, mult: 1,
                start() {
                    const b = parseFloat(document.getElementById('crash-bet-input').value) || 10;
                    if(State.balance < b) return;
                    State.balance -= b; UI.updateBalance();
                    Core.consumeRound();
                    this.active = true; this.bet = b; this.mult = 1;
                    const diff = Core.getDifficulty();
                    // Si hay penalización, el cohete explota MUCHO antes (promedio bajo)
                    const limit = (1.05 + Math.random() * 5) / diff;
                    const ival = setInterval(() => {
                        this.mult += 0.05;
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2) + 'x';
                        if(this.mult >= limit) { clearInterval(ival); this.explode(); }
                    }, 100);
                    this.ival = ival;
                    document.getElementById('btn-crash').innerText = "RETIRAR";
                    document.getElementById('btn-crash').onclick = () => this.cashout();
                },
                cashout() { 
                    clearInterval(this.ival); 
                    const win = this.bet * this.mult; 
                    State.balance += win; 
                    Core.recordWin(this.mult);
                    this.end(true); 
                },
                explode() { this.end(false); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    document.getElementById('btn-crash').innerText = "DESPEGAR";
                    document.getElementById('btn-crash').onclick = () => GameLogic.crash.start();
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            }
        };

        Core.init();
    </script>
</body>
</html>
