<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWEET ULTRA SLOT | Professional Edition</title>
    <style>
        /* CSS - EL LOOK & FEEL PROFESIONAL */
        :root {
            --candy-pink: #ff007b;
            --candy-purple: #7b00ff;
            --gold: #ffea00;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle, #2e1a47 0%, #0d0415 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 40px;
            border: 2px solid var(--candy-pink);
            box-shadow: 0 0 50px rgba(255, 0, 123, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, #ff007b, #7b00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 0, 123, 0.5));
        }

        /* TABLERO */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(6, 75px);
            grid-template-rows: repeat(5, 75px);
            gap: 12px;
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* SÍMBOLOS */
        .symbol {
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        /* ANIMACIONES */
        @keyframes dropDown {
            0% { transform: translateY(-400px); opacity: 0; }
            60% { transform: translateY(20px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        .dropping {
            animation: dropDown 0.5s backwards;
        }

        .win-glow {
            transform: scale(1.1);
            background: rgba(255, 234, 0, 0.4);
            box-shadow: 0 0 20px var(--gold);
            z-index: 10;
        }

        /* CONTROLES */
        .ui-panel {
            margin-top: 30px;
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
        }

        .stat-box {
            background: rgba(0,0,0,0.6);
            padding: 10px 25px;
            border-radius: 15px;
            border-bottom: 3px solid var(--candy-purple);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }

        #spinBtn {
            padding: 15px 50px;
            font-size: 1.8rem;
            font-weight: 900;
            color: #2e1a47;
            background: linear-gradient(180deg, var(--gold) 0%, #ff9100 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #b36600, 0 10px 20px rgba(0,0,0,0.4);
            transition: all 0.1s;
        }

        #spinBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #b36600, 0 12px 25px rgba(255, 234, 0, 0.3);
        }

        #spinBtn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #b36600;
        }

        #spinBtn:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>SWEET <span style="color:var(--gold)">ULTRA</span></h1>
        
        <div class="slot-grid" id="grid">
            </div>

        <div class="ui-panel">
            <div class="stat-box">
                <div class="stat-label">Balance</div>
                <div class="stat-value" id="balanceDisplay">$1000</div>
            </div>

            <button id="spinBtn">SPIN</button>

            <div class="stat-box">
                <div class="stat-label">Win</div>
                <div class="stat-value" id="winDisplay" style="color:var(--gold)">$0</div>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DEL JUEGO
        const grid = document.getElementById('grid');
        const spinBtn = document.getElementById('spinBtn');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const winDisplay = document.getElementById('winDisplay');

        const symbols = ['🍭', '🍬', '🍇', '🍎', '🍉', '💎', '🍓', '🍌'];
        const ROWS = 5;
        const COLS = 6;
        let balance = 1000;

        // Crear tablero inicial
        function initBoard() {
            grid.innerHTML = '';
            for (let i = 0; i < ROWS * COLS; i++) {
                const s = createSymbolElement();
                grid.appendChild(s);
            }
        }

        function createSymbolElement() {
            const div = document.createElement('div');
            div.classList.add('symbol');
            div.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            return div;
        }

        async function play() {
            if (balance < 20) return alert("¡Sin fondos!");

            // Setup inicial del giro
            spinBtn.disabled = true;
            balance -= 20;
            balanceDisplay.innerText = `$${balance}`;
            winDisplay.innerText = `$0`;

            // Animación de salida (desvanecer)
            const oldSymbols = document.querySelectorAll('.symbol');
            oldSymbols.forEach(s => {
                s.style.transform = 'scale(0) rotate(90deg)';
                s.style.opacity = '0';
            });

            await new Promise(r => setTimeout(r, 300));

            // Generar nuevos símbolos con efecto caída escalonada
            grid.innerHTML = '';
            const newElements = [];
            for (let i = 0; i < ROWS * COLS; i++) {
                const s = createSymbolElement();
                s.classList.add('dropping');
                // Retraso aleatorio para efecto profesional
                s.style.animationDelay = `${Math.random() * 0.4}s`; 
                grid.appendChild(s);
                newElements.push(s);
            }

            await new Promise(r => setTimeout(r, 800));

            checkWins(newElements);
            spinBtn.disabled = false;
        }

        function checkWins(elements) {
            const counts = {};
            const data = elements.map(el => el.innerHTML);

            // Contar cuántos de cada uno hay
            data.forEach(val => counts[val] = (counts[val] || 0) + 1);

            let totalWin = 0;
            let hasWin = false;

            for (const sym in counts) {
                // Regla tipo Sweet Bonanza: ganas con 8 o más en cualquier posición
                if (counts[sym] >= 8) {
                    hasWin = true;
                    const prize = calculatePrize(sym, counts[sym]);
                    totalWin += prize;

                    // Resaltar ganadores
                    elements.forEach(el => {
                        if (el.innerHTML === sym) {
                            el.classList.add('win-glow');
                        }
                    });
                }
            }

            if (hasWin) {
                balance += totalWin;
                balanceDisplay.innerText = `$${balance}`;
                winDisplay.innerText = `$${totalWin}`;
                // Efecto sacudida de pantalla si ganas mucho
                if (totalWin > 100) shakeScreen();
            }
        }

        function calculatePrize(sym, count) {
            const baseValues = { '🍭': 10, '💎': 15, '🍬': 8, '🍎': 5, '🍉': 4, 'grapes': 3 };
            const multiplier = baseValues[sym] || 2;
            return count * multiplier;
        }

        function shakeScreen() {
            document.body.animate([
                { transform: 'translate(1px, 1px) rotate(0deg)' },
                { transform: 'translate(-1px, -2px) rotate(-1deg)' },
                { transform: 'translate(-3px, 0px) rotate(1deg)' },
                { transform: 'translate(0px, 0px) rotate(0deg)' },
            ], { duration: 200, iterations: 2 });
        }

        spinBtn.addEventListener('click', play);
        
        // Iniciar al cargar
        initBoard();
    </script>
</body>
</html>
