    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .view-content::-webkit-scrollbar { width: 4px; }
        .view-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .history-scroll { max-height: 280px; overflow-y: auto; scrollbar-width: none; }
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
        
        .instruction-card { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 1.2rem; padding: 20px; margin-top: 24px; text-align: left; }
        .instruction-card h4 { font-family: 'Archivo Black', sans-serif; font-size: 12px; color: var(--mx-green); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .instruction-card p { font-size: 11px; color: #ccc; line-height: 1.6; }
    </style>
</head>

                <div onclick="Router.openGame('slots')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Minas</span></div>

                <div onclick="Router.openGame('tower')" class="glass p-6 text-center active:scale-95 transition-transform cursor-pointer"><span class="text-4xl block mb-2">🗼</span><span class="font-casino text-[9px] text-zinc-500 tracking-widest">Torre</span></div>

                <p id="user-email-display" class="text-sm font-bold text-zinc-300 truncate mb-1">Cargando...</p>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center px-4">

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm bg-[#0a0a0a]">
            <div id="dep-step-1">
                <h2 class="font-casino text-emerald-500 text-center mb-6">Monto a cargar</h2>
                <input id="dep-amount" type="number" placeholder="$0" class="w-full bg-transparent text-center text-5xl font-casino outline-none mb-10 text-white">
                <button onclick="UI.depNextStep()" class="btn-action w-full py-4 font-casino">Continuar</button>
            </div>
            <div id="dep-step-2" class="hidden-view space-y-4 text-center">
                <div class="instruction-card !mt-0 bg-emerald-500/5">
                    <h4><i class="fas fa-university"></i> Datos de Pago</h4>
                    <p class="text-[10px] mb-2 text-zinc-400">CLABE (STP):</p>
                    <div class="flex items-center justify-center gap-3 bg-black/40 p-3 rounded-lg">
                        <span id="clabe-number" class="text-xs font-mono font-bold">722969020533491161</span>
                        <button onclick="UI.copyClabe()" class="text-emerald-500"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
                <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="UI.handleFile(this)">
                <label for="receipt-input" class="border-2 border-dashed border-zinc-800 rounded-2xl p-4 block cursor-pointer">
                    <p id="file-label" class="text-[8px] font-bold text-zinc-500 uppercase">Subir Comprobante</p>

                <button id="btn-confirm-dep" onclick="Core.confirmDeposit()" class="btn-action w-full py-4 font-casino">Confirmar Pago</button>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        let State = { user: null, balance: 0, isSpinning: false, totalSpins: 0 };

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[viewId];
                if(navId) document.getElementById(navId).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.drawGrid();
                if(game === 'tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden flex justify-between items-center p-3 mb-3 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500 text-xs">1.00x</span><button onclick="GameLogic.mines.cashout()" class="bg-emerald-500 text-black px-3 py-1 rounded-lg font-bold text-[9px]">COBRAR</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino text-xs">APOSTAR</button></div></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino italic mb-4">1.00x</div><div class="h-24 flex items-center justify-center mb-6"><div id="crash-rocket" class="text-4xl transition-all duration-100">🚀</div></div><input id="crash-bet-input" type="number" value="10" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse overflow-y-auto max-h-[300px]"></div><div id="tower-controls"><input id="tower-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino text-xs">JUGAR</button></div><button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="hidden btn-action w-full py-4 font-casino text-xs">COBRAR</button></div>`
            }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) { 
                    State.user = session.user; 
                    document.getElementById('main-app').classList.remove('hidden-view'); 
                    this.loadBalance(); 
                } else { 
                    document.getElementById('auth-view').classList.remove('hidden-view'); 
                }
            },
            async loadBalance() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                State.balance = data ? data.saldo : 0; 
                UI.updateBalance();
            },
            async updateDBSaldo(newBalance) {
                State.balance = newBalance;
                UI.updateBalance();
                await sb.from('usuarios').update({ saldo: newBalance }).eq('id', State.user.id);
            },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Datos incompletos", "error");

                UI.notify("Enviando...", "success");
                const path = `depositos/${State.user.id}-${Date.now()}`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data: url } = sb.storage.from('comprobantes').getPublicUrl(path);

                await sb.from('history').insert([{ 
                    user_id: State.user.id, type: 'deposits', amount: amt, 
                    label: 'CARGA', status: 'pending', evidence_url: url.publicUrl 
                }]);

                UI.notify("Revisión pendiente", "success");
                UI.closeModal('modal-deposit');
            },
            async fetchHistory() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false });
                const cont = document.getElementById('history-lists');
                cont.innerHTML = data.map(i => `
                    <div class="glass p-4 flex justify-between items-center">
                        <div><p class="text-[10px] font-bold uppercase">${i.label}</p><p class="text-[8px] text-zinc-500">${new Date(i.created_at).toLocaleDateString()}</p></div>
                        <div class="font-casino ${i.amount > 0 ? 'text-emerald-500' : 'text-red-500'}">$${Math.abs(i.amount).toFixed(2)}</div>
                    </div>
                `).join('');
            }
        };

        const GameLogic = {
            slots: {
                init() { [1,2,3].forEach(id => { 
                    const r = document.getElementById(`reel-${id}`); 
                    r.innerHTML = ''; 
                    Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); 
                }); },
                async play() {
                    const bet = parseFloat(document.getElementById('slots-bet-input').value);
                    if(State.balance < bet || State.isSpinning) return UI.notify("Saldo insuficiente", "error");
                    
                    State.isSpinning = true;
                    await Core.updateDBSaldo(State.balance - bet);
                    
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { 
                        document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; 
                    });

                    setTimeout(async () => {
                        State.isSpinning = false;
                        if(res[0] === res[1] && res[1] === res[2]) {
                            const win = bet * 10;
                            await Core.updateDBSaldo(State.balance + win);
                            UI.notify(`¡GANASTE $${win}!`, "success");
                        } else UI.notify("Suerte la próxima", "error");
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 10,
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer"></div>`;
                },
                async start() {
                    this.bet = parseFloat(document.getElementById('mines-bet-input').value);
                    if(State.balance < this.bet) return UI.notify("Saldo insuficiente", "error");
                    await Core.updateDBSaldo(State.balance - this.bet);
                    this.active = true; this.revealed = []; this.mult = 1;
                    this.mines = Array.from({length:25}, (_,i)=>i).sort(()=>Math.random()-0.5).slice(0,3);
                    document.getElementById('mines-status').classList.remove('hidden');
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    this.drawGrid();
                },
                async cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.className += " bg-red-500/20";
                        this.active = false; UI.notify("BOOM!", "error");
                        setTimeout(() => this.reset(), 2000);
                    } else {
                        el.innerHTML = '💎'; el.className += " bg-emerald-500/20";
                        this.revealed.push(i);
                        this.mult += 0.45;
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2) + 'x';
                    }
                },
                async cashout() {
                    if(!this.active || this.revealed.length === 0) return;
                    const win = this.bet * this.mult;
                    await Core.updateDBSaldo(State.balance + win);
                    UI.notify(`COBRASTE $${win.toFixed(2)}`, "success");
                    this.reset();
                },
                reset() {
                    this.active = false;
                    document.getElementById('mines-status').classList.add('hidden');
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                }
            },
            crash: {
                active: false, mult: 1, bet: 10,
                async start() {
                    this.bet = parseFloat(document.getElementById('crash-bet-input').value);
                    if(State.balance < this.bet) return UI.notify("Saldo insuficiente", "error");
                    await Core.updateDBSaldo(State.balance - this.bet);
                    this.active = true; this.mult = 1;
                    const btn = document.getElementById('btn-crash');
                    btn.innerText = "COBRAR"; btn.onclick = () => this.cashout();
                    
                    const crashAt = 1 + Math.random() * 5;
                    const timer = setInterval(async () => {
                        if(!this.active) return clearInterval(timer);
                        this.mult += 0.05;
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2) + 'x';
                        if(this.mult >= crashAt) {
                            clearInterval(timer);
                            this.active = false;
                            document.getElementById('crash-mult').innerText = "EXPLOTÓ!";
                            UI.notify("Perdiste!", "error");
                            this.reset();
                        }
                    }, 100);
                },
                async cashout() {
                    if(!this.active) return;
                    this.active = false;
                    const win = this.bet * this.mult;
                    await Core.updateDBSaldo(State.balance + win);
                    UI.notify(`GANASTE $${win.toFixed(2)}`, "success");
                    this.reset();
                },
                reset() {
                    const btn = document.getElementById('btn-crash');
                    btn.innerText = "DESPEGAR";
                    btn.onclick = () => this.start();
                }
            },
            tower: {
                level: 0, bet: 10, active: false,
                drawTower() {
                    const cont = document.getElementById('tower-container'); cont.innerHTML = '';
                    for(let i=0; i<10; i++) {
                        cont.innerHTML += `<div id="t-row-${i}" class="grid grid-cols-3 gap-2 opacity-30">
                            <div onclick="GameLogic.tower.pick(${i},0)" class="h-10 bg-white/5 rounded-lg border border-white/10"></div>
                            <div onclick="GameLogic.tower.pick(${i},1)" class="h-10 bg-white/5 rounded-lg border border-white/10"></div>
                            <div onclick="GameLogic.tower.pick(${i},2)" class="h-10 bg-white/5 rounded-lg border border-white/10"></div>
                        </div>`;
                    }
                },
                async start() {
                    this.bet = parseFloat(document.getElementById('tower-bet-input').value);
                    if(State.balance < this.bet) return UI.notify("Saldo insuficiente", "error");
                    await Core.updateDBSaldo(State.balance - this.bet);
                    this.active = true; this.level = 0;
                    this.drawTower();
                    document.getElementById(`t-row-0`).classList.replace('opacity-30', 'opacity-100');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.remove('hidden');
                },
                async pick(row, col) {
                    if(!this.active || row !== this.level) return;
                    const mine = Math.floor(Math.random()*3);
                    const cells = document.getElementById(`t-row-${row}`).children;
                    if(col === mine) {
                        cells[col].className += " bg-red-500";
                        this.active = false; UI.notify("Torre caída", "error");
                        setTimeout(() => this.reset(), 1500);
                    } else {
                        cells[col].className += " bg-emerald-500";
                        this.level++;
                        if(this.level < 10) document.getElementById(`t-row-${this.level}`).classList.replace('opacity-30', 'opacity-100');
                        else this.cashout();
                    }
                },
                async cashout() {
                    if(!this.active) return;
                    const win = this.bet * (1 + (this.level * 0.5));
                    await Core.updateDBSaldo(State.balance + win);
                    UI.notify(`GANASTE $${win.toFixed(2)}`, "success");
                    this.reset();
                },
                reset() {
                    this.active = false;
                    document.getElementById('tower-controls').classList.remove('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.add('hidden');
                }
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            openModal(id) { 
                document.getElementById(id).classList.remove('hidden-view'); 
                document.getElementById('dep-step-1').classList.remove('hidden-view');
                document.getElementById('dep-step-2').classList.add('hidden-view');
            },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            depNextStep() {
                const amt = document.getElementById('dep-amount').value;
                if(!amt || amt <= 0) return this.notify("Monto inválido", "error");
                document.getElementById('dep-step-1').classList.add('hidden-view');
                document.getElementById('dep-step-2').classList.remove('hidden-view');
            },
            copyClabe() {
                navigator.clipboard.writeText("722969020533491161").then(() => this.notify("Copiado", "success"));
            },
            handleFile(input) {
                if(input.files[0]) document.getElementById('file-label').innerText = "LISTO: " + input.files[0].name.substring(0,10);
            },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-xl text-[10px] font-bold uppercase shadow-2xl animate__animated animate__fadeInDown ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => { n.remove(); }, 3000);
            }
        };

        const AuthManager = {
            async login() {
                const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) UI.notify(error.message, "error"); else location.reload();
            },
            async register() {
                if(!document.getElementById('terms-check').checked) return UI.notify("Acepta términos", "error");
                const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value;
                const { data, error } = await sb.auth.signUp({ email: e, password: p });
                if(error) UI.notify(error.message, "error");
                else {
                    await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]);
                    location.reload();
                }
            },
            async logout() { await sb.auth.signOut(); location.reload(); },
            switchTab(tab) {
                document.getElementById('login-container').classList.toggle('hidden-view', tab==='register');
                document.getElementById('register-container').classList.toggle('hidden-view', tab==='login');
            }
        };

        Core.init();
    </script>
</body>
</html>
