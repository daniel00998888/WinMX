        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }

            border-radius: 1.2rem; 
            padding: 20px;

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        // --- SISTEMA DE SONIDOS ---
        const SFX = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;

                if (type === 'win') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.exponentialRampToValueAtTime(1046, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(); osc.stop(now + 0.3);
                } 
                else if (type === 'loss') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(110, now);
                    osc.frequency.exponentialRampToValueAtTime(55, now + 0.2);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(); osc.stop(now + 0.2);
                }
                else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(); osc.stop(now + 0.05);
                }
                else if (type === 'spin') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 3.5);
                    gain.gain.setValueAtTime(0.02, now);
                    gain.gain.linearRampToValueAtTime(0, now + 3.5);
                    osc.start(); osc.stop(now + 3.5);
                }
            }
        };

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, totalSpins: 0 };

        const Router = {
            showView(viewId) {
                SFX.play('click');
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navId = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[viewId];
                if(navId) document.getElementById(navId).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.drawGrid();
                if(game === 'tower') GameLogic.tower.drawTower();
            },
            templates: {
                slots: `<div class="glass p-6 text-center animate__animated animate__fadeIn"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button></div>`,
                mines: `<div class="glass p-4 text-center mx-auto max-w-[300px]"><div id="mines-grid" class="grid grid-cols-5 gap-1.5 mb-4"></div><div id="mines-status" class="hidden flex justify-between items-center p-3 mb-3 bg-emerald-500/10 rounded-xl"><span id="mines-mult" class="font-casino text-emerald-500 text-xs">1.00x</span><button onclick="GameLogic.mines.cashout()" class="bg-emerald-500 text-black px-3 py-1 rounded-lg font-bold text-[9px]">COBRAR</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino text-xs">APOSTAR</button></div></div>`,
                crash: `<div class="glass p-6 text-center"><div id="crash-mult" class="text-5xl font-casino italic mb-4">1.00x</div><div class="h-24 flex items-center justify-center mb-6"><div id="crash-rocket" class="text-4xl transition-all duration-100">🚀</div></div><input id="crash-bet-input" type="number" value="10" class="input-bet"><button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-4 font-casino">DESPEGAR</button></div>`,
                tower: `<div class="glass p-4 mx-auto max-w-[280px] text-center"><div id="tower-container" class="space-y-1.5 mb-4 flex flex-col-reverse"></div><div id="tower-controls"><input id="tower-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 font-casino text-xs">JUGAR</button></div><button id="tower-cashout-btn" onclick="GameLogic.tower.cashout()" class="hidden-view btn-action w-full py-4 font-casino text-xs">COBRAR</button></div>`
            }
        };

        const Core = {
            async init() {
                let p = 0; const i = setInterval(() => {
                    p += 25; document.getElementById('boot-bar').style.width = `${p}%`;
                    if(p >= 100) { clearInterval(i); this.check(); }
                }, 100);
            },
            async check() {
                const { data: { session } } = await sb.auth.getSession();
                document.getElementById('boot-loader').style.display = 'none';
                if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); }
                else { document.getElementById('auth-view').classList.remove('hidden-view'); }
            },
            async loadBalance() {
                const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle();
                State.balance = data ? data.saldo : 0; UI.updateBalance();
            },
            async confirmDeposit() {
                SFX.play('click');
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Sube comprobante", "error");
                try {
                    UI.notify("Procesando...", "success");
                    const path = `depositos/${State.user.id}-${Date.now()}.${file.name.split('.').pop()}`;
                    await sb.storage.from('comprobantes').upload(path, file);
                    const { data: url } = sb.storage.from('comprobantes').getPublicUrl(path);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending', evidence_url: url.publicUrl }]);
                    UI.notify("En revisión", "success"); UI.closeModal('modal-deposit');
                } catch(e) { UI.notify("Error al enviar", "error"); }
            },
            async fetchHistory() {
                const b = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'bets').order('created_at', { ascending: false }).limit(20);
                const d = await sb.from('history').select('*').eq('user_id', State.user.id).eq('type', 'deposits').order('created_at', { ascending: false }).limit(20);
                const container = document.getElementById('history-lists');
                container.innerHTML = `
                    <div class="glass overflow-hidden mb-4"><div onclick="UI.toggleAccordion('acc-bets','arrow-bets')" class="p-5 flex justify-between cursor-pointer"><span class="font-casino text-[10px]">Jugadas</span><i id="arrow-bets" class="fas fa-chevron-down"></i></div><div id="acc-bets" class="hidden-view p-3 space-y-2">${this.renderList(b.data || [], 'bets')}</div></div>
                    <div class="glass overflow-hidden"><div onclick="UI.toggleAccordion('acc-deps','arrow-deps')" class="p-5 flex justify-between cursor-pointer"><span class="font-casino text-[10px]">Depósitos</span><i id="arrow-deps" class="fas fa-chevron-down"></i></div><div id="acc-deps" class="hidden-view p-3 space-y-2">${this.renderList(d.data || [], 'deposits')}</div></div>`;
            },
            renderList(items, type) {
                return items.map(i => `<div class="flex justify-between p-3 bg-white/5 rounded-xl"><span class="text-[9px] uppercase font-bold">${i.label}</span><span class="text-[10px] font-casino ${i.amount >= 0 ? 'text-emerald-500' : 'text-red-500'}">$${Math.abs(i.amount).toFixed(2)}</span></div>`).join('');
            }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            updateProfile() { document.getElementById('user-email-display').innerText = State.user.email; },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            toggleAccordion(id) { SFX.play('click'); document.getElementById(id).classList.toggle('hidden-view'); },
            depNextStep() {
                const amt = document.getElementById('dep-amount').value;
                if(!amt || amt <= 0) return this.notify("Monto inválido", "error");
                SFX.play('click');
                document.getElementById('display-dep-amount').innerText = `$${parseFloat(amt).toFixed(2)}`;
                document.getElementById('dep-step-1').classList.add('hidden-view');
                document.getElementById('dep-step-2').classList.remove('hidden-view');
            },
            copyClabe() {
                navigator.clipboard.writeText(document.getElementById('clabe-number').innerText).then(() => {
                    SFX.play('click'); this.notify("Copiado", "success");
                });
            },
            handleFile(input) { if(input.files[0]) document.getElementById('file-label').innerText = "Listo: " + input.files[0].name.substring(0,10); },
            notify(m, t) {
                const n = document.createElement('div');
                n.className = `p-4 rounded-2xl text-[10px] font-bold uppercase animate__animated animate__fadeInDown ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`;
                n.innerText = m; document.getElementById('notif-container').appendChild(n);
                setTimeout(() => n.remove(), 3000);
            }
        };

        const AuthManager = {
            async login() {
                SFX.play('click');
                const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value;
                const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
                if(error) UI.notify(error.message, "error"); else location.reload();
            },
            async register() {
                if(!document.getElementById('terms-check').checked) return UI.notify("Acepta términos", "error");
                const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value;
                const { data, error } = await sb.auth.signUp({ email: e, password: p });
                if(error) UI.notify(error.message, "error");
                else { await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]); location.reload(); }
            },
            async logout() { await sb.auth.signOut(); location.reload(); },
            switchTab(tab) {
                SFX.play('click');
                document.getElementById('login-container').classList.toggle('hidden-view', tab==='register');
                document.getElementById('register-container').classList.toggle('hidden-view', tab==='login');
            }
        };

        const GameLogic = {
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    const bet = parseFloat(document.getElementById('slots-bet-input').value) || 10;
                    if(State.balance < bet || State.isSpinning) return UI.notify("Sin saldo", "error");
                    SFX.play('spin');
                    State.isSpinning = true; State.balance -= bet; UI.updateBalance();
                    const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; });
                    setTimeout(async () => {
                        State.isSpinning = false;
                        let win = (res[0]===res[1] && res[1]===res[2]) ? bet * 10 : 0;
                        if(win > 0) { SFX.play('win'); State.balance += win; UI.notify(`¡GANASTE $${win}!`, "success"); } 
                        else { SFX.play('loss'); UI.notify("Perdiste", "error"); }
                        UI.updateBalance();
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win > 0 ? win : -bet, label: 'SLOTS' }]);
                    }, 3500);
                }
            },
            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 10,
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 rounded-lg border border-white/5 flex items-center justify-center text-sm cursor-pointer opacity-50"></div>`;
                },
                start() {
                    this.bet = parseFloat(document.getElementById('mines-bet-input').value) || 10;
                    if(State.balance < this.bet) return UI.notify("Sin saldo", "error");
                    SFX.play('click');
                    State.balance -= this.bet; UI.updateBalance();
                    this.active = true; this.revealed = []; this.mult = 1;
                    this.mines = Array.from({length:25}, (_,i)=>i).sort(()=>Math.random()-0.5).slice(0,4);
                    this.drawGrid();
                    document.querySelectorAll('[id^="m-"]').forEach(el => el.classList.remove('opacity-50'));
                    document.getElementById('mines-status').classList.remove('hidden');
                    document.getElementById('mines-controls').classList.add('hidden-view');
                },
                async cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    this.revealed.push(i); const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        SFX.play('loss');
                        el.innerHTML = '💣'; el.classList.add('bg-red-500/20'); this.active = false;
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: -this.bet, label: 'MINAS' }]);
                        setTimeout(() => Router.openGame('mines'), 1500);
                    } else {
                        SFX.play('click');
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500/20'); this.mult += 0.35;
                        document.getElementById('mines-mult').innerText = this.mult.toFixed(2)+'x';
                    }
                },
                async cashout() {
                    if(!this.active) return; SFX.play('win');
                    this.active = false; const win = this.bet * this.mult; State.balance += win;
                    UI.updateBalance(); UI.notify(`+$${win.toFixed(2)}`, "success");
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win, label: 'MINAS' }]);
                    Router.openGame('mines');
                }
            },
            crash: {
                timer: null, mult: 1, active: false, bet: 10,
                start() {
                    this.bet = parseFloat(document.getElementById('crash-bet-input').value) || 10;
                    if(State.balance < this.bet) return UI.notify("Sin saldo", "error");
                    SFX.play('click');
                    State.balance -= this.bet; UI.updateBalance();
                    this.active = true; this.mult = 1;
                    const b = document.getElementById('btn-crash'); b.innerText = "COBRAR"; b.onclick = () => this.cashout();
                    const limit = 1.1 + (Math.random() * 4);
                    this.timer = setInterval(async () => {
                        this.mult += 0.04; 
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2)+'x';
                        if(this.mult >= limit) {
                            clearInterval(this.timer); this.active = false; 
                            SFX.play('loss'); UI.notify("EXPLOTÓ", "error");
                            await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                            await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: -this.bet, label: 'CRASH' }]);
                            setTimeout(() => Router.openGame('crash'), 2000);
                        }
                    }, 100);
                },
                async cashout() {
                    if(!this.active) return; clearInterval(this.timer); SFX.play('win');
                    this.active = false; const win = this.bet * this.mult; State.balance += win;
                    UI.updateBalance(); UI.notify(`+$${win.toFixed(2)}`, "success");
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win, label: 'CRASH' }]);
                    setTimeout(() => Router.openGame('crash'), 2000);
                }
            },
            tower: {
                level: 0, active: false, bet: 10,
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        c.innerHTML += `<div id="row-${i}" class="grid grid-cols-3 gap-1.5 opacity-20 pointer-events-none">
                            <div onclick="GameLogic.tower.step(${i},0)" class="bg-white/5 p-2 rounded-lg border border-white/5 text-center text-xs">?</div>
                            <div onclick="GameLogic.tower.step(${i},1)" class="bg-white/5 p-2 rounded-lg border border-white/5 text-center text-xs">?</div>
                            <div onclick="GameLogic.tower.step(${i},2)" class="bg-white/5 p-2 rounded-lg border border-white/5 text-center text-xs">?</div>
                        </div>`;
                    }
                },
                start() {
                    this.bet = parseFloat(document.getElementById('tower-bet-input').value) || 10;
                    if(State.balance < this.bet) return UI.notify("Sin saldo", "error");
                    SFX.play('click');
                    State.balance -= this.bet; UI.updateBalance();
                    this.active = true; this.level = 0; this.drawTower();
                    document.getElementById('row-0').classList.remove('opacity-20', 'pointer-events-none');
                    document.getElementById('tower-controls').classList.add('hidden-view');
                    document.getElementById('tower-cashout-btn').classList.remove('hidden-view');
                },
                async step(r, c) {
                    if(!this.active || r !== this.level) return;
                    const mine = Math.floor(Math.random()*3);
                    if(c === mine) {
                        SFX.play('loss'); this.active = false;
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: -this.bet, label: 'TORRE' }]);
                        setTimeout(()=>Router.openGame('tower'), 1500);
                    } else {
                        SFX.play('click'); this.level++;
                        if(this.level < 8) document.getElementById(`row-${this.level}`).classList.remove('opacity-20', 'pointer-events-none');
                        else this.cashout();
                    }
                },
                async cashout() {
                    if(!this.active) return; SFX.play('win'); this.active = false;
                    const win = this.bet * (1 + (this.level * 0.5));
                    State.balance += win; UI.updateBalance(); UI.notify(`+$${win.toFixed(2)}`, "success");
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win, label: 'TORRE' }]);
                    Router.openGame('tower');
                }
            }
        };

        Core.init();
    </script>
</body>
</html>
