<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Casino</title>
</head>

<body style="background:#0b1d2a;color:white;text-align:center;font-family:Arial;">

<h2>🎰 Casino Login</h2>

<input id="email" placeholder="Correo"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>

<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>

<p id="msg"></p>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://dakhnqriwbzihlzhtfcb.supabase.co",
  "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
);

function msg(t){
  document.getElementById("msg").innerText = t;
}

function val(id){
  return document.getElementById(id).value;
}

// ===== REGISTER =====
async function register(){
  msg("Registrando...");

  const email = val("email");
  const pass = val("pass");

  if(!email || !pass){
    msg("Completa los campos");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: pass
  });

  console.log("REGISTER:", data, error);

  if(error){
    msg("❌ " + error.message);
  } else {
    msg("📩 Registro exitoso. Revisa tu correo y confirma.");
  }
}

// ===== LOGIN =====
async function login(){
  msg("Entrando...");

  const email = val("email");
  const pass = val("pass");

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: pass
  });

  console.log("LOGIN:", data, error);

  if(error){
    if(error.message.includes("Email not confirmed")){
      msg("⚠️ Confirma tu correo antes de entrar");
    } else {
      msg("❌ " + error.message);
    }
    return;
  }

  msg("✅ LOGIN EXITOSO");
}
</script>

</body>
</html>
