<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Real PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a1625, #1a2a3f);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .neon-text { 
            text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; 
        }
        .reel {
            width: 78px; height: 78px; 
            background: #0f1c2e; 
            border: 3px solid #22d3ee;
            border-radius: 12px; 
            font-size: 42px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }
        @media (min-width: 640px) {
            .reel { width: 92px; height: 92px; font-size: 52px; }
        }
        .reel.spinning { 
            animation: spin 0.85s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: translateY(-400%); } 
            100% { transform: translateY(0); } 
        }
        #confetti { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 9999; 
        }
        .chat-box { scrollbar-width: thin; scrollbar-color: #22d3ee #1e2937; }
    </style>
</head>
<body class="text-white min-h-screen">

    <!-- HEADER -->
    <header id="topbar" class="hidden bg-zinc-950 border-b border-cyan-500/30 py-3 px-4 sticky top-0 z-40">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎰</span>
                <h1 class="text-xl font-bold tracking-wider neon-text">CASINO REAL PRO</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-2xl border border-cyan-500/20">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span id="saldo" class="font-semibold text-yellow-300">$0</span>
                </div>
                <button onclick="logout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl text-sm flex items-center gap-1.5">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- LOGIN -->
    <div id="auth" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-b from-zinc-950 to-transparent">
        <div class="bg-zinc-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-cyan-500/30">
            <div class="text-center mb-8">
                <span class="text-7xl">🎰</span>
                <h2 class="text-4xl font-bold mt-4 neon-text">CASINO REAL</h2>
                <p class="text-zinc-400 mt-2">El mejor casino online</p>
            </div>
            <input id="email" type="email" placeholder="Correo electrónico" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-4 focus:outline-none focus:border-cyan-400">
            <input id="pass" type="password" placeholder="Contraseña" 
                   class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-cyan-400">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="register()" class="bg-zinc-700 hover:bg-zinc-600 py-4 rounded-2xl font-semibold transition">Registrarse</button>
                <button onclick="login()" class="bg-cyan-500 hover:bg-cyan-600 text-black py-4 rounded-2xl font-semibold transition">Entrar</button>
            </div>
            <p id="msg" class="text-center mt-6 text-sm min-h-[28px]"></p>
        </div>
    </div>

    <!-- CASINO -->
    <div id="casino" class="hidden min-h-screen">
        <div class="flex h-screen overflow-hidden">

            <!-- SIDEBAR -->
            <div id="sidebar" class="w-72 bg-zinc-950 border-r border-zinc-800 p-5 flex flex-col fixed md:static inset-y-0 left-0 z-50 -translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="md:hidden flex justify-between mb-6">
                    <h2 class="text-xl font-bold">Menú</h2>
                    <button onclick="toggleSidebar()" class="text-3xl leading-none">×</button>
                </div>
                
                <h3 class="text-cyan-400 font-semibold mb-4 flex items-center gap-2"><i class="fas fa-gamepad"></i> JUEGOS</h3>
                <div onclick="showGame('slot');toggleSidebar()" class="game-btn flex items-center gap-3 p-4 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-2">
                    <span class="text-3xl">🎰</span> <span>Slots</span>
                </div>
                <div onclick="showGame('roulette');toggleSidebar()" class="game-btn flex items-center gap-3 p-4 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-2">
                    <span class="text-3xl">🎡</span> <span>Ruleta</span>
                </div>
                <div onclick="showGame('dice');toggleSidebar()" class="game-btn flex items-center gap-3 p-4 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-2">
                    <span class="text-3xl">🎲</span> <span>Dados</span>
                </div>
                <div onclick="showGame('bj');toggleSidebar()" class="game-btn flex items-center gap-3 p-4 hover:bg-zinc-900 rounded-2xl cursor-pointer mb-8">
                    <span class="text-3xl">🃏</span> <span>Blackjack</span>
                </div>

                <h3 class="text-cyan-400 font-semibold mb-4 flex items-center gap-2"><i class="fas fa-trophy"></i> TOP 5</h3>
                <div id="rankingBox" class="flex-1 space-y-3 overflow-auto"></div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="flex-1 flex flex-col">
                <!-- Mobile Top Bar -->
                <div class="md:hidden bg-zinc-900 border-b border-zinc-800 p-3 flex items-center justify-between">
                    <button onclick="toggleSidebar()" class="text-2xl px-2"><i class="fas fa-bars"></i></button>
                    <span class="font-bold text-lg">Casino Real PRO</span>
                    <button onclick="toggleChat()" class="text-2xl px-2"><i class="fas fa-comments"></i></button>
                </div>

                <div class="flex-1 p-4 md:p-8 overflow-auto">
                    <!-- SLOTS -->
                    <div id="slot" class="game">
                        <h2 class="text-3xl md:text-4xl font-bold mb-8 flex items-center gap-3"><span>🎰</span> Tragamonedas Premium</h2>
                        <div class="max-w-md mx-auto">
                            <div class="flex justify-center gap-4 mb-10">
                                <div class="reel" id="r1">🍒</div>
                                <div class="reel" id="r2">💎</div>
                                <div class="reel" id="r3">7️⃣</div>
                            </div>
                            <div class="flex gap-3">
                                <input id="betSlot" type="number" placeholder="Apuesta" 
                                       class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-5 text-center text-xl focus:outline-none focus:border-cyan-400">
                                <button onclick="spinSlot()" 
                                        class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 px-10 py-5 rounded-2xl font-bold">GIRAR</button>
                            </div>
                            <p id="slotRes" class="text-center mt-10 text-2xl font-bold min-h-[70px]"></p>
                        </div>
                    </div>

                    <!-- Otros juegos (puedes expandirlos después) -->
                    <div id="roulette" class="game hidden"> <!-- Contenido de ruleta --> </div>
                    <div id="dice" class="game hidden"> <!-- Contenido de dados --> </div>
                    <div id="bj" class="game hidden"> <!-- Contenido de blackjack --> </div>
                </div>
            </div>

            <!-- CHAT -->
            <div id="chatPanel" class="w-80 bg-zinc-950 border-l border-zinc-800 flex flex-col fixed md:static inset-y-0 right-0 z-50 translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="p-4 border-b border-zinc-800 bg-zinc-900 flex justify-between md:hidden">
                    <h3 class="font-semibold">Chat en Vivo</h3>
                    <button onclick="toggleChat()" class="text-2xl">×</button>
                </div>
                <div id="chatBox" class="flex-1 p-4 overflow-auto space-y-3 text-sm"></div>
                <div class="p-4 border-t border-zinc-800 bg-zinc-900">
                    <div class="flex gap-2">
                        <input id="chatInput" placeholder="Escribe un mensaje..." 
                               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 focus:outline-none focus:border-cyan-400">
                        <button onclick="sendMsg()" class="bg-cyan-500 text-black px-6 rounded-2xl font-semibold">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        const sb = window.supabase.createClient(
            "https://dakhnqriwbzihlzhtfcb.supabase.co",
            "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs"
        );

        let user = null;
        let saldo = 0;
        let chatChannel = null;

        // Funciones básicas
        function msg(text, color = "text-white") {
            const el = document.getElementById("msg");
            if (el) el.innerHTML = `<span class="${color}">${text}</span>`;
        }

        function val(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : "";
        }

        function formatSaldo(n) {
            return new Intl.NumberFormat('es-MX').format(Math.floor(n || 0));
        }

        function updateSaldo() {
            const el = document.getElementById("saldo");
            if (el) el.textContent = "$" + formatSaldo(saldo);
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("-translate-x-full");
        }

        function toggleChat() {
            document.getElementById("chatPanel").classList.toggle("translate-x-full");
        }

        // Confetti
        function launchConfetti() {
            const canvas = document.getElementById("confetti");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext("2d");
            let particles = [];
            const colors = ['#22d3ee', '#eab308', '#a855f7', '#ec4899'];

            for (let i = 0; i < 180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 9 + 6,
                    speed: Math.random() * 8 + 5,
                    color: colors[Math.floor(Math.random()*colors.length)],
                    angle: Math.random() * 360,
                    rotationSpeed: Math.random() * 15 - 7
                });
            }

            let frame = 0;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.y += p.speed;
                    p.angle += p.rotationSpeed;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.7);
                    ctx.restore();
                    if (p.y > canvas.height + 100) particles.splice(i, 1);
                }
                if (particles.length > 0 && frame < 100) requestAnimationFrame(animate);
                frame++;
            }
            animate();
        }

        // Auth
        async function register() {
            msg("Registrando...");
            const { error } = await sb.auth.signUp({ email: val("email"), password: val("pass") });
            msg(error ? error.message : "✅ Revisa tu correo", error ? "text-red-400" : "text-green-400");
        }

        async function login() {
            msg("Iniciando sesión...");
            const { data, error } = await sb.auth.signInWithPassword({ email: val("email"), password: val("pass") });
            if (error) return msg(error.message, "text-red-400");
            user = data.user;
            startCasino();
        }

        async function startCasino() {
            document.getElementById("auth").classList.add("hidden");
            document.getElementById("casino").classList.remove("hidden");
            document.getElementById("topbar").classList.remove("hidden");

            let { data, error } = await sb.from("usuarios").select("*").eq("id", user.id).single();

            if (error && error.code === 'PGRST116') {
                await sb.from("usuarios").insert([{ id: user.id, saldo: 3000 }]);
                saldo = 3000;
            } else if (data) {
                saldo = data.saldo || 3000;
            }

            updateSaldo();
            loadRanking();
            initChat();
            showGame('slot');
        }

        async function saveSaldo() {
            if (user) await sb.from("usuarios").update({ saldo }).eq("id", user.id);
        }

        function showGame(gameId) {
            document.querySelectorAll('.game').forEach(g => g.classList.add('hidden'));
            const game = document.getElementById(gameId);
            if (game) game.classList.remove('hidden');
        }

        // Slots
        async function spinSlot() {
            let bet = parseInt(val("betSlot"));
            if (!bet || bet <= 0 || bet > saldo) {
                document.getElementById("slotRes").innerHTML = `<span class="text-red-400">Apuesta inválida</span>`;
                return;
            }

            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            reels.forEach(r => r.classList.add('spinning'));

            await new Promise(r => setTimeout(r, 1600));
            reels.forEach(r => r.classList.remove('spinning'));

            const symbols = ["🍒","💎","7️⃣","⭐","🍀","🔔","🍉"];
            let a = symbols[Math.floor(Math.random()*symbols.length)];
            let b = symbols[Math.floor(Math.random()*symbols.length)];
            let c = symbols[Math.floor(Math.random()*symbols.length)];

            reels[0].innerText = a;
            reels[1].innerText = b;
            reels[2].innerText = c;

            const win = (a === b && b === c);
            saldo += win ? bet * 15 : -bet;

            document.getElementById("slotRes").innerHTML = win 
                ? `<span class="text-yellow-400 text-3xl">¡JACKPOT! +$${bet*15}</span>` 
                : `<span class="text-red-400">-$${bet}</span>`;

            if (win) launchConfetti();

            updateSaldo();
            await saveSaldo();
            loadRanking();
        }

        // Chat
        function initChat() {
            if (chatChannel) return;
            chatChannel = sb.channel('chat-room');
            chatChannel.on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, (payload) => {
                const box = document.getElementById("chatBox");
                if (box) {
                    box.innerHTML += `<div class="bg-zinc-900 p-3 rounded-2xl"><span class="text-cyan-400">Usuario:</span> ${payload.new.mensaje}</div>`;
                    box.scrollTop = box.scrollHeight;
                }
            }).subscribe();
        }

        async function sendMsg() {
            const text = val("chatInput");
            if (!text || !user) return;
            await sb.from("chat").insert([{ user_id: user.id, mensaje: text }]);
            document.getElementById("chatInput").value = "";
        }

        async function loadRanking() {
            const { data } = await sb.from("usuarios").select("saldo").order("saldo", { ascending: false }).limit(5);
            let html = "";
            (data || []).forEach((u, i) => {
                html += `<div class="bg-zinc-900 p-4 rounded-2xl flex justify-between"><span>#${i+1}</span><span class="text-yellow-300">$${formatSaldo(u.saldo)}</span></div>`;
            });
            document.getElementById("rankingBox").innerHTML = html || "<p class='text-zinc-500'>Cargando...</p>";
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        // Inicialización
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                startCasino();
            }
        };
    </script>
</body>
</html>
