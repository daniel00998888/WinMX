<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WinMX | Premium Casino</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        body { background: var(--mx-dark); color: white; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        .view-content { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .hidden-view { display: none !important; }
        .bottom-nav { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.05); z-index: 50; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--mx-green); }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 1.5rem; }
        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="boot-loader" class="fixed inset-0 z-[1000] bg-black flex flex-col items-center justify-center">
        <div class="text-3xl font-casino italic mb-4 text-emerald-500 animate-pulse">WinMX</div>
        <div class="w-32 h-1 bg-zinc-900 rounded-full overflow-hidden"><div id="boot-bar" class="h-full bg-emerald-500 transition-all duration-300" style="width: 0%"></div></div>
    </div>

    <div id="auth-view" class="hidden-view min-h-screen flex items-center justify-center p-6 bg-black text-center">
        <div id="login-container" class="glass p-8 w-full max-w-sm animate__animated animate__fadeIn">
            <h2 class="text-3xl font-casino mb-10 italic tracking-tighter">Win<span class="text-emerald-500">MX</span></h2>
            <input id="login-email" type="email" placeholder="Correo" class="input-bet text-left font-sans mb-4">
            <input id="login-password" type="password" placeholder="Pass" class="input-bet text-left font-sans mb-4">
            <button onclick="AuthManager.login()" class="btn-action w-full py-4 font-casino">Entrar</button>
            <button onclick="AuthManager.switchTab('register')" class="mt-6 text-[10px] uppercase text-zinc-500 underline">Crear cuenta</button>
        </div>
        <div id="register-container" class="hidden-view glass p-8 w-full max-w-sm animate__animated animate__fadeIn">
            <h2 class="text-2xl font-casino mb-6 italic text-emerald-500">Registro</h2>
            <input id="reg-email" type="email" placeholder="Correo" class="input-bet text-left font-sans mb-4">
            <input id="reg-password" type="password" placeholder="Pass" class="input-bet text-left font-sans mb-4">
            <button onclick="AuthManager.register()" class="btn-action w-full py-4 font-casino">Registrar</button>
            <button onclick="AuthManager.switchTab('login')" class="mt-6 text-[10px] uppercase text-zinc-500 underline">Ya tengo cuenta</button>
        </div>
    </div>

    <div id="main-app" class="app-container hidden-view">
        <header class="p-5 flex justify-between items-center bg-black/40 border-b border-white/5">
            <span class="font-casino italic text-xl tracking-tighter">WIN<span class="text-emerald-500">MX</span></span>
            <div class="balance-pill">
                <span id="balance-display" class="font-casino text-emerald-500 text-lg">$0.00</span>
                <div onclick="UI.openModal('modal-deposit')" class="w-8 h-8 bg-emerald-500 text-black rounded-full flex items-center justify-center cursor-pointer"><i class="fas fa-plus"></i></div>
            </div>
        </header>

        <div id="view-lobby" class="view-content p-5 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="Router.openGame('slots')" class="glass p-6 text-center cursor-pointer"><span class="text-4xl block mb-2">🎰</span><span class="font-casino text-[9px]">Slots</span></div>
                <div onclick="Router.openGame('mines')" class="glass p-6 text-center cursor-pointer"><span class="text-4xl block mb-2">💣</span><span class="font-casino text-[9px]">Minas</span></div>
                <div onclick="Router.openGame('crash')" class="glass p-6 text-center cursor-pointer"><span class="text-4xl block mb-2">🚀</span><span class="font-casino text-[9px]">Aviator</span></div>
                <div onclick="Router.openGame('tower')" class="glass p-6 text-center cursor-pointer"><span class="text-4xl block mb-2">🗼</span><span class="font-casino text-[9px]">Torre</span></div>
            </div>
        </div>

        <div id="view-game" class="view-content hidden-view p-5">
            <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-600 text-[10px] font-bold uppercase"><i class="fas fa-arrow-left mr-2"></i> Volver</button>
            <div id="game-mount"></div>
        </div>

        <div id="view-history" class="view-content p-5 hidden-view"><div id="history-lists" class="space-y-4"></div></div>
        <div id="view-profile" class="view-content p-5 hidden-view text-center"><p id="user-email-display" class="mb-4"></p><button onclick="AuthManager.logout()" class="text-red-500 uppercase font-bold text-xs">Cerrar Sesión</button></div>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center">
            <div onclick="Router.showView('lobby')" class="nav-item active" id="nav-home"><i class="fas fa-gamepad text-xl"></i><span>Jugar</span></div>
            <div onclick="Router.showView('history')" class="nav-item" id="nav-history"><i class="fas fa-receipt text-xl"></i><span>Historial</span></div>
            <div onclick="Router.showView('profile')" class="nav-item" id="nav-profile"><i class="fas fa-user text-xl"></i><span>Perfil</span></div>
        </nav>
    </div>

    <div id="modal-deposit" class="fixed inset-0 bg-black/95 z-[100] hidden-view flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="font-casino text-emerald-500 mb-6">Cargar Saldo</h2>
            <input id="dep-amount" type="number" placeholder="$0" class="input-bet text-3xl mb-6">
            <div class="bg-white/5 p-4 rounded-xl mb-4 text-[10px] text-zinc-400">CLABE: <span id="clabe" class="text-white font-bold">722969020533491161</span></div>
            <input type="file" id="receipt-input" class="hidden" onchange="UI.handleFile(this)">
            <label for="receipt-input" class="p-4 border border-dashed border-zinc-700 rounded-xl block mb-4 text-[8px] uppercase">Subir Comprobante</label>
            <button onclick="Core.confirmDeposit()" class="btn-action w-full py-4 font-casino">Enviar Pago</button>
            <button onclick="UI.closeModal('modal-deposit')" class="mt-4 text-[8px] text-zinc-500">Cerrar</button>
        </div>
    </div>

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200]"></div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const sfx = {
            click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
            spin: new Audio('https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'),
            lose: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
            rocket: new Audio('https://assets.mixkit.co/active_storage/sfx/2015/2015-preview.mp3')
        };
        const playSfx = (k) => { sfx[k].currentTime = 0; sfx[k].play().catch(()=>{}); };

        // --- SISTEMA DE CONTROL DE CASINO (EL ALGORITMO) ---
        let State = { user: null, balance: 0, isSpinning: false, totalSpins: 0, luckFactor: 1.0 };

        const GameLogic = {
            adjustLuck(win, bet) {
                // Si el jugador gana más de 1.8x su apuesta, la casa aprieta
                if (win > bet * 1.8) State.luckFactor = Math.max(0.3, State.luckFactor - 0.25);
                // Si pierde, devolvemos suerte para retenerlo
                else if (win === 0) State.luckFactor = Math.min(1.0, State.luckFactor + 0.1);
            },

            slots: {
                init() { 
                    [1,2,3].forEach(id => { 
                        const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; 
                        Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); 
                    }); 
                },
                async play() {
                    if(State.isSpinning) return;
                    const bet = Math.abs(parseFloat(document.getElementById('slots-bet-input').value)) || 10;
                    if(State.balance < bet || bet <= 0) return UI.notify("Saldo insuficiente", "error");

                    State.isSpinning = true; State.balance -= bet; UI.updateBalance();
                    playSfx('spin');
                    
                    // ALGORITMO DE CASINO: Decidimos el resultado antes de que pare
                    const willWin = Math.random() < (0.12 * State.luckFactor);
                    let res;
                    if(willWin) {
                        const s = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]; res = [s,s,s];
                    } else {
                        const s1 = SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
                        const s2 = SYMBOLS[(SYMBOLS.indexOf(s1)+1)%SYMBOLS.length];
                        res = [s1, s2, SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]];
                    }

                    State.totalSpins++;
                    [1,2,3].forEach((id, i) => { 
                        document.getElementById(`reel-${id}`).style.transform = `translateY(-${(State.totalSpins * 90 * 6) + (SYMBOLS.indexOf(res[i])*90)}px)`; 
                    });

                    setTimeout(async () => {
                        State.isSpinning = false;
                        let win = willWin ? bet * 10 : 0;
                        State.balance += win; UI.updateBalance();
                        GameLogic.adjustLuck(win, bet);
                        if(win > 0) { playSfx('win'); UI.notify("¡GANASTE!", "success"); } else { playSfx('lose'); }
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win > 0 ? win : -bet, label: 'SLOTS' }]);
                    }, 3500);
                }
            },

            mines: {
                active: false, mines: [], revealed: [], mult: 1, bet: 10,
                multSteps: [1.3, 1.9, 2.8, 4.3, 6.7, 10.5, 17, 29, 48, 85],
                drawGrid() {
                    const g = document.getElementById('mines-grid'); g.innerHTML = '';
                    for(let i=0; i<25; i++) g.innerHTML += `<div onclick="GameLogic.mines.cell(${i})" id="m-${i}" class="aspect-square bg-white/5 border border-white/5 rounded-lg flex items-center justify-center text-xl cursor-pointer"></div>`;
                },
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('mines-bet-input').value)) || 10;
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance(); this.active = true; this.bet = b; this.revealed = [];
                    this.mines = []; while(this.mines.length < 3) { let r = Math.floor(Math.random()*25); if(!this.mines.includes(r)) this.mines.push(r); }
                    document.getElementById('mines-status').classList.remove('hidden-view');
                    document.getElementById('mines-controls').classList.add('hidden-view');
                    this.drawGrid();
                },
                cell(i) {
                    if(!this.active || this.revealed.includes(i)) return;
                    // ALGORITMO: Bomba Magnética si hay racha
                    let failProb = (0.12 + (this.revealed.length * 0.12)) / State.luckFactor;
                    if (Math.random() < failProb && !this.mines.includes(i)) {
                        this.mines.pop(); this.mines.push(i); // Mueve la bomba al clic
                    }
                    this.revealed.push(i);
                    const el = document.getElementById(`m-${i}`);
                    if(this.mines.includes(i)) {
                        el.innerHTML = '💣'; el.classList.add('bg-red-500'); this.end(false);
                    } else {
                        el.innerHTML = '💎'; el.classList.add('bg-emerald-500');
                        this.mult = this.multSteps[this.revealed.length-1];
                        document.getElementById('mines-cashout-btn').innerText = `COBRAR $${(this.bet * this.mult).toFixed(2)}`;
                    }
                },
                async cashout() { if(!this.active) return; State.balance += (this.bet * this.mult); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    GameLogic.adjustLuck(win ? this.bet * this.mult : 0, this.bet);
                    document.getElementById('mines-status').classList.add('hidden-view');
                    document.getElementById('mines-controls').classList.remove('hidden-view');
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win ? this.bet * this.mult : -this.bet, label: 'MINAS' }]);
                }
            },

            crash: {
                active: false, mult: 1, bet: 0, interval: null,
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('crash-bet-input').value)) || 10;
                    if(State.balance < b) return UI.notify("Saldo insuficiente", "error");
                    State.balance -= b; UI.updateBalance(); this.active = true; this.bet = b; this.mult = 1;
                    playSfx('rocket');
                    // ALGORITMO: Vuelo Cortado (Instant Crash)
                    const limit = (Math.random() > State.luckFactor) ? (1.01 + Math.random()*0.3) : (1.1 + Math.random()*4);
                    this.interval = setInterval(() => {
                        this.mult += 0.05;
                        document.getElementById('crash-mult').innerText = this.mult.toFixed(2) + 'x';
                        if(this.mult >= limit) { clearInterval(this.interval); this.explode(); }
                    }, 100);
                },
                cashout() { if(!this.active) return; clearInterval(this.interval); State.balance += (this.bet * this.mult); this.end(true); },
                explode() { this.end(false); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    GameLogic.adjustLuck(win ? this.bet * this.mult : 0, this.bet);
                    document.getElementById('crash-mult').innerText = win ? 'GANASTE' : 'BOOM';
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: win ? this.bet * this.mult : -this.bet, label: 'AVIATOR' }]);
                }
            },

            tower: {
                level: 0, active: false, bet: 0,
                steps: [1.4, 2.2, 3.8, 6.5, 12, 22, 45, 90],
                drawTower() {
                    const c = document.getElementById('tower-container'); c.innerHTML = '';
                    for(let i=0; i<8; i++) {
                        let r = document.createElement('div'); r.className = "grid grid-cols-3 gap-2 opacity-30"; r.id = `t-r-${i}`;
                        for(let j=0; j<3; j++) r.innerHTML += `<div onclick="GameLogic.tower.select(${i},${j})" class="h-10 bg-white/5 border border-white/10 rounded-lg"></div>`;
                        c.appendChild(r);
                    }
                },
                start() {
                    const b = Math.abs(parseFloat(document.getElementById('tower-bet-input').value)) || 10;
                    if(State.balance < b) return;
                    State.balance -= b; UI.updateBalance(); this.active = true; this.bet = b; this.level = 0;
                    this.drawTower(); document.getElementById('t-r-0').classList.remove('opacity-30');
                },
                select(r, c) {
                    if(!this.active || r !== this.level) return;
                    const failProb = (0.33 + (this.level * 0.05)) / State.luckFactor;
                    if(Math.random() < failProb) { this.end(false); }
                    else {
                        this.level++;
                        if(this.level === 8) this.cashout();
                        else document.getElementById(`t-r-${this.level}`).classList.remove('opacity-30');
                    }
                },
                cashout() { if(!this.active) return; State.balance += (this.bet * this.steps[this.level-1]); this.end(true); },
                async end(win) {
                    this.active = false; UI.updateBalance();
                    GameLogic.adjustLuck(win ? this.bet * this.steps[this.level-1] : 0, this.bet);
                    this.drawTower();
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                }
            }
        };

        // --- SISTEMA CORE ---
        const Core = {
            async init() { let p = 0; const i = setInterval(() => { p += 25; document.getElementById('boot-bar').style.width = p+'%'; if(p >= 100) { clearInterval(i); this.check(); } }, 100); },
            async check() { const { data: { session } } = await sb.auth.getSession(); document.getElementById('boot-loader').style.display = 'none'; if(session) { State.user = session.user; document.getElementById('main-app').classList.remove('hidden-view'); this.loadBalance(); } else { document.getElementById('auth-view').classList.remove('hidden-view'); } },
            async loadBalance() { const { data } = await sb.from('usuarios').select('saldo').eq('id', State.user.id).maybeSingle(); State.balance = data ? data.saldo : 0; UI.updateBalance(); },
            async confirmDeposit() {
                const amt = parseFloat(document.getElementById('dep-amount').value);
                const file = document.getElementById('receipt-input').files[0];
                if(!amt || !file) return UI.notify("Faltan datos", "error");
                UI.notify("Enviando...", "success");
                const path = `depositos/${State.user.id}-${Date.now()}`;
                await sb.storage.from('comprobantes').upload(path, file);
                const { data } = sb.storage.from('comprobantes').getPublicUrl(path);
                await sb.from('history').insert([{ user_id: State.user.id, type: 'deposits', amount: amt, label: 'CARGA', status: 'pending', evidence_url: data.publicUrl }]);
                UI.closeModal('modal-deposit'); UI.notify("En revisión", "success");
            }
        };

        const Router = {
            showView(id) {
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${id}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const nid = {'lobby':'nav-home','history':'nav-history','profile':'nav-profile'}[id];
                if(nid) document.getElementById(nid).classList.add('active');
            },
            openGame(g) {
                this.showView('game');
                const mount = document.getElementById('game-mount');
                if(g==='slots') { mount.innerHTML = `<div class="glass p-6 text-center"><div class="grid grid-cols-3 gap-2 mb-8"><div class="slot-box"><div id="reel-1" class="slot-reel"></div></div><div class="slot-box"><div id="reel-2" class="slot-reel"></div></div><div class="slot-box"><div id="reel-3" class="slot-reel"></div></div></div><input id="slots-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino">GIRAR</button></div>`; GameLogic.slots.init(); }
                if(g==='mines') { mount.innerHTML = `<div class="glass p-4 text-center"><div id="mines-grid" class="grid grid-cols-5 gap-2 mb-4"></div><div id="mines-status" class="hidden-view mb-4"><button id="mines-cashout-btn" onclick="GameLogic.mines.cashout()" class="btn-action w-full py-4">COBRAR</button></div><div id="mines-controls"><input id="mines-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.mines.start()" class="btn-action w-full py-4">APOSTAR</button></div></div>`; GameLogic.mines.drawGrid(); }
                if(g==='crash') { mount.innerHTML = `<div class="glass p-8 text-center"><div id="crash-mult" class="text-6xl font-casino mb-8">1.00x</div><input id="crash-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.crash.start()" class="btn-action w-full py-4 mb-2">DESPEGAR</button><button onclick="GameLogic.crash.cashout()" class="w-full py-4 bg-white/10 rounded-xl font-bold uppercase text-xs">RETIRAR</button></div>`; }
                if(g==='tower') { mount.innerHTML = `<div class="glass p-4"><div id="tower-container" class="space-y-2 mb-4 flex flex-col-reverse"></div><input id="tower-bet-input" type="number" value="10" class="input-bet"><button onclick="GameLogic.tower.start()" class="btn-action w-full py-4 mb-2">JUGAR</button><button onclick="GameLogic.tower.cashout()" class="w-full py-4 bg-emerald-500/20 text-emerald-500 rounded-xl font-bold uppercase text-xs">COBRAR</button></div>`; GameLogic.tower.drawTower(); }
            }
        };

        const AuthManager = {
            async login() { const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value; const { error } = await sb.auth.signInWithPassword({ email: e, password: p }); if(error) UI.notify("Error", "error"); else location.reload(); },
            async register() { const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value; const { data, error } = await sb.auth.signUp({ email: e, password: p }); if(error) return UI.notify("Error", "error"); await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]); location.reload(); },
            async logout() { await sb.auth.signOut(); location.reload(); },
            switchTab(t) { document.getElementById('login-container').classList.toggle('hidden-view', t==='register'); document.getElementById('register-container').classList.toggle('hidden-view', t==='login'); }
        };

        const UI = {
            updateBalance() { document.getElementById('balance-display').innerText = `$${State.balance.toFixed(2)}`; },
            openModal(id) { document.getElementById(id).classList.remove('hidden-view'); },
            closeModal(id) { document.getElementById(id).classList.add('hidden-view'); },
            notify(m, t) { const n = document.createElement('div'); n.className = `p-4 rounded-xl mb-2 font-bold text-[10px] uppercase ${t==='success'?'bg-emerald-500 text-black':'bg-red-500 text-white'}`; n.innerText = m; document.getElementById('notif-container').appendChild(n); setTimeout(()=>n.remove(), 3000); },
            handleFile(i) { UI.notify("Archivo cargado", "success"); }
        };
