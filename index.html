<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Game - Sistema de Frutas</title>
    <style>
        /* CSS: Define el aspecto y dimensiones del juego */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            height: 450px;
            background: radial-gradient(circle, #2c3e50, #000000);
            border: 5px solid #f1c40f;
            border-radius: 20px;
            position: relative; /* Crucial para el movimiento de las frutas */
            overflow: hidden;   /* Para que las frutas no se salgan del cuadro */
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.3);
        }

        .fruit-item {
            position: absolute;
            font-size: 45px;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .controls {
            margin-top: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f1c40f;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>Juego de Frutas</h1>

    <div id="game-container"></div>

    <div class="controls">
        <button onclick="spawnFruitBatch()">¡GIRAR!</button>
    </div>

    <script>
        // 1. Configuración de símbolos (Sin imágenes externas)
        const FRUIT_TYPES = [
            { symbol: '🍎', value: 10 },
            { symbol: '🍌', value: 20 },
            { symbol: '🍇', value: 50 },
            { symbol: '💎', value: 100 },
            { symbol: '⭐', value: 500 },
            { symbol: '🍒', value: 30 }
        ];

        const container = document.getElementById('game-container');

        // 2. Función para crear una fruta
        function createFruit(type, x, y) {
            const fruit = document.createElement('div');
            fruit.className = 'fruit-item';
            fruit.innerHTML = type.symbol;
            
            // Posición inicial
            fruit.style.left = x + 'px';
            fruit.style.top = y + 'px';
            
            // Atributo de velocidad para la física
            fruit.dataset.velocity = "0";
            
            return fruit;
        }

        // 3. Lógica de Física (Tumble Physics)
        // Corregimos el error de 'undefined' validando la existencia del contenedor
        function applyTumblePhysics() {
            if (!container) return;

            const fruits = container.children;
            const gravity = 0.9;   // Fuerza de caída
            const bounce = -0.25;  // Rebote (negativo para invertir dirección)
            const floor = container.clientHeight - 65; // Límite inferior

            for (let i = 0; i < fruits.length; i++) {
                const fruit = fruits[i];
                let y = parseFloat(fruit.style.top);
                let vel = parseFloat(fruit.dataset.velocity);

                vel += gravity;
                y += vel;

                // Si toca el suelo
                if (y >= floor) {
                    y = floor;
                    vel *= bounce; // Rebote suave
                    if (Math.abs(vel) < 1) vel = 0; // Detener totalmente
                }

                fruit.style.top = y + 'px';
                fruit.dataset.velocity = vel.toString();
            }
        }

        // 4. Función para generar las frutas (Simula el giro del casino)
        function spawnFruitBatch() {
            if (!container) return;
            
            // Limpiar jugada anterior
            container.innerHTML = '';

            const columns = 5;
            const rows = 3;
            const spacing = container.clientWidth / columns;

            for (let i = 0; i < columns; i++) {
                for (let j = 0; j < rows; j++) {
                    const randomType = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
                    const x = (i * spacing) + (spacing / 4);
                    const startY = -(j * 100 + 100); // Aparecen "fuera" por arriba

                    const fruit = createFruit(randomType, x, startY);
                    container.appendChild(fruit);
                }
            }
        }

        // 5. Bucle de animación infinito
        function gameLoop() {
            applyTumblePhysics();
            requestAnimationFrame(gameLoop);
        }

        // Inicializar al cargar la página
        window.onload = () => {
            gameLoop(); // Inicia el motor de física
            spawnFruitBatch(); // Primera tirada automática
        };
    </script>
</body>
</html>
