<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX | El Casino #1 de México</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --mx-green: #006341; --mx-red: #ce1126; --gold: #fbbf24; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* CONTENEDOR DESLIZABLE DEL BANCO */
        .bank-scroll-area {
            max-height: 70vh; /* Altura máxima para que siempre quepa en pantalla */
            overflow-y: auto;
            padding-right: 8px;
            scroll-behavior: smooth;
        }

        /* DISEÑO DE LA BARRA DE DESLIZAMIENTO (SCROLLBAR) */
        .bank-scroll-area::-webkit-scrollbar {
            width: 4px;
        }
        .bank-scroll-area::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
        }
        .bank-scroll-area::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--mx-green), transparent);
            border-radius: 10px;
        }

        /* EFECTO DE DESVANECIMIENTO AL FINAL PARA INDICAR MÁS CONTENIDO */
        .scroll-indicator {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to top, var(--bg), transparent);
            pointer-events: none;
            opacity: 0.8;
        }

        /* Estilos de los Sliders de confirmación */
        .swipe-container { position: relative; background: rgba(255,255,255,0.05); height: 56px; border-radius: 18px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .swipe-text { font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; pointer-events: none; z-index: 1; }
        .swipe-handle { position: absolute; left: 4px; top: 4px; height: 46px; width: 56px; background: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: black; cursor: pointer; z-index: 2; transition: transform 0.1s ease-out; }
        .swipe-bg-progress { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--mx-green); opacity: 0.2; transition: width 0.1s ease-out; }
    </style>
</head>
<body>

    <div id="notification-container" class="fixed top-5 right-5 z-[10001]"></div>

    <div id="loading" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-[500]">
        <div class="w-12 h-12 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <header id="nav" class="hidden glass sticky top-0 z-50 py-4 px-8 flex justify-between items-center border-b border-white/5">
        <div class="bg-emerald-600 px-3 py-1 rounded font-black italic text-black skew-x-[-15deg]">WinMX</div>
        <div onclick="openBank()" class="cursor-pointer flex items-center gap-3 bg-zinc-900 px-5 py-2 rounded-2xl border border-white/10">
            <p id="balance" class="text-emerald-400 font-black text-lg">$0</p>
            <i class="fas fa-wallet text-emerald-500"></i>
        </div>
    </header>

    <div id="bank-modal" class="fixed inset-0 bg-black/95 z-[1000] flex items-center justify-center p-4 hidden">
        <div class="bg-zinc-900 w-full max-w-lg rounded-[2.5rem] overflow-hidden border border-white/10 shadow-2xl relative">
            
            <div class="bg-emerald-600 p-6 flex justify-between items-center text-black">
                <h2 class="text-xl font-black italic tracking-tighter">MI CARTERA WinMX</h2>
                <button onclick="closeBank()" class="text-3xl">&times;</button>
            </div>
            
            <div class="bank-scroll-area p-6">
                
                <div class="bg-black/40 p-6 rounded-3xl border border-white/5 mb-6 text-center">
                    <p class="text-[10px] text-zinc-500 font-bold uppercase mb-1">Disponible para jugar</p>
                    <p id="bank-balance" class="text-5xl font-black text-emerald-400">$0.00</p>
                </div>

                <div class="flex gap-2 mb-6 bg-black p-1 rounded-2xl">
                    <button onclick="switchBankTab('dep')" id="tab-btn-dep" class="flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]">DEPÓSITO</button>
                    <button onclick="switchBankTab('ret')" id="tab-btn-ret" class="flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]">RETIRO</button>
                </div>

                <div id="section-dep" class="space-y-4">
                    <input id="in-amt" type="number" placeholder="Monto MXN" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none focus:border-emerald-500 text-xl font-bold">
                    <div class="swipe-container" id="slider-dep">
                        <div class="swipe-bg-progress" id="progress-dep"></div>
                        <span class="swipe-text">Desliza para cargar</span>
                        <div class="swipe-handle" id="handle-dep"><i class="fas fa-arrow-right"></i></div>
                    </div>
                    <div id="clabe-display" class="hidden bg-emerald-950/20 p-5 rounded-3xl border border-emerald-500/30 text-center">
                        <span class="text-emerald-500 text-[10px] font-bold block mb-2 uppercase">Transfiere aquí</span>
                        <span id="generated-clabe" class="text-lg font-mono font-bold block mb-4">---</span>
                        <button onclick="confirmDeposit()" class="w-full bg-emerald-500 text-black py-4 rounded-xl font-black text-xs uppercase">Confirmar pago realizado</button>
                    </div>
                </div>

                <div id="section-ret" class="hidden space-y-4">
                    <input id="out-amt" type="number" placeholder="Monto a retirar" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none font-bold">
                    <input id="out-clabe" type="text" maxlength="18" placeholder="CLABE de 18 dígitos" class="w-full bg-black p-5 rounded-2xl border border-white/5 outline-none font-mono">
                    <div class="swipe-container" id="slider-ret">
                        <div class="swipe-bg-progress !bg-red-600" id="progress-ret"></div>
                        <span class="swipe-text">Desliza para retirar</span>
                        <div class="swipe-handle" id="handle-ret"><i class="fas fa-arrow-right"></i></div>
                    </div>
                </div>

                <hr class="my-8 border-white/5">

                <div>
                    <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-4">Movimientos Recientes</h3>
                    <div id="history-list" class="space-y-3">
                        <p class="text-center text-zinc-700 text-[10px] py-8 font-bold">DESLIZA HACIA ARRIBA PARA VER MÁS</p>
                    </div>
                </div>

                <div class="h-10"></div>
            </div>

            <div class="scroll-indicator"></div>
        </div>
    </div>

    <script>
        // Lógica de Supabase y Balance
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let user = null, saldo = 0, history = [];

        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if(session) { user = session.user; await initApp(); } 
            else { document.getElementById('loading').classList.add('hidden'); }
        };

        async function initApp() {
            const { data } = await sb.from('usuarios').select('*').eq('id', user.id).single();
            if(data) {
                saldo = data.saldo; 
                history = JSON.parse(localStorage.getItem(`history_${user.id}`)) || [];
                updateUI();
                renderHistory();
                initSliders();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
            }
        }

        // Función para actualizar UI y guardar datos
        function updateUI() {
            document.getElementById('balance').innerText = `$${saldo.toLocaleString()}`;
            document.getElementById('bank-balance').innerText = `$${saldo.toLocaleString()}.00`;
            sb.from('usuarios').update({ saldo }).eq('id', user.id).then();
            localStorage.setItem(`history_${user.id}`, JSON.stringify(history));
        }

        // Renderizado del historial en la lista
        function renderHistory() {
            const container = document.getElementById('history-list');
            if(history.length === 0) return;
            container.innerHTML = history.map(m => `
                <div class="bg-black/30 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                    <div>
                        <p class="text-[10px] font-black ${m.type === 'Depósito' ? 'text-emerald-500' : 'text-red-500'} uppercase">${m.type}</p>
                        <p class="text-[9px] text-zinc-600">${m.time}</p>
                    </div>
                    <p class="font-black text-sm">$${m.amount.toLocaleString()}</p>
                </div>
            `).join('');
        }

        // Lógica de los Sliders (Swipe)
        function initSliders() {
            setupSlider('dep', () => {
                const amt = parseInt(document.getElementById('in-amt').value);
                if(!amt || amt < 50) return false;
                document.getElementById('generated-clabe').innerText = "012" + Math.floor(Math.random() * 1000000000000000);
                document.getElementById('dep-input-group')?.classList.add('hidden');
                document.getElementById('clabe-display').classList.remove('hidden');
                return true;
            });

            setupSlider('ret', () => {
                const amt = parseInt(document.getElementById('out-amt').value);
                const clabe = document.getElementById('out-clabe').value;
                if(!amt || amt > saldo || clabe.length !== 18) return false;
                saldo -= amt;
                history.unshift({ type: 'Retiro', amount: amt, time: new Date().toLocaleString() });
                updateUI(); renderHistory();
                closeBank();
                return true;
            });
        }

        function setupSlider(id, onComplete) {
            const handle = document.getElementById(`handle-${id}`);
            const container = document.getElementById(`slider-${id}`);
            const progress = document.getElementById(`progress-${id}`);
            let isDragging = false; let startX = 0;
            const max = container.offsetWidth - handle.offsetWidth - 8;

            const start = (e) => { isDragging = true; startX = e.pageX || e.touches[0].pageX; handle.style.transition = 'none'; };
            const move = (e) => {
                if(!isDragging) return;
                let x = (e.pageX || e.touches[0].pageX) - startX;
                x = Math.max(0, Math.min(x, max));
                handle.style.transform = `translateX(${x}px)`;
                progress.style.width = `${(x/max)*100}%`;
                if(x >= max) { isDragging = false; if(!onComplete()) reset(); }
            };
            const reset = () => { isDragging = false; handle.style.transition = 'all 0.3s'; handle.style.transform = 'translateX(0px)'; progress.style.width = '0%'; };
            
            handle.addEventListener('mousedown', start); handle.addEventListener('touchstart', start);
            window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', reset); window.addEventListener('touchend', reset);
        }

        function confirmDeposit() {
            const amt = parseInt(document.getElementById('in-amt').value);
            saldo += amt;
            history.unshift({ type: 'Depósito', amount: amt, time: new Date().toLocaleString() });
            updateUI(); renderHistory();
            closeBank();
            document.getElementById('clabe-display').classList.add('hidden');
            document.getElementById('in-amt').value = "";
        }

        function openBank() { document.getElementById('bank-modal').classList.remove('hidden'); }
        function closeBank() { document.getElementById('bank-modal').classList.add('hidden'); }
        function switchBankTab(t) {
            document.getElementById('section-dep').classList.toggle('hidden', t !== 'dep');
            document.getElementById('section-ret').classList.toggle('hidden', t !== 'ret');
            document.getElementById('tab-btn-dep').className = t === 'dep' ? "flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]" : "flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]";
            document.getElementById('tab-btn-ret').className = t === 'ret' ? "flex-1 py-3 bg-zinc-800 rounded-xl font-black text-[10px]" : "flex-1 py-3 text-zinc-500 rounded-xl font-black text-[10px]";
        }
    </script>
</body>
</html>
