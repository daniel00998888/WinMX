<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Pro - New Games Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #fccf31; --bg: #09090b; }
        body { background-color: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .font-casino { font-family: 'Bebas+Neue', cursive; letter-spacing: 1px; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border-radius: 24px; }
        .nav-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.5; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); color: var(--gold); }
        .hidden-view { display: none; }
        .btn-action { background: linear-gradient(135deg, #fccf31 0%, #f55555 100%); border-radius: 16px; transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.95); }
        
        /* Slots Engine */
        .slot-box { height: 90px; overflow: hidden; background: #18181b; border-radius: 12px; border: 2px solid #27272a; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }

        /* Mines */
        .mine-tile { transition: all 0.2s; }
        .mine-tile:hover { background: #27272a; }
    </style>
</head>
<body class="flex justify-center items-center h-screen bg-black">

    <div id="app" class="w-full max-w-md h-full bg-[#09090b] relative shadow-2xl flex flex-col overflow-hidden">
        
        <header class="p-6 flex justify-between items-center z-10">
            <div>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Bienvenido</p>
                <h2 id="user-name" class="font-casino text-xl text-white">Cargando...</h2>
            </div>
            <div class="glass px-4 py-2 flex items-center gap-2 border-yellow-500/20">
                <span class="text-yellow-500 text-xs">💰</span>
                <span id="user-balance" class="font-casino text-lg">0.00</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-6 pb-24">
            
            <div id="view-lobby" class="view-content animate__animated animate__fadeIn">
                <div class="mb-8 p-6 glass bg-gradient-to-br from-yellow-500/10 to-transparent relative overflow-hidden">
                    <h3 class="font-casino text-3xl mb-1">JACKPOT SEMANAL</h3>
                    <p class="text-zinc-400 text-xs">Aclama tu premio diario en la sección perfil.</p>
                    <div class="absolute -right-4 -bottom-4 opacity-10 text-8xl">🎰</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div onclick="Router.openGame('slots')" class="glass p-5 flex flex-col items-center gap-3 cursor-pointer hover:bg-white/5">
                        <span class="text-4xl">🎰</span>
                        <span class="font-casino">SLOTS</span>
                    </div>
                    <div onclick="Router.openGame('mines')" class="glass p-5 flex flex-col items-center gap-3 cursor-pointer hover:bg-white/5">
                        <span class="text-4xl">💎</span>
                        <span class="font-casino">MINAS</span>
                    </div>
                    <div onclick="Router.openGame('roulette')" class="glass p-5 flex flex-col items-center gap-3 cursor-pointer hover:bg-white/5">
                        <span class="text-4xl">🚀</span>
                        <span class="font-casino">CRASH</span>
                    </div>
                    <div onclick="Router.openGame('chests')" class="glass p-5 flex flex-col items-center gap-3 cursor-pointer hover:bg-white/5">
                        <span class="text-4xl">🗼</span>
                        <span class="font-casino">TOWERS</span>
                    </div>
                </div>
            </div>

            <div id="view-game" class="view-content hidden-view">
                <button onclick="Router.showView('lobby')" class="mb-4 text-zinc-500 text-sm flex items-center gap-2">
                    ← Volver al Lobby
                </button>
                <div id="game-mount"></div>
            </div>

            <div id="view-profile" class="view-content hidden-view animate__animated animate__fadeIn">
                <h2 class="font-casino text-3xl mb-6">Mi Perfil</h2>
                <div class="glass p-6 mb-4">
                    <p class="text-zinc-400 text-sm">ID de Usuario</p>
                    <p id="prof-id" class="text-xs font-mono text-zinc-500 mb-4">...</p>
                    <button onclick="Core.claimDaily()" class="w-full py-3 glass hover:bg-white/10 text-yellow-500 font-bold rounded-xl border-yellow-500/30">RECLAMAR BONO DIARIO</button>
                </div>
                <div class="glass p-6">
                    <p class="text-sm mb-4">Enviar saldo a otro usuario</p>
                    <input id="transfer-id" type="text" placeholder="ID del destinatario" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg mb-2 text-sm">
                    <input id="transfer-amt" type="number" placeholder="Monto" class="w-full bg-black/50 border border-white/10 p-3 rounded-lg mb-4 text-sm">
                    <button onclick="Core.transfer()" class="btn-action w-full py-3 font-bold">ENVIAR DINERO</button>
                </div>
            </div>

            <div id="view-history" class="view-content hidden-view animate__animated animate__fadeIn">
                <h2 class="font-casino text-3xl mb-6">Historial de Apuestas</h2>
                <div id="history-list" class="space-y-3"></div>
            </div>
        </main>

        <nav class="absolute bottom-0 w-full h-20 glass rounded-t-[32px] border-t border-white/10 flex items-center justify-around px-6 z-20">
            <div id="nav-home" onclick="Router.showView('lobby')" class="nav-item active flex flex-col items-center">
                <span class="text-xl">🏠</span>
                <span class="text-[10px] mt-1 font-bold">LOBBY</span>
            </div>
            <div id="nav-history" onclick="Router.showView('history')" class="nav-item flex flex-col items-center">
                <span class="text-xl">📊</span>
                <span class="text-[10px] mt-1 font-bold">HISTORIAL</span>
            </div>
            <div id="nav-profile" onclick="Router.showView('profile')" class="nav-item flex flex-col items-center">
                <span class="text-xl">👤</span>
                <span class="text-[10px] mt-1 font-bold">PERFIL</span>
            </div>
        </nav>
    </div>

    <script>
        const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
        const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

        let State = { user: null, balance: 0, currentBet: 10, isSpinning: false, totalSpins: 0, crashMult: 1, minesGrid: [] };
        const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];

        const Router = {
            showView(viewId) {
                if(State.isSpinning) return;
                document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const navMap = { 'lobby': 'nav-home', 'history': 'nav-history', 'profile': 'nav-profile' };
                if(navMap[viewId]) document.getElementById(navMap[viewId]).classList.add('active');
                if(viewId === 'history') Core.fetchHistory();
                if(viewId === 'profile') UI.updateProfile();
            },
            openGame(game) {
                this.showView('game');
                document.getElementById('game-mount').innerHTML = this.templates[game];
                if(game === 'slots') GameLogic.slots.init();
                if(game === 'mines') GameLogic.mines.init();
                UI.updateBetDisplay();
            },
            templates: {
                slots: `<div class="game-info text-[10px] text-zinc-400 uppercase mb-4"><span class="text-white font-bold block">SLOTS CLASSIC:</span> 3 iguales para ganar.</div>
                    <div class="glass p-6 text-center animate__animated animate__fadeInUp">
                        <div class="grid grid-cols-3 gap-2 mb-8">
                            <div class="slot-box"><div id="reel-1" class="slot-reel"></div></div>
                            <div class="slot-box"><div id="reel-2" class="slot-reel"></div></div>
                            <div class="slot-box"><div id="reel-3" class="slot-reel"></div></div>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button onclick="GameLogic.slots.play()" class="btn-action w-full py-5 font-casino text-xl">GIRAR</button>
                    </div>`,
                mines: `<div class="game-info text-[10px] text-zinc-400 mb-4"><span class="text-white font-bold block">MINES VIP:</span> Encuentra diamantes, evita la bomba.</div>
                    <div class="glass p-6 text-center">
                        <div id="mines-board" class="grid grid-cols-3 gap-2 mb-6"></div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button id="btn-mines" onclick="GameLogic.mines.start()" class="btn-action w-full py-4 font-casino">INICIAR JUEGO</button>
                    </div>`,
                roulette: `<div class="game-info text-[10px] text-zinc-400 mb-4"><span class="text-white font-bold block">CRASH ROCKET:</span> Retira antes de que explote.</div>
                    <div class="glass p-8 text-center">
                        <div id="crash-display" class="text-6xl font-casino text-emerald-500 mb-8">1.00x</div>
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 flex justify-between items-center">
                            <button onclick="GameLogic.changeBet(-10)" class="w-10 h-10 bg-zinc-800 rounded-xl">-</button>
                            <span class="bet-val font-casino text-2xl">$10</span>
                            <button onclick="GameLogic.changeBet(10)" class="w-10 h-10 bg-zinc-800 rounded-xl">+</button>
                        </div>
                        <button id="btn-crash" onclick="GameLogic.crash.start()" class="btn-action w-full py-5 font-casino">APOSTAR</button>
                    </div>`,
                chests: `<div class="game-info text-[10px] text-zinc-400 mb-4"><span class="text-white font-bold block">TOWER CLIMB:</span> Doble o nada rápido.</div>
                    <div class="glass p-8 text-center">
                        <div class="flex flex-col-reverse gap-2 mb-6">
                            <div class="p-3 bg-zinc-900 rounded-xl opacity-20">Nivel 3 - 4.0x</div>
                            <div class="p-3 bg-zinc-900 rounded-xl opacity-20">Nivel 2 - 2.0x</div>
                            <div class="p-3 bg-white/10 rounded-xl border border-yellow-500/50">Nivel 1 - 1.5x</div>
                        </div>
                        <button onclick="GameLogic.tower.play()" class="btn-action w-full py-5 font-casino">SUBIR PISO</button>
                    </div>`
            }
        };

        const GameLogic = {
            changeBet(v) { if(!State.isSpinning) { State.currentBet = Math.max(10, State.currentBet + v); UI.updateBetDisplay(); } },
            async startSpin() {
                if(State.isSpinning || State.balance < State.currentBet) { UI.notify("Saldo insuficiente o partida activa", "error"); return false; }
                State.isSpinning = true; State.balance -= State.currentBet; UI.updateBalance();
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                return true;
            },
            async endSpin(winAmt, label) {
                if(winAmt > 0) {
                    State.balance += winAmt;
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    UI.notify(`+ $${winAmt.toFixed(2)}`, "success"); UI.updateBalance();
                }
                await sb.from('history').insert([{ user_id: State.user.id, type: 'bets', amount: winAmt - State.currentBet, label: label, status: 'completed' }]);
                State.isSpinning = false;
            },
            slots: {
                init() { [1,2,3].forEach(id => { const r = document.getElementById(`reel-${id}`); r.innerHTML = ''; Array(40).fill(SYMBOLS).flat().forEach(s => r.innerHTML += `<div class="slot-item">${s}</div>`); }); },
                async play() {
                    if(!await GameLogic.startSpin()) return;
                    State.totalSpins++; const res = [SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)], SYMBOLS[Math.floor(Math.random()*6)]];
                    const pay = { '7️⃣7️⃣7️⃣': 50, '💎💎💎': 15, '⭐️⭐️⭐️': 10, '🔔🔔🔔': 5, '🍋🍋🍋': 2, '🍒🍒🍒': 1.5 };
                    const mult = pay[res.join('')] || 0;
                    [1,2,3].forEach((id, i) => { const reel = document.getElementById(`reel-${id}`); const pos = (State.totalSpins * 90 * 12) + (SYMBOLS.indexOf(res[i]) * 90); reel.style.transform = `translateY(-${pos}px)`; });
                    setTimeout(() => GameLogic.endSpin(State.currentBet * mult, mult > 0 ? 'WIN SLOTS' : 'LOSS SLOTS'), 3500);
                }
            },
            mines: {
                init() {
                    const b = document.getElementById('mines-board'); if(!b) return;
                    b.innerHTML = '';
                    for(let i=0; i<9; i++) b.innerHTML += `<div onclick="GameLogic.mines.reveal(${i})" class="mine-tile glass h-16 flex items-center justify-center cursor-pointer text-xl">?</div>`;
                },
                async start() {
                    if(!await GameLogic.startSpin()) return;
                    document.getElementById('btn-mines').innerText = "BUSCANDO...";
                    State.minesGrid = Array(9).fill('💎'); State.minesGrid[Math.floor(Math.random()*9)] = '💣';
                    this.init();
                },
                reveal(idx) {
                    if(!State.isSpinning) return;
                    const tiles = document.querySelectorAll('.mine-tile');
                    const content = State.minesGrid[idx];
                    tiles[idx].innerText = content;
                    tiles[idx].onclick = null;
                    if(content === '💣') {
                        tiles[idx].classList.add('bg-red-500/50');
                        GameLogic.endSpin(0, 'LOSS MINES');
                        setTimeout(() => Router.openGame('mines'), 1000);
                    } else {
                        tiles[idx].classList.add('bg-emerald-500/50');
                        GameLogic.endSpin(State.currentBet * 1.8, 'WIN MINES');
                        setTimeout(() => Router.openGame('mines'), 1000);
                    }
                }
            },
            crash: {
                async start() {
                    if(!await GameLogic.startSpin()) return;
                    const btn = document.getElementById('btn-crash');
                    const disp = document.getElementById('crash-display');
                    btn.innerText = "RETIRAR"; btn.onclick = () => this.cashout();
                    let mult = 1.0; const crashLimit = (Math.random() * 4 + 1.1).toFixed(2);
                    this.timer = setInterval(() => {
                        mult += 0.04; disp.innerText = mult.toFixed(2) + "x"; State.crashMult = mult;
                        if(mult >= crashLimit) {
                            clearInterval(this.timer); disp.classList.replace('text-emerald-500', 'text-red-500');
                            GameLogic.endSpin(0, 'LOSS CRASH');
                            setTimeout(() => Router.openGame('roulette'), 1500);
                        }
                    }, 100);
                },
                cashout() {
                    clearInterval(this.timer);
                    GameLogic.endSpin(State.currentBet * State.crashMult, 'WIN CRASH');
                    Router.openGame('roulette');
                }
            },
            tower: {
                async play() {
                    if(!await GameLogic.startSpin()) return;
                    if(Math.random() > 0.45) {
                        GameLogic.endSpin(State.currentBet * 1.5, 'WIN TOWER');
                    } else {
                        GameLogic.endSpin(0, 'LOSS TOWER');
                    }
                }
            }
        };

        const Core = {
            async init() {
                const { data: { user } } = await sb.auth.getUser();
                if(!user) return window.location.href = 'login.html'; // Redirigir si no hay sesión
                State.user = user;
                const { data } = await sb.from('usuarios').select('*').eq('id', user.id).single();
                State.balance = data.saldo;
                UI.updateBalance();
                document.getElementById('user-name').innerText = user.email.split('@')[0].toUpperCase();
            },
            async fetchHistory() {
                const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false }).limit(10);
                const list = document.getElementById('history-list');
                list.innerHTML = data.map(h => `
                    <div class="glass p-4 flex justify-between items-center border-l-4 ${h.amount >= 0 ? 'border-emerald-500' : 'border-red-500'}">
                        <div><p class="font-bold text-xs">${h.label}</p><p class="text-[10px] text-zinc-500">${new Date(h.created_at).toLocaleTimeString()}</p></div>
                        <span class="font-casino ${h.amount >= 0 ? 'text-emerald-500' : 'text-zinc-500'}">${h.amount >= 0 ? '+' : ''}${h.amount.toFixed(2)}</span>
                    </div>
                `).join('');
            },
            async claimDaily() {
                State.balance += 50;
                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                UI.notify("¡Bono de $50 reclamado!", "success"); UI.updateBalance();
            }
        };

        const UI = {
            updateBalance() { document.getElementById('user-balance').innerText = State.balance.toFixed(2); },
            updateBetDisplay() { document.querySelectorAll('.bet-val').forEach(el => el.innerText = `$${State.currentBet}`); },
            updateProfile() { document.getElementById('prof-id').innerText = State.user.id; },
            notify(msg, type) {
                const toast = document.createElement('div');
                toast.className = `fixed top-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold z-50 animate__animated animate__fadeInDown ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
                toast.innerText = msg;
                document.body.appendChild(toast);
                setTimeout(() => { toast.classList.add('animate__fadeOutUp'); setTimeout(() => toast.remove(), 500); }, 2000);
            }
        };

        Core.init();
    </script>
</body>
</html>
