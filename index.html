    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');

        .btn-action { background: var(--mx-green); color: black; font-weight: 900; border-radius: 1.2rem; transition: 0.2s; border: none; }
        .btn-action:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .balance-pill { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 99px; padding: 4px 4px 4px 12px; display: flex; align-items: center; gap: 8px; }
        .btn-plus { width: 32px; height: 32px; background: var(--mx-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .history-scroll { max-height: 280px; overflow-y: auto; scrollbar-width: none; }
        .history-scroll::-webkit-scrollbar { display: none; }

        .slot-box { height: 90px; overflow: hidden; background: #000; border-radius: 1rem; border: 1px solid #1a1a1a; }
        .slot-item { height: 90px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .slot-reel { transition: transform 3.5s cubic-bezier(0.15, 0, 0.05, 1); }
        
        .pulse-pending { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .input-bet { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 12px; width: 100%; text-align: center; color: white; font-family: 'Archivo Black', sans-serif; outline: none; margin-bottom: 12px; }
        
        .wallet-tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 4px; margin-bottom: 20px; }
        .wallet-tab-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 0.8rem; transition: 0.3s; color: #555; }
        .wallet-tab-btn.active { background: var(--mx-green); color: black; }
        .input-wallet-info { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 14px; width: 100%; color: white; font-size: 12px; outline: none; margin-bottom: 10px; }

        #crash-area { position: relative; width: 100%; height: 160px; overflow: hidden; background: #050505; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); }
        .bg-infinite { position: absolute; top: 0; left: 0; height: 100%; width: 200%; display: flex; }
        .bg-part { width: 50%; height: 100%; background-size: 50px 50px; background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px); }
        #crash-rocket-container { position: absolute; left: 20%; bottom: 20%; z-index: 10; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: all 0.1s linear; }
        #crash-rocket { font-size: 2.5rem; display: inline-block; transform: rotate(45deg); }

        .instruction-card { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 1.2rem; padding: 20px; margin-top: 24px; text-align: left; }
        .risk-badge { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; text-transform: uppercase; margin-bottom: 10px; }

    <div id="notif-container" class="fixed top-6 left-6 right-6 z-[200] flex flex-col gap-2"></div>

    <script>
        (function() {
            "use strict";

            const DB_CONFIG = { url: "https://dakhnqriwbzihlzhtfcb.supabase.co", key: "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs" };
            const sb = window.supabase.createClient(DB_CONFIG.url, DB_CONFIG.key);

            const SYMBOLS = ['🍒', '🍋', '🔔', '⭐️', '💎', '7️⃣'];
            const sfx = {
                click: new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'),
                win: new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3'),
                lose: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3')
            };

            let State = {
                user: null,
                balance: 0,
                walletMode: 'deposit',
                currentView: 'lobby',
                isGameRunning: false,
                crash: { active: false, multiplier: 1.0, bet: 0, interval: null }
            };

            function playSfx(name) { sfx[name].currentTime = 0; sfx[name].play().catch(() => {}); }

            const UI = {
                notify(msg, type = 'success') {
                    const n = document.createElement('div');
                    n.className = `p-4 rounded-2xl animate__animated animate__fadeInDown text-[10px] font-bold uppercase tracking-widest shadow-2xl ${type === 'success' ? 'bg-emerald-500 text-black' : 'bg-red-500 text-white'}`;
                    n.innerText = msg;
                    document.getElementById('notif-container').appendChild(n);
                    setTimeout(() => { n.classList.replace('animate__fadeInDown', 'animate__fadeOutUp'); setTimeout(() => n.remove(), 500); }, 3000);
                },
                setView(viewId) {
                    playSfx('click');
                    document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden-view'));
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    document.getElementById(`view-${viewId}`).classList.remove('hidden-view');
                    document.getElementById(`nav-${viewId}`).classList.add('active');
                    State.currentView = viewId;
                    if(viewId === 'history') Core.loadHistory();
                },
                updateBalance() {
                    const el = document.getElementById('balance-display');
                    el.innerText = `$${State.balance.toFixed(2)}`;
                    el.classList.add('animate__animated', 'animate__pulse');
                    setTimeout(() => el.classList.remove('animate__animated', 'animate__pulse'), 500);
                },
                toggleWalletModal(show) {
                    playSfx('click');
                    document.getElementById('modal-wallet').classList.toggle('hidden-view', !show);
                    if(show) this.switchWalletTab('deposit');
                },
                switchWalletTab(tab) {
                    State.walletMode = tab;
                    document.getElementById('tab-deposit').classList.toggle('active', tab === 'deposit');
                    document.getElementById('tab-withdraw').classList.toggle('active', tab === 'withdraw');
                    document.getElementById('wallet-title').innerText = tab === 'deposit' ? 'Monto a cargar' : 'Monto a retirar';
                    document.getElementById('wallet-step-main').classList.remove('hidden-view');
                    document.getElementById('wallet-step-confirm').classList.add('hidden-view');
                },
                walletContinue() {
                    const amt = parseFloat(document.getElementById('wallet-amount-input').value);
                    if(!amt || amt <= 0) return this.notify("Ingresa un monto válido", "error");
                    if(State.walletMode === 'withdraw' && amt > State.balance) return this.notify("Saldo insuficiente", "error");
                    
                    if(State.walletMode === 'deposit') {
                        document.getElementById('wallet-step-main').classList.add('hidden-view');
                        document.getElementById('wallet-step-confirm').classList.remove('hidden-view');
                    } else {
                        this.submitWalletRequest();
                    }
                },
                handleFileSelect(input) {
                    if(input.files && input.files[0]) {
                        document.getElementById('file-label').innerText = `LISTO: ${input.files[0].name.substring(0,15)}...`;
                    }
                },
                async submitWalletRequest() {
                    const amt = parseFloat(document.getElementById('wallet-amount-input').value);
                    const bank = document.getElementById('wallet-bank-name').value;
                    const holder = document.getElementById('wallet-holder-name').value;
                    
                    if(!bank || !holder) return this.notify("Completa la información bancaria", "error");

                    try {
                        const { error } = await sb.from('history').insert([{
                            user_id: State.user.id,
                            type: State.walletMode === 'deposit' ? 'deposits' : 'withdrawals',
                            amount: amt,
                            status: 'PENDING',
                            bank_info: bank,
                            holder_info: holder,
                            evidence_url: State.walletMode === 'deposit' ? 'Comprobante adjunto' : 'N/A',
                            label: `${State.walletMode === 'deposit' ? 'Depósito' : 'Retiro'} solicitado`
                        }]);

                        if(error) throw error;
                        
                        if(State.walletMode === 'withdraw') {
                            State.balance -= amt;
                            await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                            this.updateBalance();
                        }

                        this.notify("Solicitud enviada con éxito", "success");
                        this.toggleWalletModal(false);
                        location.reload();
                    } catch (e) {
                        this.notify("Error de conexión", "error");
                    }
                },
                toggleAdminPanel(show) {
                    playSfx('click');
                    document.getElementById('admin-panel').classList.toggle('hidden-view', !show);
                    if(show) Core.loadAdminRequests();
                }
            };

            const GameManager = {
                load(game) {
                    playSfx('click');
                    UI.setView('game');
                    const mount = document.getElementById('game-mount');
                    mount.innerHTML = '';

                    if(game === 'slots') this.initSlots(mount);
                    if(game === 'mines') this.initMines(mount);
                    if(game === 'tower') this.initTower(mount);
                    if(game === 'crash') this.initCrash(mount);
                },
                backToLobby() { UI.setView('lobby'); },

                initSlots(m) {
                    m.innerHTML = `
                        <div class="glass p-6 text-center space-y-6 animate__animated animate__fadeIn">
                            <div class="flex justify-center gap-3">
                                ${[0,1,2].map(i => `<div class="slot-box flex-1"><div id="reel-${i}" class="slot-reel"></div></div>`).join('')}
                            </div>
                            <input id="bet-amt" type="number" value="10" class="input-bet">
                            <button id="btn-spin" onclick="GameManager.spinSlots()" class="btn-action w-full py-5 font-casino text-lg tracking-widest">Girar Rodillos</button>
                        </div>
                    `;
                    [0,1,2].forEach(i => {
                        const r = document.getElementById(`reel-${i}`);
                        for(let j=0; j<20; j++) r.innerHTML += `<div class="slot-item">${SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]}</div>`;
                    });
                },
                async spinSlots() {
                    const btn = document.getElementById('btn-spin');
                    const bet = parseFloat(document.getElementById('bet-amt').value);
                    if(bet > State.balance || bet <= 0) return UI.notify("Saldo insuficiente", "error");

                    btn.disabled = true;
                    State.balance -= bet;
                    UI.updateBalance();

                    const results = [Math.floor(Math.random()*SYMBOLS.length), Math.floor(Math.random()*SYMBOLS.length), Math.floor(Math.random()*SYMBOLS.length)];
                    
                    for(let i=0; i<3; i++) {
                        const r = document.getElementById(`reel-${i}`);
                        r.style.transform = `translateY(-${(15 * 90)}px)`;
                        setTimeout(() => {
                            r.style.transition = 'none';
                            r.style.transform = 'translateY(0)';
                            r.innerHTML = '';
                            for(let j=0; j<20; j++) {
                                const symbol = j === 0 ? SYMBOLS[results[i]] : SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
                                r.innerHTML += `<div class="slot-item">${symbol}</div>`;
                            }
                            setTimeout(() => r.style.transition = 'transform 3.5s cubic-bezier(0.15, 0, 0.05, 1)', 50);
                        }, 3500 + (i*200));
                    }

                    setTimeout(async () => {
                        if(results[0] === results[1] && results[1] === results[2]) {
                            const win = bet * 10;
                            State.balance += win;
                            UI.notify(`JACKPOT! Ganaste $${win}`, "success");
                            playSfx('win');
                        } else if(results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                            const win = bet * 2;
                            State.balance += win;
                            UI.notify(`Premio Doble! Ganaste $${win}`, "success");
                        }
                        await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                        UI.updateBalance();
                        btn.disabled = false;
                    }, 4200);
                },

                initMines(m) {
                    let mines = [], revealed = 0, active = false, bet = 0;
                    m.innerHTML = `
                        <div class="glass p-6 text-center animate__animated animate__fadeIn">
                            <div class="grid grid-cols-5 gap-2 mb-6" id="mine-grid"></div>
                            <input id="mine-bet" type="number" value="10" class="input-bet">
                            <button id="btn-mine-start" class="btn-action w-full py-4 font-casino">Comenzar Juego</button>
                        </div>
                    `;
                    const grid = document.getElementById('mine-grid');
                    for(let i=0; i<25; i++) grid.innerHTML += `<div data-idx="${i}" class="aspect-square bg-white/5 rounded-xl flex items-center justify-center text-xl cursor-pointer hover:bg-white/10 transition-colors">?</div>`;
                    
                    document.getElementById('btn-mine-start').onclick = async function() {
                        if(active) {
                            const win = bet * (1 + (revealed * 0.2));
                            State.balance += win;
                            UI.notify(`Cobraste $${win.toFixed(2)}`, "success");
                            playSfx('win');
                            this.innerText = "Comenzar Juego";
                            active = false;
                            await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                            UI.updateBalance();
                            GameManager.load('mines');
                            return;
                        }
                        bet = parseFloat(document.getElementById('mine-bet').value);
                        if(bet > State.balance || bet <= 0) return UI.notify("Saldo insuficiente", "error");
                        State.balance -= bet;
                        UI.updateBalance();
                        mines = Array(25).fill(false);
                        let mCount = 0; while(mCount < 3) { let r = Math.floor(Math.random()*25); if(!mines[r]) { mines[r] = true; mCount++; } }
                        active = true; revealed = 0;
                        this.innerText = "Retirarse";
                    };

                    grid.querySelectorAll('div').forEach(el => {
                        el.onclick = async () => {
                            if(!active || el.innerText !== '?') return;
                            const idx = el.dataset.idx;
                            if(mines[idx]) {
                                el.innerText = '💣'; el.className = 'aspect-square bg-red-500 rounded-xl flex items-center justify-center text-xl animate__animated animate__shakeX';
                                UI.notify("BOOM! Perdiste", "error");
                                playSfx('lose');
                                active = false;
                                await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                                setTimeout(() => GameManager.load('mines'), 2000);
                            } else {
                                el.innerText = '💎'; el.className = 'aspect-square bg-emerald-500 text-black rounded-xl flex items-center justify-center text-xl animate__animated animate__bounceIn';
                                revealed++;
                                playSfx('click');
                            }
                        };
                    });
                },

                initTower(m) {
                    m.innerHTML = `<div class="glass p-10 text-center"><p class="font-casino text-zinc-600">Torre en mantenimiento</p></div>`;
                },

                initCrash(m) {
                    m.innerHTML = `
                        <div class="glass p-6 text-center space-y-6 animate__animated animate__fadeIn">
                            <div id="crash-area">
                                <div class="bg-infinite"><div class="bg-part"></div><div class="bg-part"></div></div>
                                <div id="crash-rocket-container"><span id="crash-rocket">🚀</span></div>
                                <div id="crash-mult" class="absolute inset-0 flex items-center justify-center font-casino text-5xl text-emerald-500 z-20">1.00x</div>
                            </div>
                            <input id="crash-bet" type="number" value="10" class="input-bet">
                            <div class="flex gap-3">
                                <button id="btn-crash-start" onclick="GameManager.startCrash()" class="btn-action flex-[2] py-4 font-casino">Despegar</button>
                                <button id="btn-crash-cashout" onclick="GameManager.cashoutCrash()" class="btn-action flex-[1] py-4 font-casino bg-orange-500 hidden">Cobrar</button>
                            </div>
                        </div>
                    `;
                },

                startCrash() {
                    const bet = parseFloat(document.getElementById('crash-bet').value);
                    if(bet > State.balance || bet <= 0) return UI.notify("Saldo insuficiente", "error");

                    State.balance -= bet;
                    UI.updateBalance();

                    State.crash = { active: true, multiplier: 1.0, bet: bet };
                    document.getElementById('btn-crash-start').classList.add('hidden');
                    document.getElementById('btn-crash-cashout').classList.remove('hidden');
                    
                    const rocket = document.getElementById('crash-rocket-container');
                    const multText = document.getElementById('crash-mult');
                    const crashPoint = (Math.random() * 5 + 1.1).toFixed(2);

                    State.crash.interval = setInterval(async () => {
                        State.crash.multiplier += 0.01;
                        multText.innerText = `${State.crash.multiplier.toFixed(2)}x`;
                        
                        // Movimiento del cohete
                        rocket.style.left = `${20 + (State.crash.multiplier * 5)}%`;
                        rocket.style.bottom = `${20 + (State.crash.multiplier * 8)}%`;

                        if(State.crash.multiplier >= crashPoint) {
                            clearInterval(State.crash.interval);
                            State.crash.active = false;
                            multText.innerText = "¡EXPLOTÓ!";
                            multText.classList.replace('text-emerald-500', 'text-red-500');
                            playSfx('lose');
                            await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                            setTimeout(() => this.initCrash(document.getElementById('game-mount')), 2000);
                        }
                    }, 100);
                },

                async cashoutCrash() {
                    if(!State.crash.active) return;
                    clearInterval(State.crash.interval);
                    const win = State.crash.bet * State.crash.multiplier;
                    State.balance += win;
                    UI.notify(`GANASTE $${win.toFixed(2)}`, "success");
                    playSfx('win');
                    State.crash.active = false;
                    await sb.from('usuarios').update({ saldo: State.balance }).eq('id', State.user.id);
                    UI.updateBalance();
                    setTimeout(() => this.initCrash(document.getElementById('game-mount')), 1000);
                }
            };

            const Core = {
                async init() {
                    let p = 0;
                    const interval = setInterval(() => {
                        p += 5;
                        document.getElementById('boot-bar').style.width = `${p}%`;
                        if(p >= 100) { clearInterval(interval); this.checkAuth(); }
                    }, 50);
                },
                async checkAuth() {
                    const { data: { session } } = await sb.auth.getSession();
                    document.getElementById('boot-loader').classList.add('animate__animated', 'animate__fadeOut');
                    setTimeout(() => {
                        document.getElementById('boot-loader').style.display = 'none';
                        if(session) {
                            State.user = session.user;
                            this.loadUserData();
                            document.getElementById('main-app').classList.remove('hidden-view');
                        } else {
                            document.getElementById('auth-view').classList.remove('hidden-view');
                        }
                    }, 500);
                },
                async loadUserData() {
                    const { data } = await sb.from('usuarios').select('*').eq('id', State.user.id).single();
                    if(data) {
                        State.balance = data.saldo;
                        UI.updateBalance();
                        document.getElementById('user-email-display').innerText = data.email;
                    }
                },
                async loadHistory() {
                    const { data } = await sb.from('history').select('*').eq('user_id', State.user.id).order('created_at', { ascending: false });
                    const container = document.getElementById('history-lists');
                    container.innerHTML = data.length ? '' : '<p class="text-center text-zinc-700 py-10">No hay movimientos</p>';
                    data.forEach(h => {
                        const isPos = ['deposits', 'wins'].includes(h.type);
                        container.innerHTML += `
                            <div class="glass p-4 flex justify-between items-center border-l-4 ${isPos ? 'border-emerald-500' : 'border-red-500'}">
                                <div>
                                    <p class="text-[10px] font-bold uppercase tracking-widest">${h.label}</p>
                                    <p class="text-[8px] text-zinc-500">${new Date(h.created_at).toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <p class="font-casino ${isPos ? 'text-emerald-500' : 'text-red-500'}">${isPos ? '+' : '-'}$${h.amount}</p>
                                    <p class="text-[7px] uppercase font-black ${h.status === 'PENDING' ? 'text-orange-500' : 'text-zinc-600'}">${h.status}</p>
                                </div>
                            </div>
                        `;
                    });
                },
                async loadAdminRequests() {
                    const { data } = await sb.from('history').select('*, usuarios(email)').eq('status', 'PENDING').order('created_at', { ascending: false });
                    const container = document.getElementById('admin-requests-container');
                    container.innerHTML = data.length ? '' : '<div class="text-center py-20 text-zinc-800 font-bold uppercase text-xs">Sin pendientes</div>';
                    
                    data.forEach(req => {
                        const card = document.createElement('div');
                        card.className = `glass p-6 border-l-4 ${req.type === 'deposits' ? 'border-emerald-500' : 'border-orange-500'} animate__animated animate__fadeInUp`;
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[9px] font-black text-zinc-500 uppercase mb-1">Usuario</p>
                                    <p class="text-xs font-bold text-emerald-500">${req.usuarios.email}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-black text-zinc-500 uppercase mb-1">Monto</p>
                                    <p class="font-casino text-xl">$${req.amount}</p>
                                </div>
                            </div>
                            <div class="bg-black/40 rounded-xl p-4 mb-4 grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-[7px] text-zinc-500 uppercase font-black">Banco</p>
                                    <p class="text-[10px] font-bold">${req.bank_info || 'N/A'}</p>
                                </div>
                                <div>
                                    <p class="text-[7px] text-zinc-500 uppercase font-black">Titular</p>
                                    <p class="text-[10px] font-bold">${req.holder_info || 'N/A'}</p>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="Core.processAdminRequest('${req.id}', 'COMPLETED', ${req.amount}, '${req.type}', '${req.user_id}', this)" class="btn-action flex-1 py-3 text-[10px]">Aprobar</button>
                                <button onclick="Core.processAdminRequest('${req.id}', 'REJECTED', 0, '${req.type}', '${req.user_id}', this)" class="bg-red-500 text-white flex-1 py-3 text-[10px] rounded-2xl font-bold uppercase">Rechazar</button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                },
                async processAdminRequest(id, status, amt, type, uid, btn) {
                    btn.disabled = true;
                    try {
                        await sb.from('history').update({ status: status }).eq('id', id);
                        if(status === 'COMPLETED' && type === 'deposits') {
                            const { data } = await sb.from('usuarios').select('saldo').eq('id', uid).single();
                            await sb.from('usuarios').update({ saldo: data.saldo + amt }).eq('id', uid);
                        }
                        UI.notify("Operación completada", "success");
                        this.loadAdminRequests();
                    } catch (e) {
                        UI.notify("Error de servidor", "error");
                        btn.disabled = false;
                    }
                }
            };

            const AuthManager = {
                async login() { 
                    const e = document.getElementById('login-email').value, p = document.getElementById('login-password').value; 
                    const { data, error } = await sb.auth.signInWithPassword({ email: e, password: p }); 
                    if(error) UI.notify(error.message, "error"); else location.reload(); 
                },
                async register() { 
                    if(!document.getElementById('terms-check').checked) return UI.notify("Acepta términos", "error"); 
                    const e = document.getElementById('reg-email').value, p = document.getElementById('reg-password').value; 
                    const { data, error } = await sb.auth.signUp({ email: e, password: p }); 
                    if(error) UI.notify(error.message, "error"); 
                    else { 
                        await sb.from('usuarios').insert([{ id: data.user.id, email: e, saldo: 0 }]); 
                        UI.notify("Cuenta creada", "success"); 
                        location.reload(); 
                    } 
                },
                async logout() { await sb.auth.signOut(); location.reload(); },
                switchTab(tab) { 
                    playSfx('click'); 
                    document.getElementById('login-container').classList.toggle('hidden-view', tab==='register'); 
                    document.getElementById('register-container').classList.toggle('hidden-view', tab==='login'); 
                }
            };

            window.GameManager = GameManager;
            window.UI = UI;
            window.AuthManager = AuthManager;
            window.Core = Core;

            Core.init();

        })();
    </script>
</body>
</html>
