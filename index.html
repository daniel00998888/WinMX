<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Casino PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1d2a;
  color:white;
  text-align:center;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  z-index:999;
}

/* UI */
header{background:#102c3c;padding:15px;font-size:24px}

.screen{display:none;}
.active{display:block;}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.card{
  background:#16394f;
  padding:20px;
  border-radius:10px;
  width:260px;
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#00c896;
  color:white;
  cursor:pointer;
  width:80%;
}

input,select{
  padding:8px;
  margin-top:10px;
  width:80%;
}

.logout{
  position:absolute;
  top:10px;
  right:10px;
  background:red;
}
</style>
</head>

<body>

<div id="loader">Cargando...</div>

<header>🎰 CASINO PRO</header>
<button class="logout" onclick="logout()">Salir</button>

<!-- LOGIN -->
<div id="auth" class="screen active">
<h2>Login / Registro</h2>
<input id="email" placeholder="Correo"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="register()">Registrar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- CASINO -->
<div id="casino" class="screen">
<h2>Saldo: $<span id="saldo">0</span></h2>

<div class="container">

<div class="card">
<h3>🎰 Slot</h3>
<input id="slotBet" type="number">
<button onclick="slot()">Jugar</button>
<p id="slotRes"></p>
</div>

<div class="card">
<h3>🎲 Dado</h3>
<input id="diceBet" type="number">
<button onclick="dice()">Jugar</button>
<p id="diceRes"></p>
</div>

<div class="card">
<h3>🎡 Ruleta</h3>
<input id="roulBet" type="number">
<select id="color">
<option value="rojo">Rojo</option>
<option value="negro">Negro</option>
</select>
<button onclick="roulette()">Jugar</button>
<p id="roulRes"></p>
</div>

</div>
</div>

<script>

// ===== LOADER =====
window.onload = () => {
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";

    let current = localStorage.getItem("currentUser");

    if(current){
      cargarUsuario(JSON.parse(current));
      show("casino");
    }else{
      show("auth");
    }

  },1000);
};

// ===== UI =====
function show(screen){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(screen).classList.add("active");
}

// ===== BASE DE DATOS LOCAL =====
function getUsers(){
  return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(users){
  localStorage.setItem("users", JSON.stringify(users));
}

// ===== REGISTRO =====
function register(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(!email || !pass) return alert("Completa los campos");

  let users = getUsers();

  if(users.find(u => u.email === email)){
    alert("Este usuario ya existe");
    return;
  }

  let newUser = { email, pass, saldo:1000 };

  users.push(newUser);
  saveUsers(users);

  alert("Registrado correctamente 🎉");
}

// ===== LOGIN =====
function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let users = getUsers();

  let user = users.find(u => u.email===email && u.pass===pass);

  if(!user){
    alert("Datos incorrectos");
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(user));

  cargarUsuario(user);
  show("casino");
}

// ===== CARGAR USUARIO =====
let saldo = 0;
let usuarioActual = null;

function cargarUsuario(user){
  usuarioActual = user;
  saldo = user.saldo;
  update();
}

// ===== GUARDAR =====
function save(){
  let users = getUsers();

  users = users.map(u=>{
    if(u.email === usuarioActual.email){
      u.saldo = saldo;
    }
    return u;
  });

  saveUsers(users);
  localStorage.setItem("currentUser", JSON.stringify(usuarioActual));
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// ===== UI =====
function update(){
  document.getElementById("saldo").innerText = saldo;
}

// ===== JUEGOS =====
function slot(){
  let bet = +document.getElementById("slotBet").value;
  if(!bet || bet > saldo) return alert("Apuesta inválida");

  let res = document.getElementById("slotRes");
  res.innerText = "Girando... 🎰";

  setTimeout(()=>{
    let s=["🍒","💎","7️⃣","⭐"];
    let a=s[Math.floor(Math.random()*4)];
    let b=s[Math.floor(Math.random()*4)];
    let c=s[Math.floor(Math.random()*4)];

    let win = (a===b && b===c);

    saldo += win ? bet*3 : -bet;

    res.innerText = `${a} ${b} ${c} → ${win?"JACKPOT 💰":"PERDISTE ❌"}`;
    update(); save();
  },1000);
}

function dice(){
  let bet = +document.getElementById("diceBet").value;
  if(!bet || bet > saldo) return alert("Apuesta inválida");

  let d = Math.floor(Math.random()*6)+1;
  let win = d>=4;

  saldo += win ? bet : -bet;

  document.getElementById("diceRes").innerText = `🎲 ${d}`;
  update(); save();
}

function roulette(){
  let bet = +document.getElementById("roulBet").value;
  let c = document.getElementById("color").value;

  if(!bet || bet > saldo) return alert("Apuesta inválida");

  let r = Math.random()<0.5?"rojo":"negro";
  let win = r===c;

  saldo += win ? bet : -bet;

  document.getElementById("roulRes").innerText = r;
  update(); save();
}

</script>

</body>
</html>
